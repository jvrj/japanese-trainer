/* v6.33 — Vocab Blitz topical sections. Same model as VERB_SECTIONS, but
   scoped to themes instead of explicit JP arrays — the deck's own `theme`
   field already curates membership (~50 time nouns, ~58 food, etc.) so
   theme-list filtering tracks new words automatically. Each section's
   `themes` is a list of theme keys; words whose theme matches any entry
   are eligible. "all" passes everything through. */
const VOCAB_SECTIONS = [
  { id:'all',      name:'All vocab',          emoji:'🔀', themes:null },
  { id:'time',     name:'Time',               emoji:'⏰', themes:['time'] },
  { id:'food',     name:'Food & drink',       emoji:'🍱', themes:['food'] },
  { id:'body',     name:'Body parts',         emoji:'🫀', themes:['body'] },
  { id:'family',   name:'Family & people',    emoji:'👨‍👩‍👧', themes:['family','people'] },
  { id:'home',     name:'Home & objects',     emoji:'🏠', themes:['home','objects'] },
  { id:'places',   name:'Places',             emoji:'🏪', themes:['places'] },
  { id:'travel',   name:'Travel',             emoji:'🚆', themes:['travel'] },
  { id:'nature',   name:'Nature & animals',   emoji:'🌳', themes:['nature','animals','weather'] },
  { id:'clothing', name:'Clothing & colors',  emoji:'👕', themes:['clothing','colors'] },
  { id:'school',   name:'School & work',      emoji:'📚', themes:['school','work','tech'] },
  { id:'numbers',  name:'Numbers',            emoji:'🔢', themes:['numbers'] },
  { id:'greetings',name:'Greetings & daily',  emoji:'👋', themes:['greetings','daily','feelings'] },
  /* v6.37 — boom-boom-boom recall sprint over everything you know cold.
     Pool = ★mastered + SM-2 mature words. Bypasses module gating, bypasses
     mastered-exclusion, bypasses SM-2 throttling. Just rotates so the
     hard-earned vocab stays sharp. */
  { id:'mastered', name:'Mastered review',    emoji:'🏆', themes:null, mode:'mastered' }
];
function vocabSectionById(id){ return VOCAB_SECTIONS.find(s => s.id === id) || VOCAB_SECTIONS[0]; }
function activeVocabSection(){
  const id = state.settings?.vocabSection || 'all';
  return vocabSectionById(id);
}
/* Apply the active section as a filter on a word list. "all" returns the list
   unchanged; otherwise restricts to words whose `theme` is in the section's
   themes list. Used by buildBlitzPool + blitzCounts so home + session both
   reflect the current scope. */
function vocabSectionFilter(words){
  const sec = activeVocabSection();
  /* v6.37 — Mastered review: pool is your ★mastered + SM-2 mature words. */
  if(sec.mode === 'mastered'){
    const masteredSet = new Set(state.settings.masteredWords || []);
    return words.filter(w => {
      if(masteredSet.has(w.id)) return true;
      const st = state.stats[w.id];
      return st && st.smInterval && st.smInterval >= BLITZ_MATURE_MIN;
    });
  }
  if(!sec.themes) return words;
  const set = new Set(sec.themes);
  return words.filter(w => set.has(w.theme));
}

function formEligibleVerbs(){
  const masteredSet = new Set(state.settings.masteredWords || []);
  const suspendedSet = new Set(state.settings.suspendedWords || []);
  const moduleIds = activeModuleWordIdSet();
  /* v6.32 — section filter. When the user has picked a section other than
     "all", restrict the eligible pool to that section's members. Form Drill
     (typed), Form Spam, and Build Mode's folded form_drill steps all flow
     through this function so the filter applies uniformly. */
  const section = activeVerbSection();
  const memberSet = section.members ? new Set(section.members) : null;
  return getActiveWords().filter(w =>
    w.pos === 'v' &&
    !masteredSet.has(w.id) &&
    !suspendedSet.has(w.id) &&
    (!moduleIds || moduleIds.has(w.id)) &&
    (!memberSet || memberSet.has(w.jp))
  );
}

function formDueCount(formId){
  const verbs = formEligibleVerbs();
  const t = now();
  let due = 0, unseen = 0;
  for(const w of verbs){
    const fst = state.formStats?.[w.id]?.[formId];
    if(!fst){ unseen++; continue; }
    ensureSm(fst);
    if(fst.smNext <= t) due++;
  }
  return {due, unseen, total: verbs.length};
}

/* v6.12 — aggregate counts across all (verb × form) pairs, used by the home
   surface to advertise Form Drills. */
function formCounts(){
  const verbs = formEligibleVerbs();
  const t = now();
  let due = 0, drilled = 0;
  const fs = state.formStats || {};
  for(const w of verbs){
    const wForms = fs[w.id] || {};
    for(const fid of Object.keys(wForms)){
      const st = wForms[fid];
      if(!st) continue;
      ensureSm(st);
      drilled++;
      if(st.smNext != null && st.smNext <= t) due++;
    }
  }
  return {verbs: verbs.length, due, drilled};
}

/* =========================================================================
   VOCAB BLITZ — SM-2 spaced repetition. Home's primary entry point.
   ========================================================================= */

function blitzCounts(){
  /* v6.33 — counts respect the active vocab section so the home subtitle
     reflects only what the next session will draw from.
     v6.37 — Mastered review: report the pool size as "due" so the hero CTA
     looks active ("12 ready to sprint" instead of "0 due · 0 new"). */
  if(activeVocabSection().mode === 'mastered'){
    const pool = vocabSectionFilter(getActiveWords());
    return {due: pool.length, overdue: pool.length, unseen: 0};
  }
  const active = vocabSectionFilter(getActiveWords());
  const t = now();
  let due = 0, overdue = 0, unseen = 0;
  for(const w of active){
    const st = state.stats[w.id];
    if(!st || !st.attempts?.length){ unseen++; continue; }
    ensureSm(st);
    if(st.smNext <= t){ due++; overdue++; }
  }
  return {due, overdue, unseen};
}

/* v4.22 — streak-to-graduate learning phase layered on SM-2.
   v4.24 — continuous flow: pool auto-refills as cards graduate; no answer cap. */

const BLITZ_STREAK_REQUIRED = 3;
const BLITZ_MATURE_MIN = SM_MASTERED_DAYS * 24 * 60; /* 7 d */

function buildBlitzPool(opts){
  opts = opts || {};
  const targetLearn = opts.targetLearn ?? (state.settings.blitzPoolLearning ?? 8);
  const targetMature = opts.targetMature ?? (state.settings.blitzPoolMature ?? 4);
  const exclude = opts.excludeIds || new Set();
  /* v6.10 — drillable (excludes Suspended + Mastered) instead of active.
     v6.33 — also restrict to active vocab section (theme group) when set. */
  const drillable = vocabSectionFilter(getDrillableWords()).filter(w => !exclude.has(w.id));
  /* v6.37 — Mastered review sprint: skip SM-2 throttling. Just rotate the
     pool of words you already know — fast recall to keep them sharp. Each
     entry needs only 1 correct to graduate (no streak), and they all enter
     as "mature" so the UI doesn't show learning-phase scaffolding. */
  if(activeVocabSection().mode === 'mastered'){
    const cap = targetLearn + targetMature;
    return shuffleFY(drillable.slice()).slice(0, cap).map(w => ({
      id:w.id, streak:0, required:1, answers:0, everWrong:false, mature:true, masteredReview:true
    }));
  }
  const t = now();
  const unseen = [], youngDue = [], youngNotDue = [], matureDue = [], focused = [];
  const focusSet = new Set(state.settings.focusWords || []);
  for(const w of drillable){
    const st = state.stats[w.id];
    if(focusSet.has(w.id)){
      /* v6.10 — focus words always go in (ahead of normal priority), regardless of due-date.
         Skipped here only if already at Mature — the auto-clear hook will remove the flag
         on next graduation, but in the meantime we treat them as normal mature reviews. */
      if(st){ ensureSm(st); }
      if(!st || st.smInterval < BLITZ_MATURE_MIN){
        focused.push(w);
        continue;
      }
    }
    if(!st || !st.attempts?.length){ unseen.push(w); continue; }
    ensureSm(st);
    if(st.smInterval >= BLITZ_MATURE_MIN){
      if(st.smNext <= t) matureDue.push({w, next: st.smNext});
    } else {
      if(st.smNext <= t) youngDue.push({w, next: st.smNext});
      else youngNotDue.push({w, next: st.smNext});
    }
  }
  matureDue.sort((a,b) => a.next - b.next);
  youngDue.sort((a,b) => a.next - b.next);
  youngNotDue.sort((a,b) => a.next - b.next); /* soonest-due last-resort */
  const matureSel = matureDue.slice(0, targetMature).map(x => x.w);
  /* v6.12.5 — discovery-first composition. Previously surfaced young-due
     before unseen, so a user who graduated ~12 cards yesterday saw the same
     12 today and never reached new vocab. Now: focus always wins, then a
     small dribble (~2 young-due) for recall, then unseen fills the rest.
     If unseen is depleted, recall fills the leftover slots. */
  const RECALL_DRIBBLE_SLOTS = 2;
  const cap = Math.max(targetLearn, focused.length);
  const slotsAfterFocus = Math.max(0, cap - focused.length);
  const recallReserve = Math.min(RECALL_DRIBBLE_SLOTS, youngDue.length + youngNotDue.length, slotsAfterFocus);
  const unseenSlots = Math.max(0, slotsAfterFocus - recallReserve);
  const unseenTake = shuffleFY(unseen.slice()).slice(0, Math.min(unseenSlots, unseen.length));
  const recallPool = [...youngDue.map(x => x.w), ...youngNotDue.map(x => x.w)];
  const recallTake = recallPool.slice(0, slotsAfterFocus - unseenTake.length);
  const learningSel = [...focused, ...unseenTake, ...recallTake].slice(0, cap);
  return shuffleFY([
    ...matureSel.map(w => ({id:w.id, streak:0, required:1, answers:0, everWrong:false, mature:true})),
    ...learningSel.map(w => ({id:w.id, streak:0, required:BLITZ_STREAK_REQUIRED, answers:0, everWrong:false, mature:false, focus: focusSet.has(w.id)})),
  ]);
}

function blitzRefillIfNeeded(){
  if(!state.blitz || !state.blitz.active) return;
  const target = state.blitz.poolTarget;
  if(!target) return;
  const halfway = Math.ceil(target / 2);
  if(state.blitz.pool.length > halfway) return;
  const deficit = target - state.blitz.pool.length;
  if(deficit <= 0) return;
  const exclude = new Set([
    ...state.blitz.pool.map(p => p.id),
    ...state.blitz.graduated,
  ]);
  /* Keep the mature:learning ratio roughly 1:2 when backfilling. */
  const defMature = Math.floor(deficit / 3);
  const defLearn = deficit - defMature;
  const fresh = buildBlitzPool({
    targetLearn: defLearn,
    targetMature: defMature,
    excludeIds: exclude,
  });
  if(!fresh.length) return;
  state.blitz.pool.push(...fresh);
  state.blitz.tally.total += fresh.length;
  state.blitz.tally.refills = (state.blitz.tally.refills || 0) + 1;
}

/* v6.9 — Vocab Blitz introduce phase: never-seen words get one exposure
   (EN + JP + romaji + 🔊) before entering test rotation. Mirrors Phrases
   (v6.6) and Variations (v6.8). Legacy stats with prior attempts are
   treated as already-introduced so existing learners don't get re-prompted. */
function vocabIsIntroduced(w){
  if(!w) return true;
  const st = state.stats[w.id];
  if(!st) return false;
  if(st.attempts && st.attempts.length > 0) return true;
  return !!st.introduced;
}
function vocabMarkIntroduced(id){
  const st = smStatFor(id);
  st.introduced = true;
  save();
  render();
  setTimeout(() => $('#blitzInput')?.focus(), 30);
}
window.vocabMarkIntroduced = vocabMarkIntroduced;

function startBlitz(){
  const poolTarget = (state.settings.blitzPoolLearning ?? 8) + (state.settings.blitzPoolMature ?? 4);
  const pool = buildBlitzPool();
  if(!pool.length){
    alert('No words due or available. Add words or enable the N5 pack in Settings.');
    return;
  }
  const direction = state.settings.blitzDirection || 'jp-en';
  state.blitz = {
    active: true, complete: false,
    direction,
    currentDir: resolveBlitzDir(direction),
    pool,
    graduated: [],
    recent: [],
    currentId: pool[0].id,
    submitted: false, input: '', autoCorrect: null, justGraduated: null,
    totalAnswers: 0,
    poolTarget,
    tally: {correct:0, wrong:0, graduated:0, total: pool.length, refills:0, struggled:0},
  };
  clearNextTimer();
  nav('blitz');
}
window.startBlitz = startBlitz;

function blitzCurrent(){
  if(!state.blitz || !state.blitz.active) return null;
  const id = state.blitz.currentId;
  if(!id) return null;
  return state.words.find(w => w.id === id) || null;
}

function blitzPoolItem(){
  if(!state.blitz) return null;
  return state.blitz.pool.find(p => p.id === state.blitz.currentId) || null;
}

function blitzPickNext(){
  if(!state.blitz) return null;
  const pool = state.blitz.pool;
  if(!pool.length) return null;
  /* v5.1: widened gap to combat shape-recognition zombie reviewing — force
     real forgetting between exposures of the same card in-session. */
  const gap = Math.min(6, pool.length - 1);
  const blocked = new Set((state.blitz.recent || []).slice(-gap));
  const eligible = pool.filter(p => !blocked.has(p.id));
  const candidates = eligible.length ? eligible : pool;
  return candidates[Math.floor(Math.random() * candidates.length)].id;
}

function resolveBlitzDir(dir){
  if(dir === 'mixed') return Math.random() < 0.5 ? 'jp-en' : 'en-jp';
  return dir === 'en-jp' ? 'en-jp' : 'jp-en';
}

function blitzToggleDir(){
  if(!state.blitz) return;
  const next = {'jp-en':'en-jp', 'en-jp':'mixed', 'mixed':'jp-en'};
  state.blitz.direction = next[state.blitz.direction] || 'jp-en';
  state.blitz.currentDir = resolveBlitzDir(state.blitz.direction);
  state.settings.blitzDirection = state.blitz.direction;
  save();
  render();
  setTimeout(() => $('#blitzInput')?.focus(), 30);
}
window.blitzToggleDir = blitzToggleDir;

let blitzAdvanceTimer = null;
function clearBlitzAdvanceTimer(){ if(blitzAdvanceTimer){ clearTimeout(blitzAdvanceTimer); blitzAdvanceTimer = null; } }

function blitzRecordAnswer(w, poolItem, isCorrect){
  updateStreak(isCorrect);
  const st = smStatFor(w.id);
  st.attempts = st.attempts || [];
  st.attempts.push({ts: now(), correct: isCorrect, voice: false, blitz: true});
  if(isCorrect && !st.firstCorrect) st.firstCorrect = now();
  st.lastSeen = now();
  poolItem.answers++;
  state.blitz.totalAnswers++;
  state.blitz.recent = [...(state.blitz.recent || []), poolItem.id].slice(-8);
  if(isCorrect){
    poolItem.streak++;
    state.blitz.tally.correct++;
    if(poolItem.streak >= poolItem.required){
      /* Graduate: SM-2 Good. Within-session stumbles don't penalize long-term. */
      smGrade(st, 'good');
      /* v6.10 — auto-clear focus when the word reaches Mature. */
      libraryAutoClearFocusIfMature(poolItem.id);
      state.blitz.pool = state.blitz.pool.filter(p => p.id !== poolItem.id);
      state.blitz.graduated.push(poolItem.id);
      state.blitz.tally.graduated++;
      state.blitz.justGraduated = poolItem.id;
    } else {
      state.blitz.justGraduated = null;
    }
  } else {
    poolItem.streak = 0;
    poolItem.everWrong = true;
    state.blitz.tally.wrong++;
    state.blitz.justGraduated = null;
  }
}

function blitzSubmit(){
  if(!state.blitz || state.blitz.submitted) return;
  const w = blitzCurrent();
  const poolItem = blitzPoolItem();
  if(!w || !poolItem) return;
  const inp = $('#blitzInput');
  state.blitz.input = inp?.value || '';
  const res = checkAnswer(state.blitz.input, w, state.blitz.currentDir || state.blitz.direction);
  state.blitz.autoCorrect = !!res.correct;
  state.blitz.submitted = true;
  blitzRecordAnswer(w, poolItem, !!res.correct);
  save();
  render();
  clearBlitzAdvanceTimer();
  if(res.correct){
    setTimeout(() => $('#blitzContinue')?.focus(), 30);
    blitzAdvanceTimer = setTimeout(blitzAdvance, 900);
  } else {
    /* v5.1: wrong answer — force user to type the correct answer to continue
       (kills shape-recognition / zombie reviewing). */
    setTimeout(() => $('#blitzConfirm')?.focus(), 30);
  }
}
window.blitzSubmit = blitzSubmit;

function blitzReveal(){
  if(!state.blitz || state.blitz.submitted) return;
  const w = blitzCurrent();
  const poolItem = blitzPoolItem();
  if(!w || !poolItem) return;
  const inp = $('#blitzInput');
  state.blitz.input = inp?.value || '';
  state.blitz.autoCorrect = false;
  state.blitz.submitted = true;
  blitzRecordAnswer(w, poolItem, false);
  save();
  render();
  clearBlitzAdvanceTimer();
  /* v5.1: reveal = wrong, force typing to continue. */
  setTimeout(() => $('#blitzConfirm')?.focus(), 30);
}
window.blitzReveal = blitzReveal;

/* v6.12 — one-tap mastered-button shown post-correct-answer in Vocab Blitz.
   Marks the word as mastered (so it's filtered from future drilling sessions
   AND from Build Mode picks via getDrillableWords / Item 4 above), removes it
   from the active session pool, then advances to the next card. */
function blitzMasterCurrent(){
  if(!state.blitz) return;
  const w = blitzCurrent();
  if(!w) return;
  const s = state.settings;
  if(!(s.masteredWords || []).includes(w.id)){
    s.focusWords = (s.focusWords || []).filter(x => x !== w.id);
    s.suspendedWords = (s.suspendedWords || []).filter(x => x !== w.id);
    s.masteredWords = s.masteredWords || [];
    s.masteredWords.push(w.id);
  }
  state.blitz.pool = state.blitz.pool.filter(p => p.id !== w.id);
  if(!state.blitz.graduated.includes(w.id)) state.blitz.graduated.push(w.id);
  save();
  blitzAdvance();
}
window.blitzMasterCurrent = blitzMasterCurrent;

function blitzAdvance(){
  clearBlitzAdvanceTimer();
  if(!state.blitz) return;
  state.blitz.submitted = false;
  state.blitz.input = '';
  state.blitz.autoCorrect = null;
  state.blitz.justGraduated = null;
  blitzRefillIfNeeded();
  if(!state.blitz.pool.length){
    /* Deck exhausted — no more cards to pull. Session ends naturally. */
    state.blitz.active = false;
    state.blitz.complete = true;
    state.blitz.currentId = null;
    save();
    render();
    return;
  }
  state.blitz.currentId = blitzPickNext();
  state.blitz.currentDir = resolveBlitzDir(state.blitz.direction);
  save();
  render();
  setTimeout(() => $('#blitzInput')?.focus(), 30);
}
window.blitzAdvance = blitzAdvance;

function blitzSkip(){
  if(!state.blitz) return;
  if(!confirm('Skip this card without recording it?')) return;
  clearBlitzAdvanceTimer();
  state.blitz.pool = state.blitz.pool.filter(p => p.id !== state.blitz.currentId);
  state.blitz.submitted = false;
  state.blitz.input = '';
  state.blitz.autoCorrect = null;
  state.blitz.justGraduated = null;
  if(!state.blitz.pool.length){
    state.blitz.active = false;
    state.blitz.complete = true;
    state.blitz.currentId = null;
  } else {
    state.blitz.currentId = blitzPickNext();
    state.blitz.currentDir = resolveBlitzDir(state.blitz.direction);
  }
  save();
  render();
  setTimeout(() => $('#blitzInput')?.focus(), 30);
}
window.blitzSkip = blitzSkip;

function blitzEnd(){
  clearBlitzAdvanceTimer();
  if(state.blitz && state.blitz.active){
    /* Apply SM-2 Again only to cards the user struggled on (wrong ≥ once) but didn't graduate.
       Clean quits on never-touched cards don't penalize the schedule. */
    const struggled = state.blitz.pool.filter(p => p.everWrong);
    for(const p of struggled){
      const st = smStatFor(p.id);
      smGrade(st, 'again');
    }
    save();
  }
  state.blitz = null;
  nav('home');
}
window.blitzEnd = blitzEnd;

function renderBlitz(){
  const b = state.blitz;
  // Cancel any pending voice listener / timer from a prior render before
  // scheduling a new one. Without this, rapid re-renders (toggleDir, advance)
  // can leak overlapping STT sessions.
  if(typeof _blitzVoiceClear === 'function') _blitzVoiceClear();
  if(!b) return `<div class="card"><div class="muted">No active session.</div>
    <button class="btn btn-primary" style="margin-top:12px" onclick="startBlitz()">Start</button></div>`;

  if(b.complete){
    const t = b.tally;
    const attempts = t.correct + t.wrong;
    const accPct = attempts ? Math.round(100 * t.correct / attempts) : 0;
    return `<div class="card">
      <h2 style="margin-top:0">Deck clear</h2>
      <div class="muted" style="font-size:13px;margin-bottom:8px">Nothing left to pull — every available card graduated. Come back later when reviews are due.</div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num">${t.graduated}</div><div class="stat-label">Graduated</div></div>
        <div class="stat-box"><div class="stat-num">${t.correct}</div><div class="stat-label">Correct</div></div>
        <div class="stat-box"><div class="stat-num">${t.wrong}</div><div class="stat-label">Wrong</div></div>
        <div class="stat-box"><div class="stat-num">${accPct}%</div><div class="stat-label">Accuracy</div></div>
      </div>
      <div class="spacer"></div>
      <button class="btn btn-primary" style="width:100%" onclick="startBlitz()">Start another session</button>
      <div class="spacer"></div>
      <button class="btn btn-secondary" style="width:100%" onclick="blitzEnd()">Done</button>
    </div>`;
  }

  const w = blitzCurrent();
  const poolItem = blitzPoolItem();
  if(!w || !poolItem) return `<div class="card"><div class="muted">No cards.</div></div>`;

  const cur = b.currentDir || b.direction;
  const prompt = cur === 'jp-en' ? w.jp : w.en;
  const answer = cur === 'jp-en' ? w.en : w.jp;
  const inputPlaceholder = cur === 'jp-en' ? 'type English meaning' : 'type Japanese in hiragana';
  const curArrow = cur === 'jp-en' ? 'JP → EN' : 'EN → JP';
  const dirLabel = b.direction === 'mixed' ? `Mixed · ${curArrow}` : curArrow;

  const streakLabel = poolItem.mature
    ? `Mature · confirm 1×`
    : `Streak ${poolItem.streak}/${poolItem.required}`;
  const progressLabel = `${b.tally.graduated}/${b.tally.total} graduated · pool ${b.pool.length}`;

  const voicePill = voiceSupported() ? `<button class="btn btn-ghost" style="padding:6px 10px;font-size:12px;${state.settings.buildVoiceMode ? 'color:var(--blue);border-color:var(--blue)' : 'color:var(--muted)'}" onclick="blitzToggleVoiceMode()" title="Hands-free voice mode — listens for your spoken answer">${state.settings.buildVoiceMode ? '🎙️ Voice ON' : '🎙 Voice'}</button>` : '';
  const head = `<div class="card" style="padding:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap">
      <span class="muted" style="font-size:13px">${esc(progressLabel)}</span>
      <span class="muted" style="font-size:12px">${esc(streakLabel)}</span>
      <div style="display:flex;gap:6px">
        ${voicePill}
        <button class="btn btn-secondary" style="padding:6px 10px;font-size:12px" onclick="blitzToggleDir()">${esc(dirLabel)} ⇄</button>
      </div>
    </div>
  </div>`;

  /* v6.9 — introduce phase: never-seen words get one exposure before test rotation. */
  if(!b.submitted && !vocabIsIntroduced(w)){
    const romaji = w.romaji || kanaToRomaji(w.jp);
    /* autoplay JP once when the introduce card first mounts for this word */
    if(b._lastIntroAutoplay !== w.id){
      b._lastIntroAutoplay = w.id;
      setTimeout(() => { try{ speakJP(w.jp); }catch(e){} }, 300);
    }
    // Voice mode: skip the "Got it — drill me" tap by auto-promoting after a beat.
    if(typeof _blitzVoiceMaybeAutoIntroduce === 'function') _blitzVoiceMaybeAutoIntroduce();
    return head + `<div class="card">
      <div class="muted" style="text-align:center;font-size:12px;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">New word</div>
      <div style="font-size:18px;text-align:center;color:var(--text);margin-bottom:14px;line-height:1.4">${esc(w.en)}</div>
      <div class="jp" style="font-size:36px;text-align:center;font-weight:700;line-height:1.4;padding:6px 8px">${esc(w.jp)}</div>
      ${romaji ? `<div class="muted" style="text-align:center;font-size:14px;font-style:italic;margin-top:4px;letter-spacing:0.02em">${esc(romaji)}</div>` : ''}
      <div class="spacer"></div>
      <div class="audio-row">
        <button class="audio-btn" onclick="speakJP('${jsEsc(w.jp)}')">🔊 Listen again</button>
      </div>
      <div class="spacer"></div>
      <div class="muted" style="font-size:12px;text-align:center;margin-bottom:10px">Read it, hear it, say it aloud. Tap when ready to drill.</div>
      <button class="btn btn-primary" style="width:100%" onclick="vocabMarkIntroduced('${jsEsc(w.id)}')">Got it — drill me</button>
      <div class="spacer"></div>
      <button class="btn btn-secondary" style="width:100%;font-size:12px" onclick="blitzSkip()">Skip card</button>
    </div>`;
  }

  if(!b.submitted){
    // Voice mode: speak the prompt (if JP→EN) and listen for the answer.
    // Always scheduled — _blitzVoiceListen self-aborts if voice mode is off.
    if(typeof _blitzVoiceListen === 'function') setTimeout(_blitzVoiceListen, 80);
    const voiceOn = state.settings.buildVoiceMode && voiceSupported();
    const sayLang = (cur === 'jp-en') ? 'English' : 'Japanese';
    const voiceLine = voiceOn
      ? `<div id="blitzVoiceLabel" style="text-align:center;font-size:13px;padding:10px 12px;margin-bottom:8px;background:rgba(100,150,255,0.1);border:1px solid var(--blue);border-radius:10px;color:var(--blue);font-weight:600">🎙️ Voice mode — say it in <b>${esc(sayLang)}</b></div>
         <button class="btn btn-blue" style="width:100%;font-size:14px;padding:12px;margin-bottom:10px" onclick="_blitzVoiceListen(true)">🎤 Listen now (manual)</button>`
      : '';
    return head + `<div class="card">
      ${voiceLine}
      <div class="muted" style="font-size:12px;margin-bottom:6px">${cur === 'jp-en' ? 'Japanese' : 'English'}</div>
      <div style="font-size:32px;text-align:center;padding:16px 0">${esc(prompt)}</div>
      <input id="blitzInput" class="input" type="text" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="${esc(inputPlaceholder)}" onkeydown="if(event.key==='Enter'){event.preventDefault();blitzSubmit();}">
      <div class="spacer"></div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="blitzReveal()">Reveal</button>
        <button class="btn btn-primary" onclick="blitzSubmit()">Submit</button>
      </div>
      <div class="spacer"></div>
      <button class="btn btn-secondary" style="width:100%;font-size:12px" onclick="blitzSkip()">Skip card</button>
    </div>`;
  }

  const correct = !!b.autoCorrect;
  const graduated = !!b.justGraduated;
  // Voice mode: skip the "type the correct answer" tap gate — speak the JP
  // once and auto-advance after a beat so the driver isn't stranded.
  if(!correct && typeof _blitzVoiceMaybeAutoAdvanceAfterWrong === 'function'){
    _blitzVoiceMaybeAutoAdvanceAfterWrong();
  }
  const accent = graduated ? 'var(--blue)' : (correct ? 'var(--green)' : 'var(--red)');
  const gradStat = graduated ? state.stats[b.justGraduated] : null;
  const nextLbl = gradStat ? smIntervalLabel(gradStat.smInterval) : '';
  const verdict = graduated ? `Graduated ✓ · next in ${esc(nextLbl)}` : (correct ? 'Correct' : 'Wrong');
  const userShown = b.input ? esc(b.input) : '<span class="muted">(nothing typed)</span>';
  const streakAfter = graduated ? '' : (correct
    ? `<div class="muted" style="font-size:12px;text-align:center;margin-top:4px">Streak ${poolItem.streak}/${poolItem.required}</div>`
    : `<div class="muted" style="font-size:12px;text-align:center;margin-top:4px">Streak reset — keep drilling</div>`);

  const continueCtl = correct
    ? `<div style="display:flex;gap:6px;width:100%">
         <button id="blitzContinue" class="btn btn-primary" style="flex:1" onclick="blitzAdvance()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();blitzAdvance();}">Continue ↵</button>
         <button class="btn btn-secondary" style="padding:0 14px;font-size:13px" onclick="blitzMasterCurrent()" title="Mastered — never see again">★ Master</button>
       </div>`
    : `<div class="muted" style="font-size:12px;margin-bottom:4px">Type <b>${esc(answer)}</b> to continue:</div>
       <input id="blitzConfirm" class="input" type="text" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="retype the correct answer" oninput="blitzTypeToContinue()" onkeydown="if(event.key==='Enter'){event.preventDefault();blitzTypeToContinue();}">`;
  /* v6.12.9 — if the user's wrong answer matches another deck word, show what
     they actually typed. Teaches the mistake instead of just rejecting it.
     v6.12.11 — show both JP + EN of the matched word, since input can be
     either language regardless of direction. */
  const wrongMatch = (!correct && b.input) ? blitzFindMatchingWord(b.input, w, cur) : null;
  let matchHint = '';
  if(wrongMatch){
    const inputShown = String(b.input).trim();
    matchHint = `<div style="font-size:13px;margin-top:6px;padding:8px 10px;background:rgba(255,255,255,0.04);border-radius:4px;border-left:3px solid var(--blue)"><span class="muted">"${esc(inputShown)}" is actually:</span> <b class="jp">${esc(wrongMatch.jp)}</b>${wrongMatch.romaji ? ` <span class="muted">${esc(wrongMatch.romaji)}</span>` : ''} <span class="muted">→</span> <b>${esc(wrongMatch.en)}</b></div>`;
  }
  return head + `<div class="card" style="border:2px solid ${accent}">
    <div style="color:${accent};font-weight:600;font-size:14px;text-align:center;margin-bottom:6px">${verdict}</div>
    ${streakAfter}
    <div class="muted" style="font-size:12px;margin-bottom:6px">${cur === 'jp-en' ? 'Japanese' : 'English'}</div>
    <div style="font-size:28px;text-align:center;padding:4px 0 10px">${esc(prompt)}</div>
    <div class="divider"></div>
    <div style="font-size:13px;margin-top:8px"><span class="muted">Your answer:</span> ${userShown}</div>
    ${matchHint}
    <div style="font-size:15px;margin-top:6px"><span class="muted">Correct:</span> <b>${esc(answer)}</b>${w.romaji?` <span class="muted">${esc(w.romaji)}</span>`:''}</div>
    <div class="spacer"></div>
    ${continueCtl}
  </div>`;
}

function blitzTypeToContinue(){
  const b = state.blitz;
  if(!b || !b.submitted || b.autoCorrect) return;
  const inp = $('#blitzConfirm');
  if(!inp) return;
  const w = blitzCurrent();
  if(!w) return;
  const cur = b.currentDir || b.direction;
  const res = checkAnswer(inp.value, w, cur);
  if(res.correct) blitzAdvance();
}
window.blitzTypeToContinue = blitzTypeToContinue;

/* =========================================================================
   VOCAB BLITZ — VOICE MODE
   When state.settings.buildVoiceMode is on, every Blitz card auto-listens for
   the answer in the right language (EN for jp-en direction, JP for en-jp),
   drops the best transcript into the input, and submits. On STT failure the
   user can still type — the input is focused as fallback. After the wrong-
   answer "type to continue" gate, voice mode auto-advances after a beat so
   driving doesn't strand on a typing requirement.
   ========================================================================= */
let _blitzVoiceTimer = null;
function _blitzVoiceClear(){
  if(_blitzVoiceTimer){ clearTimeout(_blitzVoiceTimer); _blitzVoiceTimer = null; }
  if(state.voiceListening){ try{ stopVoice(); }catch(e){} }
}
function _blitzSetListenLabel(text){
  // Update the in-card listening label without a full re-render.
  const el = document.getElementById('blitzVoiceLabel');
  if(el) el.textContent = text;
}
function _blitzVoiceListen(manual){
  const b = state.blitz;
  if(!b){ _blitzSetListenLabel('— no session'); return; }
  if(b.complete){ _blitzSetListenLabel('— session complete'); return; }
  if(b.submitted){ _blitzSetListenLabel('— card already submitted'); return; }
  if(!_buildVoiceModeActive()){
    _blitzSetListenLabel(voiceSupported() ? '— voice mode is OFF' : '— STT unsupported in this browser');
    return;
  }
  if(state.screen !== 'blitz'){ _blitzSetListenLabel('— not on blitz screen'); return; }
  const w = blitzCurrent();
  if(!w){ _blitzSetListenLabel('— no current word'); return; }
  if(!vocabIsIntroduced(w)){
    // New word — let the introduce phase run; my auto-introduce promotes after a beat.
    _blitzSetListenLabel('— introducing new word, listen will start after');
    return;
  }
  const cur = b.currentDir || b.direction;
  const lang = cur === 'jp-en' ? 'en-US' : 'ja-JP';
  const sayLangLabel = cur === 'jp-en' ? 'English' : 'Japanese';
  const listenSec = Math.max(3, Math.min(15, state.settings.voiceListenSec || 7));

  const startListen = () => {
    if(state.screen !== 'blitz' || !state.blitz || state.blitz.submitted){
      _blitzSetListenLabel('— state changed before listen could start');
      return;
    }
    _blitzSetListenLabel(`🎤 LISTENING — say it in ${sayLangLabel}`);
    let alts = [];
    let started = false;
    try{
      startVoice(
        (results) => { alts = results || []; if(alts.length) _blitzSetListenLabel(`📝 heard partial: "${alts[0].transcript}"`); },
        (err) => {
          if(state.screen !== 'blitz' || !state.blitz || state.blitz.submitted) return;
          if(err){
            const code = err && err.error;
            if(code === 'not-allowed' || code === 'service-not-allowed'){
              _blitzSetListenLabel('🚫 MIC BLOCKED — allow in browser, then re-toggle');
              showToast('Microphone permission is blocked. Allow it in your browser site settings, then re-toggle voice mode.', {tone:'warn', duration:7000});
              state.settings.buildVoiceMode = false;
              save();
              render();
              return;
            }
            if(code === 'language-not-supported' || code === 'bad-grammar'){
              _blitzSetListenLabel(`🚫 STT language ${lang} unsupported here`);
              showToast(`Speech recognition for ${lang} not available in this browser.`, {tone:'warn', duration:5000});
              return;
            }
            if(code === 'no-speech'){
              _blitzSetListenLabel('🤔 no speech detected — revealing');
              if(typeof blitzReveal === 'function') blitzReveal();
              return;
            }
            _blitzSetListenLabel(`🚫 STT error: ${code || 'unknown'}`);
          }
          if(!alts.length){
            _blitzSetListenLabel('🤔 nothing captured — revealing the answer');
            if(typeof blitzReveal === 'function') blitzReveal();
            return;
          }
          const best = alts.slice().sort((a,c) => (c.conf||0) - (a.conf||0))[0];
          const heard = (best.transcript || '').trim();
          _blitzSetListenLabel(`✓ heard: "${heard}" — submitting`);
          const inp = $('#blitzInput');
          if(inp){ inp.value = heard; }
          blitzSubmit();
        },
        lang
      );
      started = true;
    } catch(e){
      _blitzSetListenLabel(`🚫 startVoice threw: ${String(e && e.message || e)}`);
      return;
    }
    if(!started) return;
    _blitzVoiceTimer = setTimeout(() => {
      if(state.voiceListening){ try{ stopVoice(); }catch(e){} }
    }, listenSec * 1000 + 2500);
  };

  if(cur === 'jp-en'){
    _blitzSetListenLabel('🔊 speaking the JP prompt…');
    _buildSpeakJP(w.jp, () => {
      _blitzSetListenLabel('🎙 prompt done — listen starting');
      _blitzVoiceTimer = setTimeout(startListen, 200);
    });
  } else {
    _blitzSetListenLabel('🎙 voice mode armed — listen starting');
    _blitzVoiceTimer = setTimeout(startListen, manual ? 50 : 250);
  }
}
window._blitzVoiceListen = _blitzVoiceListen;
/* Auto-advance the wrong-answer "type the correct answer to continue" gate
   when voice mode is on. The user can hear the JP TTS once (auto-played by
   the existing reveal flow) then we move them on, instead of stranding on
   a typing requirement that's unsafe to fulfil while driving. */
function _blitzVoiceMaybeAutoAdvanceAfterWrong(){
  if(!_buildVoiceModeActive()) return;
  const b = state.blitz;
  if(!b || !b.submitted || b.autoCorrect) return;
  // Speak the correct answer once, then auto-advance after a short linger.
  const w = blitzCurrent();
  if(w){ try{ speakJP(w.jp); }catch(e){} }
  _blitzVoiceClear();
  _blitzVoiceTimer = setTimeout(() => {
    if(state.screen !== 'blitz' || !state.blitz || !state.blitz.submitted) return;
    blitzAdvance();
  }, 2800);
}
/* Auto-advance the introduce phase in voice mode after the user has heard
   the new word a couple times. Without this, voice users hit the "Got it —
   drill me" button which is a tap-required gate. */
function _blitzVoiceMaybeAutoIntroduce(){
  if(!_buildVoiceModeActive()) return;
  const b = state.blitz;
  if(!b || b.complete || b.submitted) return;
  const w = blitzCurrent();
  if(!w || vocabIsIntroduced(w)) return;
  if(state.screen !== 'blitz') return;
  _blitzVoiceClear();
  _blitzVoiceTimer = setTimeout(() => {
    if(state.screen !== 'blitz' || !state.blitz) return;
    const cur = blitzCurrent();
    if(cur && !vocabIsIntroduced(cur)) vocabMarkIntroduced(cur.id);
  }, 2400);
}

/* Keyboard shortcuts when a card is revealed.
   Blitz + Form Blitz: Enter/Space advance; no per-grade keys (auto-graded).
   Form Drill: 1 = Again · 2 = Good · 3 = Easy (self-graded). */
document.addEventListener('keydown', e => {
  if(state.screen !== 'blitz' && state.screen !== 'formDrill' && state.screen !== 'formBlitz' && state.screen !== 'kanaBlitz') return;
  const live = state.screen === 'blitz' ? state.blitz
             : state.screen === 'formBlitz' ? state.formBlitz
             : state.screen === 'kanaBlitz' ? state.kanaBlitz
             : state.formDrill;
  if(!live || !live.submitted) return;
  if(e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
  if(state.screen === 'blitz'){
    /* v5.1: wrong answers must be typed to continue — don't let Enter/Space
       bypass the typing gate when confirm input has lost focus. */
    if((e.key === 'Enter' || e.key === ' ') && live.autoCorrect){ e.preventDefault(); blitzAdvance(); }
    return;
  }
  if(state.screen === 'formBlitz'){
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); formBlitzAdvance(); }
    return;
  }
  if(state.screen === 'kanaBlitz'){
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); kanaBlitzAdvance(); }
    return;
  }
  if(e.key === '1'){ e.preventDefault(); formDrillGrade('again'); }
  else if(e.key === '2'){ e.preventDefault(); formDrillGrade('good'); }
  else if(e.key === '3'){ e.preventDefault(); formDrillGrade('easy'); }
});

/* =========================================================================
   FORM DRILLS — one sub-section per verb form; per-form per-verb SRS.
   ========================================================================= */

function renderForms(){
  const verbs = formEligibleVerbs();
  const available = verbs.length;
  if(!available){
    return `<div class="card">
      <h3 style="margin-top:0">No verbs in your deck</h3>
      <div class="muted">Add a verb or enable the N5 pack in Settings and form drills will populate here.</div>
    </div>`;
  }
  const totalPairs = available * FORMS.length;
  const blitzCard = `<div class="card" style="border:1px solid var(--border)">
    <div style="display:flex;align-items:baseline;justify-content:space-between;gap:8px">
      <h3 style="margin:0">⚡ Mixed Form Blitz</h3>
      <span class="muted" style="font-size:12px">${totalPairs} pairs</span>
    </div>
    <div class="muted" style="font-size:13px;margin:4px 0 10px">Recall drill across all forms. JP form shown → type the English meaning. Same rhythm as Vocab Blitz.</div>
    <button class="btn btn-primary" style="width:100%" onclick="startFormBlitz()">▶ Start mixed form blitz</button>
  </div>`;
  /* v6.15 — pick a deck verb to use as the worked example. Prefer a regular
     ichidan/godan with a short dictionary form so the example reads cleanly. */
  const exampleVerb = verbs.find(v => v.jp === 'たべる') || verbs.find(v => v.jp === 'のむ') || verbs[0];
  const cards = FORMS.map(f => {
    const counts = formDueCount(f.id);
    const ready = counts.total > 0;
    const label = counts.due > 0
      ? `${counts.due} due · ${counts.unseen} new`
      : (counts.unseen > 0 ? `${counts.unseen} new · 0 due` : 'all scheduled');
    let exJp = '', exEn = '';
    if(exampleVerb){
      try { exJp = f.conj(exampleVerb.jp); } catch(e){ exJp = exampleVerb.jp; }
      try { exEn = (typeof f.en === 'function' ? f.en(exampleVerb) : '') || stripTo(exampleVerb.en); } catch(e){ exEn = stripTo(exampleVerb.en); }
    }
    const exampleBlock = exJp ? `
      <div style="margin-top:8px;padding:8px 10px;background:rgba(255,255,255,0.03);border-radius:6px;font-size:13px">
        <div class="muted" style="font-size:11px;margin-bottom:2px">e.g. ${esc(exampleVerb.jp)} →</div>
        <div><b>${esc(exJp)}</b> · <span class="muted">${esc(exEn)}</span></div>
      </div>` : '';
    return `<div class="card" style="padding:12px">
      <div style="display:flex;align-items:baseline;justify-content:space-between;gap:8px">
        <h3 style="margin:0">${esc(f.name)}</h3>
        <span class="muted" style="font-size:12px">${esc(label)}</span>
      </div>
      <div class="muted" style="font-size:13px;margin:4px 0 8px">${esc(f.hint)}</div>
      <details style="margin-bottom:10px">
        <summary style="cursor:pointer;font-size:12px;color:var(--muted)">ⓘ How this works</summary>
        <div style="font-size:13px;line-height:1.5;margin-top:6px;padding:0 2px">${esc(f.rule || '')}</div>
        ${exampleBlock}
      </details>
      <button class="btn ${ready?'btn-primary':'btn-secondary'}" style="width:100%" ${ready?'':'disabled'} onclick="startFormDrill('${f.id}')">
        ${ready ? '▶ Drill this form (typed)' : 'No eligible verbs yet'}
      </button>
      <div style="height:6px"></div>
      <button class="btn btn-blue" style="width:100%" ${ready?'':'disabled'} onclick="startBuildModeFormSpam('${f.id}')">
        🎲 Spam in Build Mode (audio, out loud)
      </button>
    </div>`;
  }).join('');
  /* v6.32 — section chip row. One sticky selection across all forms below;
     persisted in settings.formSection. Chips that would yield 0 verbs after
     other filters (mastered/suspended/module) are still shown but disabled. */
  const activeSec = state.settings?.formSection || 'all';
  const sectionChips = VERB_SECTIONS.map(sec => {
    /* Count this section's members that survive the rest of the filters. */
    const masteredSet = new Set(state.settings.masteredWords || []);
    const suspendedSet = new Set(state.settings.suspendedWords || []);
    const moduleIds = activeModuleWordIdSet();
    const memberSet = sec.members ? new Set(sec.members) : null;
    const count = getActiveWords().filter(w =>
      w.pos === 'v' &&
      !masteredSet.has(w.id) &&
      !suspendedSet.has(w.id) &&
      (!moduleIds || moduleIds.has(w.id)) &&
      (!memberSet || memberSet.has(w.jp))
    ).length;
    const isActive = activeSec === sec.id;
    const disabled = count === 0;
    const bg = isActive ? 'background:var(--blue);color:#fff;border-color:var(--blue)' : '';
    const op = disabled ? 'opacity:0.4;cursor:not-allowed' : '';
    return `<button class="btn btn-secondary" style="padding:6px 10px;font-size:12px;${bg};${op}"
      ${disabled ? 'disabled' : `onclick="setFormSection('${sec.id}')"`}>
      ${esc(sec.emoji)} ${esc(sec.name)} <span class="muted" style="font-size:10px;${isActive?'color:#fff':''}">(${count})</span>
    </button>`;
  }).join('');
  const sectionRow = `<div class="card">
    <div class="muted" style="font-size:12px;margin-bottom:6px">Drill scope — applies to all forms below + Spam in Build Mode</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">${sectionChips}</div>
  </div>`;

  return `${sectionRow}${blitzCard}<div class="card">
    <div class="muted" style="font-size:13px"><b>${available}</b> verb${available===1?'':'s'} graduated in Vocab Blitz — available for form drilling. Pick a single form below for focused self-graded practice.</div>
  </div>${cards}`;
}

/* v6.29 — Form Drill recency tracker. The prior queue picked 2/3 due + 1/3
   unseen, but common short-interval verbs (たべる/のむ/いく/みる/...) were
   ALWAYS due each session, so users saw the same ~30 verbs every drill.
   Now we track the last ~80 form-drill verb-form pairs across sessions
   and deprioritize them, AND flip the ratio to favor unseen — sessions
   feel like genuine variety instead of an SRS treadmill. */
const FORM_LS_RECENT = 'jp4_form_recent';
const FORM_RECENT_CAP = 80;
function formRecentGet(){
  try{ const r = JSON.parse(localStorage.getItem(FORM_LS_RECENT) || '{}'); return r.pairs || []; }
  catch(e){ return []; }
}
function formRecentPush(verbId, formId){
  if(!verbId || !formId) return;
  const key = verbId + '|' + formId;
  const list = formRecentGet().filter(x => x !== key);
  list.push(key);
  while(list.length > FORM_RECENT_CAP) list.shift();
  try{ localStorage.setItem(FORM_LS_RECENT, JSON.stringify({pairs:list})); }catch(_){}
}
function formRecentSet(formId){
  /* Set of verb_ids drilled with THIS form recently. Used to deprioritize. */
  const out = new Set();
  for(const k of formRecentGet()){
    const [vid, fid] = k.split('|');
    if(fid === formId) out.add(vid);
  }
  return out;
}

function buildFormQueue(formId, maxN){
  const verbs = formEligibleVerbs();
  const t = now();
  const recent = formRecentSet(formId);
  const dueFresh = [], dueStale = [], unseenFresh = [], unseenStale = [];
  for(const w of verbs){
    const fst = state.formStats?.[w.id]?.[formId];
    const isStale = recent.has(w.id);
    if(!fst){ (isStale ? unseenStale : unseenFresh).push(w); continue; }
    ensureSm(fst);
    if(fst.smNext <= t) (isStale ? dueStale : dueFresh).push({w, next: fst.smNext});
  }
  dueFresh.sort((a,b) => a.next - b.next);
  dueStale.sort((a,b) => a.next - b.next);
  /* v6.29 — flipped ratio: prioritize unseenFresh and dueFresh, only fall
     back to recently-drilled verbs after fresh wells run dry. Caps:
     unseenFresh up to maxN/2, dueFresh up to maxN/3, then anything else. */
  const slotsUnseenFresh = Math.ceil(maxN / 2);
  const slotsDueFresh = Math.ceil(maxN / 3);
  const picks = [
    ...shuffleFY(unseenFresh).slice(0, slotsUnseenFresh),
    ...dueFresh.slice(0, slotsDueFresh).map(x => x.w),
    ...shuffleFY(unseenStale),
    ...dueStale.map(x => x.w)
  ];
  /* Deduplicate (a verb shouldn't appear in two buckets, but defensive). */
  const seen = new Set();
  const dedup = [];
  for(const w of picks){
    if(!seen.has(w.id)){ seen.add(w.id); dedup.push(w); }
  }
  return shuffleFY(dedup).slice(0, maxN);
}

function startFormDrill(formId){
  const f = FORMS.find(x => x.id === formId);
  if(!f){ alert('Unknown form'); return; }
  /* v6.22 — queue 15→50. v6.24 — 50→150 because user reported Form Drill
     "hasn't changed" (sessions still felt short). Form Drill stops when the
     queue runs out, so the cap translates directly to session length. With
     ~65+ verbs eligible per form, a 150-deep queue lets the drill run as
     long as the user has verbs ready and naturally short-circuits to
     whatever is available below 150. */
  const q = buildFormQueue(formId, 150);
  if(!q.length){
    alert(`No verbs ready for ${f.name} drill right now. All scheduled for later.`);
    return;
  }
  state.formDrill = {
    active:true, complete:false, formId, queue:q, idx:0,
    submitted:false, input:'', autoCorrect:null,
    tally:{again:0, good:0, easy:0, total:q.length}
  };
  clearNextTimer();
  nav('formDrill', formId);
}

function formDrillCurrent(){
  if(!state.formDrill || !state.formDrill.active) return null;

  if(!state.formDrill || state.formDrill.submitted) return;

function formDrillGrade(grade){
  if(!state.formDrill || !state.formDrill.submitted) return;
  const w = formDrillCurrent();
  if(!w) return;
  updateStreak(grade !== 'again');
  const fst = formStatFor(w.id, state.formDrill.formId);
  smGrade(fst, grade);
  /* v6.29 — record this verb-form pair as recently served so the next
     queue build deprioritizes it. Independent from SM-2 scheduling — even
     if smNext puts it back in the "due" bucket tomorrow, we'll prefer
     verbs we haven't drilled in this form recently. */
  formRecentPush(w.id, state.formDrill.formId);
  state.formDrill.tally[grade]++;
  state.formDrill.idx++;
  state.formDrill.submitted = false;
  state.formDrill.input = '';
  state.formDrill.autoCorrect = null;
  save();
  if(state.formDrill.idx >= state.formDrill.queue.length){
    state.formDrill.active = false;
    state.formDrill.complete = true;
  }
  render();
  setTimeout(() => $('#formInput')?.focus(), 30);
}

/* =========================================================================
   FORM BLITZ (v4.25) — mixed-form, recall-direction.
   Pool = (verb, form) pairs drawn from Vocab-Blitz-graduated verbs × all forms.
   Card shows conjugated JP + form badge; user types English meaning.
   Graded lenient via form.accept() — base-verb recognition counts.
   Mirrors Vocab Blitz rhythm: streak=3, mature fast-path, continuous refill.
   ========================================================================= */

const FORM_BLITZ_STREAK_REQUIRED = 3;
const FORM_BLITZ_MATURE_MIN = SM_MASTERED_DAYS * 24 * 60; /* 7 d */
const FORM_BLITZ_POOL_LEARNING = 8;
const FORM_BLITZ_POOL_MATURE = 4;
const FORM_BLITZ_MIN_PAIRS = 1; /* v4.28: gate effectively removed — any deck with a verb unlocks Form Blitz */

function fbKey(verbId, formId){ return verbId + '|' + formId; }

function eligibleFormPairs(){
  const verbs = formEligibleVerbs();
  const out = [];
  for(const w of verbs){
    for(const f of FORMS) out.push({verbId:w.id, formId:f.id});
  }
  return out;
}

function buildFormBlitzPool(opts){
  opts = opts || {};
  const targetLearn = opts.targetLearn ?? FORM_BLITZ_POOL_LEARNING;
  const targetMature = opts.targetMature ?? FORM_BLITZ_POOL_MATURE;
  const exclude = opts.excludeKeys || new Set();
  const pairs = eligibleFormPairs().filter(p => !exclude.has(fbKey(p.verbId, p.formId)));
  const t = now();
  const unseen = [], youngDue = [], youngNotDue = [], matureDue = [];
  for(const p of pairs){
    const fst = state.formStats?.[p.verbId]?.[p.formId];
    if(!fst){ unseen.push(p); continue; }
    ensureSm(fst);
    if(fst.smInterval >= FORM_BLITZ_MATURE_MIN){
      if(fst.smNext <= t) matureDue.push({p, next: fst.smNext});
    } else {
      if(fst.smNext <= t) youngDue.push({p, next: fst.smNext});
      else youngNotDue.push({p, next: fst.smNext});
    }
  }
  matureDue.sort((a,b)=>a.next-b.next);
  youngDue.sort((a,b)=>a.next-b.next);
  youngNotDue.sort((a,b)=>a.next-b.next);
  const matureSel = matureDue.slice(0, targetMature).map(x => x.p);
  const learningSel = [
    ...youngDue.map(x => x.p),
    ...shuffleFY(unseen),
    ...youngNotDue.map(x => x.p),
  ].slice(0, targetLearn);
  return shuffleFY([
    ...matureSel.map(p => ({verbId:p.verbId, formId:p.formId, streak:0, required:1, answers:0, everWrong:false, mature:true})),
    ...learningSel.map(p => ({verbId:p.verbId, formId:p.formId, streak:0, required:FORM_BLITZ_STREAK_REQUIRED, answers:0, everWrong:false, mature:false})),
  ]);
}

function formBlitzRefillIfNeeded(){
  if(!state.formBlitz || !state.formBlitz.active) return;
  const target = state.formBlitz.poolTarget;
  if(!target) return;
  const halfway = Math.ceil(target / 2);
  if(state.formBlitz.pool.length > halfway) return;
  const deficit = target - state.formBlitz.pool.length;
  if(deficit <= 0) return;
  const exclude = new Set([
    ...state.formBlitz.pool.map(p => fbKey(p.verbId, p.formId)),
    ...state.formBlitz.graduated,
  ]);
  const defMature = Math.floor(deficit / 3);
  const defLearn = deficit - defMature;
  const fresh = buildFormBlitzPool({targetLearn:defLearn, targetMature:defMature, excludeKeys:exclude});
  if(!fresh.length) return;
  state.formBlitz.pool.push(...fresh);
  state.formBlitz.tally.total += fresh.length;
  state.formBlitz.tally.refills = (state.formBlitz.tally.refills || 0) + 1;
}

function startFormBlitz(){
  const pairs = eligibleFormPairs();
  if(!pairs.length){
    alert('Your deck has no verbs yet. Add a verb or enable the N5 pack in Settings.');
    return;
  }
  const poolTarget = FORM_BLITZ_POOL_LEARNING + FORM_BLITZ_POOL_MATURE;
  const pool = buildFormBlitzPool();
  if(!pool.length){
    alert('No form pairs available right now.');
    return;
  }
  const direction = state.settings.formBlitzDirection || 'jp-en';
  state.formBlitz = {
    active:true, complete:false,
    direction,
    currentDir: resolveBlitzDir(direction),
    pool, graduated:[], recent:[],
    currentKey: fbKey(pool[0].verbId, pool[0].formId),
    submitted:false, input:'', autoCorrect:null, justGraduated:null,
    totalAnswers:0, poolTarget,
    tally:{correct:0, wrong:0, graduated:0, total:pool.length, refills:0}
  };
  clearNextTimer();
  nav('formBlitz');
}
window.startFormBlitz = startFormBlitz;

function formBlitzCurrentPair(){
  if(!state.formBlitz || !state.formBlitz.active) return null;
  return state.formBlitz.pool.find(p => fbKey(p.verbId, p.formId) === state.formBlitz.currentKey) || null;
}
function formBlitzCurrentWord(){
  const p = formBlitzCurrentPair();
  if(!p) return null;
  return state.words.find(w => w.id === p.verbId) || null;
}
function formBlitzCurrentForm(){
  const p = formBlitzCurrentPair();
  if(!p) return null;
  return FORMS.find(f => f.id === p.formId) || null;
}

function formBlitzPickNext(){
  if(!state.formBlitz) return null;
  const pool = state.formBlitz.pool;
  if(!pool.length) return null;
  const gap = Math.min(3, pool.length - 1);
  const blocked = new Set((state.formBlitz.recent || []).slice(-gap));
  const eligible = pool.filter(p => !blocked.has(fbKey(p.verbId, p.formId)));
  const candidates = eligible.length ? eligible : pool;
  const pick = candidates[Math.floor(Math.random() * candidates.length)];
  return fbKey(pick.verbId, pick.formId);
}

let formBlitzAdvanceTimer = null;
function clearFormBlitzAdvanceTimer(){ if(formBlitzAdvanceTimer){ clearTimeout(formBlitzAdvanceTimer); formBlitzAdvanceTimer = null; } }

function formBlitzAcceptSet(w, f){
  const out = new Set();
  const fromForm = f.accept ? f.accept(w) : [f.en(w)];
  for(const s of fromForm){
    const n = normEN(s);
    if(n) out.add(n);
  }
  for(const alt of enAlternatives(w.en)){
    if(alt) out.add(alt);
  }
  return out;
}

function formBlitzCheck(input, w, f, dir){
  const d = dir || 'jp-en';
  if(d === 'en-jp'){
    /* Production: user types the conjugated form in hiragana. Single canonical target. */
    const target = normJP(f.conj(w.jp));
    const got = normJP(input);
    if(!got) return false;
    return got === target;
  }
  const n = normEN(input);
  if(!n) return false;
  return formBlitzAcceptSet(w, f).has(n);
}

function formBlitzToggleDir(){
  if(!state.formBlitz) return;
  const next = {'jp-en':'en-jp', 'en-jp':'mixed', 'mixed':'jp-en'};
  state.formBlitz.direction = next[state.formBlitz.direction] || 'jp-en';
  state.formBlitz.currentDir = resolveBlitzDir(state.formBlitz.direction);
  state.settings.formBlitzDirection = state.formBlitz.direction;

}

function formBlitzRecord(pair, isCorrect){
  updateStreak(isCorrect);
  const fst = formStatFor(pair.verbId, pair.formId);
  ensureSm(fst);
  fst.reviewCount = (fst.reviewCount || 0) + 1;
  fst.lastReviewed = now();
  if(isCorrect){ fst.correctCount = (fst.correctCount || 0) + 1; }
  else { fst.wrongCount = (fst.wrongCount || 0) + 1; }
  pair.answers++;
  state.formBlitz.totalAnswers++;
  state.formBlitz.recent = [...(state.formBlitz.recent || []), fbKey(pair.verbId, pair.formId)].slice(-4);
  if(isCorrect){
    pair.streak++;
    state.formBlitz.tally.correct++;
    if(pair.streak >= pair.required){
      smGrade(fst, 'good');
      const k = fbKey(pair.verbId, pair.formId);
      state.formBlitz.pool = state.formBlitz.pool.filter(p => fbKey(p.verbId, p.formId) !== k);
      state.formBlitz.graduated.push(k);
      state.formBlitz.tally.graduated++;
      state.formBlitz.justGraduated = k;
    } else {
      state.formBlitz.justGraduated = null;
    }
  } else {
    pair.streak = 0;
    pair.everWrong = true;
    state.formBlitz.tally.wrong++;
    state.formBlitz.justGraduated = null;
  }
}

function formBlitzSubmit(){

  state.formBlitz.input = '';
  state.formBlitz.autoCorrect = null;
  state.formBlitz.justGraduated = null;
  if(!state.formBlitz.pool.length){

    state.formBlitz.complete = true;
    state.formBlitz.currentKey = null;
  } else {
    state.formBlitz.currentKey = formBlitzPickNext();

/* =========================================================================
   KANA BLITZ — streak-based retention. Separate track from SM-2.
   Retire: 5 correct in a row. Maintenance: retired kana resurface weekly.
   Confusion-pair surfacing: on fail of a tagged char, partner is next.
   ========================================================================= */

const KANA_RETIRE_STREAK = 5;
const KANA_MAINTENANCE_DAYS = 7;
const KANA_SESSION_TARGET = 15;

function kanaStatFor(k){
  if(!state.kanaStats) state.kanaStats = {};
  if(!state.kanaStats[k]){
    state.kanaStats[k] = {streak:0, retired:false, retiredAt:null, lastSeen:null, correctCount:0, wrongCount:0};
  }
  return state.kanaStats[k];
}

function kanaDueForMaintenance(k){
  const st = state.kanaStats && state.kanaStats[k];
  if(!st || !st.retired) return false;
  const days = (now() - (st.retiredAt || 0)) / (1000*60*60*24);
  return days >= KANA_MAINTENANCE_DAYS;
}

/* Weighted shuffle (Efraimidis–Spirakis): higher-weight items tend to land
   earlier in the result. Each item appears once. Used to front-load the
   worst-performing kana when the learning pool exceeds available slots. */
function weightedShuffle(items, weightFn){
  return items
    .map(item => {
      const w = Math.max(0.0001, weightFn(item));
      return { item, key: Math.random() ** (1 / w) };
    })
    .sort((a, b) => b.key - a.key)
    .map(x => x.item);
}

function kanaStruggleWeight(item){
  const st = state.kanaStats[item.k];
  if(!st) return 1;
  /* Wrongs hurt more when streak is cold; a hot streak dampens past sins. */
  const coolFactor = 1 - (st.streak || 0) / KANA_RETIRE_STREAK;
  return 1 + (st.wrongCount || 0) * coolFactor;
}

function buildKanaPool(scope){
  const inScope = item => {
    if(scope === 'hiragana' && item.script !== 'h') return false;
    if(scope === 'katakana' && item.script !== 'k') return false;
    return true;
  };
  const eligible = KANA_FULL.filter(item => {
    if(!inScope(item)) return false;
    const st = state.kanaStats[item.k];
    if(!st) return true;
    if(!st.retired) return true;
    return kanaDueForMaintenance(item.k);
  });
  /* v6.2 — Review fallback: if everything in scope is retired and nothing is
     yet due for maintenance, build a session from all in-scope kana so the
     user can always drill. Streak/wrong tracking still applies normally. */
  if(!eligible.length){
    const all = KANA_FULL.filter(inScope);
    return weightedShuffle(all, kanaStruggleWeight).slice(0, KANA_SESSION_TARGET);
  }
  const maintenance = [], unseen = [], learning = [];
  for(const item of eligible){
    const st = state.kanaStats[item.k];
    if(!st) unseen.push(item);
    else if(st.retired) maintenance.push(item);
    else learning.push(item);
  }
  /* v6.5 — interleave the three buckets via final shuffle so re-entry
     doesn't always open with the same maintenance → unseen → learning run. */
  const composed = [
    ...shuffleFY(maintenance).slice(0, 4),
    ...shuffleFY(unseen).slice(0, 8),
    ...weightedShuffle(learning, kanaStruggleWeight),
  ].slice(0, KANA_SESSION_TARGET);
  return shuffleFY(composed);
}

function startKanaBlitz(scope){
  scope = scope || 'all';
  if(!state.kanaStats) state.kanaStats = {};
  const pool = buildKanaPool(scope);
  if(!pool.length){
    alert('All kana retired! Great work. Check back in a week for maintenance.');
    return;
  }
  state.kanaBlitz = {
    active:true, complete:false,
    scope,
    pool,
    idx:0,
    submitted:false,
    input:'',
    autoCorrect:null,
    lastFailedK:null,
    tally:{correct:0, wrong:0, retired:0, total:pool.length},
  };
  nav('kanaBlitz');
}
window.startKanaBlitz = startKanaBlitz;

function kanaBlitzCurrent(){
  if(!state.kanaBlitz || !state.kanaBlitz.active) return null;
  return state.kanaBlitz.pool[state.kanaBlitz.idx] || null;
}

function kanaBlitzCheck(input, item){
  const i = (input||'').toLowerCase().trim().replace(/\s+/g,'');
  if(!i) return false;
  if(i === item.r) return true;
  if(item.alt && item.alt.includes(i)) return true;
  return false;
}

function kanaBlitzRecordAnswer(item, correct){
  updateStreak(correct);
  const st = kanaStatFor(item.k);
  st.lastSeen = now();
  if(correct){
    st.streak++;
    st.correctCount++;
    state.kanaBlitz.tally.correct++;
    if(st.streak >= KANA_RETIRE_STREAK && !st.retired){
      st.retired = true;
      st.retiredAt = now();
      state.kanaBlitz.tally.retired++;
    } else if(st.retired){
      st.retiredAt = now();
    }
    state.kanaBlitz.lastFailedK = null;
  } else {
    st.streak = 0;
    st.wrongCount++;
    st.retired = false;
    st.retiredAt = null;
    state.kanaBlitz.tally.wrong++;
    state.kanaBlitz.lastFailedK = item.k;
  }
}

function kanaBlitzSubmit(){
  if(!state.kanaBlitz || state.kanaBlitz.submitted) return;
  const item = kanaBlitzCurrent();
  if(!item) return;
  const inp = $('#kanaInput');
  state.kanaBlitz.input = inp?.value || '';
  const correct = kanaBlitzCheck(state.kanaBlitz.input, item);
  state.kanaBlitz.autoCorrect = correct;
  state.kanaBlitz.submitted = true;
  kanaBlitzRecordAnswer(item, correct);
  save();
  render();
  setTimeout(() => $('#kanaContinue')?.focus(), 30);
}
window.kanaBlitzSubmit = kanaBlitzSubmit;

function kanaBlitzReveal(){
  if(!state.kanaBlitz || state.kanaBlitz.submitted) return;
  const item = kanaBlitzCurrent();
  if(!item) return;
  const inp = $('#kanaInput');
  state.kanaBlitz.input = inp?.value || '';
  state.kanaBlitz.autoCorrect = false;
  state.kanaBlitz.submitted = true;
  kanaBlitzRecordAnswer(item, false);
  save();
  render();
  setTimeout(() => $('#kanaContinue')?.focus(), 30);
}
window.kanaBlitzReveal = kanaBlitzReveal;

function kanaBlitzSkip(){
  if(!state.kanaBlitz) return;
  state.kanaBlitz.lastFailedK = null;
  state.kanaBlitz.submitted = false;
  state.kanaBlitz.input = '';
  state.kanaBlitz.autoCorrect = null;
  state.kanaBlitz.idx++;
  if(state.kanaBlitz.idx >= state.kanaBlitz.pool.length){
    state.kanaBlitz.active = false;
    state.kanaBlitz.complete = true;
  }
  render();
  setTimeout(() => $('#kanaInput')?.focus(), 30);
}
window.kanaBlitzSkip = kanaBlitzSkip;

function kanaBlitzAdvance(){
  if(!state.kanaBlitz) return;
  const failedK = state.kanaBlitz.lastFailedK;
  if(failedK){
    const group = Object.values(KANA_CONFUSION_GROUPS).find(g => g.includes(failedK));
    if(group){
      const partnerK = group.find(k => k !== failedK);
      const partnerItem = KANA_FULL.find(it => it.k === partnerK);
      if(partnerItem){
        const nextIdx = state.kanaBlitz.idx + 1;
        const currentNext = state.kanaBlitz.pool[nextIdx];
        if(!currentNext || currentNext.k !== partnerK){
          state.kanaBlitz.pool.splice(nextIdx, 0, partnerItem);
          state.kanaBlitz.tally.total++;
        }
      }
    }
  }
  state.kanaBlitz.idx++;
  state.kanaBlitz.submitted = false;
  state.kanaBlitz.input = '';
  state.kanaBlitz.autoCorrect = null;
  state.kanaBlitz.lastFailedK = null;
  if(state.kanaBlitz.idx >= state.kanaBlitz.pool.length){
    state.kanaBlitz.active = false;
    state.kanaBlitz.complete = true;
  }
  save();
  render();
  setTimeout(() => $('#kanaInput')?.focus(), 30);
}
window.kanaBlitzAdvance = kanaBlitzAdvance;

function kanaBlitzEnd(){
  state.kanaBlitz = null;
  nav('home');
}
window.kanaBlitzEnd = kanaBlitzEnd;

function renderKanaBlitz(){
  const kb = state.kanaBlitz;
  if(!kb){
    return `<div class="card"><div class="muted">No active Kana Blitz.</div>
      <button class="btn btn-primary" style="margin-top:12px" onclick="nav('home')">Back home</button></div>`;
  }
  if(kb.complete){
    const t = kb.tally;
    const attempts = t.correct + t.wrong;
    const pct = attempts ? Math.round(100*t.correct/attempts) : 0;
    return `<div class="card">
      <h2 style="margin-top:0">Kana Blitz complete</h2>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num">${attempts}</div><div class="stat-label">Seen</div></div>
        <div class="stat-box"><div class="stat-num">${pct}%</div><div class="stat-label">Accuracy</div></div>
        <div class="stat-box"><div class="stat-num">${t.retired}</div><div class="stat-label">Retired</div></div>
        <div class="stat-box"><div class="stat-num">${t.wrong}</div><div class="stat-label">Wrong</div></div>
      </div>
      <div class="spacer"></div>
      <button class="btn btn-primary" style="width:100%" onclick="startKanaBlitz('${esc(kb.scope)}')">Drill again</button>
      <div class="spacer"></div>
      <button class="btn btn-secondary" style="width:100%" onclick="kanaBlitzEnd()">Back home</button>
    </div>`;
  }
  const item = kanaBlitzCurrent();
  if(!item) return `<div class="card"><div class="muted">No cards.</div></div>`;
  const st = state.kanaStats[item.k];
  const streak = st?.streak || 0;
  const retired = st?.retired || false;
  const total = kb.pool.length;
  const pos = kb.idx + 1;

  const scriptLabel = item.script === 'h' ? 'hiragana' : 'katakana';
  const modLabel = item.mod ? ' · ' + item.mod : (item.row === 'yoon' ? ' · yōon' : '');
  const head = `<div class="card" style="padding:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <span class="muted" style="font-size:13px">Card ${pos} / ${total}</span>
      <span class="muted" style="font-size:12px">${scriptLabel}${modLabel}${retired ? ' · maintenance' : ''}</span>
    </div>
  </div>`;

  if(!kb.submitted){
    return head + `<div class="card">
      <div style="font-size:120px;text-align:center;font-weight:900;line-height:1;padding:20px 0">${esc(item.k)}</div>
      <input id="kanaInput" class="input" type="text" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="type romaji (e.g. ka, shi, kyo)" onkeydown="if(event.key==='Enter'){event.preventDefault();kanaBlitzSubmit();}">
      <div class="spacer"></div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="kanaBlitzReveal()">Reveal</button>
        <button class="btn btn-primary" onclick="kanaBlitzSubmit()">Submit</button>
      </div>
      <div class="spacer"></div>
      <button class="btn btn-secondary" style="width:100%;font-size:12px" onclick="kanaBlitzSkip()">Skip card</button>
      <div class="muted" style="font-size:11px;text-align:center;margin-top:8px">Streak: ${streak} / ${KANA_RETIRE_STREAK}</div>
    </div>`;
  }

  const correct = kb.autoCorrect;
  const mnem = KANA_MNEMONICS[item.k];
  const confusionGroup = Object.entries(KANA_CONFUSION_GROUPS).find(([_, chars]) => chars.includes(item.k));
  const partner = confusionGroup ? confusionGroup[1].find(k => k !== item.k) : null;

  return head + `<div class="card" style="border:2px solid var(--${correct ? 'green' : 'red'})">
    <div style="font-size:80px;text-align:center;font-weight:900;line-height:1;padding:14px 0">${esc(item.k)}</div>
    <div style="text-align:center;font-size:18px;color:var(--${correct?'green':'red'});font-weight:700;margin-bottom:8px">
      ${correct ? '✓ correct' : '✗ wrong'}
    </div>
    <div style="text-align:center;font-size:14px;margin-bottom:6px">
      <span class="muted">Answer:</span> <b>${esc(item.r)}</b>
    </div>
    ${!correct && mnem ? `<div class="hint-card" style="margin-top:10px">
      <div class="hint-head">Remember</div>
      <div class="hint-body">${esc(mnem)}</div>
      ${partner ? `<div class="hint-body" style="margin-top:6px">Partner surfacing next: <b>${esc(partner)}</b></div>` : ''}
    </div>` : ''}
    <div class="spacer"></div>
    <button id="kanaContinue" class="btn btn-primary" style="width:100%" onclick="kanaBlitzAdvance()">Continue</button>
  </div>`;
}

/* =========================================================================
   SENTENCE BLITZ (v6.2) — read JP, type it back, reveal English.
   Same data-driven loop as Kana Blitz: streak retire, struggle weighting,
   weekly maintenance. Reading drill: typing forces eyes-on-every-character
   parsing; meaning lands on reveal once vocab clicks.
   ========================================================================= */

const SENTENCE_BLITZ_POOL = [

  {id:'sb12', jp:'おちゃを のみます。',              en:'I drink tea.'},

  {id:'sb14', jp:'このほんは おもしろいです。',      en:'This book is interesting.'},

  {id:'sb17', jp:'バスで いきます。',                en:'I go by bus.'},
  {id:'sb18', jp:'テレビを みます。',                en:'I watch TV.'},
  {id:'sb19', jp:'パンを たべます。',                en:'I eat bread.'},
  {id:'sb20', jp:'これは スマホです。',              en:'This is a smartphone.'},
  {id:'sb21', jp:'アメリカから きました。',          en:'I came from America.'},
  {id:'sb22', jp:'ピザが たべたいです。',            en:'I want to eat pizza.'},
  {id:'sb23', jp:'レストランへ いきます。',          en:'I go to the restaurant.'},
  {id:'sb24', jp:'プールで およぎます。',            en:'I swim in the pool.'},
  {id:'sb25', jp:'クラスは くじからです。',          en:'Class starts at nine.'},
  {id:'sb26', jp:'デパートで かいものを します。',   en:'I shop at the department store.'},
  {id:'sb27', jp:'タクシーで かえります。',          en:'I go home by taxi.'},
  {id:'sb28', jp:'ホテルに とまります。',            en:'I stay at the hotel.'},
  {id:'sb29', jp:'カメラを かいました。',            en:'I bought a camera.'},
  {id:'sb30', jp:'インターネットを つかいます。',    en:'I use the internet.'},
];

const SENTENCE_RETIRE_STREAK = 5;
const SENTENCE_MAINTENANCE_DAYS = 7;
const SENTENCE_SESSION_TARGET = 12;

function sentenceStatFor(id){
  if(!state.sentenceStats) state.sentenceStats = {};
  if(!state.sentenceStats[id]){
    state.sentenceStats[id] = {streak:0, retired:false, retiredAt:null, lastSeen:null, correctCount:0, wrongCount:0};
  }
  return state.sentenceStats[id];
}

function sentenceDueForMaintenance(id){
  const st = state.sentenceStats && state.sentenceStats[id];
  if(!st || !st.retired) return false;
  const days = (now() - (st.retiredAt || 0)) / (1000*60*60*24);
  return days >= SENTENCE_MAINTENANCE_DAYS;
}

function sentenceStruggleWeight(item){
  const st = state.sentenceStats[item.id];
  if(!st) return 1;
  const coolFactor = 1 - (st.streak || 0) / SENTENCE_RETIRE_STREAK;
  return 1 + (st.wrongCount || 0) * coolFactor;
}

function buildSentenceBlitzPool(){
  const eligible = SENTENCE_BLITZ_POOL.filter(item => {
    const st = state.sentenceStats[item.id];
    if(!st) return true;
    if(!st.retired) return true;
    return sentenceDueForMaintenance(item.id);
  });
  /* Review fallback: if everything is retired and not yet due, build a pool
     from the full set so the user can always drill. */
  if(!eligible.length){
    return weightedShuffle(SENTENCE_BLITZ_POOL.slice(), sentenceStruggleWeight).slice(0, SENTENCE_SESSION_TARGET);
  }
  const maintenance = [], unseen = [], learning = [];
  for(const item of eligible){
    const st = state.sentenceStats[item.id];
    if(!st) unseen.push(item);
    else if(st.retired) maintenance.push(item);
    else learning.push(item);
  }
  const composed = [
    ...shuffleFY(maintenance).slice(0, 3),
    ...shuffleFY(unseen).slice(0, 6),
    ...weightedShuffle(learning, sentenceStruggleWeight),
  ].slice(0, SENTENCE_SESSION_TARGET);
  return shuffleFY(composed);
}

function sentenceBlitzCounts(){
  const total = SENTENCE_BLITZ_POOL.length;
  let retired = 0, learning = 0, unseen = 0;
  for(const item of SENTENCE_BLITZ_POOL){
    const st = state.sentenceStats[item.id];
    if(!st){ unseen++; continue; }
    if(st.retired) retired++;
    else learning++;
  }
  return {total, retired, learning, unseen};
}

function startSentenceBlitz(){
  if(!state.sentenceStats) state.sentenceStats = {};
  const pool = buildSentenceBlitzPool();
  if(!pool.length){
    showToast('All sentences retired! Check back in a week for maintenance.', 'success');
    return;
  }
  state.sentenceBlitz = {
    active:true, complete:false,
    pool,
    idx:0,
    submitted:false,
    input:'',
    autoCorrect:null,
    tally:{correct:0, wrong:0, retired:0, total:pool.length},
  };
  nav('sentenceBlitz');
}
window.startSentenceBlitz = startSentenceBlitz;

function sentenceBlitzCurrent(){
  if(!state.sentenceBlitz || !state.sentenceBlitz.active) return null;
  return state.sentenceBlitz.pool[state.sentenceBlitz.idx] || null;
}

function sentenceBlitzCheck(input, item){
  if(!input) return false;
  return normJPLoose(input) === normJPLoose(item.jp);
}

function sentenceBlitzRecordAnswer(item, correct){
  updateStreak(correct);
  const st = sentenceStatFor(item.id);
  st.lastSeen = now();
  if(correct){
    st.streak++;
    st.correctCount++;
    state.sentenceBlitz.tally.correct++;
    if(st.streak >= SENTENCE_RETIRE_STREAK && !st.retired){
      st.retired = true;
      st.retiredAt = now();
      state.sentenceBlitz.tally.retired++;
    } else if(st.retired){
      st.retiredAt = now();
    }
  } else {
    st.streak = 0;
    st.wrongCount++;
    st.retired = false;
    st.retiredAt = null;
    state.sentenceBlitz.tally.wrong++;
  }
}

function sentenceBlitzSubmit(){
  if(!state.sentenceBlitz || state.sentenceBlitz.submitted) return;
  const item = sentenceBlitzCurrent();
  if(!item) return;
  const inp = $('#sentenceBlitzInput');
  state.sentenceBlitz.input = inp?.value || '';
  const correct = sentenceBlitzCheck(state.sentenceBlitz.input, item);
  state.sentenceBlitz.autoCorrect = correct;
  state.sentenceBlitz.submitted = true;
  sentenceBlitzRecordAnswer(item, correct);
  save();
  render();
  setTimeout(() => $('#sentenceBlitzContinue')?.focus(), 30);
}
window.sentenceBlitzSubmit = sentenceBlitzSubmit;

function sentenceBlitzReveal(){
  if(!state.sentenceBlitz || state.sentenceBlitz.submitted) return;
  const item = sentenceBlitzCurrent();
  if(!item) return;
  const inp = $('#sentenceBlitzInput');
  state.sentenceBlitz.input = inp?.value || '';
  state.sentenceBlitz.autoCorrect = false;
  state.sentenceBlitz.submitted = true;
  sentenceBlitzRecordAnswer(item, false);
  save();
  render();
  setTimeout(() => $('#sentenceBlitzContinue')?.focus(), 30);
}
window.sentenceBlitzReveal = sentenceBlitzReveal;

function sentenceBlitzSkip(){
  if(!state.sentenceBlitz) return;
  state.sentenceBlitz.submitted = false;
  state.sentenceBlitz.input = '';
  state.sentenceBlitz.autoCorrect = null;
  state.sentenceBlitz.idx++;
  if(state.sentenceBlitz.idx >= state.sentenceBlitz.pool.length){
    state.sentenceBlitz.active = false;
    state.sentenceBlitz.complete = true;
  }
  render();
  setTimeout(() => $('#sentenceBlitzInput')?.focus(), 30);
}
window.sentenceBlitzSkip = sentenceBlitzSkip;

function sentenceBlitzAdvance(){
  if(!state.sentenceBlitz) return;
  state.sentenceBlitz.idx++;
  state.sentenceBlitz.submitted = false;
  state.sentenceBlitz.input = '';
  state.sentenceBlitz.autoCorrect = null;
  if(state.sentenceBlitz.idx >= state.sentenceBlitz.pool.length){
    state.sentenceBlitz.active = false;
    state.sentenceBlitz.complete = true;
  }
  save();
  render();
  setTimeout(() => $('#sentenceBlitzInput')?.focus(), 30);
}
window.sentenceBlitzAdvance = sentenceBlitzAdvance;

function sentenceBlitzEnd(){
  state.sentenceBlitz = null;
  nav('home');
}
window.sentenceBlitzEnd = sentenceBlitzEnd;

function renderSentenceBlitz(){
  const sb = state.sentenceBlitz;
  if(!sb){
    return `<div class="card"><div class="muted">No active Sentence Blitz.</div>
      <button class="btn btn-primary" style="margin-top:12px" onclick="nav('home')">Back home</button></div>`;
  }
  if(sb.complete){
    const t = sb.tally;
    const attempts = t.correct + t.wrong;
    const pct = attempts ? Math.round(100*t.correct/attempts) : 0;
    const counts = sentenceBlitzCounts();
    return `<div class="card">
      <h2 style="margin-top:0">Sentence Blitz complete</h2>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num">${attempts}</div><div class="stat-label">Seen</div></div>
        <div class="stat-box"><div class="stat-num">${pct}%</div><div class="stat-label">Accuracy</div></div>
        <div class="stat-box"><div class="stat-num">${t.retired}</div><div class="stat-label">Retired</div></div>
        <div class="stat-box"><div class="stat-num">${t.wrong}</div><div class="stat-label">Wrong</div></div>
      </div>
      <div class="muted" style="text-align:center;margin-top:10px;font-size:13px">
        Pool mastery: <b>${counts.retired}</b> / ${counts.total} retired · ${counts.learning} learning · ${counts.unseen} unseen
      </div>
      <div class="spacer"></div>
      <button class="btn btn-primary" style="width:100%" onclick="startSentenceBlitz()">Drill again</button>
      <div class="spacer"></div>
      <button class="btn btn-secondary" style="width:100%" onclick="sentenceBlitzEnd()">Back home</button>
    </div>`;
  }
  const item = sentenceBlitzCurrent();
  if(!item) return `<div class="card"><div class="muted">No cards.</div></div>`;
  const st = state.sentenceStats[item.id];
  const streak = st?.streak || 0;
  const retired = st?.retired || false;
  const total = sb.pool.length;
  const pos = sb.idx + 1;

  const head = `<div class="card" style="padding:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <span class="muted" style="font-size:13px">Card ${pos} / ${total}</span>
      <span class="muted" style="font-size:12px">sentence${retired ? ' · maintenance' : ''}</span>
    </div>
  </div>`;

  if(!sb.submitted){
    return head + `<div class="card">
      <div class="jp" style="font-size:32px;text-align:center;font-weight:700;line-height:1.4;padding:20px 8px">${esc(item.jp)}</div>
      <input id="sentenceBlitzInput" class="input" type="text" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="type the sentence in kana (katakana ok as hiragana)" onkeydown="if(event.key==='Enter'){event.preventDefault();sentenceBlitzSubmit();}">
      <div class="spacer"></div>
      <div class="audio-row">
        <button class="audio-btn" onclick="speakJP('${jsEsc(item.jp)}')">🔊 Listen</button>
      </div>
      <div class="spacer"></div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="sentenceBlitzReveal()">Reveal</button>
        <button class="btn btn-primary" onclick="sentenceBlitzSubmit()">Submit</button>
      </div>
      <div class="spacer"></div>
      <button class="btn btn-secondary" style="width:100%;font-size:12px" onclick="sentenceBlitzSkip()">Skip card</button>
      <div class="muted" style="font-size:11px;text-align:center;margin-top:8px">Streak: ${streak} / ${SENTENCE_RETIRE_STREAK}</div>
    </div>`;
  }

  const correct = sb.autoCorrect;
  return head + `<div class="card" style="border:2px solid var(--${correct ? 'green' : 'red'})">
    <div class="jp" style="font-size:26px;text-align:center;font-weight:700;line-height:1.4;padding:14px 8px">${esc(item.jp)}</div>
    <div style="text-align:center;font-size:18px;color:var(--${correct?'green':'red'});font-weight:700;margin-bottom:8px">
      ${correct ? '✓ correct' : '✗ wrong'}
    </div>
    <div style="text-align:center;font-size:16px;margin:6px 0 4px;color:var(--text)">
      ${esc(item.en)}
    </div>
    ${!correct && sb.input ? `<div class="feedback-smart" style="margin-top:10px">You wrote: <b>${esc(sb.input)}</b></div>` : ''}
    <div class="spacer"></div>
    <div class="audio-row">
      <button class="audio-btn" onclick="speakJP('${jsEsc(item.jp)}')">🔊 Listen</button>
    </div>
    <div class="spacer"></div>
    <button id="sentenceBlitzContinue" class="btn btn-primary" style="width:100%" onclick="sentenceBlitzAdvance()">Continue</button>
  </div>`;
}

const PHRASE_RETIRE_STREAK = 5;
const PHRASE_MAINTENANCE_DAYS = 7;
const PHRASE_SESSION_TARGET = 12;

const PHRASE_CATEGORIES = [
  {key:'timing',   label:'Timing & logistics'},
  {key:'social',   label:'Social rituals'},
