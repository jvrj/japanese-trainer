<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ef4444">
<title>Isshin</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a; --card:#161616; --card2:#1f1f1f; --border:#2a2a2a;
  --text:#e8e8e8; --dim:#888; --faint:#555;
  --red:#ef4444; --red-d:#7f1d1d;
  --green:#22c55e; --green-d:#14532d;
  --orange:#f97316; --orange-d:#7c2d12;
  --blue:#3b82f6; --purple:#a855f7; --teal:#14b8a6; --yellow:#eab308;
  --accent:#ef4444;
}
html,body{background:var(--bg);color:var(--text);min-height:100dvh}
body{font-family:'Noto Sans JP',-apple-system,sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased;padding-bottom:100px}
.app{max-width:480px;margin:0 auto;padding:0 14px 120px;min-height:100dvh;position:relative}

/* Header */
.header{text-align:center;padding:22px 0 14px}
.header h1{font-size:30px;font-weight:900;letter-spacing:-1.5px;background:linear-gradient(135deg,#fff,#888);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:10px;letter-spacing:3px;color:var(--faint);margin-top:4px;text-transform:uppercase}

/* Cards & layout */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px}
.card h3{font-size:12px;letter-spacing:2px;color:var(--dim);margin-bottom:10px;text-transform:uppercase}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 4px;text-align:center}
.stat-num{font-size:22px;font-weight:900;line-height:1}
.stat-label{font-size:9px;letter-spacing:1.5px;color:var(--faint);margin-top:4px;text-transform:uppercase}

/* Buttons */
.btn{display:block;width:100%;border:none;border-radius:14px;padding:14px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:transform .1s,opacity .1s;text-align:center;margin-bottom:7px;color:#fff}
.btn:active{transform:scale(.97);opacity:.9}
.btn-primary{background:var(--red)}
.btn-orange{background:var(--orange)}
.btn-blue{background:var(--blue)}
.btn-teal{background:var(--teal)}
.btn-purple{background:var(--purple)}
.btn-green{background:var(--green)}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-ghost{background:transparent;color:var(--dim);border:none;padding:10px;font-size:13px;font-family:inherit;cursor:pointer}
.btn-sm{padding:9px 14px;font-size:12px;width:auto;display:inline-block}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.btn-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}

/* Tags / pills */
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.tag{padding:6px 11px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);cursor:pointer;font-family:inherit;background:var(--card);color:var(--dim);transition:all .1s}
.tag.active{background:var(--red);color:#fff;border-color:var(--red)}
.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.pill-new{background:#333;color:#bbb}
.pill-learning{background:#7c2d12;color:#fed7aa}
.pill-apprentice{background:#713f12;color:#fde68a}
.pill-guru{background:#14532d;color:#bbf7d0}
.pill-master{background:#1e3a8a;color:#bfdbfe}
.pill-burned{background:#4c1d95;color:#ddd6fe}
.pill-unverified{background:var(--orange-d);color:#fed7aa}

/* Inputs */
.input{width:100%;padding:13px 14px;font-size:17px;border-radius:14px;border:2px solid var(--border);background:var(--card);color:var(--text);font-family:inherit;outline:none;transition:border-color .1s}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:var(--faint)}
textarea.input{min-height:80px;resize:vertical;font-size:14px}

/* Drill card */
.drill-wrap{position:relative}
.drill-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 18px;text-align:center;margin-bottom:12px;min-height:140px;display:flex;flex-direction:column;justify-content:center;position:relative}
.drill-cat{font-size:10px;letter-spacing:2px;color:var(--faint);text-transform:uppercase;margin-bottom:8px}
.drill-prompt{font-size:24px;font-weight:700;line-height:1.3;margin-bottom:6px}
.drill-prompt.jp{font-size:40px;font-weight:900}
.drill-sub{font-size:12px;color:var(--dim);margin-top:6px}
.drill-sub-inline{font-size:12px;color:var(--dim);font-weight:400}
.drill-divider{height:1px;background:var(--border);margin:14px -6px 12px}
.drill-answer{font-size:22px;font-weight:700;line-height:1.3}
.drill-answer.ok{color:var(--green)}
.drill-answer.bad{color:var(--red)}
.drill-stage{position:relative}
.action-slot{min-height:58px;display:flex;flex-direction:column;justify-content:center;margin-top:8px}
.fade-in{animation:fadeIn 180ms ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* TTS / Voice buttons */
.audio-row{display:flex;gap:8px;margin-bottom:10px}
.audio-btn{flex:1;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:14px;border-radius:14px;font-family:inherit;cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px}
.audio-btn:active{transform:scale(.97)}
.audio-btn.listening{background:var(--red);color:#fff;border-color:var(--red);animation:pulse 1.2s infinite}
.audio-btn.speaking{background:var(--blue);color:#fff;border-color:var(--blue)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.voice-heard{font-size:12px;color:var(--dim);padding:8px 12px;background:var(--card2);border-radius:10px;margin-bottom:10px;text-align:center}
.voice-heard b{color:var(--text)}

/* Feedback card */
.feedback-card{border-radius:20px;padding:20px;text-align:center;margin-bottom:12px;border:2px solid}
.feedback-card.correct{background:var(--green-d);border-color:var(--green)}
.feedback-card.wrong{background:var(--red-d);border-color:var(--red)}
.feedback-card.partial{background:var(--orange-d);border-color:var(--orange)}
.feedback-head{font-size:13px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.feedback-body{font-size:15px;line-height:1.5}
.feedback-body b{font-weight:900}
.feedback-smart{margin-top:10px;padding:10px;background:rgba(0,0,0,.25);border-radius:10px;font-size:13px;line-height:1.5}
.feedback-smart .hit{color:#fde68a;font-weight:700}

/* Hint card */
.hint-card{background:var(--card2);border:1px dashed var(--border);border-radius:14px;padding:12px;margin-bottom:10px}
.hint-head{font-size:10px;letter-spacing:2px;color:var(--yellow);text-transform:uppercase;margin-bottom:6px}
.hint-body{font-size:14px;line-height:1.4}

/* Word list */
.word-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:8px}
.word-row:last-child{border-bottom:none}
.word-main{flex:1;min-width:0}
.word-jp{font-weight:700;font-size:15px}
.word-r{font-size:11px;color:var(--faint);margin-left:6px}
.word-en{font-size:12px;color:var(--dim);margin-top:2px}
.word-meta{text-align:right;font-size:10px;color:var(--faint)}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.95);backdrop-filter:blur(14px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 calc(10px + env(safe-area-inset-bottom));z-index:50}
.nav-btn{background:none;border:none;color:var(--faint);font-family:inherit;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;padding:6px 10px;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn .nav-ico{font-size:20px;line-height:1}
.nav-btn.active{color:var(--red)}

/* Floating FABs */
.notes-fab{position:fixed;right:16px;bottom:86px;width:52px;height:52px;border-radius:26px;background:var(--purple);color:#fff;border:none;font-size:22px;cursor:pointer;z-index:45;box-shadow:0 6px 20px rgba(168,85,247,.45);display:flex;align-items:center;justify-content:center}
.notes-fab:active{transform:scale(.92)}
.ask-fab{position:fixed;right:16px;bottom:148px;width:52px;height:52px;border-radius:26px;background:linear-gradient(135deg,#60a5fa,#a78bfa);color:#fff;border:none;font-size:22px;cursor:pointer;z-index:45;box-shadow:0 6px 20px rgba(96,165,250,.45);display:flex;align-items:center;justify-content:center}
.ask-fab:active{transform:scale(.92)}
.chat-log{max-height:40dvh;overflow-y:auto;padding:8px 4px;display:flex;flex-direction:column;gap:10px;direction:ltr;unicode-bidi:isolate}
.chat-msg{padding:10px 12px;border-radius:14px;max-width:85%;line-height:1.45;font-size:14px;white-space:pre-wrap;word-wrap:break-word;direction:ltr;unicode-bidi:isolate;text-align:left}
.chat-msg.user{align-self:flex-end;background:var(--blue);color:#fff;border-bottom-right-radius:4px}
.chat-msg.asst{align-self:flex-start;background:var(--card2);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px}
.chat-msg.err{align-self:stretch;background:rgba(248,113,113,.12);color:#fca5a5;border:1px solid rgba(248,113,113,.3);font-size:12px}
.chat-msg .jp{font-family:inherit}
.chat-input-row{display:flex;gap:8px;margin-top:8px;position:sticky;bottom:0;background:var(--bg);padding:8px 0;z-index:2;align-items:stretch}
.chat-input-row .input{flex:1 1 auto;min-width:0;direction:ltr;unicode-bidi:isolate;text-align:left}
.chat-input-row .btn{width:auto!important;flex:0 0 auto;margin-bottom:0;padding:14px 20px}
.chat-status{font-size:11px;color:var(--dim);padding:4px 2px}
.back-fab{position:fixed;left:16px;bottom:86px;width:52px;height:52px;border-radius:26px;background:var(--card2);color:var(--text);border:1px solid var(--border);font-size:22px;cursor:pointer;z-index:45;box-shadow:0 6px 20px rgba(0,0,0,.45);display:none;align-items:center;justify-content:center}
.back-fab:active{transform:scale(.92)}
.back-fab.show{display:flex}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg);border-top:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:90dvh;overflow-y:auto;padding:20px 16px 30px;animation:slideup .22s ease}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-head h2{font-size:18px;font-weight:800}
.modal-close{background:none;border:none;color:var(--dim);font-size:22px;cursor:pointer;padding:4px 10px}

/* Convo */
.convo-turn{padding:10px 14px;border-radius:14px;margin-bottom:8px;max-width:85%}
.convo-turn.them{background:var(--card2);border:1px solid var(--border);align-self:flex-start;margin-right:auto}
.convo-turn.you{background:var(--blue);color:#fff;align-self:flex-end;margin-left:auto;text-align:right}
.convo-turn .jp-line{font-size:16px;font-weight:700;margin-bottom:3px}
.convo-turn .en-line{font-size:11px;opacity:.75}
.convo-list{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.convo-chip{font-size:10px;letter-spacing:1.5px;color:var(--faint);text-transform:uppercase;margin-left:3px;margin-bottom:3px}

/* Progress */
.progress-bar{width:100%;height:5px;background:var(--border);border-radius:3px;margin-bottom:14px;overflow:hidden}
.progress-fill{height:100%;background:var(--red);border-radius:3px;transition:width .3s}
.direction-toggle{display:flex;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.direction-btn{flex:1;padding:10px;border:none;background:transparent;color:var(--dim);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer}
.direction-btn.active{background:var(--red);color:#fff}

.divider{height:1px;background:var(--border);margin:12px 0}
.muted{color:var(--dim);font-size:12px;line-height:1.5}
.center{text-align:center}
.spacer{height:12px}

/* Mastery grid */
.mastery-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:6px}
.mastery-cell{text-align:center;padding:9px 4px;border-radius:8px;background:var(--card2);border:1px solid var(--border)}
.mastery-cell .mc-n{font-size:17px;font-weight:900;line-height:1}
.mastery-cell .mc-l{font-size:8px;letter-spacing:.5px;color:var(--faint);margin-top:3px;text-transform:uppercase}

/* Scenario list */
.scenario-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px}
.scenario-item:active{transform:scale(.98)}
.scenario-emoji{font-size:26px}
.scenario-body{flex:1;min-width:0}
.scenario-title{font-size:14px;font-weight:700}
.scenario-meta{font-size:11px;color:var(--dim);margin-top:2px}

.note-item{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:7px}
.note-time{font-size:10px;color:var(--faint);margin-bottom:4px;letter-spacing:1px}
.note-text{font-size:13px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.note-del{font-size:10px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 0;margin-top:4px}

.kbd{font-family:ui-monospace,monospace;font-size:11px;background:var(--card2);padding:2px 6px;border-radius:4px;border:1px solid var(--border)}
.warn{background:var(--orange-d);border:1px solid var(--orange);border-radius:12px;padding:12px;font-size:12px;color:#fed7aa;margin-bottom:10px}

/* Top bar тАФ back button + screen title */
.topbar{display:flex;align-items:center;gap:10px;padding:8px 6px 12px;position:sticky;top:0;background:var(--bg);z-index:10;margin:-4px -14px 6px;padding-left:14px;padding-right:14px;border-bottom:1px solid var(--border)}
.topbar-back{background:var(--card2);border:1px solid var(--border);color:var(--text);width:38px;height:38px;border-radius:19px;cursor:pointer;font-size:16px;font-family:inherit;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topbar-back:active{transform:scale(.93)}
.topbar-title{font-size:16px;font-weight:800;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar-action{background:var(--card2);border:1px solid var(--border);color:var(--dim);border-radius:10px;padding:7px 11px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.5px;text-transform:uppercase}

/* Collapsible section */
.collapsible{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden}
.collapsible-head{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;user-select:none}
.collapsible-head h3{font-size:11px;letter-spacing:2px;color:var(--dim);margin:0;text-transform:uppercase}
.collapsible-arrow{font-size:14px;color:var(--faint);transition:transform .2s}
.collapsible.open .collapsible-arrow{transform:rotate(90deg)}
.collapsible-body{display:none;padding:0 14px 14px}
.collapsible.open .collapsible-body{display:block}

/* Compact mastery strip */
.mastery-strip{display:flex;height:8px;border-radius:4px;overflow:hidden;margin:4px 0 8px;background:var(--border)}
.mastery-strip-seg{height:100%}
.mastery-strip-seg.new{background:#444}
.mastery-strip-seg.learning{background:var(--orange)}
.mastery-strip-seg.apprentice{background:var(--yellow)}
.mastery-strip-seg.guru{background:var(--green)}
.mastery-strip-seg.master{background:var(--blue)}
.mastery-strip-seg.burned{background:var(--purple)}
.mastery-legend{display:flex;flex-wrap:wrap;gap:6px 10px;font-size:10px;color:var(--dim)}
.mastery-legend span{display:flex;align-items:center;gap:4px}
.mastery-legend i{width:8px;height:8px;border-radius:2px;display:inline-block;font-style:normal}

/* Training wheels */
.wheels-card{background:linear-gradient(180deg,rgba(59,130,246,.12),rgba(168,85,247,.08));border:1px solid #3b82f6;border-radius:14px;padding:10px 12px;margin-bottom:10px}
.wheels-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.wheels-title{font-size:11px;letter-spacing:2px;color:#93c5fd;text-transform:uppercase;font-weight:800}
.wheels-toggle{font-size:10px;background:var(--card2);border:1px solid var(--border);color:var(--dim);padding:3px 7px;border-radius:8px;cursor:pointer;font-family:inherit;letter-spacing:1px;text-transform:uppercase}
.wheels-list{display:flex;flex-direction:column;gap:4px;max-height:180px;overflow-y:auto}
.wheels-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:5px 8px;background:rgba(0,0,0,.25);border-radius:8px;font-size:12px}
.wheels-jp{font-weight:700;font-size:13px}
.wheels-en{color:#bfdbfe;font-size:11px;text-align:right;flex:1}
.wheels-actions{display:flex;gap:4px}
.wheels-btn{background:none;border:none;color:#93c5fd;cursor:pointer;font-size:13px;padding:2px 4px;opacity:.7}
.wheels-btn:hover{opacity:1}
.wheels-btn.pinned{color:#fbbf24;opacity:1}
.wheels-empty{font-size:11px;color:var(--dim);padding:6px;text-align:center}
/* Build Mode тАФ Paul Noble-style sentence construction */
.build-chip{display:inline-block;font-size:10px;padding:3px 8px;border-radius:4px;letter-spacing:.5px;text-transform:uppercase;font-weight:700}
.build-chip-introduce{background:#1e3a5f;color:#93c5fd}
.build-chip-recall{background:#3f2a10;color:#fbbf24}
.build-chip-build{background:#0f3d1f;color:#86efac}
.build-chip-substitute{background:#3b1c3d;color:#e9a7ed}
.build-chip-callback{background:#4a1010;color:#fca5a5}
.build-progress{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:4px}
.build-progress-fill{height:100%;background:var(--red);transition:width .2s}
.build-big-jp{font-size:38px;text-align:center;padding:14px 0;font-weight:500}
.build-big-en{font-size:18px;text-align:center;color:var(--muted);padding:6px 0}
.build-romaji{font-size:13px;text-align:center;color:var(--faint);padding:2px 0}
.build-placeholder{text-align:center;font-size:14px;padding:16px 0;color:var(--faint);border:1px dashed var(--border);border-radius:8px;margin-top:4px}
.build-callback-banner{text-align:center;font-size:12px;color:#fca5a5;background:#2a0f0f;border:1px solid #4a1010;border-radius:6px;padding:6px 10px;margin-bottom:10px;letter-spacing:.3px;font-weight:700}
.build-countdown{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin:8px 0 4px}
.build-countdown-fill{height:100%;background:var(--blue);width:100%;transform-origin:left center}
.build-countdown-fill.run{animation:buildCount linear forwards}
.build-countdown-fill.think{background:var(--orange)}
.build-countdown-fill.linger{background:var(--green)}
@keyframes buildCount{from{transform:scaleX(1)}to{transform:scaleX(0)}}
#toast-host{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:#1f2937;color:#f3f4f6;padding:10px 16px;border-radius:10px;border:1px solid var(--border);font-size:13px;font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.5);max-width:90vw;text-align:center;animation:toast-in .25s ease;pointer-events:auto}
.toast-warn{background:#3a1d0a;color:#fed7aa;border-color:var(--orange-d)}
.toast-error{background:#3a0a0a;color:#fca5a5;border-color:#5a1010}
.toast-out{animation:toast-out .3s ease forwards}
@keyframes toast-in{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toast-out{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}
.build-phase-label{text-align:center;font-size:11px;color:var(--faint);letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px}
</style>
</head>
<body>

const HIRA_TO_KATA = {'уБН':'уВн','уБЧ':'уВ╖','уБб':'уГБ','уБл':'уГЛ','уБ▓':'уГТ','уБ┐':'уГЯ','уВК':'уГк',

                     'уВГ':'уГг','уВЕ':'уГе','уВЗ':'уГз'};

function buildYoonSet(scriptKey){
  const out = [];
  for(const [base, baseR] of YOON_PAIRS){
    for(const [suf, sufR] of YOON_SUFFIX){
      const k = scriptKey === 'h' ? base + suf : HIRA_TO_KATA[base] + HIRA_TO_KATA[suf];
      const exc = YOON_EXCEPTIONS[baseR];
      const r = exc ? exc[sufR] : baseR.slice(0,-1) + sufR;
      out.push({k, r, script:scriptKey, row:'yoon'});
    }
  }
  return out;
}

const ROMAJI_KANA = {

};
function romajiToKana(s){
  if(!s) return s;
  const t = s.toLowerCase();
  let out = '';
  let i = 0;
  while(i < t.length){
    /* Sokuon: double consonant (k,s,t,p,b,g,d,j,z,r,m,h,f) тЖТ уБг + single */
    if(i+1 < t.length && t[i] === t[i+1] && 'bcdfghjkmprstz'.includes(t[i])){
      out += 'уБг'; i++; continue;
    }
    const tri = t.slice(i, i+3);
    if(ROMAJI_KANA[tri]){ out += ROMAJI_KANA[tri]; i += 3; continue; }
    const bi = t.slice(i, i+2);
    if(ROMAJI_KANA[bi]){ out += ROMAJI_KANA[bi]; i += 2; continue; }
    /* "n" before consonant (not before y-initial yoon) тЖТ уВУ */
    if(t[i] === 'n' && i+1 < t.length && !'aiueoy'.includes(t[i+1])){
      out += 'уВУ'; i++; continue;
    }
    const single = t[i];
    if(ROMAJI_KANA[single]){ out += ROMAJI_KANA[single]; i++; continue; }
    out += single; i++;
  }
  return out;
}

/* Normalize Japanese text for matching: romajiтЖТhira, kataтЖТhira, strip spaces/punct */
function normJP(s){
  if(!s) return '';
  let t = String(s).trim();
  t = romajiToKana(t);
  t = t.replace(/[\u30A1-\u30F6]/g, c => String.fromCharCode(c.charCodeAt(0)-0x60));
  t = t.replace(/[\sуАБуАВя╝Бя╝Я,\.!?уГ╗]/g, '');
  t = t.replace(/[уГ╝]/g,'');
  return t.toLowerCase();
}

/* Loose JP matcher for SENTENCE-level drills (Sentence Blitz, Phrase Blitz).
   Forgives the three classic particle traps and long-vowel ambiguity:
     - уБп/уВП as topic particle (you HEAR "wa", you SEE уБп)
     - уВТ/уБК as object particle ("o" / "wo" both fine)
     - уБ╕/уБИ as direction particle ("e" / "he" both fine)
     - long vowels: "kohi"/"koohii"/"kohii" all match уВ│уГ╝уГТуГ╝
   Not used for vocab card matching тАФ collision risk in 600+ deck. */
const _KANA_VOWEL = {
  'уБВ':'a','уБД':'i','уБЖ':'u','уБИ':'e','уБК':'o',
  'уБЛ':'a','уБН':'i','уБП':'u','уБС':'e','уБУ':'o',
  'уБХ':'a','уБЧ':'i','уБЩ':'u','уБЫ':'e','уБЭ':'o',
  'уБЯ':'a','уБб':'i','уБд':'u','уБж':'e','уБи':'o',
  'уБк':'a','уБл':'i','уБм':'u','уБн':'e','уБо':'o',
  'уБп':'a','уБ▓':'i','уБ╡':'u','уБ╕':'e','уБ╗':'o',
  'уБ╛':'a','уБ┐':'i','уВА':'u','уВБ':'e','уВВ':'o',
  'уВД':'a','уВЖ':'u','уВИ':'o',
  'уВЙ':'a','уВК':'i','уВЛ':'u','уВМ':'e','уВН':'o',
  'уВП':'a','уВТ':'o',
  'уБМ':'a','уБО':'i','уБР':'u','уБТ':'e','уБФ':'o',
  'уБЦ':'a','уБШ':'i','уБЪ':'u','уБЬ':'e','уБЮ':'o',
  'уБа':'a','уБв':'i','уБе':'u','уБз':'e','уБй':'o',
  'уБ░':'a','уБ│':'i','уБ╢':'u','уБ╣':'e','уБ╝':'o',
  'уБ▒':'a','уБ┤':'i','уБ╖':'u','уБ║':'e','уБ╜':'o',
  'уВГ':'a','уВЕ':'u','уВЗ':'o'
};
function _collapseLongVowels(s){
  let out = '';
  for(let i = 0; i < s.length; i++){
    const ch = s[i];
    if(out.length){
      const v = _KANA_VOWEL[out[out.length - 1]];
      if(v === 'a' && ch === 'уБВ') continue;
      if(v === 'i' && ch === 'уБД') continue;
      if(v === 'u' && ch === 'уБЖ') continue;
      if(v === 'e' && (ch === 'уБИ' || ch === 'уБД')) continue;
      if(v === 'o' && (ch === 'уБК' || ch === 'уБЖ')) continue;
    }
    out += ch;
  }
  return out;
}
function normJPLoose(s){
  let t = normJP(s);
  t = t.replace(/уБп/g, 'уВП').replace(/уВТ/g, 'уБК').replace(/уБ╕/g, 'уБИ');
  t = _collapseLongVowels(t);
  return t;
}

/* Normalize English for matching тАФ strip parenthetical qualifiers, articles, punctuation */
function normEN(s){
  let t = String(s||'').toLowerCase().trim();
  t = t.replace(/\([^)]*\)/g, ' '); /* "(casual)", "(mine)", "(intr)" etc. */
  t = t.replace(/^(to |a |an |the )/, '');
  t = t.replace(/[\.!?,'"()]/g, '');
  t = t.replace(/\s+/g, ' ').trim();
  return t;
}

/* Expand a word's English into all acceptable alternatives */
function enAlternatives(en){
  if(!en) return [];
  /* split on / and , */
  const parts = String(en).split(/[\/,]/).map(p => p.trim()).filter(Boolean);
  const out = new Set();
  for(const p of parts){
    const n = normEN(p);
    if(n) out.add(n);
    /* also accept without the parenthetical stripped, in case answer *includes* it */
    const raw = p.toLowerCase().replace(/[\.!?,'"]/g,'').trim();
    if(raw) out.add(raw);
  }
  return [...out].filter(Boolean);
}

function levenshtein(a,b){
  a=a||''; b=b||'';
  if(a===b) return 0;
  if(!a.length) return b.length;
  if(!b.length) return a.length;
  const dp=[...Array(a.length+1).keys()];
  for(let i=1;i<=b.length;i++){
    let prev=dp[0]; dp[0]=i;
    for(let j=1;j<=a.length;j++){
      const tmp=dp[j];
      dp[j] = Math.min(dp[j]+1, dp[j-1]+1, prev + (a[j-1]===b[i-1]?0:1));
      prev=tmp;
    }
  }
  return dp[a.length];
}

/* =========================================================================
   MASTERY LADDER
   ========================================================================= */

const MASTERY = ['new','learning','apprentice','guru','master','burned'];

function getMasteryForWord(wordId){
  const st = state.stats[wordId];
  if(!st || !st.attempts || st.attempts.length===0) return 'new';
  const attempts = st.attempts;
  const recent = attempts.slice(-10);
  const recentCorrect = recent.filter(a=>a.correct).length;
  const recentAcc = recentCorrect / recent.length;
  const totalCorrect = attempts.filter(a=>a.correct).length;
  const firstCorrect = st.firstCorrect;
  const daysSinceFirstCorrect = firstCorrect ? (now()-firstCorrect)/(1000*60*60*24) : 0;
  const hasVoice = attempts.some(a=>a.voice && a.correct);
  const voiceCount = attempts.filter(a=>a.voice && a.correct).length;

  if(attempts.length < 3) return 'learning';
  if(recentAcc >= 0.95 && totalCorrect >= 10 && daysSinceFirstCorrect >= 30) return 'burned';
  if(recentAcc >= 0.95 && totalCorrect >= 10 && daysSinceFirstCorrect >= 7 && (!state.settings.voiceOn || voiceCount >= 3)) return 'master';
  if(recentAcc >= 0.85 && totalCorrect >= 5) return 'guru';
  if(totalCorrect >= 3) return 'apprentice';
  return 'learning';
}

/* =========================================================================
   SM-2 SRS тАФ Vocab Blitz + Form Drills share this model.

   Per-card fields (stored on stats[wordId] for Vocab Blitz, on
   formStats[wordId][form] for Form Drills):
     smInterval    minutes until next review
     ease          multiplier, default 2.5, floor 1.3
     reviewCount   total gradings
     correctCount  # of Good + Easy
     wrongCount    # of Again
     lastReviewed  timestamp of last grading
     smNext        timestamp when card is next due

   Grading:
     Again тЖТ interval = 1 day; ease -= 0.2 (floor 1.3); wrongCount++
     Good  тЖТ interval = interval ├Ч ease;                correctCount++
     Easy  тЖТ interval = interval ├Ч ease ├Ч 1.3; ease += 0.15; correctCount++
   New cards start at 10 minutes. Cap: 1 year. */

const SM_BASE_MIN = 10;
const SM_AGAIN_MIN = 60*24;           /* 1 day */
const SM_DEFAULT_EASE = 2.5;
const SM_MIN_EASE = 1.3;
const SM_MAX_MIN = 60*24*365;         /* 1 year */
const SM_MASTERED_DAYS = 7;           /* "mastered" threshold for Form Drills eligibility */

function smDefault(){
  return {
    smInterval: SM_BASE_MIN, ease: SM_DEFAULT_EASE,
    reviewCount: 0, correctCount: 0, wrongCount: 0,
    lastReviewed: null, smNext: now()
  };
}

function ensureSm(st){
  if(!st) return;
  if(st.smInterval === undefined) st.smInterval = SM_BASE_MIN;
  if(st.ease === undefined) st.ease = SM_DEFAULT_EASE;
  if(st.reviewCount === undefined) st.reviewCount = 0;
  if(st.correctCount === undefined) st.correctCount = 0;
  if(st.wrongCount === undefined) st.wrongCount = 0;
  if(st.lastReviewed === undefined) st.lastReviewed = null;
  if(st.smNext === undefined) st.smNext = now();
  if(st.lastEaseDrop === undefined) st.lastEaseDrop = null;
}

function smGrade(st, grade){
  ensureSm(st);
  st.reviewCount++;
  st.lastReviewed = now();
  if(grade === 'again'){
    st.wrongCount++;
    st.smInterval = SM_AGAIN_MIN;
    /* Ease-hell mitigation: only decrement ease once per 24h per card. */
    const dayMs = 24*60*60*1000;
    const recentDrop = st.lastEaseDrop && (now() - st.lastEaseDrop) < dayMs;
    if(!recentDrop){
      st.ease = Math.max(SM_MIN_EASE, +(st.ease - 0.2).toFixed(2));
      st.lastEaseDrop = now();
    }
  } else if(grade === 'good'){
    st.correctCount++;
    st.smInterval = Math.min(SM_MAX_MIN, Math.max(1, Math.round(st.smInterval * st.ease)));
  } else if(grade === 'easy'){
    st.correctCount++;
    st.smInterval = Math.min(SM_MAX_MIN, Math.max(1, Math.round(st.smInterval * st.ease * 1.3)));
    st.ease = +(st.ease + 0.15).toFixed(2);
  }
  st.smNext = now() + st.smInterval * 60 * 1000;
}

/* Human-readable interval, e.g. "10 min", "2.3 hr", "5 d", "2.1 mo" */
function smIntervalLabel(minutes){
  if(minutes == null) return '';
  if(minutes < 60) return `${Math.round(minutes)} min`;
  const hours = minutes / 60;
  if(hours < 24) return `${hours < 10 ? hours.toFixed(1) : Math.round(hours)} hr`;
  const days = hours / 24;
  if(days < 30) return `${days < 10 ? days.toFixed(1) : Math.round(days)} d`;
  const months = days / 30;
  return `${months < 10 ? months.toFixed(1) : Math.round(months)} mo`;
}

/* Get/ensure the SM-2 stats slot on state.stats[wordId] (creates attempts shell too). */
function smStatFor(wordId){
  if(!state.stats[wordId]) state.stats[wordId] = {attempts:[], firstCorrect:null, lastSeen:null};
  ensureSm(state.stats[wordId]);
  return state.stats[wordId];
}

/* Get/ensure the SM-2 stats slot for a (verb, form) pair. */
function formStatFor(wordId, formId){
  if(!state.formStats) state.formStats = {};
  if(!state.formStats[wordId]) state.formStats[wordId] = {};
  if(!state.formStats[wordId][formId]) state.formStats[wordId][formId] = smDefault();
  return state.formStats[wordId][formId];
}

/* =========================================================================
   CARD SELECTION
   ========================================================================= */

/* v5.2: true if jp string contains any katakana codepoint (U+30A0тАУU+30FF).
   Used to exclude loanword katakana vocab from hiragana-only learners' pools. */
function hasKatakana(s){
  if(!s) return false;
  for(let i = 0; i < s.length; i++){
    const c = s.charCodeAt(i);
    if(c >= 0x30A0 && c <= 0x30FF) return true;
  }
  return false;
}

function getActiveWords(){
  const s = state.settings;
  const removed = new Set(s.removedWords || []);
  const includeKata = s.includeKatakana === true;
  return state.words.filter(w => {
    if(removed.has(w.id)) return false;
    if(s.activeThemes.length && !s.activeThemes.includes(w.theme)) return false;
    if(s.activePOS.length && !s.activePOS.includes(w.pos)) return false;
    if(s.activeRegister.length && !s.activeRegister.includes(w.register)) return false;
    if(!includeKata && hasKatakana(w.jp)) return false;
    return true;
  });
}

function buildSession(overrideSize){
  let pool = getActiveWords();
  if(!pool.length) return [];
  const s = state.settings;
  const SZ = overrideSize || 20;
  /* Avoid serving recently-drilled words at the top of a new session */
  const recent = (state._recentlyServed || []).slice(-Math.max(5, Math.floor(SZ/3)));
  const recentSet = new Set(recent);
  const noRecent = pool.filter(w => !recentSet.has(w.id));
  if(noRecent.length >= SZ) pool = noRecent;

  if(s.mode === 'weakest'){
    pool = pool.slice().sort((a,b) => {
      const ord = {new:0, learning:1, apprentice:2, guru:3, master:4, burned:5};
      return ord[getMasteryForWord(a.id)] - ord[getMasteryForWord(b.id)];
    });
    return pool.slice(0, SZ);
  }
  if(s.mode === 'newest'){
    pool = pool.slice().sort((a,b) => (state.stats[b.id]?.attempts?.[0]?.ts || 0) - (state.stats[a.id]?.attempts?.[0]?.ts || 0));
    return pool.slice(0, SZ);
  }
  /* SRS-aware random: prioritise due words, then unseen, then random */
  if(s.srsOn){
    const due = [], unseen = [], other = [];
    const t = now();
    for(const w of pool){
      const st = state.stats[w.id];
      if(!st || !st.attempts?.length) unseen.push(w);
      else if(!st.nextReview || st.nextReview <= t) due.push(w);
      else other.push(w);
    }
    const mix = [...shuffleFY(due).slice(0, Math.floor(SZ*0.6)), ...shuffleFY(unseen).slice(0, Math.floor(SZ*0.3)), ...shuffleFY(other)];
    return mix.slice(0, SZ);
  }
  pool = shuffleFY(pool);
  return pool.slice(0, SZ);
}

/* =========================================================================
   ANSWER CHECKING
   ========================================================================= */

/* Find all homograph siblings: words with identical normalised JP */
function homographSiblings(word){
  const targetJP = normJP(word.jp);
  return state.words.filter(w => normJP(w.jp) === targetJP);
}
/* Find all EN homograph siblings: words whose EN alternatives include the target EN */
function enHomographSiblings(word){
  const targetEN = enAlternatives(word.en);
  return state.words.filter(w => {
    const wAlts = enAlternatives(w.en);
    return wAlts.some(a => targetEN.includes(a));
  });
}

function checkAnswer(userInput, word, direction){
  const ui = (userInput||'').trim();
  if(!ui) return {correct:false, reason:'empty'};

  if(direction === 'jp-en'){
    /* English expected тАФ accept ANY meaning across homograph siblings */
    const siblings = homographSiblings(word);
    const altSet = new Set();
    for(const s of siblings) for(const a of enAlternatives(s.en)) altSet.add(a);
    const alts = [...altSet];
    const uiN = normEN(ui);
    if(alts.includes(uiN)) return {correct:true, match:'exact'};
    for(const p of alts){
      if(p && p.length >= 4 && levenshtein(uiN, p) <= 1) return {correct:true, match:'near'};
    }
    for(const p of alts){
      if(p && uiN && p.length >= 3 && uiN.length >= 3 && p.includes(uiN) && Math.abs(p.length-uiN.length) <= 4) return {correct:true, match:'subset'};
    }
    return {correct:false, reason:'wrong'};
  } else {
    /* Japanese expected тАФ accept ANY JP form whose EN overlaps the card's EN */
    const siblings = enHomographSiblings(word);
    const jpTargets = [...new Set(siblings.map(s => normJP(s.jp)))];
    const uiN = normJP(ui);
    if(jpTargets.includes(uiN)) return {correct:true, match:'exact'};
    for(const t of jpTargets){
      if(t.length >= 4 && levenshtein(uiN, t) === 1) return {correct:true, match:'typo'};
    }
    return {correct:false, reason:'wrong'};
  }
}

let speakingFlag = false;
let _ttsVoicesReady = false;
let _ttsMutedWarned = false;

function _scoreVoice(v, femaleNames, preferredNames){
  const n = (v.name || '').toLowerCase();
  let score = 0;
  if(/natural|neural|online|premium|enhanced/i.test(v.name||'')) score += 100;
  if(/google/i.test(v.name||'')) score += 60;
  for(const p of preferredNames) if(n.includes(p.toLowerCase())) score += 80;
  for(const f of femaleNames) if(n.includes(f.toLowerCase())) score += 40;
  if(/\bdesktop\b/i.test(v.name||'')) score -= 50;
  if(v.localService === false) score += 20;
  return score;
}
function _pickJaVoice(){
  if(!('speechSynthesis' in window)) return null;
  const voices = window.speechSynthesis.getVoices() || [];
  if(!voices.length) return null;
  const jaVoices = voices.filter(v =>
    (v.lang && v.lang.toLowerCase().startsWith('ja')) ||
    /japanese|цЧецЬмшкЮ/i.test(v.name||'')
  );
  if(!jaVoices.length) return null;
  const saved = (state.settings && state.settings.jpVoiceName) || '';
  if(saved){
    const hit = jaVoices.find(v => v.name === saved);
    if(hit) return hit;
  }
  const femaleNames = ['nanami','ayumi','haruka','sayaka','mizuki','kyoko','otoya','female'];
  const preferredNames = ['nanami','ayumi','kyoko','google'];
  return jaVoices.slice().sort((a,b) => _scoreVoice(b, femaleNames, preferredNames) - _scoreVoice(a, femaleNames, preferredNames))[0];
}
function _pickEnVoice(){
  if(!('speechSynthesis' in window)) return null;
  const voices = window.speechSynthesis.getVoices() || [];
  if(!voices.length) return null;
  const enVoices = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith('en'));
  if(!enVoices.length) return null;
  const saved = (state.settings && state.settings.enVoiceName) || '';
  if(saved){
    const hit = enVoices.find(v => v.name === saved);
    if(hit) return hit;
  }
  const femaleNames = ['aria','jenny','samantha','zira','hazel','susan','kate','serena','allison','ava','sonia','libby','female'];
  const preferredNames = ['aria','jenny','samantha','sonia','libby','google','siri'];
  return enVoices.slice().sort((a,b) => _scoreVoice(b, femaleNames, preferredNames) - _scoreVoice(a, femaleNames, preferredNames))[0];
}
function _listVoicesByLang(langPrefix){
  if(!('speechSynthesis' in window)) return [];
  const voices = window.speechSynthesis.getVoices() || [];
  if(langPrefix === 'ja'){
    return voices.filter(v => (v.lang && v.lang.toLowerCase().startsWith('ja')) || /japanese|цЧецЬмшкЮ/i.test(v.name||''));
  }
  return voices.filter(v => v.lang && v.lang.toLowerCase().startsWith(langPrefix));
}

function _waitForVoices(cb){
  if(!('speechSynthesis' in window)) return cb();
  const have = (window.speechSynthesis.getVoices() || []);
  if(have.length){ _ttsVoicesReady = true; return cb(); }
  let done = false;
  const onChange = () => { if(done) return; done = true; _ttsVoicesReady = true; cb(); };
  try{ window.speechSynthesis.addEventListener('voiceschanged', onChange, {once:true}); }catch(e){}
  setTimeout(() => { if(done) return; done = true; cb(); }, 1200);
}

function _showTtsMuteHint(){
  if(_ttsMutedWarned) return;
  _ttsMutedWarned = true;
  const el = document.createElement('div');
  el.textContent = 'ЁЯФЗ No audio? Check your device mute switch and volume.';
  el.style.cssText = 'position:fixed;bottom:80px;left:12px;right:12px;background:#dc2626;color:#fff;padding:12px;border-radius:12px;font-size:14px;text-align:center;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.3)';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 5000);
}

function speakJP(text, rate){
  try{
    if(!('speechSynthesis' in window)) return;
    const utter = () => {
      try{
        const ss = window.speechSynthesis;
        if(ss.speaking || ss.pending) ss.cancel();
        const u = new SpeechSynthesisUtterance(String(text).replace(/\s+/g,''));
        u.rate = rate || state.settings.ttsRate || 0.9;
        const v = _pickJaVoice();
        if(v){ u.voice = v; u.lang = v.lang || 'ja-JP'; } else { u.lang = 'ja-JP'; }
        let started = false;
        u.onstart = () => { started = true; speakingFlag = true; updateSpeakBtn(); };
        u.onend = () => {
          speakingFlag = false; updateSpeakBtn();
          if(!started) _showTtsMuteHint();
        };
        u.onerror = (e) => { speakingFlag = false; updateSpeakBtn(); log('tts_err',{err:String(e.error||e)}); };
        ss.speak(u);
        log('tts',{text});
      }catch(e){ log('tts_err',{err:String(e)}); }
    };
    if(_ttsVoicesReady) utter();
    else _waitForVoices(utter);
  }catch(e){ log('tts_err',{err:String(e)}); }
}
function updateSpeakBtn(){
  const btn = $('#ttsBtn');
  if(btn) btn.classList.toggle('speaking', speakingFlag);
}

let _rec = null;

  _rec = new SR();

function startVoice(onResult, onEnd){

  state.voiceListening = true;
  rec.onresult = (e)=>{
    const alts = [];
    for(let i=0;i<e.results.length;i++){

/* Local-date streak тАФ only counts on correct answers */
function localToday(){ return new Date().toLocaleDateString('en-CA'); }
function updateStreak(wasCorrect){
  if(!wasCorrect) return; /* streak requires real correct answers */
  const t = localToday();
  const last = state.streak.lastDate;
  if(last === t) return;
  if(!last){
    state.streak.current = 1;
  } else {
    const y = new Date(Date.now() - 86400000).toLocaleDateString('en-CA');
    if(last === y) state.streak.current = (state.streak.current||0) + 1;

  if(state.streak.current > (state.streak.longest||0)) state.streak.longest = state.streak.current;

}

/* =========================================================================
   VERB CLASSIFICATION & CONJUGATION HELPERS
   Used by Form Drills / Form Blitz to build conjugated cards.
   ========================================================================= */

/* Common godan verbs that LOOK ichidan (-iru/-eru ending). Conservative list. */
const GODAN_LOOKING_ICHIDAN = new Set([
  'уБпуБЧуВЛ','уБЧуВЛ','уБпуБДуВЛ','уБЛуБИуВЛ','уБНуВЛ','уБДуВЛ','уБЧуВГуБ╣уВЛ','уБДуБШуВЛ',
  'уБСуБЪуВЛ','уБ╛уБШуВЛ','уБ╕уВЛ','уБбуВЛ','уБСуВЛ','уБЧуБТуВЛ','уБЩуБ╣уВЛ'
]);

function classifyVerb(jp){
  if(!jp) return 'v-u';
  if(jp === 'уБПуВЛ') return 'v-irr-kuru';
  if(jp === 'уБЩуВЛ') return 'v-irr-suru';
  if(jp.endsWith('уБЩуВЛ')) return 'v-compound-suru';
  if(!jp.endsWith('уВЛ')) return 'v-u';
  if(GODAN_LOOKING_ICHIDAN.has(jp)) return 'v-u';
  const second = jp[jp.length - 2];
  const iRow = 'уБДуБНуБЧуБбуБлуБ▓уБ┐уВКуБОуБШуБ│уБ┤';
  const eRow = 'уБИуБСуБЫуБжуБнуБ╕уВБуВМуБТуБЬуБ╣уБ║уБзуБ╢';
  if(iRow.includes(second) || eRow.includes(second)) return 'v-ru';
  return 'v-u';
}

const GODAN_STEM_MAP = {'уБЖ':'уБД','уБП':'уБН','уБР':'уБО','уБЩ':'уБЧ','уБд':'уБб','уБм':'уБл','уБ╢':'уБ│','уВА':'уБ┐','уВЛ':'уВК'};

/* Verb stem in i-form (щАгчФих╜в) тАФ used for -уБ╛уБЩ, -уБЯуБД */
function iStem(jp){
  const cls = classifyVerb(jp);
  if(cls === 'v-ru') return jp.slice(0,-1);
  if(cls === 'v-irr-kuru') return 'уБН';
  if(cls === 'v-irr-suru') return 'уБЧ';
  if(cls === 'v-compound-suru') return jp.slice(0,-2) + 'уБЧ';
  const last = jp.slice(-1);
  const m = GODAN_STEM_MAP[last];
  return m ? jp.slice(0,-1) + m : jp;
}

function toTai(jp){ return iStem(jp) + 'уБЯуБД'; }
function toMasu(jp){ return iStem(jp) + 'уБ╛уБЩ'; }
function toMashita(jp){ return iStem(jp) + 'уБ╛уБЧуБЯ'; }
function toMasen(jp){ return iStem(jp) + 'уБ╛уБЫуВУ'; }

function toKatta(jp){
  if(jp === 'уБДуБД' || jp === 'уВИуБД') return 'уВИуБЛуБгуБЯ';
  if(jp.endsWith('уБДуБД') && jp.length > 2) return jp.slice(0,-2) + 'уВИуБЛуБгуБЯ';
  if(jp.endsWith('уБД')) return jp.slice(0,-1) + 'уБЛуБгуБЯ';
  return jp + 'уБЛуБгуБЯ';
}
function toKunai(jp){
  if(jp === 'уБДуБД' || jp === 'уВИуБД') return 'уВИуБПуБкуБД';
  if(jp.endsWith('уБДуБД') && jp.length > 2) return jp.slice(0,-2) + 'уВИуБПуБкуБД';
  if(jp.endsWith('уБД')) return jp.slice(0,-1) + 'уБПуБкуБД';
  return jp + 'уБПуБкуБД';
}
function toJanai(jp){ return jp + ' уБШуВГуБкуБД'; }

/* ---------- Conjugations for Form Drills ---------- */

/* a-row stem for godan уБкуБД-form: final уБЖ тЖТ уВП (exception), else final kana тЖТ a-row equivalent */
const GODAN_NAI_MAP = {'уБЖ':'уВП','уБП':'уБЛ','уБР':'уБМ','уБЩ':'уБХ','уБд':'уБЯ','уБм':'уБк','уБ╢':'уБ░','уВА':'уБ╛','уВЛ':'уВЙ'};

function aStem(jp){
  const cls = classifyVerb(jp);
  if(cls === 'v-ru') return jp.slice(0,-1);
  if(cls === 'v-irr-suru') return 'уБЧ';
  if(cls === 'v-irr-kuru') return 'уБУ';
  if(cls === 'v-compound-suru') return jp.slice(0,-2) + 'уБЧ';
  const last = jp.slice(-1);
  const m = GODAN_NAI_MAP[last];
  return m ? jp.slice(0,-1) + m : jp;
}

function toNai(jp){
  /* special case: уБВуВЛ тЖТ уБкуБД (no уБВуВЙуБкуБД) */
  if(jp === 'уБВуВЛ') return 'уБкуБД';
  return aStem(jp) + 'уБкуБД';
}
function toMashou(jp){ return iStem(jp) + 'уБ╛уБЧуВЗуБЖ'; }
function toMasenka(jp){ return iStem(jp) + 'уБ╛уБЫуВУуБЛ'; }

/* уБж-form тАФ group-dependent.
   Group 1 (godan):
     уБЖ,уБд,уВЛ тЖТ уБгуБж    (exception: уБДуБП тЖТ уБДуБгуБж)
     уБм,уБ╢,уВА тЖТ уВУуБз
     уБП тЖТ уБДуБж
     уБР тЖТ уБДуБз
     уБЩ тЖТ уБЧуБж
   Group 2 (ichidan): drop уВЛ + уБж
   Group 3: уБЩуВЛ тЖТ уБЧуБж, уБПуВЛ тЖТ уБНуБж, уАЬуБЩуВЛ тЖТ уАЬуБЧуБж */
function toTe(jp){
  const cls = classifyVerb(jp);
  if(cls === 'v-ru') return jp.slice(0,-1) + 'уБж';
  if(cls === 'v-irr-suru') return 'уБЧуБж';
  if(cls === 'v-irr-kuru') return 'уБНуБж';
  if(cls === 'v-compound-suru') return jp.slice(0,-2) + 'уБЧуБж';
  if(jp === 'уБДуБП') return 'уБДуБгуБж';
  const last = jp.slice(-1);
  const stem = jp.slice(0,-1);
  switch(last){
    case 'уБЖ': case 'уБд': case 'уВЛ': return stem + 'уБгуБж';
    case 'уБм': case 'уБ╢': case 'уВА': return stem + 'уВУуБз';
    case 'уБП': return stem + 'уБДуБж';
    case 'уБР': return stem + 'уБДуБз';
    case 'уБЩ': return stem + 'уБЧуБж';
    default: return jp + 'уБж';
  }
}

/* уБЯ-form = уБж-form with уБжтЖТуБЯ, уБзтЖТуБа */
function toTa(jp){
  const te = toTe(jp);
  if(te.endsWith('уБж')) return te.slice(0,-1) + 'уБЯ';
  if(te.endsWith('уБз')) return te.slice(0,-1) + 'уБа';
  return te;
}

function toTeiru(jp){ return toTe(jp) + 'уБДуВЛ'; }

function verbGroupInfo(jp){
  const cls = classifyVerb(jp);
  if(cls === 'v-u') return {group:1, label:'Group 1 ┬╖ u-verb (godan)'};
  if(cls === 'v-ru') return {group:2, label:'Group 2 ┬╖ ru-verb (ichidan)'};
  return {group:3, label:'Group 3 ┬╖ irregular'};
}

function stripTo(en){ return (en||'').replace(/^to /,''); }

   FORM DRILLS тАФ v4.20
   One sub-section per verb form. Eligibility: Vocab Blitz smInterval тЙе 7 days.
   Each (word, form) pair has its own SM-2 schedule in state.formStats.

/* Split a verb's English into base-meaning alternatives so multi-meaning entries
   like "to sleep/go to bed" become ["sleep", "go to bed"] for acceptor templates. */
function baseVerbAlts(w){
  const raw = stripTo(w.en || '');
  return raw.split(/[\/,]/).map(s => s.replace(/\([^)]*\)/g, ' ').replace(/\s+/g,' ').trim()).filter(Boolean);
}

/* Irregular English past tense for the first verb in a multi-word base.
   Covers the common verbs in the N5 pack; regular fallback is +ed with
   consonant doubling for CVC single-syllable verbs. US spellings preferred. */
const EN_IRREG_PAST = {
  eat:'ate', go:'went', drink:'drank', sleep:'slept', come:'came', see:'saw',
  say:'said', make:'made', do:'did', write:'wrote', read:'read', run:'ran',
  sit:'sat', stand:'stood', think:'thought', buy:'bought', take:'took',
  get:'got', give:'gave', have:'had', be:'was', put:'put', meet:'met',
  hear:'heard', feel:'felt', keep:'kept', leave:'left', lose:'lost',
  find:'found', send:'sent', sell:'sold', tell:'told', understand:'understood',
  speak:'spoke', know:'knew', grow:'grew', fly:'flew', sing:'sang', swim:'swam',
  teach:'taught', catch:'caught', bring:'brought', fight:'fought', hold:'held',
  pay:'paid', spend:'spent', build:'built', break:'broke', choose:'chose',
  ride:'rode', drive:'drove', wake:'woke', fall:'fell', forget:'forgot',
  begin:'began', become:'became', wear:'wore', hide:'hid', cut:'cut',
  let:'let', set:'set', hit:'hit', cost:'cost', shut:'shut', spread:'spread',
  mean:'meant', lend:'lent', beat:'beat', hang:'hung',
  bite:'bit', blow:'blew', draw:'drew', freeze:'froze', shake:'shook',
  steal:'stole', throw:'threw', win:'won', lie:'lay', lay:'laid',
  shoot:'shot', stick:'stuck', sweep:'swept'
};

/* CVC verbs double their final consonant before -ed / -ing only if:
   (a) monosyllabic (single vowel group), or
   (b) polysyllabic with stress on the last syllable (explicit list).
   Avoids false positives on open/listen/remember/enter/travel. */
const EN_STRESS_LAST = new Set([
  'begin','forget','regret','admit','submit','permit','commit','occur','refer',
  'prefer','control','equip','omit','transfer','concur','propel','patrol',
  'repel','compel','rebel','expel','occur'
]);
function needsDouble(first){
  if(!first || first.length < 3) return false;
  const c1 = first[first.length-3];
  const v  = first[first.length-2];
  const c2 = first[first.length-1];
  if(!/[bcdfgklmnprst]/.test(c2)) return false;
  if(!/[aeiou]/.test(v)) return false;
  if(/[aeiou]/.test(c1)) return false;
  const vowelGroups = (first.match(/[aeiou]+/g) || []).length;
  if(vowelGroups === 1) return true;
  return EN_STRESS_LAST.has(first);
}

function enPast(base){
  const parts = (base||'').split(/\s+/).filter(Boolean);
  if(!parts.length) return base;
  const first = parts[0].toLowerCase();
  if(EN_IRREG_PAST[first]) return [EN_IRREG_PAST[first], ...parts.slice(1)].join(' ');
  let past;
  if(first.endsWith('e')) past = first + 'd';
  else if(first.endsWith('y') && first.length > 1 && !/[aeiou]/.test(first[first.length-2])) past = first.slice(0,-1) + 'ied';
  else if(needsDouble(first)) past = first + first[first.length-1] + 'ed';
  else past = first + 'ed';
  return [past, ...parts.slice(1)].join(' ');
}

/* Irregular/spelling-rule -ing form for the first verb in a multi-word base. */
const EN_IRREG_ING = {be:'being', have:'having', do:'doing', go:'going', see:'seeing', say:'saying'};
function enIng(base){
  const parts = (base||'').split(/\s+/).filter(Boolean);
  if(!parts.length) return base;
  const first = parts[0].toLowerCase();
  if(EN_IRREG_ING[first]) return [EN_IRREG_ING[first], ...parts.slice(1)].join(' ');
  let ing;
  if(first.endsWith('ie')) ing = first.slice(0,-2) + 'ying';
  else if(first.endsWith('e') && first.length > 1) ing = first.slice(0,-1) + 'ing';
  else if(needsDouble(first)) ing = first + first[first.length-1] + 'ing';
  else ing = first + 'ing';
  return [ing, ...parts.slice(1)].join(' ');
}

   - en(w): a display string for the form's English meaning (shown as "ideal" answer on reveal).

/* v4.28: gate removed тАФ all verbs available for form drilling immediately.
   Julius uses this app alone and doesn't need the "earn your way in" flow. */
function formEligibleVerbs(){
  return getActiveWords().filter(w => w.pos === 'v');
}

function formDueCount(formId){
  const verbs = formEligibleVerbs();
  const t = now();
  let due = 0, unseen = 0;
  for(const w of verbs){
    const fst = state.formStats?.[w.id]?.[formId];
    if(!fst){ unseen++; continue; }
    ensureSm(fst);
    if(fst.smNext <= t) due++;
  }
  return {due, unseen, total: verbs.length};
}

/* =========================================================================
   VOCAB BLITZ тАФ SM-2 spaced repetition. Home's primary entry point.
   ========================================================================= */

function blitzCounts(){
  const active = getActiveWords();
  const t = now();
  let due = 0, overdue = 0, unseen = 0;
  for(const w of active){
    const st = state.stats[w.id];
    if(!st || !st.attempts?.length){ unseen++; continue; }
    ensureSm(st);
    if(st.smNext <= t){ due++; overdue++; }
  }
  return {due, overdue, unseen};
}

/* v4.22 тАФ streak-to-graduate learning phase layered on SM-2.
   v4.24 тАФ continuous flow: pool auto-refills as cards graduate; no answer cap. */

const BLITZ_STREAK_REQUIRED = 3;
const BLITZ_MATURE_MIN = SM_MASTERED_DAYS * 24 * 60; /* 7 d */

function buildBlitzPool(opts){
  opts = opts || {};
  const targetLearn = opts.targetLearn ?? (state.settings.blitzPoolLearning ?? 8);
  const targetMature = opts.targetMature ?? (state.settings.blitzPoolMature ?? 4);
  const exclude = opts.excludeIds || new Set();
  const active = getActiveWords().filter(w => !exclude.has(w.id));
  const t = now();
  const unseen = [], youngDue = [], youngNotDue = [], matureDue = [];
  for(const w of active){
    const st = state.stats[w.id];
    if(!st || !st.attempts?.length){ unseen.push(w); continue; }
    ensureSm(st);
    if(st.smInterval >= BLITZ_MATURE_MIN){
      if(st.smNext <= t) matureDue.push({w, next: st.smNext});
    } else {
      if(st.smNext <= t) youngDue.push({w, next: st.smNext});
      else youngNotDue.push({w, next: st.smNext});
    }
  }
  matureDue.sort((a,b) => a.next - b.next);
  youngDue.sort((a,b) => a.next - b.next);
  youngNotDue.sort((a,b) => a.next - b.next); /* soonest-due last-resort */
  const matureSel = matureDue.slice(0, targetMature).map(x => x.w);
  /* Priority: young-due > unseen > young-not-due. */
  const learningSel = [
    ...youngDue.map(x => x.w),
    ...shuffleFY(unseen),
    ...youngNotDue.map(x => x.w),
  ].slice(0, targetLearn);
  return shuffleFY([
    ...matureSel.map(w => ({id:w.id, streak:0, required:1, answers:0, everWrong:false, mature:true})),
    ...learningSel.map(w => ({id:w.id, streak:0, required:BLITZ_STREAK_REQUIRED, answers:0, everWrong:false, mature:false})),
  ]);
}

function blitzRefillIfNeeded(){
  if(!state.blitz || !state.blitz.active) return;
  const target = state.blitz.poolTarget;
  if(!target) return;
  const halfway = Math.ceil(target / 2);
  if(state.blitz.pool.length > halfway) return;
  const deficit = target - state.blitz.pool.length;
  if(deficit <= 0) return;
  const exclude = new Set([
    ...state.blitz.pool.map(p => p.id),
    ...state.blitz.graduated,
  ]);
  /* Keep the mature:learning ratio roughly 1:2 when backfilling. */
  const defMature = Math.floor(deficit / 3);
  const defLearn = deficit - defMature;
  const fresh = buildBlitzPool({
    targetLearn: defLearn,
    targetMature: defMature,
    excludeIds: exclude,
  });
  if(!fresh.length) return;
  state.blitz.pool.push(...fresh);
  state.blitz.tally.total += fresh.length;
  state.blitz.tally.refills = (state.blitz.tally.refills || 0) + 1;
}

function startBlitz(){
  const poolTarget = (state.settings.blitzPoolLearning ?? 8) + (state.settings.blitzPoolMature ?? 4);
  const pool = buildBlitzPool();
  if(!pool.length){
    alert('No words due or available. Add words or enable the N5 pack in Settings.');
    return;
  }
  const direction = state.settings.blitzDirection || 'jp-en';
  state.blitz = {
    active: true, complete: false,
    direction,
    currentDir: resolveBlitzDir(direction),
    pool,
    graduated: [],
    recent: [],
    currentId: pool[0].id,
    submitted: false, input: '', autoCorrect: null, justGraduated: null,
    totalAnswers: 0,
    poolTarget,
    tally: {correct:0, wrong:0, graduated:0, total: pool.length, refills:0, struggled:0},
  };
  clearNextTimer();
  nav('blitz');
}
window.startBlitz = startBlitz;

function blitzCurrent(){
  if(!state.blitz || !state.blitz.active) return null;
  const id = state.blitz.currentId;
  if(!id) return null;
  return state.words.find(w => w.id === id) || null;
}

function blitzPoolItem(){
  if(!state.blitz) return null;
  return state.blitz.pool.find(p => p.id === state.blitz.currentId) || null;
}

function blitzPickNext(){
  if(!state.blitz) return null;
  const pool = state.blitz.pool;
  if(!pool.length) return null;
  /* v5.1: widened gap to combat shape-recognition zombie reviewing тАФ force
     real forgetting between exposures of the same card in-session. */
  const gap = Math.min(6, pool.length - 1);
  const blocked = new Set((state.blitz.recent || []).slice(-gap));
  const eligible = pool.filter(p => !blocked.has(p.id));
  const candidates = eligible.length ? eligible : pool;
  return candidates[Math.floor(Math.random() * candidates.length)].id;
}

function resolveBlitzDir(dir){
  if(dir === 'mixed') return Math.random() < 0.5 ? 'jp-en' : 'en-jp';
  return dir === 'en-jp' ? 'en-jp' : 'jp-en';
}

function blitzToggleDir(){
  if(!state.blitz) return;
  const next = {'jp-en':'en-jp', 'en-jp':'mixed', 'mixed':'jp-en'};
  state.blitz.direction = next[state.blitz.direction] || 'jp-en';
  state.blitz.currentDir = resolveBlitzDir(state.blitz.direction);
  state.settings.blitzDirection = state.blitz.direction;
  save();
  render();
  setTimeout(() => $('#blitzInput')?.focus(), 30);
}
window.blitzToggleDir = blitzToggleDir;

let blitzAdvanceTimer = null;
function clearBlitzAdvanceTimer(){ if(blitzAdvanceTimer){ clearTimeout(blitzAdvanceTimer); blitzAdvanceTimer = null; } }

function blitzRecordAnswer(w, poolItem, isCorrect){
  updateStreak(isCorrect);
  const st = smStatFor(w.id);
  st.attempts = st.attempts || [];
  st.attempts.push({ts: now(), correct: isCorrect, voice: false, blitz: true});
  if(isCorrect && !st.firstCorrect) st.firstCorrect = now();
  st.lastSeen = now();
  poolItem.answers++;
  state.blitz.totalAnswers++;
  state.blitz.recent = [...(state.blitz.recent || []), poolItem.id].slice(-8);
  if(isCorrect){
    poolItem.streak++;
    state.blitz.tally.correct++;
    if(poolItem.streak >= poolItem.required){
      /* Graduate: SM-2 Good. Within-session stumbles don't penalize long-term. */
      smGrade(st, 'good');
      state.blitz.pool = state.blitz.pool.filter(p => p.id !== poolItem.id);
      state.blitz.graduated.push(poolItem.id);
      state.blitz.tally.graduated++;
      state.blitz.justGraduated = poolItem.id;
    } else {
      state.blitz.justGraduated = null;
    }
  } else {
    poolItem.streak = 0;
    poolItem.everWrong = true;
    state.blitz.tally.wrong++;
    state.blitz.justGraduated = null;
  }
}

function blitzSubmit(){
  if(!state.blitz || state.blitz.submitted) return;
  const w = blitzCurrent();
  const poolItem = blitzPoolItem();
  if(!w || !poolItem) return;
  const inp = $('#blitzInput');
  state.blitz.input = inp?.value || '';
  const res = checkAnswer(state.blitz.input, w, state.blitz.currentDir || state.blitz.direction);
  state.blitz.autoCorrect = !!res.correct;
  state.blitz.submitted = true;
  blitzRecordAnswer(w, poolItem, !!res.correct);
  save();
  render();
  clearBlitzAdvanceTimer();
  if(res.correct){
    setTimeout(() => $('#blitzContinue')?.focus(), 30);
    blitzAdvanceTimer = setTimeout(blitzAdvance, 900);
  } else {
    /* v5.1: wrong answer тАФ force user to type the correct answer to continue
       (kills shape-recognition / zombie reviewing). */
    setTimeout(() => $('#blitzConfirm')?.focus(), 30);
  }
}
window.blitzSubmit = blitzSubmit;

function blitzReveal(){
  if(!state.blitz || state.blitz.submitted) return;
  const w = blitzCurrent();
  const poolItem = blitzPoolItem();
  if(!w || !poolItem) return;
  const inp = $('#blitzInput');
  state.blitz.input = inp?.value || '';
  state.blitz.autoCorrect = false;
  state.blitz.submitted = true;
  blitzRecordAnswer(w, poolItem, false);
  save();
  render();
  clearBlitzAdvanceTimer();
  /* v5.1: reveal = wrong, force typing to continue. */
  setTimeout(() => $('#blitzConfirm')?.focus(), 30);
}
window.blitzReveal = blitzReveal;

function blitzAdvance(){
  clearBlitzAdvanceTimer();
  if(!state.blitz) return;
  state.blitz.submitted = false;
  state.blitz.input = '';
  state.blitz.autoCorrect = null;
  state.blitz.justGraduated = null;
  blitzRefillIfNeeded();
  if(!state.blitz.pool.length){
    /* Deck exhausted тАФ no more cards to pull. Session ends naturally. */
    state.blitz.active = false;
    state.blitz.complete = true;
    state.blitz.currentId = null;
    save();
    render();
    return;
  }
  state.blitz.currentId = blitzPickNext();
  state.blitz.currentDir = resolveBlitzDir(state.blitz.direction);
  save();
  render();
  setTimeout(() => $('#blitzInput')?.focus(), 30);
}
window.blitzAdvance = blitzAdvance;

function blitzSkip(){
  if(!state.blitz) return;
  if(!confirm('Skip this card without recording it?')) return;
  clearBlitzAdvanceTimer();
  state.blitz.pool = state.blitz.pool.filter(p => p.id !== state.blitz.currentId);
  state.blitz.submitted = false;
  state.blitz.input = '';
  state.blitz.autoCorrect = null;
  state.blitz.justGraduated = null;
  if(!state.blitz.pool.length){
    state.blitz.active = false;
    state.blitz.complete = true;
    state.blitz.currentId = null;
  } else {
    state.blitz.currentId = blitzPickNext();
    state.blitz.currentDir = resolveBlitzDir(state.blitz.direction);
  }
  save();
  render();
  setTimeout(() => $('#blitzInput')?.focus(), 30);
}
window.blitzSkip = blitzSkip;

function blitzEnd(){
  clearBlitzAdvanceTimer();
  if(state.blitz && state.blitz.active){
    /* Apply SM-2 Again only to cards the user struggled on (wrong тЙе once) but didn't graduate.
       Clean quits on never-touched cards don't penalize the schedule. */
    const struggled = state.blitz.pool.filter(p => p.everWrong);
    for(const p of struggled){
      const st = smStatFor(p.id);
      smGrade(st, 'again');
    }
    save();
  }
  state.blitz = null;
  nav('home');
}
window.blitzEnd = blitzEnd;

    return `<div class="card">

/* Keyboard shortcuts when a card is revealed.
   Blitz + Form Blitz: Enter/Space advance; no per-grade keys (auto-graded).
   Form Drill: 1 = Again ┬╖ 2 = Good ┬╖ 3 = Easy (self-graded). */
document.addEventListener('keydown', e => {
  if(state.screen !== 'blitz' && state.screen !== 'formDrill' && state.screen !== 'formBlitz' && state.screen !== 'kanaBlitz') return;
  const live = state.screen === 'blitz' ? state.blitz
             : state.screen === 'formBlitz' ? state.formBlitz
             : state.screen === 'kanaBlitz' ? state.kanaBlitz
             : state.formDrill;
  if(!live || !live.submitted) return;
  if(e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
  if(state.screen === 'blitz'){
    /* v5.1: wrong answers must be typed to continue тАФ don't let Enter/Space
       bypass the typing gate when confirm input has lost focus. */
    if((e.key === 'Enter' || e.key === ' ') && live.autoCorrect){ e.preventDefault(); blitzAdvance(); }
    return;
  }
  if(state.screen === 'formBlitz'){
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); formBlitzAdvance(); }
    return;
  }
  if(state.screen === 'kanaBlitz'){
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); kanaBlitzAdvance(); }
    return;
  }
  if(e.key === '1'){ e.preventDefault(); formDrillGrade('again'); }
  else if(e.key === '2'){ e.preventDefault(); formDrillGrade('good'); }
  else if(e.key === '3'){ e.preventDefault(); formDrillGrade('easy'); }
});

  </div>${cards}`;

function buildFormQueue(formId, maxN){
  const verbs = formEligibleVerbs();
  const t = now();
  const due = [], unseen = [];
  for(const w of verbs){
    const fst = state.formStats?.[w.id]?.[formId];
    if(!fst){ unseen.push(w); continue; }
    ensureSm(fst);
    if(fst.smNext <= t) due.push({w, next: fst.smNext});
  }
  due.sort((a,b) => a.next - b.next);
  const q = [...due.slice(0, Math.ceil(maxN*2/3)).map(x => x.w), ...shuffleFY(unseen).slice(0, Math.ceil(maxN/3))];
  return shuffleFY(q).slice(0, maxN);
}

function startFormDrill(formId){
  const f = FORMS.find(x => x.id === formId);
  if(!f){ alert('Unknown form'); return; }
  const q = buildFormQueue(formId, 15);
  if(!q.length){
    alert(`No verbs ready for ${f.name} drill right now. All scheduled for later.`);
    return;
  }
  state.formDrill = {
    active:true, complete:false, formId, queue:q, idx:0,
    submitted:false, input:'', autoCorrect:null,
    tally:{again:0, good:0, easy:0, total:q.length}
  };
  clearNextTimer();
  nav('formDrill', formId);
}
window.startFormDrill = startFormDrill;

function formDrillCurrent(){
  if(!state.formDrill || !state.formDrill.active) return null;
  return state.formDrill.queue[state.formDrill.idx] || null;
}

function formDrillSubmit(){
  if(!state.formDrill || state.formDrill.submitted) return;
  const w = formDrillCurrent();
  if(!w) return;
  const f = FORMS.find(x => x.id === state.formDrill.formId);
  const inp = $('#formInput');
  state.formDrill.input = inp?.value || '';
  const expected = f.conj(w.jp);
  state.formDrill.autoCorrect = normJP(state.formDrill.input) === normJP(expected);
  state.formDrill.submitted = true;
  render();
  setTimeout(() => $('#formGradeGood')?.focus(), 30);
}

function formDrillReveal(){

  const inp = $('#formInput');
  state.formDrill.input = inp?.value || '';
  state.formDrill.autoCorrect = false;
  state.formDrill.submitted = true;

window.formDrillReveal = formDrillReveal;

function formDrillGrade(grade){
  if(!state.formDrill || !state.formDrill.submitted) return;
  const w = formDrillCurrent();
  if(!w) return;
  updateStreak(grade !== 'again');
  const fst = formStatFor(w.id, state.formDrill.formId);
  smGrade(fst, grade);
  state.formDrill.tally[grade]++;
  state.formDrill.idx++;
  state.formDrill.submitted = false;
  state.formDrill.input = '';
  state.formDrill.autoCorrect = null;
  save();
  if(state.formDrill.idx >= state.formDrill.queue.length){
    state.formDrill.active = false;
    state.formDrill.complete = true;
  }
  render();
  setTimeout(() => $('#formInput')?.focus(), 30);
}

  state.formDrill.idx++;
  state.formDrill.submitted = false;
  state.formDrill.input = '';

  if(state.formDrill.idx >= state.formDrill.queue.length){
    state.formDrill.active = false;
    state.formDrill.complete = true;

  setTimeout(() => $('#formInput')?.focus(), 30);

/* =========================================================================
   FORM BLITZ (v4.25) тАФ mixed-form, recall-direction.
   Pool = (verb, form) pairs drawn from Vocab-Blitz-graduated verbs ├Ч all forms.
   Card shows conjugated JP + form badge; user types English meaning.
   Graded lenient via form.accept() тАФ base-verb recognition counts.
   Mirrors Vocab Blitz rhythm: streak=3, mature fast-path, continuous refill.
   ========================================================================= */

const FORM_BLITZ_STREAK_REQUIRED = 3;
const FORM_BLITZ_MATURE_MIN = SM_MASTERED_DAYS * 24 * 60; /* 7 d */
const FORM_BLITZ_POOL_LEARNING = 8;
const FORM_BLITZ_POOL_MATURE = 4;
const FORM_BLITZ_MIN_PAIRS = 1; /* v4.28: gate effectively removed тАФ any deck with a verb unlocks Form Blitz */

function fbKey(verbId, formId){ return verbId + '|' + formId; }

function eligibleFormPairs(){
  const verbs = formEligibleVerbs();
  const out = [];
  for(const w of verbs){
    for(const f of FORMS) out.push({verbId:w.id, formId:f.id});
  }
  return out;
}

function buildFormBlitzPool(opts){
  opts = opts || {};
  const targetLearn = opts.targetLearn ?? FORM_BLITZ_POOL_LEARNING;
  const targetMature = opts.targetMature ?? FORM_BLITZ_POOL_MATURE;
  const exclude = opts.excludeKeys || new Set();
  const pairs = eligibleFormPairs().filter(p => !exclude.has(fbKey(p.verbId, p.formId)));
  const t = now();
  const unseen = [], youngDue = [], youngNotDue = [], matureDue = [];
  for(const p of pairs){
    const fst = state.formStats?.[p.verbId]?.[p.formId];
    if(!fst){ unseen.push(p); continue; }
    ensureSm(fst);
    if(fst.smInterval >= FORM_BLITZ_MATURE_MIN){
      if(fst.smNext <= t) matureDue.push({p, next: fst.smNext});
    } else {
      if(fst.smNext <= t) youngDue.push({p, next: fst.smNext});
      else youngNotDue.push({p, next: fst.smNext});
    }
  }
  matureDue.sort((a,b)=>a.next-b.next);
  youngDue.sort((a,b)=>a.next-b.next);
  youngNotDue.sort((a,b)=>a.next-b.next);
  const matureSel = matureDue.slice(0, targetMature).map(x => x.p);
  const learningSel = [
    ...youngDue.map(x => x.p),
    ...shuffleFY(unseen),
    ...youngNotDue.map(x => x.p),
  ].slice(0, targetLearn);
  return shuffleFY([
    ...matureSel.map(p => ({verbId:p.verbId, formId:p.formId, streak:0, required:1, answers:0, everWrong:false, mature:true})),
    ...learningSel.map(p => ({verbId:p.verbId, formId:p.formId, streak:0, required:FORM_BLITZ_STREAK_REQUIRED, answers:0, everWrong:false, mature:false})),
  ]);
}

function formBlitzRefillIfNeeded(){
  if(!state.formBlitz || !state.formBlitz.active) return;
  const target = state.formBlitz.poolTarget;
  if(!target) return;
  const halfway = Math.ceil(target / 2);
  if(state.formBlitz.pool.length > halfway) return;
  const deficit = target - state.formBlitz.pool.length;
  if(deficit <= 0) return;
  const exclude = new Set([
    ...state.formBlitz.pool.map(p => fbKey(p.verbId, p.formId)),
    ...state.formBlitz.graduated,
  ]);
  const defMature = Math.floor(deficit / 3);
  const defLearn = deficit - defMature;
  const fresh = buildFormBlitzPool({targetLearn:defLearn, targetMature:defMature, excludeKeys:exclude});
  if(!fresh.length) return;
  state.formBlitz.pool.push(...fresh);
  state.formBlitz.tally.total += fresh.length;
  state.formBlitz.tally.refills = (state.formBlitz.tally.refills || 0) + 1;
}

function startFormBlitz(){
  const pairs = eligibleFormPairs();
  if(!pairs.length){
    alert('Your deck has no verbs yet. Add a verb or enable the N5 pack in Settings.');
    return;
  }
  const poolTarget = FORM_BLITZ_POOL_LEARNING + FORM_BLITZ_POOL_MATURE;
  const pool = buildFormBlitzPool();
  if(!pool.length){
    alert('No form pairs available right now.');
    return;
  }
  const direction = state.settings.formBlitzDirection || 'jp-en';
  state.formBlitz = {
    active:true, complete:false,
    direction,
    currentDir: resolveBlitzDir(direction),
    pool, graduated:[], recent:[],
    currentKey: fbKey(pool[0].verbId, pool[0].formId),
    submitted:false, input:'', autoCorrect:null, justGraduated:null,
    totalAnswers:0, poolTarget,
    tally:{correct:0, wrong:0, graduated:0, total:pool.length, refills:0}
  };
  clearNextTimer();
  nav('formBlitz');
}
window.startFormBlitz = startFormBlitz;

function formBlitzCurrentPair(){
  if(!state.formBlitz || !state.formBlitz.active) return null;
  return state.formBlitz.pool.find(p => fbKey(p.verbId, p.formId) === state.formBlitz.currentKey) || null;
}
function formBlitzCurrentWord(){
  const p = formBlitzCurrentPair();
  if(!p) return null;
  return state.words.find(w => w.id === p.verbId) || null;
}
function formBlitzCurrentForm(){
  const p = formBlitzCurrentPair();
  if(!p) return null;
  return FORMS.find(f => f.id === p.formId) || null;
}

function formBlitzPickNext(){
  if(!state.formBlitz) return null;
  const pool = state.formBlitz.pool;
  if(!pool.length) return null;
  const gap = Math.min(3, pool.length - 1);
  const blocked = new Set((state.formBlitz.recent || []).slice(-gap));
  const eligible = pool.filter(p => !blocked.has(fbKey(p.verbId, p.formId)));
  const candidates = eligible.length ? eligible : pool;
  const pick = candidates[Math.floor(Math.random() * candidates.length)];
  return fbKey(pick.verbId, pick.formId);
}

let formBlitzAdvanceTimer = null;
function clearFormBlitzAdvanceTimer(){ if(formBlitzAdvanceTimer){ clearTimeout(formBlitzAdvanceTimer); formBlitzAdvanceTimer = null; } }

function formBlitzAcceptSet(w, f){
  const out = new Set();
  const fromForm = f.accept ? f.accept(w) : [f.en(w)];
  for(const s of fromForm){
    const n = normEN(s);
    if(n) out.add(n);
  }
  for(const alt of enAlternatives(w.en)){
    if(alt) out.add(alt);
  }
  return out;
}

function formBlitzCheck(input, w, f, dir){
  const d = dir || 'jp-en';
  if(d === 'en-jp'){
    /* Production: user types the conjugated form in hiragana. Single canonical target. */
    const target = normJP(f.conj(w.jp));
    const got = normJP(input);
    if(!got) return false;
    return got === target;
  }
  const n = normEN(input);
  if(!n) return false;
  return formBlitzAcceptSet(w, f).has(n);
}

function formBlitzToggleDir(){
  if(!state.formBlitz) return;
  const next = {'jp-en':'en-jp', 'en-jp':'mixed', 'mixed':'jp-en'};
  state.formBlitz.direction = next[state.formBlitz.direction] || 'jp-en';
  state.formBlitz.currentDir = resolveBlitzDir(state.formBlitz.direction);
  state.settings.formBlitzDirection = state.formBlitz.direction;
  save();
  render();
  setTimeout(() => $('#formBlitzInput')?.focus(), 30);
}
window.formBlitzToggleDir = formBlitzToggleDir;

function formBlitzRecord(pair, isCorrect){
  updateStreak(isCorrect);
  const fst = formStatFor(pair.verbId, pair.formId);
  ensureSm(fst);
  fst.reviewCount = (fst.reviewCount || 0) + 1;
  fst.lastReviewed = now();
  if(isCorrect){ fst.correctCount = (fst.correctCount || 0) + 1; }
  else { fst.wrongCount = (fst.wrongCount || 0) + 1; }
  pair.answers++;
  state.formBlitz.totalAnswers++;
  state.formBlitz.recent = [...(state.formBlitz.recent || []), fbKey(pair.verbId, pair.formId)].slice(-4);
  if(isCorrect){
    pair.streak++;
    state.formBlitz.tally.correct++;
    if(pair.streak >= pair.required){
      smGrade(fst, 'good');
      const k = fbKey(pair.verbId, pair.formId);
      state.formBlitz.pool = state.formBlitz.pool.filter(p => fbKey(p.verbId, p.formId) !== k);
      state.formBlitz.graduated.push(k);
      state.formBlitz.tally.graduated++;
      state.formBlitz.justGraduated = k;
    } else {
      state.formBlitz.justGraduated = null;
    }
  } else {
    pair.streak = 0;
    pair.everWrong = true;
    state.formBlitz.tally.wrong++;
    state.formBlitz.justGraduated = null;
  }
}

function formBlitzSubmit(){
  if(!state.formBlitz || state.formBlitz.submitted) return;
  const pair = formBlitzCurrentPair();
  const w = formBlitzCurrentWord();
  const f = formBlitzCurrentForm();
  if(!pair || !w || !f) return;
  const inp = $('#formBlitzInput');
  state.formBlitz.input = inp?.value || '';
  const correct = formBlitzCheck(state.formBlitz.input, w, f, state.formBlitz.currentDir || state.formBlitz.direction);
  state.formBlitz.autoCorrect = correct;
  state.formBlitz.submitted = true;
  formBlitzRecord(pair, correct);
  save();
  render();
  clearFormBlitzAdvanceTimer();
  setTimeout(() => $('#formBlitzContinue')?.focus(), 30);
  const ms = correct ? 900 : 2000;
  formBlitzAdvanceTimer = setTimeout(formBlitzAdvance, ms);
}
window.formBlitzSubmit = formBlitzSubmit;

function formBlitzReveal(){
  if(!state.formBlitz || state.formBlitz.submitted) return;
  const pair = formBlitzCurrentPair();
  if(!pair) return;
  const inp = $('#formBlitzInput');
  state.formBlitz.input = inp?.value || '';
  state.formBlitz.autoCorrect = false;
  state.formBlitz.submitted = true;
  formBlitzRecord(pair, false);
  save();
  render();
  clearFormBlitzAdvanceTimer();
  setTimeout(() => $('#formBlitzContinue')?.focus(), 30);
  formBlitzAdvanceTimer = setTimeout(formBlitzAdvance, 2000);
}
window.formBlitzReveal = formBlitzReveal;

function formBlitzAdvance(){
  clearFormBlitzAdvanceTimer();
  if(!state.formBlitz) return;
  state.formBlitz.submitted = false;
  state.formBlitz.input = '';
  state.formBlitz.autoCorrect = null;
  state.formBlitz.justGraduated = null;
  formBlitzRefillIfNeeded();
  if(!state.formBlitz.pool.length){
    state.formBlitz.active = false;
    state.formBlitz.complete = true;
    state.formBlitz.currentKey = null;
    save();
    render();
    return;
  }
  state.formBlitz.currentKey = formBlitzPickNext();
  state.formBlitz.currentDir = resolveBlitzDir(state.formBlitz.direction);
  save();
  render();
  setTimeout(() => $('#formBlitzInput')?.focus(), 30);
}
window.formBlitzAdvance = formBlitzAdvance;

function formBlitzSkip(){
  if(!state.formBlitz) return;
  if(!confirm('Skip this card without recording it?')) return;
  clearFormBlitzAdvanceTimer();
  const k = state.formBlitz.currentKey;
  state.formBlitz.pool = state.formBlitz.pool.filter(p => fbKey(p.verbId, p.formId) !== k);
  state.formBlitz.submitted = false;
  state.formBlitz.input = '';
  state.formBlitz.autoCorrect = null;
  state.formBlitz.justGraduated = null;
  if(!state.formBlitz.pool.length){
    state.formBlitz.active = false;
    state.formBlitz.complete = true;
    state.formBlitz.currentKey = null;
  } else {
    state.formBlitz.currentKey = formBlitzPickNext();
    state.formBlitz.currentDir = resolveBlitzDir(state.formBlitz.direction);
  }
  save();
  render();
  setTimeout(() => $('#formBlitzInput')?.focus(), 30);
}
window.formBlitzSkip = formBlitzSkip;

function formBlitzEnd(){
  clearFormBlitzAdvanceTimer();
  if(state.formBlitz && state.formBlitz.active){
    const struggled = state.formBlitz.pool.filter(p => p.everWrong);
    for(const p of struggled){
      const fst = formStatFor(p.verbId, p.formId);
      smGrade(fst, 'again');
    }
    save();
  }
  state.formBlitz = null;
  nav('forms');
}
window.formBlitzEnd = formBlitzEnd;

        <div class="stat-box"><div class="stat-num">${t.wrong}</div><div class="stat-label">Wrong</div></div>
        <div class="stat-box"><div class="stat-num">${accPct}%</div><div class="stat-label">Accuracy</div></div>

  }

  const pair = formBlitzCurrentPair();

  const f = formBlitzCurrentForm();
  if(!pair || !w || !f) return `<div class="card"><div class="muted">No cards.</div></div>`;

  const conj = f.conj(w.jp);

      <div class="muted" style="font-size:12px;margin-bottom:6px">${promptSide} ┬╖ ${esc(f.name)} form</div>
      <div style="font-size:32px;text-align:center;padding:16px 0 6px">${esc(promptBig)}</div>
      <div class="muted" style="text-align:center;font-size:12px;margin-bottom:12px">[${esc(f.name)}] ┬╖ ${esc(f.hint)}</div>
      <input id="formBlitzInput" class="input" type="text" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="${esc(inputPh)}" onkeydown="if(event.key==='Enter'){event.preventDefault();formBlitzSubmit();}">
      <div class="spacer"></div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="formBlitzReveal()">Reveal</button>
        <button class="btn btn-primary" onclick="formBlitzSubmit()">Submit</button>
      </div>
      <div class="spacer"></div>
      <button class="btn btn-secondary" style="width:100%;font-size:12px" onclick="formBlitzSkip()">Skip card</button>
    </div>`;
  }

  const correct = !!b.autoCorrect;
  const graduated = !!b.justGraduated;
  const accent = graduated ? 'var(--blue)' : (correct ? 'var(--green)' : 'var(--red)');
  const fst = state.formStats?.[pair.verbId]?.[pair.formId];
  const nextLbl = (graduated && fst) ? smIntervalLabel(fst.smInterval) : '';

  const idealEn = f.en(w);
  const streakAfter = graduated ? '' : (correct

  const revealRows = cur === 'jp-en'
