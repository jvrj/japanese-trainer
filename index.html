async function sendAskClaude(){
  const inp = $('#askInput');
  const btn = $('#askSendBtn');
  const status = $('#chatStatus');
  const key = (state.settings.anthropicKey || '').trim();
  if(!key){ if(status) status.textContent = 'No API key set — open Settings first.'; return; }
  const text = (inp?.value || '').trim();
  if(!text) return;
  const ctx = currentClaudeContext();
  const fullText = ctx && (state.askClaude.messages.length === 0) ? `${ctx.text}\n\n${text}` : text;

  state.askClaude.messages.push({role:'user', content:fullText});
  save();
  if(inp) inp.value = '';
  if(btn) btn.disabled = true;
  if(status) status.textContent = 'thinking…';
  const logEl = $('#chatLog');
  if(logEl){
    logEl.insertAdjacentHTML('beforeend', renderChatMsg({role:'user', content:fullText}));
    scrollChatToBottom();
  }

  try{
    const model = state.settings.anthropicModel || 'claude-haiku-4-5-20251001';
    const history = state.askClaude.messages.slice(-20).map(m => ({role:m.role, content:m.content}));
    const body = {
      model,
      max_tokens: 1024,
      system: [{type:'text', text: ASK_CLAUDE_SYSTEM, cache_control:{type:'ephemeral'}}],
      messages: history
    };
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers: {
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
        'content-type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    if(!res.ok){
      const errTxt = await res.text().catch(()=>String(res.status));
      let friendly = `${res.status}`;
      if(res.status === 401) friendly += ' — API key rejected. Re-check the key in Settings (extra spaces? wrong account?).';
      else if(res.status === 400) friendly += ' — bad request. Try a shorter message or different model.';
      else if(res.status === 429) friendly += ' — rate limited or out of credits. Check console.anthropic.com billing.';
      else if(res.status === 529 || res.status === 503) friendly += ' — Anthropic overloaded. Try again in a moment.';
      throw new Error(`${friendly}\n\n${errTxt.slice(0,400)}`);
    }
    const data = await res.json();
    const reply = (data.content || []).map(c => c.text || '').join('').trim() || '(empty reply)';
    state.askClaude.messages.push({role:'assistant', content: reply});
    save();
    if(logEl){
      logEl.insertAdjacentHTML('beforeend', renderChatMsg({role:'assistant', content:reply}));
      scrollChatToBottom();
    }
    if(status){
      const usage = data.usage || {};
      const cache = usage.cache_read_input_tokens ? ` · ${usage.cache_read_input_tokens} cached` : '';
      status.textContent = `${usage.input_tokens||'?'} in · ${usage.output_tokens||'?'} out${cache}`;
    }
    log('ask_claude_ok',{model, in:(data.usage||{}).input_tokens, out:(data.usage||{}).output_tokens});
  } catch(e){
    if(logEl){
      logEl.insertAdjacentHTML('beforeend', `<div class="chat-msg err">Request failed: ${esc(String(e.message||e))}</div>`);
      scrollChatToBottom();
    }
    if(status) status.textContent = 'error';
    log('ask_claude_err',{err:String(e.message||e)});
  } finally {
    if(btn) btn.disabled = false;
    if(inp){ inp.focus(); }
  }
}

    const s = (e.state && e.state.screen) || 'home';
    const d = e.state && e.state.data;
    nav(s, d, true);
  });
  /* seed initial history */
  try{ history.replaceState({screen:'home'}, '', '#home'); }catch(e){}

  /* Prime voices list — some browsers populate async */
  try{
    if('speechSynthesis' in window){
      const v = window.speechSynthesis.getVoices();
      if(v && v.length) _ttsVoicesReady = true;
      else window.speechSynthesis.addEventListener('voiceschanged', () => { _ttsVoicesReady = true; }, {once:true});
    }
  }catch(e){}
  /* v6.0 — Build Mode resilience: handle tab hide/show so the timer chain doesn't desync from throttled TTS. */
  document.addEventListener('visibilitychange', _buildOnVisibilityChange);
  /* keep header version label in sync with APP_VERSION so it never goes stale */
  const _vLabel = document.getElementById('appVersionLabel');
  if(_vLabel) _vLabel.textContent = '一心 · v' + APP_VERSION;
  render();
  updateBackFab();
  log('init',{v:APP_VERSION, words:state.words.length});
}
