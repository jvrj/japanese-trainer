<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>日本語 Trainer v4</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a; --card:#161616; --card2:#1f1f1f; --border:#2a2a2a;
  --text:#e8e8e8; --dim:#888; --faint:#555;
  --red:#ef4444; --red-d:#7f1d1d;
  --green:#22c55e; --green-d:#14532d;
  --orange:#f97316; --orange-d:#7c2d12;
  --blue:#3b82f6; --purple:#a855f7; --teal:#14b8a6; --yellow:#eab308;
  --accent:#ef4444;
}
html,body{background:var(--bg);color:var(--text);min-height:100dvh}
body{font-family:'Noto Sans JP',-apple-system,sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased;padding-bottom:100px}
.app{max-width:480px;margin:0 auto;padding:0 14px 120px;min-height:100dvh;position:relative}

/* Header */
.header{text-align:center;padding:22px 0 14px}
.header h1{font-size:30px;font-weight:900;letter-spacing:-1.5px;background:linear-gradient(135deg,#fff,#888);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:10px;letter-spacing:3px;color:var(--faint);margin-top:4px;text-transform:uppercase}

/* Cards & layout */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px}
.card h3{font-size:12px;letter-spacing:2px;color:var(--dim);margin-bottom:10px;text-transform:uppercase}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 4px;text-align:center}
.stat-num{font-size:22px;font-weight:900;line-height:1}
.stat-label{font-size:9px;letter-spacing:1.5px;color:var(--faint);margin-top:4px;text-transform:uppercase}

/* Buttons */
.btn{display:block;width:100%;border:none;border-radius:14px;padding:14px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:transform .1s,opacity .1s;text-align:center;margin-bottom:7px;color:#fff}
.btn:active{transform:scale(.97);opacity:.9}
.btn-primary{background:var(--red)}
.btn-orange{background:var(--orange)}
.btn-blue{background:var(--blue)}
.btn-teal{background:var(--teal)}
.btn-purple{background:var(--purple)}
.btn-green{background:var(--green)}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-ghost{background:transparent;color:var(--dim);border:none;padding:10px;font-size:13px;font-family:inherit;cursor:pointer}
.btn-sm{padding:9px 14px;font-size:12px;width:auto;display:inline-block}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.btn-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}

/* Tags / pills */
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.tag{padding:6px 11px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);cursor:pointer;font-family:inherit;background:var(--card);color:var(--dim);transition:all .1s}
.tag.active{background:var(--red);color:#fff;border-color:var(--red)}
.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.pill-new{background:#333;color:#bbb}
.pill-learning{background:#7c2d12;color:#fed7aa}
.pill-apprentice{background:#713f12;color:#fde68a}
.pill-guru{background:#14532d;color:#bbf7d0}
.pill-master{background:#1e3a8a;color:#bfdbfe}
.pill-burned{background:#4c1d95;color:#ddd6fe}
.pill-unverified{background:var(--orange-d);color:#fed7aa}

/* Inputs */
.input{width:100%;padding:13px 14px;font-size:17px;border-radius:14px;border:2px solid var(--border);background:var(--card);color:var(--text);font-family:inherit;outline:none;transition:border-color .1s}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:var(--faint)}
textarea.input{min-height:80px;resize:vertical;font-size:14px}

/* Drill card */
.drill-wrap{position:relative}
.drill-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 18px;text-align:center;margin-bottom:12px;min-height:140px;display:flex;flex-direction:column;justify-content:center;position:relative}
.drill-cat{font-size:10px;letter-spacing:2px;color:var(--faint);text-transform:uppercase;margin-bottom:8px}
.drill-prompt{font-size:24px;font-weight:700;line-height:1.3;margin-bottom:6px}
.drill-prompt.jp{font-size:40px;font-weight:900}
.drill-sub{font-size:12px;color:var(--dim);margin-top:6px}

/* TTS / Voice buttons */
.audio-row{display:flex;gap:8px;margin-bottom:10px}
.audio-btn{flex:1;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:14px;border-radius:14px;font-family:inherit;cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px}
.audio-btn:active{transform:scale(.97)}
.audio-btn.listening{background:var(--red);color:#fff;border-color:var(--red);animation:pulse 1.2s infinite}
.audio-btn.speaking{background:var(--blue);color:#fff;border-color:var(--blue)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.voice-heard{font-size:12px;color:var(--dim);padding:8px 12px;background:var(--card2);border-radius:10px;margin-bottom:10px;text-align:center}
.voice-heard b{color:var(--text)}

/* Feedback card */
.feedback-card{border-radius:20px;padding:20px;text-align:center;margin-bottom:12px;border:2px solid}
.feedback-card.correct{background:var(--green-d);border-color:var(--green)}
.feedback-card.wrong{background:var(--red-d);border-color:var(--red)}
.feedback-card.partial{background:var(--orange-d);border-color:var(--orange)}
.feedback-head{font-size:13px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.feedback-body{font-size:15px;line-height:1.5}
.feedback-body b{font-weight:900}
.feedback-smart{margin-top:10px;padding:10px;background:rgba(0,0,0,.25);border-radius:10px;font-size:13px;line-height:1.5}
.feedback-smart .hit{color:#fde68a;font-weight:700}

/* Hint card */
.hint-card{background:var(--card2);border:1px dashed var(--border);border-radius:14px;padding:12px;margin-bottom:10px}
.hint-head{font-size:10px;letter-spacing:2px;color:var(--yellow);text-transform:uppercase;margin-bottom:6px}
.hint-body{font-size:14px;line-height:1.4}

/* Word list */
.word-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:8px}
.word-row:last-child{border-bottom:none}
.word-main{flex:1;min-width:0}
.word-jp{font-weight:700;font-size:15px}
.word-r{font-size:11px;color:var(--faint);margin-left:6px}
.word-en{font-size:12px;color:var(--dim);margin-top:2px}
.word-meta{text-align:right;font-size:10px;color:var(--faint)}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.95);backdrop-filter:blur(14px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 calc(10px + env(safe-area-inset-bottom));z-index:50}
.nav-btn{background:none;border:none;color:var(--faint);font-family:inherit;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;padding:6px 10px;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn .nav-ico{font-size:20px;line-height:1}
.nav-btn.active{color:var(--red)}

/* Floating FABs */
.notes-fab{position:fixed;right:16px;bottom:86px;width:52px;height:52px;border-radius:26px;background:var(--purple);color:#fff;border:none;font-size:22px;cursor:pointer;z-index:45;box-shadow:0 6px 20px rgba(168,85,247,.45);display:flex;align-items:center;justify-content:center}
.notes-fab:active{transform:scale(.92)}
.back-fab{position:fixed;left:16px;bottom:86px;width:52px;height:52px;border-radius:26px;background:var(--card2);color:var(--text);border:1px solid var(--border);font-size:22px;cursor:pointer;z-index:45;box-shadow:0 6px 20px rgba(0,0,0,.45);display:none;align-items:center;justify-content:center}
.back-fab:active{transform:scale(.92)}
.back-fab.show{display:flex}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg);border-top:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:90dvh;overflow-y:auto;padding:20px 16px 30px;animation:slideup .22s ease}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-head h2{font-size:18px;font-weight:800}
.modal-close{background:none;border:none;color:var(--dim);font-size:22px;cursor:pointer;padding:4px 10px}

/* Convo */
.convo-turn{padding:10px 14px;border-radius:14px;margin-bottom:8px;max-width:85%}
.convo-turn.them{background:var(--card2);border:1px solid var(--border);align-self:flex-start;margin-right:auto}
.convo-turn.you{background:var(--blue);color:#fff;align-self:flex-end;margin-left:auto;text-align:right}
.convo-turn .jp-line{font-size:16px;font-weight:700;margin-bottom:3px}
.convo-turn .en-line{font-size:11px;opacity:.75}
.convo-list{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.convo-chip{font-size:10px;letter-spacing:1.5px;color:var(--faint);text-transform:uppercase;margin-left:3px;margin-bottom:3px}

/* Progress */
.progress-bar{width:100%;height:5px;background:var(--border);border-radius:3px;margin-bottom:14px;overflow:hidden}
.progress-fill{height:100%;background:var(--red);border-radius:3px;transition:width .3s}
.direction-toggle{display:flex;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.direction-btn{flex:1;padding:10px;border:none;background:transparent;color:var(--dim);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer}
.direction-btn.active{background:var(--red);color:#fff}

.divider{height:1px;background:var(--border);margin:12px 0}
.muted{color:var(--dim);font-size:12px;line-height:1.5}
.center{text-align:center}
.spacer{height:12px}

/* Mastery grid */
.mastery-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:6px}
.mastery-cell{text-align:center;padding:9px 4px;border-radius:8px;background:var(--card2);border:1px solid var(--border)}
.mastery-cell .mc-n{font-size:17px;font-weight:900;line-height:1}
.mastery-cell .mc-l{font-size:8px;letter-spacing:.5px;color:var(--faint);margin-top:3px;text-transform:uppercase}

/* Scenario list */
.scenario-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px}
.scenario-item:active{transform:scale(.98)}
.scenario-emoji{font-size:26px}
.scenario-body{flex:1;min-width:0}
.scenario-title{font-size:14px;font-weight:700}
.scenario-meta{font-size:11px;color:var(--dim);margin-top:2px}

.note-item{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:7px}
.note-time{font-size:10px;color:var(--faint);margin-bottom:4px;letter-spacing:1px}
.note-text{font-size:13px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.note-del{font-size:10px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 0;margin-top:4px}

.kbd{font-family:ui-monospace,monospace;font-size:11px;background:var(--card2);padding:2px 6px;border-radius:4px;border:1px solid var(--border)}
.warn{background:var(--orange-d);border:1px solid var(--orange);border-radius:12px;padding:12px;font-size:12px;color:#fed7aa;margin-bottom:10px}

/* Top bar — back button + screen title */
.topbar{display:flex;align-items:center;gap:10px;padding:8px 6px 12px;position:sticky;top:0;background:var(--bg);z-index:10;margin:-4px -14px 6px;padding-left:14px;padding-right:14px;border-bottom:1px solid var(--border)}
.topbar-back{background:var(--card2);border:1px solid var(--border);color:var(--text);width:38px;height:38px;border-radius:19px;cursor:pointer;font-size:16px;font-family:inherit;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topbar-back:active{transform:scale(.93)}
.topbar-title{font-size:16px;font-weight:800;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar-action{background:var(--card2);border:1px solid var(--border);color:var(--dim);border-radius:10px;padding:7px 11px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.5px;text-transform:uppercase}

/* Collapsible section */
.collapsible{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden}
.collapsible-head{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;user-select:none}
.collapsible-head h3{font-size:11px;letter-spacing:2px;color:var(--dim);margin:0;text-transform:uppercase}
.collapsible-arrow{font-size:14px;color:var(--faint);transition:transform .2s}
.collapsible.open .collapsible-arrow{transform:rotate(90deg)}
.collapsible-body{display:none;padding:0 14px 14px}
.collapsible.open .collapsible-body{display:block}

/* Compact mastery strip */
.mastery-strip{display:flex;height:8px;border-radius:4px;overflow:hidden;margin:4px 0 8px;background:var(--border)}
.mastery-strip-seg{height:100%}
.mastery-strip-seg.new{background:#444}
.mastery-strip-seg.learning{background:var(--orange)}
.mastery-strip-seg.apprentice{background:var(--yellow)}
.mastery-strip-seg.guru{background:var(--green)}
.mastery-strip-seg.master{background:var(--blue)}
.mastery-strip-seg.burned{background:var(--purple)}
.mastery-legend{display:flex;flex-wrap:wrap;gap:6px 10px;font-size:10px;color:var(--dim)}
.mastery-legend span{display:flex;align-items:center;gap:4px}
.mastery-legend i{width:8px;height:8px;border-radius:2px;display:inline-block;font-style:normal}

/* Training wheels */
.wheels-card{background:linear-gradient(180deg,rgba(59,130,246,.12),rgba(168,85,247,.08));border:1px solid #3b82f6;border-radius:14px;padding:10px 12px;margin-bottom:10px}
.wheels-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.wheels-title{font-size:11px;letter-spacing:2px;color:#93c5fd;text-transform:uppercase;font-weight:800}
.wheels-toggle{font-size:10px;background:var(--card2);border:1px solid var(--border);color:var(--dim);padding:3px 7px;border-radius:8px;cursor:pointer;font-family:inherit;letter-spacing:1px;text-transform:uppercase}
.wheels-list{display:flex;flex-direction:column;gap:4px;max-height:180px;overflow-y:auto}
.wheels-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:5px 8px;background:rgba(0,0,0,.25);border-radius:8px;font-size:12px}
.wheels-jp{font-weight:700;font-size:13px}
.wheels-en{color:#bfdbfe;font-size:11px;text-align:right;flex:1}
.wheels-actions{display:flex;gap:4px}
.wheels-btn{background:none;border:none;color:#93c5fd;cursor:pointer;font-size:13px;padding:2px 4px;opacity:.7}
.wheels-btn:hover{opacity:1}
.wheels-btn.pinned{color:#fbbf24;opacity:1}
.wheels-empty{font-size:11px;color:var(--dim);padding:6px;text-align:center}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <h1>日本語 Trainer</h1>
    <div class="sub">v4 · conversation edition</div>
  </div>
  <main id="main"></main>
</div>

<nav class="bottom-nav">
  <button class="nav-btn" data-screen="home"><span class="nav-ico">🏠</span>Home</button>
  <button class="nav-btn" data-screen="drill"><span class="nav-ico">🎯</span>Drill</button>
  <button class="nav-btn" data-screen="convo"><span class="nav-ico">💬</span>Convo</button>
  <button class="nav-btn" data-screen="sentence"><span class="nav-ico">✍️</span>Sentence</button>
  <button class="nav-btn" data-screen="settings"><span class="nav-ico">⚙️</span>More</button>
</nav>

<button class="back-fab" id="backFab" title="Back">←</button>
<button class="notes-fab" id="notesFab" title="Quick note">💭</button>

<div class="modal-bg" id="modal"><div class="modal" id="modalInner"></div></div>

<script>
/* =========================================================================
   日本語 Trainer v4
   ========================================================================= */

'use strict';

/* ------------------- DATA: scenarios, templates, examples ------------------ */

const SCENARIOS = [
  {id:"cafe",title:"Ordering at a café",emoji:"☕",register:"polite",turns:[
    {who:"them",jp:"いらっしゃいませ。",en:"Welcome."},
    {who:"you",jp:"コーヒー を ひとつ ください。",en:"One coffee, please."},
    {who:"them",jp:"アイス ですか、ホット ですか。",en:"Iced or hot?"},
    {who:"you",jp:"ホット で おねがいします。",en:"Hot, please."},
    {who:"them",jp:"かしこまりました。すこし お まち ください。",en:"Certainly. Please wait a moment."}
  ],notes:"ください = please give. おねがいします = please (softer). かしこまりました is very formal 'understood' used by staff."},
  {id:"station",title:"Asking directions",emoji:"🚉",register:"polite",turns:[
    {who:"you",jp:"すみません、しぶや えき は どこ ですか。",en:"Excuse me, where is Shibuya station?"},
    {who:"them",jp:"まっすぐ いって、つぎ の かど を みぎ です。",en:"Go straight, then right at the next corner."},
    {who:"you",jp:"ありがとう ございます。あるいて どのくらい ですか。",en:"Thank you. How long on foot?"},
    {who:"them",jp:"ごふん ぐらい ですよ。",en:"About five minutes."},
    {who:"you",jp:"たすかりました。",en:"That helps a lot."}
  ],notes:"すみません opens a polite request. どのくらい = how much/long. たすかりました = 'I was helped' — natural thanks for info."},
  {id:"intro",title:"Self-introduction",emoji:"🤝",register:"polite",turns:[
    {who:"you",jp:"はじめまして。ユリウス と もうします。",en:"Nice to meet you. I'm called Julius."},
    {who:"them",jp:"はじめまして。たなか です。よろしく おねがいします。",en:"Nice to meet you. I'm Tanaka. Pleased to meet you."},
    {who:"you",jp:"イギリス から きました。にほんご を べんきょう して います。",en:"I'm from the UK. I'm studying Japanese."},
    {who:"them",jp:"そう ですか。じょうず ですね。",en:"Oh really? You're good at it."},
    {who:"you",jp:"いえいえ、まだまだ です。",en:"No no, I still have a long way to go."}
  ],notes:"もうします is humble 'to be called'. いえいえ、まだまだ です is the standard humble response to a compliment."},
  {id:"doctor",title:"At the doctor",emoji:"🏥",register:"polite",turns:[
    {who:"them",jp:"きょう は どう されました か。",en:"What seems to be the matter today?"},
    {who:"you",jp:"きのう から おなか が いたい です。",en:"My stomach has hurt since yesterday."},
    {who:"them",jp:"ねつ は あります か。",en:"Do you have a fever?"},
    {who:"you",jp:"すこし あります。あたま も いたい です。",en:"A little. My head also hurts."},
    {who:"them",jp:"わかりました。くすり を だします ね。",en:"Understood. I'll prescribe some medicine."}
  ],notes:"いたい = painful. きのう から = since yesterday. くすり を だす = to prescribe medicine."},
  {id:"shopping",title:"Shopping for clothes",emoji:"🛍️",register:"polite",turns:[
    {who:"them",jp:"なにか おさがし ですか。",en:"Are you looking for something?"},
    {who:"you",jp:"この シャツ の Mサイズ は あります か。",en:"Do you have this shirt in medium?"},
    {who:"them",jp:"しょうしょう おまち ください … はい、こちら です。",en:"One moment please... here you are."},
    {who:"you",jp:"しちゃく しても いい ですか。",en:"May I try it on?"},
    {who:"them",jp:"もちろん です。どうぞ。",en:"Of course. Go ahead."}
  ],notes:"しちゃく = trying on. ～ても いい ですか = may I ～? しょうしょう おまち ください = formal 'please wait a moment'."},
  {id:"exchange",title:"Language exchange",emoji:"💬",register:"casual",turns:[
    {who:"them",jp:"ひさしぶり！げんき？",en:"Long time! How are you?"},
    {who:"you",jp:"うん、げんき だよ。そっち は？",en:"Yeah, I'm good. How about you?"},

const $ = (sel,root=document) => root.querySelector(sel);

function shuffleFY(a){ const r=a.slice(); for(let i=r.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [r[i],r[j]]=[r[j],r[i]]; } return r; }

/* Normalize Japanese text for matching: kata→hira, strip spaces/punct */
function normJP(s){
  if(!s) return '';
  let t = String(s).trim();
  t = t.replace(/[\u30A1-\u30F6]/g, c => String.fromCharCode(c.charCodeAt(0)-0x60));
  t = t.replace(/[\s、。！？,\.!?・]/g, '');
  t = t.replace(/[ー]/g,'');
  return t.toLowerCase();
}

/* Normalize English for matching — strip parenthetical qualifiers, articles, punctuation */
function normEN(s){
  let t = String(s||'').toLowerCase().trim();
  t = t.replace(/\([^)]*\)/g, ' '); /* "(casual)", "(mine)", "(intr)" etc. */
  t = t.replace(/^(to |a |an |the )/, '');
  t = t.replace(/[\.!?,'"()]/g, '');
  t = t.replace(/\s+/g, ' ').trim();
  return t;
}

/* Expand a word's English into all acceptable alternatives */
function enAlternatives(en){
  if(!en) return [];
  /* split on / and , */
  const parts = String(en).split(/[\/,]/).map(p => p.trim()).filter(Boolean);
  const out = new Set();
  for(const p of parts){
    const n = normEN(p);
    if(n) out.add(n);
    /* also accept without the parenthetical stripped, in case answer *includes* it */
    const raw = p.toLowerCase().replace(/[\.!?,'"]/g,'').trim();
    if(raw) out.add(raw);
  }
  return [...out].filter(Boolean);
}

function levenshtein(a,b){
  a=a||''; b=b||'';
  if(a===b) return 0;
  if(!a.length) return b.length;
  if(!b.length) return a.length;
  const dp=[...Array(a.length+1).keys()];
  for(let i=1;i<=b.length;i++){
    let prev=dp[0]; dp[0]=i;
    for(let j=1;j<=a.length;j++){
      const tmp=dp[j];
      dp[j] = Math.min(dp[j]+1, dp[j-1]+1, prev + (a[j-1]===b[i-1]?0:1));
      prev=tmp;
    }
  }
  return dp[a.length];
}

/* =========================================================================
   MASTERY LADDER
   ========================================================================= */

const MASTERY = ['new','learning','apprentice','guru','master','burned'];

function getMasteryForWord(wordId){
  const st = state.stats[wordId];
  if(!st || !st.attempts || st.attempts.length===0) return 'new';
  const attempts = st.attempts;
  const recent = attempts.slice(-10);
  const recentCorrect = recent.filter(a=>a.correct).length;
  const recentAcc = recentCorrect / recent.length;
  const totalCorrect = attempts.filter(a=>a.correct).length;
  const firstCorrect = st.firstCorrect;
  const daysSinceFirstCorrect = firstCorrect ? (now()-firstCorrect)/(1000*60*60*24) : 0;
  const hasVoice = attempts.some(a=>a.voice && a.correct);
  const voiceCount = attempts.filter(a=>a.voice && a.correct).length;

  if(attempts.length < 3) return 'learning';
  if(recentAcc >= 0.95 && totalCorrect >= 10 && daysSinceFirstCorrect >= 30) return 'burned';
  if(recentAcc >= 0.95 && totalCorrect >= 10 && daysSinceFirstCorrect >= 7 && (!state.settings.voiceOn || voiceCount >= 3)) return 'master';
  if(recentAcc >= 0.85 && totalCorrect >= 5) return 'guru';
  if(totalCorrect >= 3) return 'apprentice';
  return 'learning';
}

/* SRS-lite intervals: minutes until next review, doubles on correct, resets to 10min on wrong */
const SRS_BASE_MIN = 10;
function srsBump(st, correct){
  const cur = st.srsInterval || SRS_BASE_MIN;
  const next = correct ? Math.min(cur * 2, 60*24*30) : SRS_BASE_MIN; /* cap at 30 days */
  st.srsInterval = next;
  st.nextReview = now() + next * 60 * 1000;
}

function recordAttempt(wordId, correct, viaVoice){
  if(!state.stats[wordId]) state.stats[wordId] = {attempts:[], firstCorrect:null, lastSeen:null};
  const st = state.stats[wordId];
  const prevMastery = getMasteryForWord(wordId);
  st.attempts.push({ts:now(), correct, voice:!!viaVoice});
  st.lastSeen = now();
  if(correct && !st.firstCorrect) st.firstCorrect = now();
  srsBump(st, correct);
  const newMastery = getMasteryForWord(wordId);

  /* Ghost demote: if at Guru+ and miss, demote one stage by injecting "shadow" failures */
  if(!correct && (prevMastery==='guru' || prevMastery==='master')){
    st.demotedAt = now();
    log('ghost_demote',{id:wordId, from:prevMastery});
  }

  log('attempt',{id:wordId, correct, voice:!!viaVoice, prev:prevMastery, next:newMastery});
}

/* =========================================================================
   CARD SELECTION
   ========================================================================= */

function getActiveWords(){
  const s = state.settings;
  const removed = new Set(s.removedWords || []);
  return state.words.filter(w => {
    if(removed.has(w.id)) return false;
    if(s.activeThemes.length && !s.activeThemes.includes(w.theme)) return false;
    if(s.activePOS.length && !s.activePOS.includes(w.pos)) return false;
    if(s.activeRegister.length && !s.activeRegister.includes(w.register)) return false;
    return true;
  });
}

/* Training wheels decision — show answers panel for words the user doesn't know yet */
function shouldShowWheels(){
  const mode = state.settings.trainingWheels;
  if(mode === 'on') return true;
  if(mode === 'off') return false;
  /* auto: show if most of session queue is New/Learning */
  if(!state.sessionQueue.length) return false;
  let weak = 0;
  for(const w of state.sessionQueue){
    const m = getMasteryForWord(w.id);
    if(m === 'new' || m === 'learning') weak++;
  }
  return weak / state.sessionQueue.length >= 0.4;
}

function getWheelsWords(){
  const pinned = new Set(state.settings.pinnedWords || []);
  const out = [];
  const seen = new Set();
  for(const w of state.sessionQueue){
    if(seen.has(w.id)) continue;
    const m = getMasteryForWord(w.id);
    if(m === 'new' || m === 'learning' || pinned.has(w.id)){
      out.push({word:w, mastery:m, pinned:pinned.has(w.id)});
      seen.add(w.id);
    }
  }
  /* also include any pinned words not in current queue */
  for(const id of pinned){
    if(seen.has(id)) continue;
    const w = state.words.find(x=>x.id===id);
    if(w){ out.push({word:w, mastery:getMasteryForWord(w.id), pinned:true}); seen.add(id); }
  }
  return out;
}

function buildSession(overrideSize){
  let pool = getActiveWords();
  if(!pool.length) return [];
  const s = state.settings;
  const SZ = overrideSize || 20;

  if(s.mode === 'weakest'){
    pool = pool.slice().sort((a,b) => {
      const ord = {new:0, learning:1, apprentice:2, guru:3, master:4, burned:5};
      return ord[getMasteryForWord(a.id)] - ord[getMasteryForWord(b.id)];
    });
    return pool.slice(0, SZ);
  }
  if(s.mode === 'newest'){
    pool = pool.slice().sort((a,b) => (state.stats[b.id]?.attempts?.[0]?.ts || 0) - (state.stats[a.id]?.attempts?.[0]?.ts || 0));
    return pool.slice(0, SZ);
  }
  /* SRS-aware random: prioritise due words, then unseen, then random */
  if(s.srsOn){
    const due = [], unseen = [], other = [];
    const t = now();
    for(const w of pool){
      const st = state.stats[w.id];
      if(!st || !st.attempts?.length) unseen.push(w);
      else if(!st.nextReview || st.nextReview <= t) due.push(w);
      else other.push(w);
    }
    const mix = [...shuffleFY(due).slice(0, Math.floor(SZ*0.6)), ...shuffleFY(unseen).slice(0, Math.floor(SZ*0.3)), ...shuffleFY(other)];
    return mix.slice(0, SZ);
  }
  pool = shuffleFY(pool);
  return pool.slice(0, SZ);
}

/* =========================================================================
   ANSWER CHECKING
   ========================================================================= */

function checkAnswer(userInput, word, direction){
  const ui = (userInput||'').trim();
  if(!ui) return {correct:false, reason:'empty'};

  if(direction === 'jp-en'){
    /* English expected */
    const alts = enAlternatives(word.en);
    const uiN = normEN(ui);
    if(alts.includes(uiN)) return {correct:true, match:'exact'};
    /* Allow 1-char typo for longer answers */
    for(const p of alts){
      if(p && p.length >= 4 && levenshtein(uiN, p) <= 1) return {correct:true, match:'near'};
    }
    /* Allow user answer being a subset or superset when short meanings overlap */
    for(const p of alts){
      if(p && uiN && (p === uiN || (p.length >= 3 && uiN.length >= 3 && (p.includes(uiN) && Math.abs(p.length-uiN.length) <= 4)))) return {correct:true, match:'subset'};
    }
    return {correct:false, reason:'wrong'};
  } else {
    /* Japanese expected */
    const target = normJP(word.jp);
    const uiN = normJP(ui);
    if(uiN === target) return {correct:true, match:'exact'};
    /* Allow 1-char typo for words >= 4 chars */
    if(target.length >= 4 && levenshtein(uiN, target) === 1) return {correct:true, match:'typo'};
    return {correct:false, reason:'wrong'};
  }
}

/* Smart wrong feedback: was it a real (known) word? */
function analyzeWrongJP(userInput, word){
  const uiN = normJP(userInput);
  if(!uiN) return null;
  /* search dictionary */
  const hit = state.words.find(w => normJP(w.jp) === uiN && w.id !== word.id);
  if(hit) return {type:'real-word', match:hit};
  /* near-real word */
  for(const w of state.words){
    if(w.id === word.id) continue;
    if(levenshtein(uiN, normJP(w.jp)) === 1 && normJP(w.jp).length >= 3){
      return {type:'near-real', match:w};
    }
  }
  return {type:'unknown'};
}

function analyzeWrongEN(userInput, word){
  const uiN = normEN(userInput);
  if(!uiN) return null;
  const hit = state.words.find(w => enAlternatives(w.en).includes(uiN) && w.id !== word.id);
  if(hit) return {type:'real-word', match:hit};
  return {type:'unknown'};
}

let speakingFlag = false;
function speakJP(text, rate){
  try{
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(String(text).replace(/\s+/g,''));
    u.lang = 'ja-JP';
    u.rate = rate || state.settings.ttsRate || 0.9;
    const voices = window.speechSynthesis.getVoices();
    const jp = voices.find(v=>v.lang && v.lang.toLowerCase().startsWith('ja'));
    if(jp) u.voice = jp;
    u.onstart = ()=>{speakingFlag=true; updateSpeakBtn();};
    u.onend = ()=>{speakingFlag=false; updateSpeakBtn();};
    window.speechSynthesis.speak(u);
    log('tts',{text});
  }catch(e){ log('tts_err',{err:String(e)}); }
}
function updateSpeakBtn(){
  const btn = $('#ttsBtn');
  if(btn) btn.classList.toggle('speaking', speakingFlag);
}

/* =========================================================================
   VOICE INPUT (browser SpeechRecognition)
   ========================================================================= */

let _rec = null;
function getRecognition(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return null;
  if(_rec) return _rec;
  _rec = new SR();
  _rec.lang = 'ja-JP';
  _rec.continuous = false;
  _rec.interimResults = false;
  _rec.maxAlternatives = 3;
  return _rec;
}
function voiceSupported(){ return !!(window.SpeechRecognition || window.webkitSpeechRecognition); }

function startVoice(onResult, onEnd){
  const rec = getRecognition();
  if(!rec) { onEnd && onEnd(new Error('unsupported')); return; }
  state.voiceListening = true;
  rec.onresult = (e)=>{
    const alts = [];
    for(let i=0;i<e.results.length;i++){
      for(let j=0;j<e.results[i].length;j++) alts.push({transcript:e.results[i][j].transcript, conf:e.results[i][j].confidence});
    }
    log('voice_result',{alts});
    onResult && onResult(alts);
  };
  rec.onerror = (e)=>{ state.voiceListening=false; log('voice_err',{err:e.error}); onEnd && onEnd(e); };
  rec.onend = ()=>{ state.voiceListening=false; onEnd && onEnd(null); updateVoiceBtn(); };
  try{ rec.start(); updateVoiceBtn(); }catch(e){ state.voiceListening=false; onEnd && onEnd(e); }
}
function stopVoice(){ try{ _rec && _rec.stop(); }catch(e){} state.voiceListening=false; updateVoiceBtn(); }
function updateVoiceBtn(){
  const btn = $('#voiceBtn');
  if(btn) btn.classList.toggle('listening', state.voiceListening);
}

/* =========================================================================
   HINTS
   ========================================================================= */

function getHintsFor(word){
  const hints = [];
  /* user-written hint wins */
  if(word.hint) hints.push({label:'your note', text:word.hint});
  /* theme/category */
  if(word.theme) hints.push({label:'category', text:`It's a ${word.theme} word.`});
  /* POS */
  const posLabels = {n:'a noun',v:'a verb','adj':'an i-adjective','adj-na':'a na-adjective',adv:'an adverb',expr:'a phrase/expression',pron:'a pronoun',num:'a number',part:'a particle',conj:'a conjunction'};
  if(word.pos) hints.push({label:'word type', text:`It's ${posLabels[word.pos] || word.pos}.`});
  /* register */
  if(word.register && word.register!=='neutral') hints.push({label:'register', text:`Used in ${word.register} contexts.`});
  /* shape hint */
  const jp = normJP(word.jp);
  if(jp.length) hints.push({label:'shape', text:`${jp.length} character${jp.length>1?'s':''}, ends in "${jp.slice(-1)}"`});
  return hints;
}

/* =========================================================================
   STREAK
   ========================================================================= */

function updateStreak(){
  const t = today();
  const last = state.streak.lastDate;
  if(last === t) return;
  if(!last){
    state.streak.current = 1;
  } else {
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
    if(last === yesterday) state.streak.current = (state.streak.current||0) + 1;
    else state.streak.current = 1;
  }
  state.streak.lastDate = t;
  if(state.streak.current > (state.streak.longest||0)) state.streak.longest = state.streak.current;
  save();
}

  const m = $('#main');

function nav(screen, data, fromPop){

  state.screen = screen;
  state._navData = data;
  if(!fromPop){
    try{ history.pushState({screen, data}, '', '#'+screen); }catch(e){}
  }

function goBack(){
  /* if browser has history, use it; otherwise manual fallback */
  if(history.state && history.length > 1){
    history.back();
  } else {
    const back = state.screen === 'convoDetail' ? 'convo' : 'home';
    nav(back);
  }

/* ---------- HOME ---------- */
function renderHome(){
  const active = getActiveWords();
  const masteryBuckets = {new:0,learning:0,apprentice:0,guru:0,master:0,burned:0};
  for(const w of active) masteryBuckets[getMasteryForWord(w.id)]++;
  const streak = state.streak.current || 0;
  const totalAttempts = Object.values(state.stats).reduce((s,x)=>s+(x.attempts?.length||0),0);
  const totalCorrect = Object.values(state.stats).reduce((s,x)=>s+(x.attempts?.filter(a=>a.correct).length||0),0);
  const acc = totalAttempts ? Math.round(100*totalCorrect/totalAttempts) : 0;

  /* Mastery strip segments */
  const total = active.length || 1;

/* ---------- DRILL ---------- */
function renderDrill(){

  const pct = Math.round(100 * idx / state.sessionQueue.length);

function renderFeedback(fb){
  const cls = fb.correct ? 'correct' : 'wrong';
  const head = fb.correct ? '✓ Correct' : '✗ Incorrect';
  let smart = '';
  if(!fb.correct && fb.smart){
    if(fb.smart.type === 'real-word'){
      const h = fb.smart.match;
      smart = `<div class="feedback-smart">You wrote <span class="hit">${esc(fb.userJP || fb.userEN)}</span> — that's a real word meaning "<b>${esc(h.en)}</b>" (${h.pos||''}). But the answer was <b>${esc(fb.correctAnswer)}</b>.</div>`;
    } else if(fb.smart.type === 'near-real'){
      const h = fb.smart.match;
      smart = `<div class="feedback-smart">Almost — that's close to <b>${esc(h.jp)}</b> (${esc(h.en)}). But the answer was <b>${esc(fb.correctAnswer)}</b>.</div>`;
    } else {
      smart = `<div class="feedback-smart">Not a word I recognize. The answer was <b>${esc(fb.correctAnswer)}</b>.</div>`;
    }
  }
  return `<div class="feedback-card ${cls}">
    <div class="feedback-head">${head}${fb.viaVoice?' · voice':''}</div>
    <div class="feedback-body">${esc(fb.word.jp)} <span style="color:var(--dim);font-size:12px">${esc(fb.word.romaji||'')}</span> — <b>${esc(fb.word.en)}</b></div>
    ${smart}
  </div>`;
}

let _hintStage = 0;
function showNextHint(wordId){
  const word = state.words.find(w=>w.id===wordId);
  if(!word) return;
  const hints = getHintsFor(word);
  if(_hintStage >= hints.length) _hintStage = 0;
  const h = hints[_hintStage];
  _hintStage++;
  const c = $('#hintContainer');
  if(c) c.innerHTML += `<div class="hint-card"><div class="hint-head">Hint — ${esc(h.label)}</div><div class="hint-body">${esc(h.text)}</div></div>`;
  log('hint_used',{id:wordId, stage:_hintStage});
}

function setDirection(d){ state.settings.direction = d; save(); state.lastAnswer=null; render(); }

function submitAns(viaVoice, overrideInput){
  const word = state.sessionQueue[state.sessionIdx];
  if(!word) return;
  const inp = overrideInput !== undefined ? overrideInput : ($('#ansInput')?.value || '');
  const dir = state.settings.direction;
  const res = checkAnswer(inp, word, dir);
  let smart = null;
  if(!res.correct && state.settings.smartWrongFeedback){
    smart = dir==='jp-en' ? analyzeWrongEN(inp, word) : analyzeWrongJP(inp, word);
  }
  recordAttempt(word.id, res.correct, viaVoice);
  updateStreak();
  state.lastAnswer = {correct:res.correct, viaVoice, word, smart, userJP:dir==='en-jp'?inp:'', userEN:dir==='jp-en'?inp:'', correctAnswer:dir==='jp-en'?word.en:word.jp};
  save();
  render();
}

function revealAnswer(){
  const word = state.sessionQueue[state.sessionIdx];
  if(!word) return;
  state.lastAnswer = {correct:false, viaVoice:false, word, smart:{type:'revealed'}, correctAnswer:state.settings.direction==='jp-en'?word.en:word.jp};
  recordAttempt(word.id, false, false);
  save();
  render();
}

function nextCard(){
  _hintStage = 0;
  state.sessionIdx++;
  if(state.sessionIdx >= state.sessionQueue.length){
    state.sessionQueue = buildSession();
    state.sessionIdx = 0;
  }
  state.lastAnswer = null;
  render();
}

function drillVoice(){
  const word = state.sessionQueue[state.sessionIdx];
  if(!word) return;
  startVoice(
    (alts) => {
      /* pick best matching alt */
      const target = normJP(word.jp);
      let best = alts[0];
      let bestScore = levenshtein(normJP(alts[0].transcript), target);
      for(const a of alts){
        const s = levenshtein(normJP(a.transcript), target);
        if(s < bestScore){ best = a; bestScore = s; }
      }
      state.voiceResult = best.transcript;
      const c = $('#ansInput'); if(c) c.value = best.transcript;
      submitAns(true, best.transcript);
    },
    (err)=>{ if(err) log('voice_end_err',{err:String(err)}); }
  );
}

/* ---------- SENTENCE MODE ---------- */
function generateSentence(){
  const t = SENTENCE_TEMPLATES[Math.floor(Math.random()*SENTENCE_TEMPLATES.length)];
  const active = getActiveWords();
  let pattern = t.pattern;
  let en = t.en;
  const filledJP = {}, filledEN = {};
  for(const [slot, themes] of Object.entries(t.slots)){
    const candidates = active.filter(w => themes.includes(w.theme));
    const pick = candidates.length ? candidates[Math.floor(Math.random()*candidates.length)] : null;
    const jpFill = pick ? pick.jp : '___';
    const enFill = pick ? (pick.en.split('/')[0]) : '___';
    pattern = pattern.replaceAll('{'+slot+'}', jpFill);
    en = en.replaceAll('{'+slot+'}', enFill);
    filledJP[slot] = jpFill; filledEN[slot] = enFill;
  }
  return {jp: pattern, en, register: t.register, level: t.level, template: t};
}

function renderSentence(){
  const s = state._sentence || generateSentence();
  state._sentence = s;
  return `

function renderParticles(){
  if(!state._particleIdx && state._particleIdx !== 0) state._particleIdx = 0;
  if(!state._particleQueue) state._particleQueue = shuffleFY(PARTICLE_DRILLS.map((_,i)=>i));
  const idx = state._particleQueue[state._particleIdx % state._particleQueue.length];
  const d = PARTICLE_DRILLS[idx];
  const ans = state._particleAnswer;
  const particles = ['は','が','を','に','で','へ','と','も','の','から','まで','や'];

  return `
    <div class="card">
      <h3>Particle drills · ${state._particleIdx+1} / ${state._particleQueue.length}</h3>
      <div class="muted">Pick the particle that belongs in the blank.</div>
    </div>
    <div class="drill-card">
      <div class="drill-cat">fill in the blank</div>
      <div class="drill-prompt jp">${esc(d.jp)}</div>
      <div class="drill-sub">${esc(d.en)}</div>
    </div>
    <div class="audio-row">
      <button class="audio-btn" onclick="speakJP('${esc(d.jp.replace('___',d.blank))}')">🔊 Listen (with answer)</button>
    </div>
    <div class="tags" style="justify-content:center">
      ${particles.map(p => `<button class="tag ${ans===p?(p===d.blank?'active':''):''}" style="${ans===p && p!==d.blank?'background:var(--red);color:#fff;border-color:var(--red)':''}" onclick="answerParticle('${p}')">${p}</button>`).join('')}
    </div>
    ${ans ? `<div class="feedback-card ${ans===d.blank?'correct':'wrong'}">
      <div class="feedback-head">${ans===d.blank?'✓ Correct':'✗ Wrong — answer: '+esc(d.blank)}</div>
      <div class="feedback-body">${esc(d.jp.replace('___','<b>'+d.blank+'</b>'))}</div>
      <div class="feedback-smart">${esc(d.explain)}</div>
    </div>
    <button class="btn btn-primary" onclick="nextParticle()">Next particle →</button>` : ''}
  `;
}
function answerParticle(p){
  state._particleAnswer = p;
  const idx = state._particleQueue[state._particleIdx % state._particleQueue.length];
  const d = PARTICLE_DRILLS[idx];
  log('particle_attempt',{idx, correct:p===d.blank, chose:p});
  render();
}
function nextParticle(){
  state._particleAnswer = null;
  state._particleIdx++;
  if(state._particleIdx >= state._particleQueue.length){
    state._particleQueue = shuffleFY(PARTICLE_DRILLS.map((_,i)=>i));
    state._particleIdx = 0;
  }
  render();
}
window.answerParticle = answerParticle;
window.nextParticle = nextParticle;

/* ---------- DASHBOARD ---------- */
function renderDashboard(){
  const logs = state.logs || [];
  const attempts = logs.filter(l=>l.evt==='attempt');
  const last7d = attempts.filter(l=>l.ts > now() - 7*86400000);
  const today0 = new Date(); today0.setHours(0,0,0,0);
  const todayAttempts = attempts.filter(l=>l.ts >= today0.getTime());
  const todayCorrect = todayAttempts.filter(l=>l.data?.correct).length;
  const accToday = todayAttempts.length ? Math.round(100*todayCorrect/todayAttempts.length) : 0;
  const voiceAttempts = attempts.filter(l=>l.data?.voice).length;
  const hintsUsed = logs.filter(l=>l.evt==='hint_used').length;
  const particlesTried = logs.filter(l=>l.evt==='particle_attempt').length;
  const particlesCorrect = logs.filter(l=>l.evt==='particle_attempt' && l.data?.correct).length;

  /* per-word accuracy, weakest N */
  const perWord = {};
  for(const l of attempts){
    const id = l.data?.id; if(!id) continue;
    perWord[id] = perWord[id] || {c:0,t:0};
    perWord[id].t++;
    if(l.data?.correct) perWord[id].c++;
  }
  const weakest = Object.entries(perWord)
    .filter(([,s])=>s.t >= 3)
    .map(([id,s])=>({id, acc:s.c/s.t, t:s.t, w: state.words.find(x=>x.id===id)}))
    .filter(x=>x.w)
    .sort((a,b)=>a.acc-b.acc)
    .slice(0,10);

  /* daily activity last 14 days */
  const days = [];
  for(let i=13;i>=0;i--){
    const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-i);
    const d2 = new Date(d); d2.setDate(d2.getDate()+1);
    const cnt = attempts.filter(l=>l.ts>=d.getTime() && l.ts<d2.getTime()).length;
    days.push({d:d.toISOString().slice(5,10), cnt});
  }
  const maxCnt = Math.max(1, ...days.map(d=>d.cnt));

  return `
    <div class="card">
      <h3>Today</h3>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num">${todayAttempts.length}</div><div class="stat-label">Reps</div></div>
        <div class="stat-box"><div class="stat-num">${accToday}%</div><div class="stat-label">Accuracy</div></div>
        <div class="stat-box"><div class="stat-num">${state.streak.current||0}</div><div class="stat-label">Streak</div></div>
        <div class="stat-box"><div class="stat-num">${voiceAttempts}</div><div class="stat-label">Voice</div></div>
      </div>
    </div>
    <div class="card">
      <h3>Last 14 days</h3>
      <div style="display:flex;align-items:flex-end;gap:3px;height:60px;padding:4px 0">
        ${days.map(d => `<div title="${d.d}: ${d.cnt}" style="flex:1;background:var(--red);min-height:2px;height:${Math.round(100*d.cnt/maxCnt)}%;border-radius:2px 2px 0 0"></div>`).join('')}
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:9px;color:var(--faint)">
        <span>${days[0].d}</span><span>${days[days.length-1].d}</span>
      </div>
    </div>
    <div class="card">
      <h3>Weakest 10 words (by accuracy)</h3>
      ${weakest.length ? weakest.map(x => `
        <div class="word-row">
          <div class="word-main">
            <div class="word-jp">${esc(x.w.jp)} <span class="word-r">${esc(x.w.romaji||'')}</span></div>
            <div class="word-en">${esc(x.w.en)}</div>
          </div>
          <div class="word-meta">${Math.round(x.acc*100)}% · ${x.t} tries</div>
        </div>
      `).join('') : '<div class="muted">Not enough data yet. Do a few drills.</div>'}
    </div>
    <div class="card">
      <h3>Other</h3>
      <div class="muted">
        7-day reps: <b>${last7d.length}</b><br>
        Hints used: <b>${hintsUsed}</b><br>
        Particle drills: <b>${particlesCorrect}/${particlesTried}</b> correct<br>
        Events logged: <b>${logs.length}</b>
      </div>
    </div>
  `;
}

function sentenceVoice(){
  const s = state._sentence;
  if(!s) return;
  startVoice(
    (alts)=>{
      const target = normJP(s.jp);
      let best = alts[0]; let bestScore = levenshtein(normJP(alts[0].transcript), target);
      for(const a of alts){ const sc = levenshtein(normJP(a.transcript), target); if(sc < bestScore){ best=a; bestScore=sc; } }
      const dist = bestScore; const maxLen = target.length;
      const pct = Math.max(0, Math.round(100*(1 - dist/maxLen)));
      alert(`Heard: "${best.transcript}"\nMatch: ${pct}% (${dist} char diff)`);
      log('sentence_voice',{heard:best.transcript, pct});
    },
    ()=>{}
  );
}

/* ---------- SETTINGS ---------- */

  return `
    <div class="card">

      <div class="tags">
        ${regList.map(r => `<button class="tag ${s.activeRegister.includes(r)?'active':''}" onclick="toggleFilter('activeRegister','${r}')">${r}</button>`).join('')}

    </div>

      <label class="word-row"><div class="word-main"><div class="word-jp">N5 pack enabled</div><div class="word-en">${N5_PACK.length} words</div></div>
        <input type="checkbox" ${s.n5PackEnabled?'checked':''} onchange="toggleSetting('n5PackEnabled')"></label>
      <label class="word-row"><div class="word-main"><div class="word-jp">Hints enabled</div></div>
        <input type="checkbox" ${s.hintsEnabled?'checked':''} onchange="toggleSetting('hintsEnabled')"></label>
      <label class="word-row"><div class="word-main"><div class="word-jp">Smart wrong-answer feedback</div><div class="word-en">Tell me what I wrote if it's a real word</div></div>
        <input type="checkbox" ${s.smartWrongFeedback?'checked':''} onchange="toggleSetting('smartWrongFeedback')"></label>
      <label class="word-row"><div class="word-main"><div class="word-jp">Voice input shown</div><div class="word-en">${voiceSupported()?'Supported':'NOT supported in this browser'}</div></div>
        <input type="checkbox" ${s.voiceOn?'checked':''} onchange="toggleSetting('voiceOn')"></label>
    </div>

    <div class="card">
      <h3>Add a word</h3>
      <input class="input" id="addJP" placeholder="にほんご (hiragana)">
      <div class="spacer"></div>
      <input class="input" id="addEN" placeholder="English meaning">
      <div class="spacer"></div>
      <input class="input" id="addHint" placeholder="Optional hint (scenario, mnemonic, opposite...)">
      <div class="spacer"></div>
      <button class="btn btn-primary" onclick="addWord()">Add word</button>
    </div>

    <div class="card">
      <h3>Data</h3>
      <button class="btn btn-blue" onclick="exportJSON()">⬇ Export all data (JSON)</button>

    </div>

    <div class="card">
      <h3>Removed words (${(state.settings.removedWords||[]).length})</h3>
      <div class="muted" style="margin-bottom:8px">Words you've removed from the active pool. Tap to restore.</div>
      ${(state.settings.removedWords||[]).length ? (state.settings.removedWords||[]).map(id => {
        const w = state.words.find(x=>x.id===id);
        if(!w) return '';
        return `<div class="word-row"><div class="word-main"><div class="word-jp">${esc(w.jp)} <span class="word-r">${esc(w.romaji||'')}</span></div><div class="word-en">${esc(w.en)}</div></div><button class="btn btn-sm btn-secondary" onclick="restoreWord('${id}')">Restore</button></div>`;
      }).join('') : '<div class="muted">None.</div>'}

        if(!w) return '';
        return `<div class="word-row"><div class="word-main"><div class="word-jp">${esc(w.jp)} <span class="word-r">${esc(w.romaji||'')}</span></div><div class="word-en">${esc(w.en)}</div></div><button class="btn btn-sm btn-secondary" onclick="togglePin('${id}')">Unpin</button></div>`;

function toggleFilter(field, val){
  const arr = state.settings[field];
  const i = arr.indexOf(val);
  if(i>=0) arr.splice(i,1); else arr.push(val);
  save(); render();
}
function clearFilters(){ state.settings.activeThemes=[]; state.settings.activePOS=[]; state.settings.activeRegister=[]; save(); render(); }
function toggleSetting(k){ state.settings[k] = !state.settings[k]; save(); load(); render(); }

function addWord(){
  const jp = ($('#addJP')?.value || '').trim();
  const en = ($('#addEN')?.value || '').trim();
  const hint = ($('#addHint')?.value || '').trim();
  if(!jp || !en){ alert('Both Japanese and English are required.'); return; }
  const w = {id:'u_'+uid(), jp:esc(jp).replace(/&amp;/g,'&'), en:esc(en).replace(/&amp;/g,'&'), pos:'n', theme:'custom', register:'neutral', source:'user', verified:false, hint:hint||undefined, createdAt:now()};
  state.words.push(w);
  save(); load();
  alert('Word added (flagged unverified).');
  render();
}

function exportJSON(){
  const data = {version:4, exportedAt:new Date().toISOString(), words:state.words.filter(w=>w.source==='user'), stats:state.stats, settings:state.settings, notes:state.notes, streak:state.streak, logs:state.logs.slice(-200)};
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`japanese-trainer-${today()}.json`; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 500);
}
function importJSON(){ $('#importFile').click(); }
function handleImport(ev){
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const d = JSON.parse(r.result);
      if(!confirm(`Import ${Object.keys(d.stats||{}).length} word stats + ${(d.notes||[]).length} notes? Existing data will be merged (existing keys kept).`)) return;
      if(d.words) for(const w of d.words) if(!state.words.find(x=>x.id===w.id)) state.words.push(w);
      if(d.stats) for(const k in d.stats) if(!state.stats[k]) state.stats[k] = d.stats[k];
      if(d.notes) for(const n of d.notes) if(!state.notes.find(x=>x.id===n.id)) state.notes.push(n);
      if(d.settings) state.settings = {...state.settings, ...d.settings};
      if(d.streak) state.streak = {...state.streak, ...d.streak};
      save(); load(); alert('Import complete.'); render();
    }catch(e){ alert('Import failed: '+e.message); }
  };
  r.readAsText(f);
}
function exportNotes(){
  const txt = state.notes.map(n => `--- ${new Date(n.ts).toISOString()} ---\n${n.text}\n`).join('\n');
  const blob = new Blob([txt], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`notes-${today()}.txt`; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 500);
}
function resetAll(){
  if(!confirm('Reset ALL stats, notes, settings, custom words? (This cannot be undone.)')) return;
  if(!confirm('Are you sure? Type the word YES in the next prompt.')) return;
  const c = prompt('Type YES to confirm reset:'); if(c !== 'YES') return;
  localStorage.removeItem(LS.words); localStorage.removeItem(LS.stats); localStorage.removeItem(LS.settings);
  localStorage.removeItem(LS.notes); localStorage.removeItem(LS.logs); localStorage.removeItem(LS.streak);
  location.reload();
}

/* ---------- NOTES MODAL ---------- */
function openNotes(){
  const m = $('#modalInner');
  m.innerHTML = `
    <div class="modal-head">
      <h2>💭 Notes</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <textarea class="input" id="newNote" placeholder="Drop a thought, a word to verify with JAPANEASY, a bug, an idea..."></textarea>

    <div class="divider"></div>

    ${state.notes.slice().reverse().map(n => `
      <div class="note-item">

      </div>

  `;
  $('#modal').classList.add('open');
}
function closeModal(){ $('#modal').classList.remove('open'); }
function saveNote(){
  const t = ($('#newNote')?.value || '').trim();
  if(!t) return;
  state.notes.push({id:uid(), ts:now(), text:t});
  save(); openNotes();
}
function deleteNote(id){
  state.notes = state.notes.filter(n => n.id !== id);
  save(); openNotes();
}

/* ---------- SCREEN BINDING ---------- */
function bindScreen(){
  const inp = $('#ansInput');
  if(inp) inp.focus();
  if(state.screen === 'drill' && state.settings.swipeOn) bindSwipe();
}

/* Swipe gestures on drill card */
let _swipe = {x0:0, y0:0, t0:0};
function bindSwipe(){
  const card = $('.drill-card');
  if(!card) return;
  card.ontouchstart = (e)=>{ const t=e.touches[0]; _swipe={x0:t.clientX, y0:t.clientY, t0:Date.now()}; };
  card.ontouchend = (e)=>{
    const t = e.changedTouches[0];
    const dx = t.clientX - _swipe.x0;
    const dy = t.clientY - _swipe.y0;
    const dt = Date.now() - _swipe.t0;
    if(dt > 700) return;
    if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.5){
      if(dx < 0) nextCard();              /* swipe left → skip */
      else submitAns(false);              /* swipe right → submit */
    } else if(Math.abs(dy) > 60 && Math.abs(dy) > Math.abs(dx)*1.5){
      if(dy < 0) revealAnswer();          /* swipe up → reveal */
      else if(voiceSupported()) drillVoice(); /* swipe down → voice */
    }
  };
}

/* ---------- INIT ---------- */
function init(){
  load();
  /* SW registration */
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
  /* Nav wiring */
  $$('.nav-btn').forEach(b => b.onclick = () => nav(b.dataset.screen));
  $('#notesFab').onclick = openNotes;
  $('#backFab').onclick = goBack;
  $('#modal').onclick = (e)=>{ if(e.target.id==='modal') closeModal(); };

  /* Browser history — native back button/gesture works */
  window.addEventListener('popstate', (e) => {
    const s = (e.state && e.state.screen) || 'home';
    const d = e.state && e.state.data;
    nav(s, d, true);
  });
  /* seed initial history */
  try{ history.replaceState({screen:'home'}, '', '#home'); }catch(e){}

  /* Prime voices list */
  try{ if('speechSynthesis' in window) window.speechSynthesis.getVoices(); }catch(e){}
  window.speechSynthesis && (window.speechSynthesis.onvoiceschanged = ()=>{});
  render();
  updateBackFab();
  log('init',{v:46, words:state.words.length});
}

function cycleWheels(){
  const order = ['auto','on','off'];
  const cur = state.settings.trainingWheels || 'auto';
  state.settings.trainingWheels = order[(order.indexOf(cur)+1) % order.length];
  save(); render();
}
function togglePin(id){
  const p = state.settings.pinnedWords || [];
  const i = p.indexOf(id);
  if(i>=0) p.splice(i,1); else p.push(id);
  state.settings.pinnedWords = p;
  save(); render();
}
function removeWord(id){
  if(!confirm('Remove this word from your active deck? You can restore it later in Settings.')) return;
  const r = state.settings.removedWords || [];
  if(!r.includes(id)) r.push(id);
  state.settings.removedWords = r;
  /* also drop from session queue */
  state.sessionQueue = state.sessionQueue.filter(w=>w.id!==id);
  if(state.sessionIdx >= state.sessionQueue.length) state.sessionIdx = 0;
  save(); render();
}
function restoreWord(id){
  state.settings.removedWords = (state.settings.removedWords||[]).filter(x=>x!==id);
  save(); render();
}
window.cycleWheels = cycleWheels;
window.togglePin = togglePin;
window.removeWord = removeWord;
window.restoreWord = restoreWord;
window.goBack = goBack;
</script>
