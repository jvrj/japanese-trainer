function buildOnComplete(){
  const l = state.buildMode?.lesson;
  if(l?._meta && !l._completed){
    l._completed = true;
    /* v6.12.14 — also store {id,jp,en} for each word so the Recent Lessons
       panel can render readable lists without back-resolving via buildGenWordId. */
    const words = [...(l.new_words || []), ...(l.carryover_words || [])]
      .map(r => ({id: r.id, jp: r.jp, en: r.en, role: (l.new_words || []).some(n => n.id === r.id) ? 'new' : 'callback'}));
    buildPushSequence({
      id: l.id, mode: l._meta.mode,
      templates: [l._meta.primary_template, l._meta.secondary_template],
      introduced: l._meta.introduced_ids,
      callbacks: l._meta.callback_ids,
      words,
      date: new Date().toISOString()
    });
    /* v6.14 — credit SM-2 for each word the lesson exposed. Default is
       'good' on the timer (hands-free / driving-friendly). If the user
       tapped "Missed it" on a step, that word gets 'again' instead, so
       Build Mode produces honest SRS data when the user has a free hand
       and graceful good-faith credit when they don't. */
    try{
      const realIds = l._meta.real_word_ids || [];
      const missed = state.buildMode?._missed || new Set();
      let missedCount = 0;
      for(const wid of realIds){
        if(!wid) continue;
        const st = smStatFor(wid);
        if(missed.has(wid)){
          smGrade(st, 'again');
          missedCount++;
        } else {
          smGrade(st, 'good');
        }
      }
      if(realIds.length) save();
      if(missedCount > 0){
        showToast(`${missedCount} word${missedCount === 1 ? '' : 's'} marked missed — will resurface in Vocab Blitz soon.`, {tone:'info', duration:3500});
      }
    }catch(e){ log('build_sm2_credit_err', {err:String(e)}); }
    /* v6.29 — record any form_drill steps the lesson contained as recently
       served, so standalone Form Drills don't surface the same verb-form
       pair right after Build Mode just drilled it.
       v6.30 — also record Form Spam verbs (mode === 'formSpam'). Form Spam
       steps are type:'build', not 'form_drill', so the loop above doesn't
       catch them — but every word in real_word_ids was drilled with
       _meta.formId, so we push those pairs explicitly. */
    try{
      for(const c of (l.cycles || [])){
        for(const s of (c.steps || [])){
          if(s.type === 'form_drill' && s.word_id && s.form_id){
            formRecentPush(s.word_id, s.form_id);
          }
        }
      }
      if(l._meta.mode === 'formSpam' && l._meta.formId){
        for(const wid of (l._meta.real_word_ids || [])){
          if(wid) formRecentPush(wid, l._meta.formId);
        }
      }
    }catch(e){ log('build_form_recent_err', {err:String(e)}); }
    /* v6.13 — advance Daily Chain. Step 1 (simple) -> 2 (complex) -> 3 (hard) -> done.
       v6.14 — Social lessons sit on a separate axis, never advance chain. */
    if(l._meta.mode !== 'social'){
      const chain = buildChainGet();
      if(chain && chain.step != null){
        chain.step++;
        if(chain.step > 3){
          buildChainClear();
          showToast(`Daily Chain complete — drilled ${(chain.wordIds || []).length} words across all 3 modes ✓`, {tone:'info', duration:5000});
        } else {
          buildChainSet(chain);
        }
      }
    }
  }
  /* v6.22 — autopilot session extension. When auto-advance is on and we're
     in a chainable mode, automatically generate and start the next lesson
     instead of stopping. Caps at BUILD_AUTO_CHAIN_CAP (4) so the user does
     eventually get a break. Skips when:
       - autopilot is off (user is hand-grading, single-lesson is fine)
       - mode is 'formSpam' or starter (focused/one-off practice)
       - a Daily Chain step is active (its own continue flow takes over)
       - we've already hit the cap
     If lesson generation fails (e.g. eligible pool exhausted), we fall
     through to the normal complete screen. */
  const cur = state.buildMode;
  const mode = l?._meta?.mode;
  const chainable = mode === 'simple' || mode === 'complex' || mode === 'social' || mode === 'hard';
  const dailyChainActive = (() => { const c = buildChainGet(); return !!(c && c.step != null && c.step <= 3); })();
  const cap = state.settings.buildAutoChainCap || BUILD_AUTO_CHAIN_CAP;
  const curIdx = (cur && cur._chainIdx) || 1;
  if(cur && _buildAutoOn() && !cur._paused && chainable && !dailyChainActive && curIdx < cap){
    const nextIdx = curIdx + 1;
    const origin = cur._origin;
    /* Mark the session as queued so renderBuildModeComplete shows a
       transition placeholder instead of the full complete screen — avoids
       a race where the user taps "Run it again" / "Back" during the 1.5s
       gap and starts something that then collides with the chain fire. */
    cur._chainQueued = nextIdx;
    /* Hold the wake lock — releasing and re-acquiring across an async gap
       can fail silently on Safari. */
    setTimeout(() => {
      if(state.buildMode !== cur) return; /* user navigated away */
      try{
        const nextLesson = mode === 'hard' ? buildGenerateHardLesson() : buildGenerateLesson(mode);
        const sess = buildMakeSession(nextLesson, nextIdx);
        if(origin) sess._origin = origin;
        state.buildMode = sess;
        render();
        const step = sess.steps[0];
        if(step) buildAutoplayStep(step);
      }catch(e){
        log('build_chain_err', {err:String(e), mode, nextIdx});
        showToast(`Chain stopped — ${e.message}`, {tone:'info', duration:3500});
        if(state.buildMode === cur){
          cur._chainQueued = null;
          cur.done = true;
          render();
        }
        _wakeLockRelease();
      }
    }, 1500);
    return; /* don't release wake lock — chain continues */
  }
  _wakeLockRelease();
}
/* v6.13 — fired from the lesson-summary "Continue chain" button. Generates
   the next mode in the chain using the same chain words. */
function buildChainContinue(){
  const chain = buildChainGet();
  if(!chain || chain.step == null || chain.step > 3) return;
  const mode = chain.step === 2 ? 'complex' : 'hard';
  startBuildModeGenerated(mode);
}
window.buildChainContinue = buildChainContinue;

/* v6.14 — Self-grade. Default is 'good' on timer (autopilot, hands-free).
   Tapping "Missed it" toggles the current step's word in b._missed; on
   completion those words get smGrade('again') instead of 'good'. The
   timer still advances on its own — no input is required for the default. */
function _buildCurrentStepWordId(){
  const b = state.buildMode;
  if(!b) return null;
  const step = b.steps[b.stepIdx];
  if(!step) return null;
  const stepLikeWord = {...step, word_id: step.word_id || step.swap_word_id};
  if(!stepLikeWord.word_id) return null;
  return _buildStateWordIdForStep(stepLikeWord);
}
function buildToggleMissed(){
  const b = state.buildMode;
  if(!b) return;
  if(!b._missed) b._missed = new Set();
  const wid = _buildCurrentStepWordId();
  if(!wid) return;
  if(b._missed.has(wid)) b._missed.delete(wid);
  else b._missed.add(wid);
  render();
}
window.buildToggleMissed = buildToggleMissed;

/* v6.16 — ★ Master from Build Mode. Resolves the current step's lesson word
   back to the deck word (Build uses synthesized w_<romaji> ids), flags the
   deck word mastered, and toasts. The next selector call won't pick it. */
function buildMasterCurrentWord(){
  const wid = _buildCurrentStepWordId();
  if(!wid){
    if(typeof showToast === 'function') showToast("No deck word here to master.", {tone:'warn', duration:3000});
    return;
  }
  const lessonWord = buildWordById(wid);
  if(!lessonWord) return;
  const w = (state.words || []).find(d => d.jp === lessonWord.jp && d.en === lessonWord.en);
  if(!w){
    if(typeof showToast === 'function') showToast("Couldn't find that word in your deck.", {tone:'warn', duration:3000});
    return;
  }
  const s = state.settings;
  if((s.masteredWords || []).includes(w.id)){
    if(typeof showToast === 'function') showToast(`Already mastered: ${w.jp}`, {tone:'info', duration:2500});
    return;
  }
  s.focusWords = (s.focusWords || []).filter(x => x !== w.id);
  s.suspendedWords = (s.suspendedWords || []).filter(x => x !== w.id);
  s.masteredWords = s.masteredWords || [];
  s.masteredWords.push(w.id);
  save();
  if(typeof showToast === 'function') showToast(`★ Mastered ${w.jp} (${w.en}) — won't appear again`, {tone:'info', duration:3500});
  modulesMaybeUnlockNext();
  render();
}
window.buildMasterCurrentWord = buildMasterCurrentWord;

function buildExit(){
  _buildClearTimer();
  try{ window.speechSynthesis?.cancel(); }catch(e){}
  /* v6.21 — if the lesson was launched from a specific origin (e.g., the
     Forms picker for Form Spam), route back there instead of leaving the
     user on Build Mode home, which forces them to re-navigate to continue. */
  const origin = state.buildMode && state.buildMode._origin;
  state.buildMode = { lesson:null, steps:[], stepIdx:0, revealed:false, done:false };
  _wakeLockRelease();
  if(origin){
    nav(origin);
  } else {
    render();
  }
}

function buildAuditAll(){
  const deck = state.words || [];
  const out = [];
  const pools = [
    ['SIMPLE', BUILD_TEMPLATES],
    ['COMPLEX', BUILD_COMPLEX_TEMPLATES]
  ];
  for(const [label, pool] of pools){
    out.push('\n===== ' + label + ' =====');
    for(const t of pool){
      const eligible = deck.filter(w =>
        w.pos === 'n' &&
        t.slotThemes.includes(w.theme) &&
        !hasKatakana(w.jp) &&
        w.jp && w.en && w.romaji &&
        (!t.slotWords || t.slotWords.includes(w.en)) &&
        (!t.slotExclude || !t.slotExclude.includes(w.en))
      );
      out.push('\n--- ' + t.id + '  (' + eligible.length + ' words)  ' + t.pattern + '  |  ' + t.en);
      for(const w of eligible){
        const filled = buildFillTemplate(t, w);
        out.push('  ' + filled.jp.padEnd(36) + '  ' + filled.en);
      }
    }
  }
  const text = out.join('\n');
  console.log(text);
  try{ navigator.clipboard.writeText(text); console.log('[buildAuditAll] copied to clipboard'); }catch(_){}
  return text;
}
window.buildAuditAll = buildAuditAll;

function buildAuditHard(samples){
  const n = samples || 5;
  const deck = state.words || [];
  const out = [];
  out.push('===== HARD (multi-slot, ' + n + ' samples per template) =====');
  for(const t of BUILD_HARD_TEMPLATES){
    const keys = Object.keys(t.slots);
    const slotSizes = keys.map(k => {
      const cfg = t.slots[k];
      const pool = deck.filter(w =>
        w.pos === 'n' && (cfg.allowKatakana || !hasKatakana(w.jp)) && w.jp && w.en && w.romaji &&
        (!cfg.slotThemes || cfg.slotThemes.includes(w.theme)) &&
        (!cfg.slotWords || cfg.slotWords.includes(w.en)) &&
        (!cfg.slotExclude || !cfg.slotExclude.includes(w.en))
      );
      return k + '=' + pool.length;
    }).join(', ');
    out.push('\n--- ' + t.id + '  [' + slotSizes + ']  ' + t.pattern + '  |  ' + t.en);
    const seen = new Set();
    let tries = 0;
    while(seen.size < n && tries < n * 10){
      tries++;
      const filled = buildMultiSlotFill(t, deck);
      if(!filled) break;
      const key = filled.jp;
      if(seen.has(key)) continue;
      seen.add(key);
      out.push('  ' + filled.jp.padEnd(40) + '  ' + filled.en);
    }
  }
  const text = out.join('\n');
  console.log(text);
  try{ navigator.clipboard.writeText(text); console.log('[buildAuditHard] copied to clipboard'); }catch(_){}
  return text;
}
window.buildAuditHard = buildAuditHard;

function renderBuildMode(){
  const b = state.buildMode;
  if(!b || !b.lesson) return renderBuildModeStart();
  if(b.done) return renderBuildModeComplete();
  return renderBuildModeStep();
}

function renderBuildModeStart(){

function renderBuildModeStep(){
  const b = state.buildMode;
  const step = b.steps[b.stepIdx];
  const total = b.steps.length;
  const pct = Math.round(100 * b.stepIdx / total);
  const auto = _buildAutoOn();
  const paused = !!b._paused;

  let body = '';
  switch(step.type){
    case 'introduce':  body = _buildRenderIntroduce(step); break;
    case 'recall':     body = _buildRenderRecall(step); break;
    case 'build':      body = _buildRenderBuild(step); break;
    case 'substitute': body = _buildRenderSubstitute(step); break;
    case 'callback':   body = _buildRenderCallback(step); break;
    case 'variation':  body = _buildRenderVariation(step); break;
    case 'qa':         body = _buildRenderQa(step); break;
    case 'similar':    body = _buildRenderSimilar(step); break;
    case 'form_drill': body = _buildRenderFormDrill(step); break;
    case 'phrase':     body = _buildRenderPhrase(step); break;
    default: body = `<div class="muted">Unknown step: ${esc(step.type)}</div>`;
  }

  if(!b.revealed && !paused){ setTimeout(() => buildAutoplayStep(step), 100); }

  const countdown = (auto && !paused) ? `
    <div class="build-countdown"><div class="build-countdown-fill"></div></div>
    <div class="build-phase-label"></div>
  ` : '';

  /* v6.22 — chain pill. Renders only when this session is part of an
     auto-chained run: autopilot must be on, mode must be chainable, cap > 1,
     and Daily Chain not active (it has its own continue flow). Single-shot
     lessons don't get a noisy "1 of 4" label. */
  const chainCap = state.settings.buildAutoChainCap || BUILD_AUTO_CHAIN_CAP;
  const chainIdx = b._chainIdx || 1;
  const mode = b.lesson?._meta?.mode;
  const dailyActive = (() => { const c = buildChainGet(); return !!(c && c.step != null && c.step <= 3); })();
  const chainable = (mode === 'simple' || mode === 'complex' || mode === 'social' || mode === 'hard') && _buildAutoOn() && !dailyActive;
  const chainPill = (chainable && chainCap > 1)
    ? ` · <span style="color:var(--blue)">⛓ Lesson ${chainIdx} of ${chainCap}</span>`
    : '';

  return `
    <div class="build-progress"><div class="build-progress-fill" style="width:${pct}%"></div></div>
    <div class="muted" style="text-align:center;font-size:11px;margin:2px 0 6px">Step ${b.stepIdx+1} of ${total} · ${esc(step._cycleName)}${chainPill}</div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:6px">
        <span class="build-chip build-chip-${_buildChipClass(step)}">${_buildChipLabel(step)}</span>
        <div style="display:flex;gap:6px">
          ${voiceSupported() ? `<button class="btn btn-ghost" style="font-size:11px;padding:4px 10px;${state.settings.buildVoiceMode ? 'color:var(--blue);border-color:var(--blue)' : 'color:var(--muted)'}" onclick="buildToggleVoiceMode()" title="Hands-free voice mode — listens, scores, falls back to type after 2 misses">${state.settings.buildVoiceMode ? '🎙️ Voice ON' : '🎙 Voice'}</button>` : ''}
          ${auto ? `<button class="btn btn-ghost" style="font-size:11px;padding:4px 10px" onclick="buildTogglePause()">${paused ? '▶ Resume' : '⏸ Pause'}</button>` : ''}
        </div>
      </div>
      ${body}
      ${countdown}
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="buildPrevStep()" ${b.stepIdx === 0 ? 'disabled' : ''}>‹ Back</button>
      <button class="btn btn-secondary" onclick="buildReplayAudio()">🔊 Replay</button>
      ${b.revealed || step.type === 'introduce'
        ? `<button class="btn btn-primary" onclick="buildNextStep()">${b.stepIdx === total - 1 ? 'Finish ✓' : 'Next ›'}</button>`
        : (step.type === 'similar'
            ? `<span style="flex:1;text-align:center;color:var(--muted);font-size:12px">tap a choice</span>`
            : (_buildWriteApplies(step)
                ? `<button class="btn btn-ghost" style="font-size:11px" onclick="buildRevealStep()">Skip → reveal</button>`
                : `<button class="btn btn-blue" onclick="buildRevealStep()">Reveal</button>`))
      }
    </div>

    ${(() => {
      /* v6.14 — Self-grade button. Only when this step has a resolvable
         deck word AND the answer has been revealed (you can't grade what
         you haven't seen yet). Optional — autopilot default is 'good'.
         v6.16 — paired with ★ Master so the user can retire a word from
         inside the lesson, not just from Vocab Blitz. */
      const wid = _buildCurrentStepWordId();
      if(!wid || !b.revealed) return '';
      const missed = b._missed && b._missed.has(wid);
      return `<div style="text-align:center;margin-top:6px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-ghost" style="font-size:11px;padding:4px 12px;${missed ? 'color:var(--red);border-color:var(--red)' : 'color:var(--muted)'}" onclick="buildToggleMissed()">${missed ? '✗ marked missed (will reset SRS)' : '✗ Missed it (optional)'}</button>
        <button class="btn btn-ghost" style="font-size:11px;padding:4px 12px;color:var(--muted)" onclick="buildMasterCurrentWord()" title="Mastered — never see this word again">★ Master this word</button>
      </div>`;
    })()}

    <div style="text-align:center;margin-top:10px">
      <button class="btn btn-secondary" style="font-size:11px;padding:6px 12px" onclick="buildExit()">Exit lesson</button>
    </div>
  `;
}

function _buildChipClass(step){
  if(step.type === 'qa' && step._aiMode) return 'aiqa';
  return step.type;
}
function _buildChipLabel(step){
  if(step.type === 'variation') return 'ways';
  if(step.type === 'qa') return step._aiMode ? '🤖 ai chat' : 'q&a';
  if(step.type === 'similar') return 'discriminate';
  if(step.type === 'form_drill') return 'conjugate';
  if(step.type === 'phrase') return 'phrase';
  return step.type;
}

/* v6.26 — Build Mode similar-words step. Picks a SIMILAR_SET whose items
   include the lesson's primary or secondary verb (or a new-word JP), then
   generates a multiple-choice discrimination question. Falls back to a
   random set if no overlap. Returns null when SIMILAR_SETS is empty or
   excluded sets fail to find a viable pick. */
function _buildPickSimilarSetForLesson(primaryVerb, secondaryVerb, lessonWords){
  if(!Array.isArray(SIMILAR_SETS) || SIMILAR_SETS.length === 0) return null;
  const lessonJp = new Set([primaryVerb, secondaryVerb, ...(lessonWords || []).map(w => w?.jp)].filter(Boolean));
  /* Strip parenthetical kanji from set item JPs so e.g. 'さむい (寒い)' matches verb 'さむい'. */
  const stripParen = (s) => String(s || '').replace(/\s*[（(].*?[)）]/g, '').trim();
  const overlapping = SIMILAR_SETS.filter(set =>
    (set.items || []).some(it => lessonJp.has(stripParen(it.jp)))
  );
  if(overlapping.length) return overlapping[Math.floor(Math.random() * overlapping.length)];
  return SIMILAR_SETS[Math.floor(Math.random() * SIMILAR_SETS.length)];
}
function _buildGenerateSimilarSteps(set, count){
  if(!set || !Array.isArray(set.items) || set.items.length < 2) return [];
  const n = Math.min(count || 2, set.items.length);
  const idxs = set.items.map((_, i) => i);
  /* Sample N distinct item indices to ask about. */
  const order = idxs.slice().sort(() => Math.random() - 0.5).slice(0, n);
  return order.map(itemIdx => ({
    type: 'similar',
    set_id: set.id,
    item_idx: itemIdx,
    options: idxs.slice().sort(() => Math.random() - 0.5)
  }));
}

/* v6.27 — Build Mode form_drill step. Picks an introduced verb from the
   deck and generates a conjugation challenge using FORMS. The conjugation
   answer is baked at lesson generation so no FORMS lookup is needed at
   render time. Returns [] when no eligible verb exists (small decks). */
function _buildPickFormDrillVerbs(deck, count){
  const masteredSet = new Set(state.settings.masteredWords || []);
  const suspendedSet = new Set(state.settings.suspendedWords || []);
  const moduleIds = activeModuleWordIdSet();
  const verbs = (deck || []).filter(w =>
    w.pos === 'v' && w.jp && !hasKatakana(w.jp) &&
    !masteredSet.has(w.id) && !suspendedSet.has(w.id) &&
    (!moduleIds || moduleIds.has(w.id)) &&
    vocabIsIntroduced(w)
  );
  if(verbs.length === 0) return [];
  /* v6.29 — bias against verbs that appear in the form_recent log AT ALL
     (any form), so the in-Build-Mode form_drill picks shake out across the
     deck instead of repeating common verbs. The form_recent set is shared
     with standalone Form Drills via formRecentGet. */
  const recentVerbIds = new Set();
  try{ for(const k of formRecentGet()) recentVerbIds.add(k.split('|')[0]); }catch(e){}
  const fresh = verbs.filter(v => !recentVerbIds.has(v.id));
  /* If we have enough fresh verbs, pick exclusively from them; otherwise
     supplement with recent ones so the cycle still generates. */
  const pool = fresh.length >= (count || 2) ? fresh : [...fresh, ...verbs.filter(v => recentVerbIds.has(v.id))];
  const out = [];
  const used = new Set();
  for(let i = 0; i < (count || 2) && used.size < pool.length; i++){
    let v;
    do { v = pool[Math.floor(Math.random() * pool.length)]; } while(used.has(v.id));
    used.add(v.id);
    out.push(v);
  }
  return out;
}
/* v6.28 — Build Mode phrase step. Surfaces real-life phrases from
   PHRASE_POOL inside Build Mode lessons — folds Phrase Blitz's content
   into the autopilot flow. Random sample for now; future enhancement
   could bias toward phraseStats due-soonest. */
function _buildGeneratePhraseSteps(count){
  if(!Array.isArray(PHRASE_POOL) || PHRASE_POOL.length === 0) return [];
  const shuffled = PHRASE_POOL.slice().sort(() => Math.random() - 0.5);
  return shuffled.slice(0, count || 2).map(p => ({
    type: 'phrase',
    phrase_id: p.id,
    jp: p.jp,
    en: p.en,
    cat: p.cat
  }));
}

function _buildGenerateFormDrillSteps(verbs, count){
  if(!verbs || !verbs.length || !Array.isArray(FORMS) || FORMS.length === 0) return [];
  const out = [];
  for(const v of verbs.slice(0, count || 2)){
    /* Bias toward the foundational forms: ます, ました, て, ない. Random
       across all FORMS would surface obscure ones too often for a folded
       drill that's only 1-2 questions long. */
    const PRIMARY_FORMS = ['masu','mashita','te','ta','nai','tai','masen','teiru'];
    const candidates = FORMS.filter(f => PRIMARY_FORMS.includes(f.id));
    const pool = candidates.length ? candidates : FORMS;
    const f = pool[Math.floor(Math.random() * pool.length)];
    let expected = '';
    try{ expected = f.conj(v.jp) || ''; }catch(e){ expected = ''; }
    if(!expected) continue;
    out.push({
      type: 'form_drill',
      word_jp: v.jp,
      word_en: v.en,
      word_id: v.id,
      form_id: f.id,
      form_name: f.name,
      form_hint: f.hint,
      expected_jp: expected
    });
  }
  return out;
}

/* v6.26 — render the similar-words discrimination card. Pre-tap: shows the
   target's English + note as the prompt, then N option buttons (item.jp).
   Post-tap: highlights the correct option + the user's pick if wrong, and
   shows the correct item's note for context. */
function _buildRenderSimilar(step){
  const b = state.buildMode;
  const set = similarSetById(step.set_id);
  if(!set) return `<div class="muted">Similar set "${esc(step.set_id)}" not found</div>`;
  const target = set.items[step.item_idx];
  if(!target) return `<div class="muted">Similar item missing</div>`;
  const picked = (b._similarPick != null) ? b._similarPick : null;
  const correctIdx = step.item_idx;
  const optBtns = (step.options || []).map(idx => {
    const it = set.items[idx];
    if(!it) return '';
    let style = 'width:100%;text-align:left;margin:4px 0;padding:10px 12px;font-size:16px';
    let cls = 'btn btn-secondary';
    if(picked != null){
      if(idx === correctIdx){ cls = 'btn'; style += ';background:var(--green);color:#fff;border-color:var(--green)'; }
      else if(idx === picked){ cls = 'btn'; style += ';background:var(--red);color:#fff;border-color:var(--red)'; }
    }
    const onclick = (picked != null) ? '' : `onclick="buildSimilarPick(${idx})"`;
    return `<button class="${cls}" style="${style}" ${onclick} ${picked != null ? 'disabled' : ''}>${esc(it.jp)}</button>`;
  }).join('');
  const reveal = (picked != null) ? `
    <div style="margin-top:10px;padding:10px;background:rgba(255,255,255,0.04);border-radius:6px">
      <div style="font-size:13px;color:var(--green)"><b>${esc(set.items[correctIdx].jp)}</b> — ${esc(set.items[correctIdx].en)}</div>
      <div class="muted" style="font-size:12px;margin-top:4px">${esc(set.items[correctIdx].note || '')}</div>
    </div>` : '';
  return `
    <div class="muted" style="text-align:center;font-size:13px;margin-bottom:4px">Pick the JP that means:</div>
    <div class="build-big-en">${esc(target.en)}</div>
    <div class="muted" style="font-size:12px;text-align:center;margin:4px 0 10px">${esc(target.note || '')}</div>
    ${optBtns}
    ${reveal}
  `;
}

/* v6.28 — render a phrase step. Audio-led with EN gloss prompt; reveal
   shows the JP form. Write mode flips it to a typed input the same way
   build/substitute do. */
function _buildRenderPhrase(step){
  const b = state.buildMode;
  const banner = `<div class="build-callback-banner" style="background:rgba(160,120,255,0.12);color:var(--purple,#a78bfa)">📞 PHRASE — real-life ${esc(step.cat || '')}</div>`;
  if(_buildWriteApplies(step) && !b.revealed){
    return banner + _buildRenderWriteInput(step.en);
  }
  if(b.revealed){
    return banner + `
      <div class="muted" style="text-align:center;font-size:14px;margin-bottom:4px">Phrase:</div>
      <div class="build-big-jp">${esc(step.jp)}</div>
      <div class="build-big-en">${esc(step.en)}</div>
    `;
  }
  return banner + `
    <div class="muted" style="text-align:center;font-size:14px;margin-bottom:4px">Say this phrase in Japanese</div>
    <div class="build-big-en">${esc(step.en)}</div>
    <div class="build-placeholder">say it out loud, then tap Reveal</div>
  `;
}

/* v6.27 — render the form_drill conjugation step. Pre-reveal: shows the
   dictionary form + target form name, then "say it out loud" or (in write
   mode) an input box. Post-reveal: shows the conjugated answer plus EN. */
function _buildRenderFormDrill(step){
  const b = state.buildMode;
  if(_buildWriteApplies(step) && !b.revealed){

function renderBuildModeComplete(){
  const l = state.buildMode.lesson;
  /* v6.22 — chain-queued placeholder. When buildOnComplete schedules the
     next chained lesson there's a 1.5s gap before it fires; show a brief
     "next lesson loading" view so the user doesn't tap into a button race. */
  const queuedIdx = state.buildMode?._chainQueued;
  if(queuedIdx){
    const cap = state.settings.buildAutoChainCap || BUILD_AUTO_CHAIN_CAP;
    return `<div class="card" style="text-align:center;padding:30px 20px">
      <div style="font-size:48px;color:var(--green);margin-bottom:8px">✓</div>
      <h2 style="margin:0 0 6px 0">Lesson ${(state.buildMode._chainIdx || 1)} done</h2>
      <div class="muted" style="font-size:13px;margin-bottom:14px;color:var(--blue)">⛓ Lesson ${queuedIdx} of ${cap} starting…</div>
      <button class="btn btn-secondary" style="width:100%;font-size:12px" onclick="buildExit()">Stop chain</button>
    </div>`;
  }
  /* v6.13 — Daily Chain. buildOnComplete already advanced chain.step to the
     next mode. Surface a "continue chain" CTA so the user flows from simple
     -> complex -> hard with the same words. */
  const chain = buildChainGet();
  const chainBtn = (chain && chain.step != null && chain.step <= 3)
    ? `<button class="btn btn-blue" style="width:100%;margin-bottom:8px" onclick="buildChainContinue()">▶ Continue chain — ${chain.step === 2 ? 'Complex' : 'Hard'} (step ${chain.step}/3)</button>`
    : '';
  /* v6.22 — autopilot chain summary. If we got here it means autopilot was
     off, the cap was hit, or generation failed mid-chain. Show how many
     lessons in the run completed and offer "Keep going →" to extend past
     the cap manually if the user wants more. */
  const chainCap = state.settings.buildAutoChainCap || BUILD_AUTO_CHAIN_CAP;
  const chainIdx = state.buildMode?._chainIdx || 1;
  const mode = l?._meta?.mode;
  const modeChainable = mode === 'simple' || mode === 'complex' || mode === 'social' || mode === 'hard';
  const dailyActive = !!(chain && chain.step != null && chain.step <= 3);
  const chainSummary = (modeChainable && chainIdx > 1)
    ? `<div class="muted" style="font-size:12px;margin-bottom:14px;color:var(--blue)">⛓ Autopilot chain: ${chainIdx} of ${chainCap} lesson${chainCap === 1 ? '' : 's'} completed</div>`
    : '';
  const keepGoingBtn = (modeChainable && !dailyActive)
    ? `<button class="btn btn-blue" style="width:100%;margin-bottom:8px" onclick="buildChainKeepGoing()">▶ Keep going — fresh ${esc(mode)} lesson</button>`
    : '';
  return `
    <div class="card" style="text-align:center;padding:30px 20px">
      <div style="font-size:64px;color:var(--green);margin-bottom:12px">✓</div>
      <h2 style="margin:0 0 8px 0">${chainIdx > 1 ? 'Chain complete' : 'Lesson complete'}</h2>
      <div class="muted" style="font-size:14px;margin-bottom:20px">
        ${(() => {
          const missedCount = (state.buildMode?._missed?.size) || 0;
          const summaryHead = l._meta?.mode === 'hard'
            ? `${l.cycles[0].steps.length} sentences · ${(l.carryover_words||[]).length} unique words.`
            : `${l.new_words.length} new words practiced · ${(l.carryover_words||[]).length} callbacks.`;
          const srsTail = missedCount > 0
            ? ` <span style="color:var(--green)">SRS:</span> ${(l._meta?.real_word_ids?.length || 0) - missedCount} good · <span style="color:var(--red)">${missedCount} again</span>`
            : ` <span style="color:var(--green)">SRS credit applied (all 'good').</span>`;
          return summaryHead + srsTail;
        })()}
      </div>
      ${chainSummary}
      ${chainBtn}
      ${keepGoingBtn}
      <button class="btn btn-primary" style="width:100%" onclick="buildRestart()">↻ Run it again</button>
      <div style="height:8px"></div>
      <button class="btn btn-secondary" style="width:100%" onclick="buildExit()">Back to Build Mode</button>
    </div>
  `;
}

/* v6.22 — manual chain extender. Same logic as auto-chain (generate fresh
   lesson same mode, restart autoplay), but ignores the cap so the user can
   keep going as long as eligible words exist. Reachable from the complete
   screen; useful when 4 wasn't enough or autopilot is off. */
function buildChainKeepGoing(){
  const cur = state.buildMode;
  if(!cur || !cur.lesson) return;
  const mode = cur.lesson._meta?.mode;
  if(!(mode === 'simple' || mode === 'complex' || mode === 'social' || mode === 'hard')) return;
  const origin = cur._origin;
  const nextIdx = (cur._chainIdx || 1) + 1;
  try{
    const nextLesson = mode === 'hard' ? buildGenerateHardLesson() : buildGenerateLesson(mode);
    const sess = buildMakeSession(nextLesson, nextIdx);
    if(origin) sess._origin = origin;
    state.buildMode = sess;
    _buildWakeLockSync();
    render();
    if(_buildAutoOn()){
      const step = sess.steps[0];
      if(step) buildAutoplayStep(step);
    }
  }catch(e){
    showToast(`Can't extend chain — ${e.message}`, {tone:'warn', duration:4500});
  }
}
window.buildChainKeepGoing = buildChainKeepGoing;

function renderTopbar(){
  if(state.screen === 'home') return '';
  let title = SCREEN_TITLES[state.screen];

    const f = FORMS.find(x => x.id === state._navData);
    title = f ? `Form drill · ${f.name}` : 'Form drill';
  }
  return `<div class="topbar">
    <button class="topbar-back" onclick="goBack()" title="Back">←</button>
    <div class="topbar-title">${esc(title)}</div>
  </div>`;
}

function render(){
  updateNav();
  const r = {home:renderHome, settings:renderSettings, particles:renderParticles, blitz:renderBlitz, forms:renderForms, formDrill:renderFormDrill, formBlitz:renderFormBlitz, kanaBlitz:renderKanaBlitz, sentenceBlitz:renderSentenceBlitz, buildMode:renderBuildMode, phrases:renderPhrases, phraseBlitz:renderPhraseBlitz, variations:renderVariations, variationBlitz:renderVariationBlitz, library:renderLibrary, modules:renderModules, similar:renderSimilar}[state.screen] || renderHome;
  const m = $('#main');
  m.innerHTML = renderTopbar() + r();
  document.body.dataset.screen = state.screen;
  bindScreen();
}
function nav(screen, data, fromPop){
  /* history tracking: only push when not coming from popstate */
  clearNextTimer();
  /* v6.5 — re-shuffle on each entry so re-opening Particles doesn't resume
     the same deck. v6.7 — swap to multi-blank session model. */
  if(screen === 'particles' && state.screen !== 'particles'){
    state.particleSession = null; /* ensureParticleSession will rebuild fresh */
  }
  state.screen = screen;
  state._navData = data;
  if(!fromPop){
    try{ history.pushState({screen, data}, '', '#'+screen); }catch(e){}
  }
  render();
  updateBackFab();
}

function goBack(){
  /* if browser has history, use it; otherwise manual fallback */
  if(history.state && history.length > 1){
    history.back();
  } else {
    nav('home');
  }
}

function updateBackFab(){
  const fab = document.getElementById('backFab');
  if(!fab) return;
  fab.classList.toggle('show', state.screen !== 'home');
}
function updateNav(){
  $$('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.screen === state.screen));
}

/* v6.34 — Home redesign. App-feel: streak strip → hero (Vocab Blitz with
   horizontal scope chips) → optional continue/module strips → drills tile
   grid → library entry. Drops the boxy 13-card stack and verbose muted
   descriptions. Single accent (blue); other colors retired from buttons.
   Each tile shows a 1-line progress meta so users still see at-a-glance
   where each mode stands without paragraphs. */
function renderHome(){
  const active = getActiveWords();
  const streak = state.streak.current || 0;
  const totalAttempts = Object.values(state.stats).reduce((s,x)=>s+(x.attempts?.length||0),0);
  const totalCorrect = Object.values(state.stats).reduce((s,x)=>s+(x.attempts?.filter(a=>a.correct).length||0),0);
  const acc = totalAttempts ? Math.round(100*totalCorrect/totalAttempts) : 0;

  const masteredSet = new Set(state.settings.masteredWords || []);
  const suspendedSet = new Set(state.settings.suspendedWords || []);

  /* Decide what today's session is — drives the hero card */
  const bc = blitzCounts();
  const targetR = state.settings.blitzReviews || 20;
  const targetN = state.settings.blitzNew || 10;
  const reviewsLabel = Math.min(bc.due, targetR);
  const newsLabel = Math.min(bc.unseen, targetN);
  const blitzEmpty = bc.due === 0 && bc.unseen === 0;
  const sec = activeVocabSection();
  const isMasteredMode = sec.mode === 'mastered';
  const bm = state.buildMode;
  const hasResume = !!(bm && bm.lesson && !bm.done);

  let heroEyebrow, heroTitle, heroMeta, heroDeco, heroCta, heroAction, heroDis = '';
  if(hasResume){
    /* Resume takes priority */
    const stepsLeft = (bm.steps?.length || 0) - (bm.stepIdx || 0);
    heroEyebrow = 'IN PROGRESS';
    heroTitle = bm.lesson.title || 'Build Mode session';
    heroMeta = `${stepsLeft} step${stepsLeft===1?'':'s'} left · pick up where you left off`;
    heroDeco = '続';
    heroCta = '▶ Resume';
    heroAction = `nav('buildMode')`;
  } else if(blitzEmpty){
    heroEyebrow = 'INBOX ZERO';
    heroTitle = isMasteredMode ? 'No mastered words yet' : 'You\'re all caught up';
    heroMeta = isMasteredMode
      ? 'Drill some words and ★-mark them — they\'ll show up here for sprint review.'
      : 'Pick a different drill below or come back tomorrow.';
    heroDeco = '空';
    heroCta = '✓ All clear';
    heroDis = 'disabled';
  } else if(isMasteredMode){
    const est = Math.max(1, Math.round(bc.due * 4 / 60));
    heroEyebrow = 'TODAY · SPRINT';
    heroTitle = 'Mastered review';
    heroMeta = `${bc.due} ready · boom-boom-boom recall · ~${est} min`;
    heroDeco = '極';
    heroCta = '🏆 Begin sprint';
    heroAction = 'startBlitz()';
  } else {
    const enabled = state.settings.modulesEnabled;
    const cur = enabled ? (moduleById(state.settings.currentModuleId || MODULES[0].id) || MODULES[0]) : null;
    const total = reviewsLabel + newsLabel;
    const est = Math.max(2, Math.round(total * 5 / 60));
    heroEyebrow = 'TODAY · SESSION';
    heroTitle = cur ? `Module ${cur.num} · ${cur.name}` : (sec.id === 'all' ? 'Vocab Blitz' : `${sec.emoji} ${sec.name}`);
    const overdue = bc.overdue > targetR ? ` · +${bc.overdue-targetR} overdue` : '';
    heroMeta = `${reviewsLabel} due · ${newsLabel} new${overdue} · ~${est} min`;
    heroDeco = cur ? cur.emoji : (sec.emoji || '心');
    /* When voice mode is on, route Begin Session to Build Mode (audio-led,
       voice-native) instead of typed Vocab Blitz. The user wants hands-free
       drilling and Build Mode is the shape that handles voice cleanly. */
    const voiceOn = state.settings.buildVoiceMode && voiceSupported();
    heroCta = voiceOn ? '🎙️ Begin session (hands-free)' : '⚡ Begin session';
    heroAction = voiceOn ? 'startRandomDrill()' : 'startBlitz()';
    if(voiceOn) heroMeta = `${heroMeta} · audio-led, voice-scored`;
  }

  /* Top bar — settings icon · wordmark · streak */
  const topBar = `
    <div class="h8-bar">
      <button class="h8-icon-btn" onclick="nav('settings')" title="Settings">⚙</button>
      <div class="h8-mark">一心<span class="r">Isshin</span></div>
      ${streak > 0
        ? `<span class="h8-streak">🔥 ${streak}</span>`
        : `<button class="h8-icon-btn" onclick="nav('library')" title="Library">📚</button>`}
    </div>`;

  /* Hero card — the centerpiece */
  const decoIsKanji = /^[぀-ヿ一-鿿]$/.test(heroDeco);
  const decoCls = decoIsKanji ? 'h8-hero-deco' : 'h8-hero-deco emoji';
  const heroAct = heroAction ? `onclick="${heroAction}"` : '';
  /* Exit banner — the user can land in Mastered Review with a tiny pool by
     tapping the up-next row, which leaves them stuck on a 1-word session
     with no obvious way out. Surface a one-tap exit here. */
  const isStuckMastered = isMasteredMode && (bc.due || 0) <= 3;
  const exitBanner = isStuckMastered ? `
    <div style="background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px">
      <div style="font-size:12px;color:var(--dim);text-align:left">You're in <b>Mastered Review</b> (only ★mastered words). Pool is small.</div>
      <button class="btn btn-primary" style="font-size:12px;padding:6px 12px;white-space:nowrap" onclick="setVocabSection('all')">← Full session</button>
    </div>` : '';
  /* Voice Mode toggle — big and unmissable. Sits between the hero meta and
     the CTA so the driver sees it before tapping start. */
  const voiceModeOn = state.settings.buildVoiceMode === true && voiceSupported();
  const voiceToggle = voiceSupported() ? `
    <button onclick="homeToggleVoiceMode()" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;padding:12px 16px;border-radius:14px;font-size:14px;font-weight:600;border:2px solid ${voiceModeOn ? 'var(--blue)' : 'var(--border)'};background:${voiceModeOn ? 'rgba(100,150,255,0.1)' : 'transparent'};color:${voiceModeOn ? 'var(--blue)' : 'var(--text)'};cursor:pointer">
      <span style="font-size:18px">${voiceModeOn ? '🎙️' : '🎙'}</span>
      <span>${voiceModeOn ? 'Voice Mode ON · hands-free drills' : 'Voice Mode OFF · tap for hands-free'}</span>
    </button>` : '';
  const heroCard = `
    ${exitBanner}
    <div class="h8-hero">
      <div class="${decoCls}">${esc(heroDeco)}</div>
      <div class="h8-hero-eyebrow">${esc(heroEyebrow)}</div>
      <div class="h8-hero-title">${esc(heroTitle)}</div>
      <div class="h8-hero-meta">${esc(heroMeta)}</div>
      <button class="h8-hero-cta" ${heroDis} ${heroAct}>${esc(heroCta)}</button>
      ${voiceToggle}
    </div>`;

  /* Up Next — alternative sessions, dynamic based on what has content */
  const fc = formCounts();
  const pc = phraseCounts();
  const scc = sentenceBlitzCounts();
  const vc = variationCounts();
  const simC = similarCounts();
  const masteredReady = active.filter(w => {
    if(suspendedSet.has(w.id)) return false;
    if(masteredSet.has(w.id)) return true;
    const st = state.stats[w.id];
    return st && st.smInterval && st.smInterval >= BLITZ_MATURE_MIN;
  }).length;

  const upNextRows = [
    /* Random Drill — pulls 30 random words from the WHOLE active deck
       (no module gating, no section filter). Always works, always
       audio-led. The "I just want to drive and drill" entry point. */
    { emoji:'🎲', title:'Random drill', meta:'30 random words from full deck · audio-led · honors voice mode', click:`startRandomDrill()` },
    /* Mastered review — only show if not already the active hero and has content */
    !isMasteredMode && masteredReady > 0
      ? { emoji:'🏆', title:'Mastered review', meta:`${masteredReady} ready · sprint mode`, click:`setVocabSection('mastered')` }
      : null,
    /* Spam mode — current section, audio out loud */
    !blitzEmpty
      ? { emoji:'🌀', title:'Spam mode (current section)', meta:'Audio out loud · 30 steps · hands-free', click:`startBuildModeVocabSpam()` }
      : null,
    /* Forms */
    fc.verbs > 0
      ? { emoji:'📖', title:'Form drills', meta: fc.due > 0 ? `${fc.due} due · ${fc.drilled} drilled` : `${fc.drilled} drilled · all caught up` , click:`nav('forms')` }
      : null,
    /* Phrases */
    pc.total > 0
      ? { emoji:'💬', title:'Phrases', meta:`${pc.retired}/${pc.total} mastered`, click:`nav('phrases')` }
      : null,
    /* Sentences */
    scc.total > 0
      ? { emoji:'📜', title:'Sentence Blitz', meta:`${scc.retired}/${scc.total} mastered`, click:`startSentenceBlitz()` }
      : null,
    /* Particles — always available */
    { emoji:'🔗', title:'Particles', meta:'Drill は · が · に · で · を', click:`nav('particles')` },
    /* Variations */
    vc.totalDrills > 0
      ? { emoji:'🔀', title:'Variations', meta:`${vc.drillsDone}/${vc.totalDrills} drills done`, click:`nav('variations')` }
      : null,
    /* Similar */
    simC.totalSets > 0
      ? { emoji:'🔍', title:'Similar words', meta:`${simC.setsDone}/${simC.totalSets} sets done`, click:`nav('similar')` }
      : null,
    /* Build Mode — always */
    { emoji:'🎯', title:'Build Mode', meta:'Audio sentence construction', click:`startBuildMode()` },
    /* Kana */
    { emoji:'あ', title:'Kana Blitz', meta:'Hiragana · Katakana · Mix', click:`startKanaBlitz('all')` }
  ].filter(Boolean);

  const upNext = `
    <div class="h8-section">More to do</div>
    <div class="h8-list">
      ${upNextRows.map(r => `
        <button class="h8-row" onclick="${r.click}">
          <div class="h8-row-emoji">${esc(r.emoji)}</div>
          <div class="h8-row-body">
            <div class="h8-row-title">${esc(r.title)}</div>
            <div class="h8-row-meta">${esc(r.meta)}</div>
          </div>
          <div class="h8-row-arrow">›</div>
        </button>
      `).join('')}
    </div>`;

  /* Stats footer */
  const statsRow = `
    <div class="h8-stats">
      <div class="h8-stat">
        <div class="h8-stat-num flame">${streak}</div>
        <div class="h8-stat-label">Streak</div>
      </div>
      <div class="h8-stat">
        <div class="h8-stat-num">${acc}%</div>
        <div class="h8-stat-label">Accuracy</div>
      </div>
      <div class="h8-stat">
        <div class="h8-stat-num accent">${active.length}</div>
        <div class="h8-stat-label">Words</div>
      </div>
    </div>`;

  return `
    <div class="home-v8">
      ${topBar}
      ${heroCard}
      ${upNext}
      ${statsRow}
    </div>
  `;
}

/* ---------- MODULES (v6.16) ----------
   Browse all modules. Unlocked ones are tappable to set as current.
   Locked ones show a preview, the unlock threshold, and an "Unlock anyway"
   bypass so the user is never trapped if they want to skip ahead. */

function renderModules(){
  const enabled = state.settings.modulesEnabled;
  const cards = MODULES.map(m => {
    const prog = moduleProgress(m.id);
    const unlocked = moduleIsUnlocked(m.id);
    const current = moduleIsCurrent(m.id);
    const themeList = m.themes ? m.themes.join(' · ') : '—';
    const verbNote = m.includeAllVerbs ? ' · all verbs' : '';
    const bar = `<div class="mastery-strip" style="margin-top:8px;height:8px;background:var(--card)"><div style="height:100%;width:${prog.pct}%;background:${prog.pct >= MODULE_UNLOCK_PCT ? 'var(--blue)' : 'var(--green)'};border-radius:4px"></div></div>`;
    const meta = `<div class="muted" style="font-size:12px;margin-top:4px">${esc(themeList)}${esc(verbNote)} · ${prog.total} words</div>`;
    let footer;
    if(!enabled){
      footer = `<div class="muted" style="font-size:12px;margin-top:8px">Modules are off — every word is currently drillable.</div>`;
    } else if(current){
      footer = `<div style="margin-top:8px;padding:8px 10px;background:rgba(34,197,94,0.12);border-radius:6px;font-size:13px;color:var(--green)">● Current — Vocab Blitz, Build Mode and Form Drills pull from here + earlier modules.</div>`;
    } else if(unlocked){
      footer = `<div class="spacer"></div><button class="btn btn-primary" style="width:100%" onclick="setCurrentModule('${m.id}')">Set as current</button>`;
    } else {
      footer = `<div style="margin-top:8px;padding:8px 10px;background:rgba(255,255,255,0.04);border-radius:6px;font-size:13px;color:var(--muted)">🔒 Locked — finish previous module to ${MODULE_UNLOCK_PCT}% mastery to unlock.</div>
        <div class="spacer"></div>
        <button class="btn btn-secondary" style="width:100%;font-size:12px" onclick="unlockModuleAnyway('${m.id}')">Unlock anyway</button>`;
    }
    return `<div class="card" style="${current ? 'border:2px solid var(--green)' : (unlocked ? '' : 'opacity:0.7')}">
      <div style="display:flex;align-items:baseline;justify-content:space-between;gap:8px">
        <h3 style="margin:0">${m.emoji} Module ${m.num} — ${esc(m.name)}</h3>
        <span class="muted" style="font-size:12px">${prog.pct}% · ${prog.masteredCount}/${prog.total}</span>
      </div>
      ${bar}
      ${meta}
      ${footer}
    </div>`;
  }).join('');

  const toggle = `<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <div>
        <h3 style="margin:0 0 4px 0">Modules ${enabled ? 'on' : 'off'}</h3>
        <div class="muted" style="font-size:12.5px">${enabled
          ? `Drilling pulls only from your current module + already-unlocked modules. Reach ${MODULE_UNLOCK_PCT}% mastery (★-mastered or SM-2 mature) to unlock the next.`
          : `Modules are disabled — every active word is fair game everywhere.`}</div>
      </div>
      <button class="btn ${enabled ? 'btn-secondary' : 'btn-primary'}" style="white-space:nowrap" onclick="toggleModulesEnabled()">${enabled ? 'Turn off' : 'Turn on'}</button>
    </div>
  </div>`;

  return toggle + cards;
}

/* ---------- LIBRARY (v6.10) ----------
   Per-word management surface for Vocab Blitz. List + search + sort + filter.
   Each row tappable → expand-tray with Focus / Suspend / Mark mastered / Reset.
   Affects only Vocab Blitz drilling; other modes still use the word as content. */

function libraryUpdateUi(field, value){
  state._libraryUi = state._libraryUi || {search:'', sort:'en', filter:'all', expandedId:null};
  state._libraryUi[field] = value;
  if(field !== 'search') render(); /* search re-render is handled inline to keep focus in input */
}
window.libraryUpdateUi = libraryUpdateUi;

function librarySearchInput(){
  const v = $('#libSearch')?.value || '';
  state._libraryUi = state._libraryUi || {};
  state._libraryUi.search = v;
  /* Live re-render only the list, not the whole screen, to keep input focused. */
  const list = $('#libList');
  if(list) list.innerHTML = libraryRenderList();
  /* tally + filter chips don't change with search, so no full re-render. */
}
window.librarySearchInput = librarySearchInput;

function libraryToggleExpand(id){
  state._libraryUi = state._libraryUi || {};
  state._libraryUi.expandedId = (state._libraryUi.expandedId === id) ? null : id;
  render();
}
window.libraryToggleExpand = libraryToggleExpand;

function libraryStatusBadge(status, focused){
  const colors = {
    new: 'background:var(--card2);color:var(--dim)',
    learning: 'background:#1e3a5f;color:#93c5fd',
    mature: 'background:#14532d;color:#86efac',
    suspended: 'background:#3f3f46;color:#a1a1aa',
    mastered: 'background:#581c87;color:#d8b4fe',
  };
  const label = {new:'New', learning:'Learning', mature:'Mature', suspended:'Suspended', mastered:'Mastered'}[status] || status;
  const focusBit = focused ? `<span class="pill" style="background:var(--orange);color:#fff;margin-right:4px">⭐ Focus</span>` : '';
  return focusBit + `<span class="pill" style="${colors[status] || ''}">${esc(label)}</span>`;
}

function libraryRenderList(){
  const ui = state._libraryUi || {search:'', sort:'en', filter:'all'};
  const allActive = getActiveWords();
  const focusSet = new Set(state.settings.focusWords || []);
  const q = (ui.search || '').trim().toLowerCase();
  let words = allActive.slice();

  /* Filter chip */
  if(ui.filter !== 'all'){
    words = words.filter(w => {
      const st = libraryWordStatus(w);
      if(ui.filter === 'focus') return focusSet.has(w.id);
      return st === ui.filter;
    });
  }

  /* Search query — match across EN, JP, romaji */
  if(q){
    words = words.filter(w => {
      const en = (w.en || '').toLowerCase();
      const jp = (w.jp || '').toLowerCase();
      const rom = (w.romaji || kanaToRomaji(w.jp) || '').toLowerCase();
      return en.includes(q) || jp.includes(q) || rom.includes(q);
    });
  }

  /* Sort */
  const sortFns = {
    en: (a,b) => (a.en || '').localeCompare(b.en || '', 'en', {sensitivity:'base'}),
    jp: (a,b) => (a.jp || '').localeCompare(b.jp || '', 'ja'),
    seen: (a,b) => (state.stats[b.id]?.lastSeen || 0) - (state.stats[a.id]?.lastSeen || 0),
    struggle: (a,b) => {
      const wA = (state.stats[a.id]?.attempts || []).slice(-10).filter(x => !x.correct).length;
      const wB = (state.stats[b.id]?.attempts || []).slice(-10).filter(x => !x.correct).length;
      return wB - wA;
    },
  };
  words.sort(sortFns[ui.sort] || sortFns.en);

  if(!words.length){
    return `<div class="muted" style="text-align:center;padding:30px 10px">No words match.</div>`;
  }

  /* v6.10 — render up to 400 to keep DOM light. Most filters slice well below this. */
  const MAX = 400;
  const overflow = words.length > MAX;
  const rendered = words.slice(0, MAX);
  const expandedId = ui.expandedId;

  return rendered.map(w => {
    const status = libraryWordStatus(w);
    const focused = focusSet.has(w.id);
    const romaji = w.romaji || kanaToRomaji(w.jp) || '';
    const expanded = (expandedId === w.id);
    const st = state.stats[w.id];
    const attempts = st?.attempts?.length || 0;
    const correctCount = st?.attempts?.filter(a => a.correct).length || 0;
    const acc = attempts ? Math.round(100*correctCount/attempts) : 0;
    const next = (st && st.smInterval) ? smIntervalLabel(st.smInterval) : '—';

    const tray = !expanded ? '' : `
      <div style="border-top:1px solid var(--border);padding:10px 4px 4px;margin-top:8px">
        <div class="muted" style="font-size:12px;margin-bottom:8px">
          ${attempts} attempts · ${acc}% accuracy · next ${esc(next)}
        </div>
        <div class="btn-row">
          <button class="btn ${focused ? 'btn-primary' : 'btn-secondary'}" style="font-size:12px;padding:10px" onclick="libraryFocusToggle('${jsEsc(w.id)}')">${focused ? '⭐ Unfocus' : '⭐ Focus'}</button>
          <button class="btn ${status === 'suspended' ? 'btn-primary' : 'btn-secondary'}" style="font-size:12px;padding:10px" onclick="librarySuspendToggle('${jsEsc(w.id)}')">${status === 'suspended' ? '▶ Activate' : '⏸ Suspend'}</button>
        </div>
        <div class="btn-row">
          <button class="btn ${status === 'mastered' ? 'btn-primary' : 'btn-secondary'}" style="font-size:12px;padding:10px" onclick="libraryMasterToggle('${jsEsc(w.id)}')">${status === 'mastered' ? '↩ Un-master' : '🎓 Mastered'}</button>
          <button class="btn btn-secondary" style="font-size:12px;padding:10px" onclick="libraryResetWord('${jsEsc(w.id)}')">🔄 Reset</button>
        </div>
        <div class="audio-row" style="margin-top:6px">
          <button class="audio-btn" style="font-size:12px;padding:10px" onclick="speakJP('${jsEsc(w.jp)}')">🔊 Listen</button>
        </div>
      </div>`;

    return `<div class="card" style="padding:10px 12px;margin-bottom:6px;cursor:pointer" onclick="libraryToggleExpand('${jsEsc(w.id)}')">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:600;color:var(--text)">${esc(w.en || '')}</div>
          <div class="muted" style="font-size:13px;margin-top:2px">
            <span class="jp" style="color:var(--text);font-size:14px">${esc(w.jp)}</span>
            ${romaji ? ` <span style="font-style:italic">· ${esc(romaji)}</span>` : ''}
          </div>
        </div>
        <div style="text-align:right;white-space:nowrap">${libraryStatusBadge(status, focused)}</div>
      </div>
      ${tray}
    </div>`;
  }).join('') + (overflow ? `<div class="muted" style="text-align:center;padding:10px;font-size:12px">+${words.length - MAX} more — refine search to see them</div>` : '');
}

function libraryRenderTally(){
  const all = getActiveWords();
  const total = all.length;
  let mature = 0, learning = 0, fresh = 0;
  const focusSet = new Set(state.settings.focusWords || []);
  const suspended = (state.settings.suspendedWords || []).length;
  const mastered = (state.settings.masteredWords || []).length;
  for(const w of all){
    const st = libraryWordStatus(w);
    if(st === 'mature') mature++;
    else if(st === 'learning') learning++;
    else if(st === 'new') fresh++;
  }
  const focus = focusSet.size;
  return `<div class="stats-row" style="flex-wrap:wrap;gap:6px">
    <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">Total</div></div>
    <div class="stat-box"><div class="stat-num">${fresh}</div><div class="stat-label">New</div></div>
    <div class="stat-box"><div class="stat-num">${learning}</div><div class="stat-label">Learning</div></div>
    <div class="stat-box"><div class="stat-num">${mature}</div><div class="stat-label">Mature</div></div>
    <div class="stat-box" style="background:rgba(245,158,11,0.15)"><div class="stat-num">${focus}</div><div class="stat-label">⭐ Focus</div></div>
    <div class="stat-box"><div class="stat-num">${suspended}</div><div class="stat-label">Suspended</div></div>
    <div class="stat-box"><div class="stat-num">${mastered}</div><div class="stat-label">Mastered</div></div>
  </div>`;
}

function renderLibrary(){
  const ui = state._libraryUi = state._libraryUi || {search:'', sort:'en', filter:'all', expandedId:null};

  const filterChip = (key, label) => `<button class="tag${ui.filter === key ? ' active' : ''}" onclick="libraryUpdateUi('filter', '${key}')">${esc(label)}</button>`;
  const sortOption = (key, label) => `<option value="${key}"${ui.sort === key ? ' selected' : ''}>${esc(label)}</option>`;

  return `
    ${libraryRenderTally()}

    <div class="card">
      <input id="libSearch" class="input" type="text" placeholder="Search EN, JP, or romaji" autocomplete="off" autocorrect="off" spellcheck="false" oninput="librarySearchInput()" value="${esc(ui.search || '')}">
      <div class="spacer"></div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="muted" style="font-size:12px">Sort:</span>
        <select class="input" style="width:auto;padding:6px 10px;font-size:13px" onchange="libraryUpdateUi('sort', this.value)">
          ${sortOption('en', 'EN A→Z')}
          ${sortOption('jp', 'JP あ→ん')}
          ${sortOption('seen', 'Last seen')}
          ${sortOption('struggle', 'Most-wrong recent')}
        </select>
      </div>
      <div class="spacer"></div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${filterChip('all', 'All')}
        ${filterChip('new', 'New')}
        ${filterChip('learning', 'Learning')}
        ${filterChip('mature', 'Mature')}
        ${filterChip('focus', '⭐ Focus')}
        ${filterChip('suspended', 'Suspended')}
        ${filterChip('mastered', 'Mastered')}
      </div>
    </div>

    <div id="libList">${libraryRenderList()}</div>
  `;
}

let _nextTimer = null;
function clearNextTimer(){ if(_nextTimer){ clearTimeout(_nextTimer); _nextTimer = null; } }

/* ---------- PARTICLES ----------
   v6.7 — multi-blank rework. Each (drillIdx, blankIdx) pair is an independent
   pool item with its own retire streak, so the user can't pattern-match from
   "the answer to this sentence was X last time" — the next blank in the same
   sentence is a separate question. Retire after PARTICLE_RETIRE_STREAK
   consecutive correct on that exact pair. */
const PARTICLE_RETIRE_STREAK = 2;
const PARTICLE_SESSION_TARGET = 16;
const PARTICLE_OPTIONS = ['は','が','を','に','で','へ','と','も','の','から','まで','や'];

/* v6.20 — teacher's "3 uses per particle" framework. Each row is one cell of
   the breakdown grid. Display order = particle order, then use order within
   particle. Cells with zero tagged drills are intentionally omitted. */
const PARTICLE_USES = [
  {particle:'は', use:'topic',       label:'Topic'},
  {particle:'は', use:'contrast',    label:'Contrast'},
  {particle:'が', use:'stative_obj', label:'Stative object (好き / ほしい)'},
  {particle:'が', use:'existence',   label:'Existence (ある / いる)'},
  {particle:'を', use:'dobj',        label:'Direct object'},
  {particle:'を', use:'path',        label:'Path traversed'},
  {particle:'に', use:'time',        label:'Time point'},
  {particle:'に', use:'target',      label:'Destination / target'},
  {particle:'に', use:'becoming',    label:'Becoming (なる)'},
  {particle:'で', use:'location',    label:'Location of action'},
  {particle:'で', use:'means',       label:'Means / instrument'},
  {particle:'へ', use:'direction',   label:'Direction'},
  {particle:'と', use:'with',        label:'With (companion)'},
  {particle:'と', use:'and',         label:'And (concrete nouns)'},
  {particle:'も', use:'also',        label:'Also / too'},
  {particle:'の', use:'possessive',  label:'Possessive'},
  {particle:'から', use:'from',      label:'From (origin)'}
];
const PARTICLE_ORDER = ['は','が','を','に','で','へ','と','も','の','から','まで'];

function particleBlanks(d){
  if(d.blanks) return d.blanks;
  /* Defensive fallback for any legacy single-blank shape that slips through. */
  return [{answer:d.blank, accept:d.accept, explain:d.explain}];
}
function particleAccept(blank){
  return blank.accept || [blank.answer];
}
function particleJP(d, activeIdx){
  /* Render JP with all blanks shown as ＿＿＿; the active blank gets a highlight. */
  const parts = d.jp.split('___');
  let out = esc(parts[0] || '');
  for(let i = 0; i < parts.length - 1; i++){
    if(i === activeIdx){
      out += '<span class="p-blank-active" style="background:var(--accent);color:#000;padding:2px 8px;border-radius:6px;font-weight:700">＿＿＿</span>';
    } else {
      out += '<span class="p-blank-other" style="opacity:0.5">＿＿＿</span>';
    }
    out += esc(parts[i+1] || '');
  }
  return out;
}
function particleJPRevealed(d, activeIdx, picked, isCorrect){
  /* JP with the active blank filled by user's pick (other blanks remain ＿＿＿). */
  const parts = d.jp.split('___');
  const colorVar = isCorrect ? '--green' : '--red';
  let out = esc(parts[0] || '');
  for(let i = 0; i < parts.length - 1; i++){
    if(i === activeIdx){
      out += `<b style="color:var(${colorVar})">${esc(picked)}</b>`;
    } else {
      out += '<span style="opacity:0.5">＿＿＿</span>';
    }
    out += esc(parts[i+1] || '');
  }
  return out;
}
function particleJPFilled(d){
  const blanks = particleBlanks(d);
  let i = 0;
  return d.jp.replace(/___/g, () => (blanks[i++] || {}).answer || '');
}

function particleStatFor(drillIdx, blankIdx){
  if(!state.particleStats) state.particleStats = {};
  if(!state.particleStats[drillIdx]) state.particleStats[drillIdx] = {};
  if(!state.particleStats[drillIdx][blankIdx]){
    state.particleStats[drillIdx][blankIdx] = {streak:0, retired:false, retiredAt:null, correctCount:0, wrongCount:0, lastSeen:null};
  }
  return state.particleStats[drillIdx][blankIdx];
}
function particleStatPeek(drillIdx, blankIdx){
  return state.particleStats?.[drillIdx]?.[blankIdx] || null;
}

/* v6.20 — scope = {} for all-particles, {particle} for one particle's uses,
   {particle, use} for a single bucket. Empty scope preserves v6.19 behavior. */
function blankMatchesScope(blank, scope){
  if(!scope || (!scope.particle && !scope.use)) return true;
  if(scope.particle && blank.particle !== scope.particle) return false;
  if(scope.use && blank.use !== scope.use) return false;
  return true;
}

/* v6.36 — particle confusables. When the user drills a single particle, the
   pool used to be 100% that particle, so they could pattern-match "the answer
   is に" without reading the sentence. Mix in ~30% drills from commonly
   confused particles so the answer isn't pre-decided. Tracking still applies
   per-blank globally, so confusable hits also count toward retirement. */
const PARTICLE_CONFUSABLES = {
  'は': ['が'],          // topic vs subject
  'が': ['は', 'を'],    // subject vs topic vs object
  'を': ['が'],          // object vs subject (esp. with potential)
  'に': ['で', 'へ'],    // existence-loc vs action-loc; destination
  'で': ['に'],          // action-loc vs existence-loc
  'へ': ['に'],          // direction vs destination
  'と': ['や'],          // exhaustive and vs partial and
  'や': ['と'],
  'も': ['は'],          // also vs topic
  'の': ['が'],          // possessive vs subject in relative clauses
  'から': ['まで'],
  'まで': ['から'],
};

function buildParticlePoolScoped(scope){
  const pairs = [];
  for(let di = 0; di < PARTICLE_DRILLS.length; di++){
    const blanks = particleBlanks(PARTICLE_DRILLS[di]);
    for(let bi = 0; bi < blanks.length; bi++){
      if(!blankMatchesScope(blanks[bi], scope)) continue;
      const st = particleStatPeek(di, bi);
      if(!st || !st.retired) pairs.push({drillIdx:di, blankIdx:bi});
    }
  }
  if(!pairs.length){
    /* All retired in scope — sample everything in scope for review. */
    for(let di = 0; di < PARTICLE_DRILLS.length; di++){
      const blanks = particleBlanks(PARTICLE_DRILLS[di]);
      for(let bi = 0; bi < blanks.length; bi++){
        if(blankMatchesScope(blanks[bi], scope)) pairs.push({drillIdx:di, blankIdx:bi});
      }
    }
  }
  /* v6.36 — mix in confusable-particle drills when scoped to a single
     particle (no use sub-scope). Otherwise the answer is always the scoped
     particle and the user pattern-matches the scope, not the sentence. */
  let confusables = [];
  if(scope && scope.particle && !scope.use){
    const confList = PARTICLE_CONFUSABLES[scope.particle] || [];
    for(let di = 0; di < PARTICLE_DRILLS.length; di++){
      const blanks = particleBlanks(PARTICLE_DRILLS[di]);
      for(let bi = 0; bi < blanks.length; bi++){
        if(confList.includes(blanks[bi].particle)) confusables.push({drillIdx:di, blankIdx:bi});
      }
    }
    confusables = shuffleFY(confusables);
    /* Aim for ~30% of the session being confusables. */
    const want = Math.round(PARTICLE_SESSION_TARGET * 0.3);
    confusables = confusables.slice(0, want);
  }
  const inScope = shuffleFY(pairs).slice(0, Math.max(1, PARTICLE_SESSION_TARGET - confusables.length));
  return shuffleFY(inScope.concat(confusables));
}

function buildParticlePool(){ return buildParticlePoolScoped({}); }

function particleCountsScoped(scope){
  let total = 0, retired = 0;
  for(let di = 0; di < PARTICLE_DRILLS.length; di++){
    const blanks = particleBlanks(PARTICLE_DRILLS[di]);
    for(let bi = 0; bi < blanks.length; bi++){
      if(!blankMatchesScope(blanks[bi], scope)) continue;
      total++;
      if(particleStatPeek(di, bi)?.retired) retired++;
    }
  }
  return {total, retired};
}

function particleCounts(){ return particleCountsScoped({}); }

function ensureParticleSession(scope){
  if(!state.particleSession || !state.particleSession.pool?.length){
    state.particleSession = {pool: buildParticlePoolScoped(scope || {}), idx: 0, answer: null, scope: scope || {}, active: true};
  }
}

function startParticleScope(scope){
  state.particleSession = {pool: buildParticlePoolScoped(scope || {}), idx: 0, answer: null, scope: scope || {}, active: true};
  if(!state.particleSession.pool.length){
    showToast('No drills in this scope.', 'success');
    state.particleSession = null;
    render();
    return;
  }
  save();
  render();
}

function exitParticleSession(){

function scopeLabel(scope){

  if(scope.particle && scope.use){
    const row = PARTICLE_USES.find(r => r.particle === scope.particle && r.use === scope.use);
    return `${scope.particle} · ${row ? row.label : scope.use}`;
  }
  if(scope.particle) return `${scope.particle} · all uses`;
  return 'All particles';
}

function renderParticlesIndex(){
  const totals = particleCountsScoped({});

  const allBtn = `<button class="btn btn-primary" style="width:100%" onclick="startParticleScope({})">▶ Drill all particles · ${totals.retired}/${totals.total} retired</button>`;

  const cards = PARTICLE_ORDER.map(p => {
    const uses = PARTICLE_USES.filter(r => r.particle === p);
    if(!uses.length) return '';
    const pCounts = particleCountsScoped({particle:p});
    const isOpen = expanded === p;
    const useRows = isOpen ? uses.map(r => {
      const c = particleCountsScoped({particle:r.particle, use:r.use});

      return `<div style="display:flex;align-items:center;gap:8px;margin-top:6px">

    }).join('') : '';
    const drillAllBtn = isOpen
      ? `<button class="btn btn-primary" style="width:100%;margin-top:10px;font-size:13px;padding:9px" onclick="startParticleScope({particle:'${jsEsc(p)}'})">Drill all uses of ${esc(p)}</button>`

  `;
}

function renderParticles(){
  /* v6.20 — index view when no session is active; drill view when one is. */
  if(!state.particleSession || !state.particleSession.active) return renderParticlesIndex();

  const sess = state.particleSession;
  if(sess.idx >= sess.pool.length){
    /* Pool exhausted — bounce back to the index with a friendly note. */
    return `<div class="card">
      <h2 style="margin-top:0">Drill complete</h2>
      <div class="muted" style="font-size:13px">${esc(scopeLabel(sess.scope))} — ${sess.pool.length} drills done.</div>
      <div class="spacer"></div>
      <button class="btn btn-primary" style="width:100%" onclick="startParticleScope(${JSON.stringify(sess.scope||{})})">Drill again</button>
      <div class="spacer"></div>
      <button class="btn btn-secondary" style="width:100%" onclick="exitParticleSession()">Back to particles</button>
    </div>`;
  }

  const cur = sess.pool[sess.idx];
  const d = PARTICLE_DRILLS[cur.drillIdx];
  const blanks = particleBlanks(d);
  const blank = blanks[cur.blankIdx];
  const accept = particleAccept(blank);
  const ans = sess.answer;
  const isCorrect = ans && accept.includes(ans);
  const stPeek = particleStatPeek(cur.drillIdx, cur.blankIdx);
  const streak = stPeek?.streak || 0;
  const blankLabel = blanks.length > 1 ? `Blank ${cur.blankIdx+1} of ${blanks.length}` : 'Fill in the blank';

  return `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
        <h3 style="margin:0">Particle drills · ${sess.idx+1} / ${sess.pool.length}</h3>
        <button class="btn btn-secondary" style="font-size:12px;padding:5px 10px" onclick="exitParticleSession()">↩ Back</button>
      </div>
      <div class="muted" style="font-size:13px;margin-top:4px">${esc(scopeLabel(sess.scope))} · streak ${streak} / ${PARTICLE_RETIRE_STREAK}</div>
    </div>
    <div class="drill-card">
      <div class="drill-cat">${esc(blankLabel)}${accept.length>1?' · multiple acceptable':''}</div>
      <div class="drill-prompt jp" style="line-height:1.7">${particleJP(d, cur.blankIdx)}</div>
      <div class="drill-sub">${esc(d.en)}</div>
    </div>
    ${ans ? '' : `<div class="tags" style="justify-content:center">
      ${PARTICLE_OPTIONS.map(p => `<button class="tag" onclick="answerParticle('${jsEsc(p)}')">${p}</button>`).join('')}
    </div>`}
    ${ans ? `<div class="feedback-card ${isCorrect?'correct':'wrong'}">
      <div class="feedback-head">${isCorrect?'✓ Correct':'✗ Wrong — accepted: '+accept.map(esc).join(' / ')}</div>
      <div class="feedback-body" style="line-height:1.7">${particleJPRevealed(d, cur.blankIdx, ans, isCorrect)}</div>
      ${!isCorrect ? `<div class="feedback-smart">${esc(blank.explain)}</div>` : ''}
    </div>
    <div class="audio-row">
      <button class="audio-btn" onclick="speakJP('${jsEsc(particleJPFilled(d))}')">🔊 Listen (full sentence)</button>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="nextParticle()">Next →</button>` : ''}
  `;
}

function answerParticle(p){
  ensureParticleSession();
  const sess = state.particleSession;
  if(sess.answer) return; /* already answered this blank */
  const cur = sess.pool[sess.idx];
  const d = PARTICLE_DRILLS[cur.drillIdx];
  const blank = particleBlanks(d)[cur.blankIdx];
  const accept = particleAccept(blank);
  const correct = accept.includes(p);
  sess.answer = p;
  const st = particleStatFor(cur.drillIdx, cur.blankIdx);
  st.lastSeen = now();
  if(correct){
    st.streak++;
    st.correctCount++;
    if(st.streak >= PARTICLE_RETIRE_STREAK && !st.retired){
      st.retired = true;
      st.retiredAt = now();
    }
  } else {
    st.streak = 0;
    st.wrongCount++;
    st.retired = false;
    st.retiredAt = null;
  }
  log('particle_attempt', {drillIdx:cur.drillIdx, blankIdx:cur.blankIdx, correct, chose:p});
  save();
  render();
}

function nextParticle(){
  if(!state.particleSession) return;
  const sess = state.particleSession;
  sess.answer = null;
  sess.idx++;
  /* v6.20 — when scope pool is exhausted, leave idx >= pool.length so the
     renderer shows the completion card; user picks "Drill again" or "Back". */
  save();
  render();
}
window.answerParticle = answerParticle;

function handleImport(ev){
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const d = JSON.parse(r.result);
      if(!confirm(`Import ${Object.keys(d.stats||{}).length} word stats + ${(d.notes||[]).length} notes? Existing data will be merged (existing keys kept).`)) return;
      if(d.words) for(const w of d.words) if(!state.words.find(x=>x.id===w.id)) state.words.push(w);
      if(d.stats) for(const k in d.stats) if(!state.stats[k]) state.stats[k] = d.stats[k];
      if(d.formStats){
        if(!state.formStats) state.formStats = {};
        for(const wid in d.formStats){
          if(!state.formStats[wid]) state.formStats[wid] = {};
          for(const fid in d.formStats[wid]){
            if(!state.formStats[wid][fid]) state.formStats[wid][fid] = d.formStats[wid][fid];
          }
        }
      }
      if(d.notes) for(const n of d.notes) if(!state.notes.find(x=>x.id===n.id)) state.notes.push(n);
      if(d.settings) state.settings = {...state.settings, ...d.settings};
      if(d.streak) state.streak = {...state.streak, ...d.streak};
      if(d.kanaStats){
        if(!state.kanaStats) state.kanaStats = {};
        for(const k in d.kanaStats) if(!state.kanaStats[k]) state.kanaStats[k] = d.kanaStats[k];
      }
      if(d.sentenceStats){
        if(!state.sentenceStats) state.sentenceStats = {};
        for(const k in d.sentenceStats) if(!state.sentenceStats[k]) state.sentenceStats[k] = d.sentenceStats[k];
      }
      if(d.phraseStats){
        if(!state.phraseStats) state.phraseStats = {};
        for(const k in d.phraseStats) if(!state.phraseStats[k]) state.phraseStats[k] = d.phraseStats[k];
      }
      if(d.particleStats){
        if(!state.particleStats) state.particleStats = {};
        for(const di in d.particleStats){
          if(!state.particleStats[di]) state.particleStats[di] = {};
          for(const bi in d.particleStats[di]){
            if(!state.particleStats[di][bi]) state.particleStats[di][bi] = d.particleStats[di][bi];
          }
        }
      }
      if(d.variationStats){
        if(!state.variationStats) state.variationStats = {};
        for(const did in d.variationStats){
          if(!state.variationStats[did]) state.variationStats[did] = {};
          for(const vi in d.variationStats[did]){
            if(!state.variationStats[did][vi]) state.variationStats[did][vi] = d.variationStats[did][vi];
          }
        }
      }
      if(d.similarStats){
        if(!state.similarStats) state.similarStats = {};
        for(const sid in d.similarStats){
          if(!state.similarStats[sid]) state.similarStats[sid] = {};
          for(const ii in d.similarStats[sid]){
            if(!state.similarStats[sid][ii]) state.similarStats[sid][ii] = d.similarStats[sid][ii];
          }
        }
      }
      save(); load(); alert('Import complete.'); render();
    }catch(e){ alert('Import failed: '+e.message); }
  };
  r.readAsText(f);
}

/* ---------- ASK CLAUDE ---------- */
const ASK_CLAUDE_SYSTEM = `You are Julius's Japanese sparring partner. He is a beginner/intermediate learner focused on conversational fluency — not JLPT. He attends a weekly JAPANEASY class and a language exchange.

Teach like a peer, not a teacher. Direct, casual, encouraging. No hedging. Don't lecture.

Hard rules:
- Write ALL Japanese in HIRAGANA ONLY. Never kanji. Never romaji unless Julius explicitly asks.
- Reply in concise English with short Japanese examples inline.
- Keep answers to 3–6 sentences by default. Expand only when asked.
- Prioritise conversational utility over grammar theory.
- Register-tag every Japanese example: [casual], [polite], or [formal].
- Flag anything uncertain so his JAPANEASY teacher can confirm.

When he asks about a word: give meaning, register, 1–2 short hiragana examples (register-tagged), and any close-but-wrong siblings he might confuse it with.

When he asks about a grammar pattern: show the pattern with 2–3 substitution examples using common N5-level words in hiragana, each register-tagged.

When he writes Japanese and asks to check it: correct gently, show the fix in hiragana, explain in one sentence.

Watch for these common beginner error patterns and proactively flag when his question touches one:
- い-adjective drop: dropping い before です (e.g. "たのし です" — wrong; should be "たのしい です")
- に vs で confusion: に for destinations, existence, and targets; で for locations of action and means/method
- は vs が: は for topic, が for subject/new information; が goes with すき, ある, いる, ほしい
- Transitive / intransitive pairs: はじまる vs はじめる, あく vs あける, きえる vs けす, でる vs だす, はいる vs いれる
- Stem vs dictionary form: ます-stem (たべ) vs dictionary (たべる) — ます-stem does not stand alone
- Particle drops in polite speech: don't drop を or が the way casual speech allows

Use examples from daily life — food, trains, weather, friends, work. Julius's ethos is "mayoeba yaburu" — hesitate and you lose. Match that energy: pick the most useful thing and say it plainly.`;

function currentClaudeContext(){
  return null;
}

function renderChatMsg(m){
  if(m.role === 'user') return `<div class="chat-msg user">${esc(m.content)}</div>`;
  return `<div class="chat-msg asst">${esc(m.content)}</div>`;
}

}

function openAskClaude(){
  const ctx = currentClaudeContext();
  const hasKey = !!(state.settings.anthropicKey || '').trim();
  const msgs = (state.askClaude && state.askClaude.messages) || [];
  const m = $('#modalInner');
  m.innerHTML = `

    <div class="chat-log" id="chatLog">
      ${msgs.length === 0 ? `<div class="muted" style="padding:8px;font-size:13px">Ask about a word, a grammar point, how to say something, or get a quick correction. Replies use hiragana only.</div>` : ''}
      ${msgs.map(renderChatMsg).join('')}
    </div>
    <div class="chat-input-row">
      <textarea class="input" id="askInput" rows="3" placeholder="${hasKey ? (ctx ? 'ask about '+esc(ctx.hint)+'...' : 'ask anything japanese...') : 'add API key in settings first'}" ${hasKey?'':'disabled'} style="resize:none;min-height:72px;font-size:16px"></textarea>
      <button class="btn btn-primary" id="askSendBtn" onclick="sendAskClaude()" ${hasKey?'':'disabled'} style="align-self:stretch;min-width:72px">Send</button>
    </div>
    <div class="chat-status" id="chatStatus"></div>
    <div style="display:flex;gap:8px;margin-top:6px">
      <button class="btn btn-ghost" style="flex:1;font-size:12px" onclick="clearAskClaude()">Clear chat</button>
      ${ctx && hasKey ? `<button class="btn btn-ghost" style="flex:1;font-size:12px" onclick="quickAskContext()">💡 Ask about ${esc(ctx.hint)}</button>` : ''}
    </div>
  `;
  $('#modal').classList.add('open');
  const inp = $('#askInput');
  if(inp && hasKey){
    inp.focus();

    inp.addEventListener('focus', () => {
      setTimeout(() => inp.scrollIntoView({block:'center', behavior:'smooth'}), 300);
    });
  }
  scrollChatToBottom();
