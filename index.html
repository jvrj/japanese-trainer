];

function phraseStatFor(id){
  if(!state.phraseStats) state.phraseStats = {};
  if(!state.phraseStats[id]){
    state.phraseStats[id] = {streak:0, retired:false, retiredAt:null, lastSeen:null, correctCount:0, wrongCount:0, introduced:false, recognized:false, lastBuildupAt:null};
  }
  return state.phraseStats[id];
}

/* v6.6 — never-seen phrases get an introduce screen before they enter test
   rotation. Legacy stats (pre-v6.6) had no `introduced` field and are treated
   as already introduced so existing learners don't get re-prompted. */
function phraseIsIntroduced(item){
  const st = state.phraseStats && state.phraseStats[item.id];
  if(!st) return false;
  if(typeof st.introduced === 'undefined') return true;
  return !!st.introduced;
}
function phraseMarkIntroduced(id){
  const st = phraseStatFor(id);
  st.introduced = true;
  st.lastSeen = now();
  save();
  render();
}
window.phraseMarkIntroduced = phraseMarkIntroduced;

/* v6.19 — build-up mode. Replaces the v6.17 tap-to-reveal recognition for
   chunked phrases: we walk the chunks one-by-one (teach), then drop into the
   regular type-in test (test). Build-up itself records no streak credit;
   it only flips `introduced` and `recognized` so the regular flow takes over.
   Triggers on first sight, plus a stale-poor refresh: 14+ days since lastSeen
   AND streak===0 (last attempt was wrong). A 30-day soft cap on
   `lastBuildupAt` prevents a re-trigger loop on persistently-hard phrases. */
const PHRASE_STALE_DAYS = 14;
const PHRASE_BUILDUP_COOLDOWN_DAYS = 30;
function phraseStalePoor(item){
  const st = state.phraseStats && state.phraseStats[item.id];
  if(!st) return false;
  if(st.retired) return false;
  if(!st.lastSeen) return false;
  const days = (now() - st.lastSeen) / (1000*60*60*24);
  return days > PHRASE_STALE_DAYS && (st.streak || 0) === 0;
}
function phraseRecentBuildup(item){
  const st = state.phraseStats && state.phraseStats[item.id];
  if(!st || !st.lastBuildupAt) return false;
  const days = (now() - st.lastBuildupAt) / (1000*60*60*24);
  return days < PHRASE_BUILDUP_COOLDOWN_DAYS;
}
function phraseNeedsBuildup(item){
  if(!phraseIsIntroduced(item)) return true;
  if(phraseStalePoor(item) && !phraseRecentBuildup(item)) return true;
  return false;
}

/* v6.17 — recognition phase. Only phrases with a `chunks` breakdown go
   through it (the long ones we can't reasonably ask you to type cold).
   First post-introduce exposure is JP→EN tap-to-reveal: see the phrase,
   try to recall its meaning, tap to confirm, then move into EN→JP type-in.
   Short phrases skip recognition entirely (they're already recognition-easy).
   v6.19 — build-up mode now handles long-phrase first-exposure for chunked
   items and supersedes recognition by setting both flags. The recognition
   branch still exists as a safety net for any item that was recognized=false
   in legacy stats. */
function phraseNeedsRecognition(item){
  return Array.isArray(item.chunks) && item.chunks.length > 0;
}
function phraseIsRecognized(item){
  if(!phraseNeedsRecognition(item)) return true;
  const st = state.phraseStats && state.phraseStats[item.id];
  if(!st) return false;
  return !!st.recognized;
}
function phraseMarkRecognized(id){
  const st = phraseStatFor(id);
  st.recognized = true;
  st.lastSeen = now();
  if(state.phraseBlitz) state.phraseBlitz.recognitionRevealed = false;
  save();
  render();
}
window.phraseMarkRecognized = phraseMarkRecognized;
function phraseBlitzRevealMeaning(){
  if(!state.phraseBlitz) return;
  state.phraseBlitz.recognitionRevealed = true;
  render();
}
window.phraseBlitzRevealMeaning = phraseBlitzRevealMeaning;

/* v6.19 — build-up step controllers. Advance walks chunks one by one
   without flipping any stats. Complete sets introduced+recognized+lastBuildupAt
   on the phrase, clears the build-up state, and re-renders so the type-in
   branch takes over for this same item in the same card. */
function phraseBuildupAdvance(){
  if(!state.phraseBlitz || !state.phraseBlitz.buildup) return;
  const bu = state.phraseBlitz.buildup;
  if(bu.stepIdx < bu.totalSteps - 1){
    bu.stepIdx++;
    render();
  }
}
window.phraseBuildupAdvance = phraseBuildupAdvance;
function phraseBuildupComplete(id){
  const st = phraseStatFor(id);
  st.introduced = true;
  st.recognized = true;
  st.lastSeen = now();
  st.lastBuildupAt = now();
  if(state.phraseBlitz){
    state.phraseBlitz.buildup = null;
    state.phraseBlitz.recognitionRevealed = false;
  }
  save();
  render();
  setTimeout(() => $('#phraseBlitzInput')?.focus(), 30);
}
window.phraseBuildupComplete = phraseBuildupComplete;

function phraseDueForMaintenance(id){
  const st = state.phraseStats && state.phraseStats[id];
  if(!st || !st.retired) return false;
  const days = (now() - (st.retiredAt || 0)) / (1000*60*60*24);
  return days >= PHRASE_MAINTENANCE_DAYS;
}

function phraseStruggleWeight(item){
  const st = state.phraseStats && state.phraseStats[item.id];
  if(!st) return 1;
  const cool = 1 - (st.streak || 0) / PHRASE_RETIRE_STREAK;
  return 1 + (st.wrongCount || 0) * cool;
}

function phraseFilteredPool(catFilter){
  if(!catFilter || catFilter === 'all') return PHRASE_POOL;
  return PHRASE_POOL.filter(p => p.cat === catFilter);
}

function buildPhraseBlitzPool(catFilter){
  const base = phraseFilteredPool(catFilter);
  const eligible = base.filter(item => {
    const st = state.phraseStats[item.id];
    if(!st) return true;
    if(!st.retired) return true;
    return phraseDueForMaintenance(item.id);
  });
  if(!eligible.length){
    return weightedShuffle(base.slice(), phraseStruggleWeight).slice(0, PHRASE_SESSION_TARGET);
  }
  const maintenance = [], unseen = [], learning = [];
  for(const item of eligible){
    const st = state.phraseStats[item.id];
    if(!st) unseen.push(item);
    else if(st.retired) maintenance.push(item);
    else learning.push(item);
  }
  const composed = [
    ...shuffleFY(maintenance).slice(0, 3),
    ...shuffleFY(unseen).slice(0, 6),
    ...weightedShuffle(learning, phraseStruggleWeight)
  ].slice(0, PHRASE_SESSION_TARGET);
  /* v6.19 — at most one build-up phrase per session. Drop the rest;
     they'll naturally surface in later sessions. */
  let buildupSeen = 0;
  const capped = composed.filter(it => {
    if(!phraseNeedsBuildup(it)) return true;
    if(buildupSeen >= 1) return false;
    buildupSeen++;
    return true;
  });
  return shuffleFY(capped);
}

function phraseCounts(catFilter){
  const base = phraseFilteredPool(catFilter);
  let retired = 0, learning = 0, unseen = 0;
  for(const item of base){
    const st = state.phraseStats && state.phraseStats[item.id];
    if(!st){ unseen++; continue; }
    if(st.retired) retired++;
    else learning++;
  }
  return {total: base.length, retired, learning, unseen};
}

function startPhraseBlitz(catFilter){
  if(!state.phraseStats) state.phraseStats = {};
  const cat = catFilter || 'all';
  const pool = buildPhraseBlitzPool(cat);
  if(!pool.length){
    showToast('No phrases to drill in this category.', 'success');
    return;
  }
  state.phraseBlitz = {
    active:true, complete:false, cat,
    pool, idx:0, submitted:false, input:'', autoCorrect:null,
    recognitionRevealed:false,
    buildup:null,
    tally:{correct:0, wrong:0, retired:0, total:pool.length}
  };
  nav('phraseBlitz');
}
window.startPhraseBlitz = startPhraseBlitz;

function phraseBlitzCurrent(){
  if(!state.phraseBlitz || !state.phraseBlitz.active) return null;
  return state.phraseBlitz.pool[state.phraseBlitz.idx] || null;
}

function phraseBlitzCheck(input, item){
  if(!input) return false;
  return normJPLoose(input) === normJPLoose(item.jp);
}

function phraseBlitzRecordAnswer(item, correct){
  updateStreak(correct);
  const st = phraseStatFor(item.id);
  st.lastSeen = now();
  if(correct){
    st.streak++;
    st.correctCount++;
    state.phraseBlitz.tally.correct++;
    if(st.streak >= PHRASE_RETIRE_STREAK && !st.retired){
      st.retired = true;
      st.retiredAt = now();
      state.phraseBlitz.tally.retired++;
    } else if(st.retired){
      st.retiredAt = now();
    }
  } else {
    st.streak = 0;
    st.wrongCount++;
    st.retired = false;
    st.retiredAt = null;
    state.phraseBlitz.tally.wrong++;
  }
}

function phraseBlitzSubmit(){
  if(!state.phraseBlitz || state.phraseBlitz.submitted) return;
  const item = phraseBlitzCurrent();
  if(!item) return;
  const inp = $('#phraseBlitzInput');
  state.phraseBlitz.input = inp?.value || '';
  const correct = phraseBlitzCheck(state.phraseBlitz.input, item);
  state.phraseBlitz.autoCorrect = correct;
  state.phraseBlitz.submitted = true;
  phraseBlitzRecordAnswer(item, correct);
  save();
  render();
  setTimeout(() => $('#phraseBlitzContinue')?.focus(), 30);
}
window.phraseBlitzSubmit = phraseBlitzSubmit;

function phraseBlitzReveal(){
  if(!state.phraseBlitz || state.phraseBlitz.submitted) return;
  const item = phraseBlitzCurrent();
  if(!item) return;
  const inp = $('#phraseBlitzInput');
  state.phraseBlitz.input = inp?.value || '';
  state.phraseBlitz.autoCorrect = false;
  state.phraseBlitz.submitted = true;
  phraseBlitzRecordAnswer(item, false);
  save();
  render();
  setTimeout(() => $('#phraseBlitzContinue')?.focus(), 30);
}
window.phraseBlitzReveal = phraseBlitzReveal;

function phraseBlitzSkip(){
  if(!state.phraseBlitz) return;
  state.phraseBlitz.submitted = false;
  state.phraseBlitz.input = '';
  state.phraseBlitz.autoCorrect = null;
  state.phraseBlitz.recognitionRevealed = false;
  state.phraseBlitz.buildup = null;
  state.phraseBlitz.idx++;
  if(state.phraseBlitz.idx >= state.phraseBlitz.pool.length){
    state.phraseBlitz.active = false;
    state.phraseBlitz.complete = true;
  }
  render();
  setTimeout(() => $('#phraseBlitzInput')?.focus(), 30);
}
window.phraseBlitzSkip = phraseBlitzSkip;

function phraseBlitzAdvance(){
  if(!state.phraseBlitz) return;
  state.phraseBlitz.idx++;
  state.phraseBlitz.submitted = false;
  state.phraseBlitz.input = '';
  state.phraseBlitz.autoCorrect = null;
  state.phraseBlitz.recognitionRevealed = false;
  state.phraseBlitz.buildup = null;
  if(state.phraseBlitz.idx >= state.phraseBlitz.pool.length){
    state.phraseBlitz.active = false;
    state.phraseBlitz.complete = true;
  }
  save();
  render();
  setTimeout(() => $('#phraseBlitzInput')?.focus(), 30);
}
window.phraseBlitzAdvance = phraseBlitzAdvance;

function phraseBlitzEnd(){
  state.phraseBlitz = null;
  nav('phrases');
}
window.phraseBlitzEnd = phraseBlitzEnd;

  const counts = phraseCounts();
  const header = `
    <div class="card">
      <div class="muted" style="font-size:13px;line-height:1.5;margin-top:0">
        Practical chunks — what you'd actually say to a friend, in a shop, on the way somewhere. Drill: read the English, type the Japanese.
      </div>
      <div class="stats-row" style="margin-top:12px">
        <div class="stat-box"><div class="stat-num">${counts.retired}</div><div class="stat-label">Mastered</div></div>
        <div class="stat-box"><div class="stat-num">${counts.learning}</div><div class="stat-label">Learning</div></div>
        <div class="stat-box"><div class="stat-num">${counts.unseen}</div><div class="stat-label">Unseen</div></div>
        <div class="stat-box"><div class="stat-num">${counts.total}</div><div class="stat-label">Total</div></div>
      </div>
      <div class="spacer"></div>
      <button class="btn btn-primary" style="width:100%" onclick="startPhraseBlitz('all')">▶ Drill all categories</button>
      <div style="height:6px"></div>

  const cats = PHRASE_CATEGORIES.map(c => {

    const items = PHRASE_POOL.filter(p => p.cat === c.key).map(p => {
      const st = state.phraseStats && state.phraseStats[p.id];
      const dot = st && st.retired ? '✓' : st ? '·' : '○';
      return `<div style="padding:6px 0;border-bottom:1px solid var(--border)">
        <div style="font-size:14px"><b>${esc(p.jp)}</b> <span class="muted" style="font-size:12px">${dot}</span></div>
        <div class="muted" style="font-size:13px">${esc(p.en)}</div>
      </div>`;
    }).join('');
    return `
      <div class="card" style="padding:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px">
          <h3 style="margin:0">${esc(c.label)}</h3>
          <span class="muted" style="font-size:12px">${cc.retired} / ${cc.total} mastered</span>
        </div>
        <button class="btn btn-primary" style="width:100%;font-size:14px;padding:10px" onclick="startPhraseBlitz('${c.key}')">Drill ${esc(c.label.toLowerCase())}</button>
        <div style="height:4px"></div>
        <button class="btn btn-blue" style="width:100%;font-size:13px;padding:8px" onclick="startBuildModePhraseSpam('${c.key}')">🎲 Spam ${esc(c.label.toLowerCase())} in Build Mode</button>
        <div class="collapsible" id="phr_${c.key}" style="margin-top:8px">
          <div class="collapsible-head" onclick="document.getElementById('phr_${c.key}').classList.toggle('open')">
            <span class="muted" style="font-size:13px">Browse phrases</span>
            <span class="collapsible-arrow">›</span>
          </div>
          <div class="collapsible-body" style="padding-top:6px">${items}</div>
        </div>

  }).join('');

  return header + cats;

function renderPhraseBlitz(){
  const pb = state.phraseBlitz;
  if(!pb){
    return `<div class="card"><div class="muted">No active phrase drill.</div>
      <button class="btn btn-primary" style="margin-top:12px" onclick="nav('phrases')">Back to phrases</button></div>`;
  }
  if(pb.complete){
    const t = pb.tally;
    const attempts = t.correct + t.wrong;
    const pct = attempts ? Math.round(100*t.correct/attempts) : 0;
    const counts = phraseCounts(pb.cat);
    const scope = pb.cat === 'all' ? 'All categories' : (PHRASE_CATEGORIES.find(c=>c.key===pb.cat)?.label || pb.cat);
    return `<div class="card">
      <h2 style="margin-top:0">Phrase drill complete</h2>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num">${attempts}</div><div class="stat-label">Seen</div></div>
        <div class="stat-box"><div class="stat-num">${pct}%</div><div class="stat-label">Accuracy</div></div>
        <div class="stat-box"><div class="stat-num">${t.retired}</div><div class="stat-label">Retired</div></div>
        <div class="stat-box"><div class="stat-num">${t.wrong}</div><div class="stat-label">Wrong</div></div>
      </div>
      <div class="muted" style="text-align:center;margin-top:10px;font-size:13px">
        ${esc(scope)}: <b>${counts.retired}</b> / ${counts.total} mastered · ${counts.learning} learning · ${counts.unseen} unseen
      </div>
      <div class="spacer"></div>
      <button class="btn btn-primary" style="width:100%" onclick="startPhraseBlitz('${pb.cat}')">Drill again</button>
      <div class="spacer"></div>
      <button class="btn btn-secondary" style="width:100%" onclick="phraseBlitzEnd()">Back to phrases</button>
    </div>`;
  }
  const item = phraseBlitzCurrent();
  if(!item) return `<div class="card"><div class="muted">No phrases.</div></div>`;
  const st = state.phraseStats[item.id];
  const streak = st?.streak || 0;
  const retired = st?.retired || false;
  const total = pb.pool.length;
  const pos = pb.idx + 1;

  const head = `<div class="card" style="padding:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <span class="muted" style="font-size:13px">Phrase ${pos} / ${total}</span>
      <span class="muted" style="font-size:12px">${esc(item.cat)}${retired ? ' · maintenance' : ''}</span>
    </div>
  </div>`;

  /* v6.17 — chunk breakdown for long phrases. Renders a small piece→meaning
     table so you see the moving parts before being asked to produce them. */
  /* v6.18 — chunks may be [jp, en] or [jp, en, root]. The optional 3rd
     element exposes the dictionary form / conjugation path so a learner
     who heard `ねむれませんでした` can recognize the underlying ねむる. */
  const chunksHtml = Array.isArray(item.chunks) && item.chunks.length
    ? `<div style="margin-top:10px;padding:8px 10px;border-top:1px solid var(--border);font-size:13px;line-height:1.6">
        ${item.chunks.map(c => `<div style="margin-bottom:4px">
          <div style="display:flex;gap:10px;align-items:baseline">
            <span class="jp" style="flex:0 0 auto;font-weight:600">${esc(c[0])}</span>
            <span class="muted" style="flex:1;text-align:right">${esc(c[1])}</span>
          </div>
          ${c[2] ? `<div class="muted" style="font-size:11px;font-style:italic;opacity:0.75;padding-left:6px;margin-top:2px">↳ ${esc(c[2])}</div>` : ''}
        </div>`).join('')}
      </div>`
    : '';

  /* v6.19 — build-up: walk chunks one by one, then drop into the type-in test.
     Replaces both the v6.6 introduce card and the v6.17 recognition phase
     for chunked phrases. Triggers on first sight or stale-poor refresh.
     For non-chunk phrases (rare: stale-poor on a short phrase), we collapse
     to a single intro card and complete in one tap. */
  if(!pb.submitted && phraseNeedsBuildup(item)){
    if(!pb.buildup || pb.buildup.itemId !== item.id){
      const totalSteps = (Array.isArray(item.chunks) && item.chunks.length) ? item.chunks.length : 1;
      pb.buildup = {itemId: item.id, stepIdx: 0, totalSteps};
    }
    const bu = pb.buildup;
    const romaji = kanaToRomaji(item.jp);
    if(pb._lastBuildupAutoplay !== item.id){
      pb._lastBuildupAutoplay = item.id;
      setTimeout(() => { try{ speakJP(item.jp); }catch(e){} }, 300);
    }
    const isReturning = phraseIsIntroduced(item);
    const headerLabel = isReturning ? 'Refresh — let\'s rebuild it' : 'New phrase — build-up';
    const lastStep = bu.stepIdx >= bu.totalSteps - 1;
    const hasChunks = Array.isArray(item.chunks) && item.chunks.length > 0;
    const chunksRevealHtml = hasChunks
      ? `<div style="margin-top:10px;padding:8px 10px;border-top:1px solid var(--border);font-size:13px;line-height:1.6">
          ${item.chunks.map((c, i) => {
            const dim = i > bu.stepIdx ? 'opacity:0.25;' : '';
            const highlight = i === bu.stepIdx ? 'background:var(--accent-dim,rgba(255,180,80,0.12));border-radius:6px;padding:4px 6px;' : '';
            return `<div style="margin-bottom:4px;${dim}${highlight}">
              <div style="display:flex;gap:10px;align-items:baseline">
                <span class="jp" style="flex:0 0 auto;font-weight:600">${esc(c[0])}</span>
                <span class="muted" style="flex:1;text-align:right">${i <= bu.stepIdx ? esc(c[1]) : '…'}</span>
              </div>
              ${(i <= bu.stepIdx && c[2]) ? `<div class="muted" style="font-size:11px;font-style:italic;opacity:0.75;padding-left:6px;margin-top:2px">↳ ${esc(c[2])}</div>` : ''}
            </div>`;
          }).join('')}
        </div>`
      : '';
    const cta = lastStep
      ? `<button class="btn btn-primary" style="width:100%" onclick="phraseBuildupComplete('${jsEsc(item.id)}')">Got it — drill me</button>`
      : `<button class="btn btn-primary" style="width:100%" onclick="phraseBuildupAdvance()">Next →</button>`;
    const stepLine = hasChunks
      ? `<div class="muted" style="text-align:center;font-size:11px;margin-top:8px">Chunk ${bu.stepIdx+1} / ${bu.totalSteps}</div>`
      : '';
    return head + `<div class="card">
      <div class="muted" style="text-align:center;font-size:12px;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">${esc(headerLabel)}</div>
      <div style="font-size:20px;text-align:center;color:var(--text);margin-bottom:14px;line-height:1.4">${esc(item.en)}</div>
      <div class="jp" style="font-size:28px;text-align:center;font-weight:700;line-height:1.4;padding:6px 8px">${esc(item.jp)}</div>
      <div class="muted" style="text-align:center;font-size:14px;font-style:italic;margin-top:4px;letter-spacing:0.02em">${esc(romaji)}</div>
      ${chunksRevealHtml}
      <div class="spacer"></div>
      <div class="audio-row">
        <button class="audio-btn" onclick="speakJP('${jsEsc(item.jp)}')">🔊 Listen again</button>
      </div>
      <div class="spacer"></div>
      ${cta}
      ${stepLine}
      <div class="spacer"></div>
      <button class="btn btn-secondary" style="width:100%;font-size:12px" onclick="phraseBlitzSkip()">Skip this phrase</button>
    </div>`;
  }

  /* v6.6 — introduce phase: never-seen phrases get one exposure before test rotation.
     v6.17 — long phrases also surface their `chunks` breakdown here.
     v6.19 — chunked phrases now use build-up above; this branch only fires
     for short phrases (no chunks) on first sight. */
  if(!pb.submitted && !phraseIsIntroduced(item)){
    const romaji = kanaToRomaji(item.jp);
    /* autoplay JP once when the introduce card first mounts for this item */
    if(pb._lastIntroAutoplay !== item.id){
      pb._lastIntroAutoplay = item.id;
      setTimeout(() => { try{ speakJP(item.jp); }catch(e){} }, 300);
    }
    return head + `<div class="card">
      <div class="muted" style="text-align:center;font-size:12px;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">New phrase</div>
      <div style="font-size:20px;text-align:center;color:var(--text);margin-bottom:14px;line-height:1.4">${esc(item.en)}</div>
      <div class="jp" style="font-size:28px;text-align:center;font-weight:700;line-height:1.4;padding:6px 8px">${esc(item.jp)}</div>
      <div class="muted" style="text-align:center;font-size:14px;font-style:italic;margin-top:4px;letter-spacing:0.02em">${esc(romaji)}</div>
      ${chunksHtml}
      <div class="spacer"></div>
      <div class="audio-row">
        <button class="audio-btn" onclick="speakJP('${jsEsc(item.jp)}')">🔊 Listen again</button>
      </div>
      <div class="spacer"></div>
      <div class="muted" style="font-size:12px;text-align:center;margin-bottom:10px">Read it, hear it, say it aloud. Tap when ready to drill.</div>
      <button class="btn btn-primary" style="width:100%" onclick="phraseMarkIntroduced('${jsEsc(item.id)}')">Got it — drill me</button>
      <div class="spacer"></div>
      <button class="btn btn-secondary" style="width:100%;font-size:12px" onclick="phraseBlitzSkip()">Skip this phrase</button>
    </div>`;
  }

  /* v6.17 — recognition phase: JP shown, tap to reveal the English meaning,
     then advance into the EN→JP type-in drill. Only fires on first encounter
     of long phrases (those with `chunks`). Cools the difficulty curve so
     you're not asked to produce a 9-segment sentence cold. */
  if(!pb.submitted && !phraseIsRecognized(item)){
    const romaji = kanaToRomaji(item.jp);
    const revealed = !!pb.recognitionRevealed;
    if(pb._lastRecogAutoplay !== item.id){
      pb._lastRecogAutoplay = item.id;
      setTimeout(() => { try{ speakJP(item.jp); }catch(e){} }, 300);
    }
    return head + `<div class="card">
      <div class="muted" style="text-align:center;font-size:12px;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Do you remember?</div>
      <div class="jp" style="font-size:28px;text-align:center;font-weight:700;line-height:1.4;padding:10px 8px">${esc(item.jp)}</div>
      <div class="muted" style="text-align:center;font-size:14px;font-style:italic;margin-top:4px;letter-spacing:0.02em">${esc(romaji)}</div>
      <div class="spacer"></div>
      <div class="audio-row">
        <button class="audio-btn" onclick="speakJP('${jsEsc(item.jp)}')">🔊 Listen</button>
      </div>
      <div class="spacer"></div>
      ${revealed
        ? `<div style="font-size:20px;text-align:center;color:var(--text);line-height:1.4;padding:8px 6px">${esc(item.en)}</div>${chunksHtml}<div class="spacer"></div><button class="btn btn-primary" style="width:100%" onclick="phraseMarkRecognized('${jsEsc(item.id)}')">I've got it — drill me</button>`
        : `<div class="muted" style="font-size:12px;text-align:center;margin-bottom:10px">Try to recall the meaning. Tap to check.</div><button class="btn btn-primary" style="width:100%" onclick="phraseBlitzRevealMeaning()">Show meaning</button>`}
      <div class="spacer"></div>
      <button class="btn btn-secondary" style="width:100%;font-size:12px" onclick="phraseBlitzSkip()">Skip this phrase</button>
    </div>`;
  }

  if(!pb.submitted){
    return head + `<div class="card">
      <div style="font-size:22px;text-align:center;font-weight:600;line-height:1.4;padding:20px 8px;color:var(--text)">${esc(item.en)}</div>
      <input id="phraseBlitzInput" class="input" type="text" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="type the phrase in kana / romaji" onkeydown="if(event.key==='Enter'){event.preventDefault();phraseBlitzSubmit();}">
      <div class="spacer"></div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="phraseBlitzReveal()">Reveal</button>
        <button class="btn btn-primary" onclick="phraseBlitzSubmit()">Submit</button>
      </div>
      <div class="spacer"></div>
      <button class="btn btn-secondary" style="width:100%;font-size:12px" onclick="phraseBlitzSkip()">Skip phrase</button>
      <div class="muted" style="font-size:11px;text-align:center;margin-top:8px">Streak: ${streak} / ${PHRASE_RETIRE_STREAK}</div>
    </div>`;
  }

  const correct = pb.autoCorrect;
  return head + `<div class="card" style="border:2px solid var(--${correct ? 'green' : 'red'})">
    <div style="font-size:18px;text-align:center;color:var(--text);margin-bottom:6px">${esc(item.en)}</div>
    <div class="jp" style="font-size:26px;text-align:center;font-weight:700;line-height:1.4;padding:8px">${esc(item.jp)}</div>
    <div style="text-align:center;font-size:18px;color:var(--${correct?'green':'red'});font-weight:700;margin-bottom:8px">
      ${correct ? '✓ correct' : '✗ wrong'}
    </div>
    ${!correct && pb.input ? `<div class="feedback-smart" style="margin-top:10px">You wrote: <b>${esc(pb.input)}</b></div>` : ''}
    <div class="spacer"></div>
    <div class="audio-row">
      <button class="audio-btn" onclick="speakJP('${jsEsc(item.jp)}')">🔊 Listen</button>
    </div>
    <div class="spacer"></div>
    <button id="phraseBlitzContinue" class="btn btn-primary" style="width:100%" onclick="phraseBlitzAdvance()">Continue</button>
  </div>`;
}

/* =========================================================================
   VARIATIONS — one English intent, multiple Japanese ways to say it.
   Real life isn't 1:1; you say the same thing casually, politely, with a
   softener, in past tense, with a different particle. This mode exposes
   3-4 variants per intent. User types ANY of them; whichever they typed
   gets streak credit toward retirement. After answering, the OTHER
   variants are revealed with register notes — that's how new variants
   surface naturally. Retire per-variant; drill ranks as "fully mastered"
   only when every variant retires.
   ========================================================================= */
const VARIATION_POOL = [
  {id:'v_late', en:"I'm running late",
   variants:[
     {jp:'ちょっと おくれます', register:'polite', note:"plain polite — 'I'll be a bit late'"},
     {jp:'すみません、おくれます', register:'polite', note:"with apology prefix"},
     {jp:'いま いきます', register:'polite', note:"'I'm on my way' (en route)"},
     {jp:'もうすぐ つきます', register:'polite', note:"'I'm almost there' (close)"}
   ]},
  {id:'v_toilet', en:"Where's the bathroom?",
   variants:[
     {jp:'トイレは どこですか', register:'polite', note:"the standard polite ask"},
     {jp:'トイレは どこ', register:'casual', note:"casual — friends, family"},
     {jp:'すみません、トイレは どこですか', register:'polite', note:"with apology prefix — strangers"},

const VARIATION_RETIRE_STREAK = 3;
const VARIATION_SESSION_TARGET = 10;

function variationStatFor(drillId, variantIdx){
  if(!state.variationStats) state.variationStats = {};
  if(!state.variationStats[drillId]) state.variationStats[drillId] = {};
  if(!state.variationStats[drillId][variantIdx]){
    state.variationStats[drillId][variantIdx] = {streak:0, retired:false, retiredAt:null, correctCount:0, wrongCount:0, lastSeen:null};
  }
  return state.variationStats[drillId][variantIdx];
}
function variationStatPeek(drillId, variantIdx){
  return state.variationStats?.[drillId]?.[variantIdx] || null;
}
function variationDrillIsIntroduced(drillId){
  /* A drill is "introduced" once any variant has been seen. */
  const m = state.variationStats?.[drillId];
  if(!m) return false;
  for(const k in m){
    if(typeof m[k].lastSeen !== 'undefined' && m[k].lastSeen) return true;
    if(m[k].correctCount || m[k].wrongCount) return true;
  }
  return false;
}
function variationMarkIntroduced(drillId){
  /* Touch the first variant's stat with a timestamp so the introduce screen
     doesn't show again. Doesn't grant any streak — user still has to type. */
  const st = variationStatFor(drillId, 0);
  st.lastSeen = now();
  save();
  render();
}
window.variationMarkIntroduced = variationMarkIntroduced;

function variationDrillFullyRetired(drillId){
  const drill = VARIATION_POOL.find(d => d.id === drillId);
  if(!drill) return false;
  for(let i = 0; i < drill.variants.length; i++){
    const st = variationStatPeek(drillId, i);
    if(!st || !st.retired) return false;
  }
  return true;
}

function buildVariationPool(){
  const eligible = VARIATION_POOL.filter(d => !variationDrillFullyRetired(d.id));
  if(!eligible.length) return shuffleFY(VARIATION_POOL.slice()).slice(0, VARIATION_SESSION_TARGET);
  return shuffleFY(eligible).slice(0, VARIATION_SESSION_TARGET);
}

function variationCounts(){
  let totalVariants = 0, retiredVariants = 0, drillsDone = 0;
  for(const d of VARIATION_POOL){
    let allRet = true;
    for(let i = 0; i < d.variants.length; i++){
      totalVariants++;
      const st = variationStatPeek(d.id, i);
      if(st?.retired) retiredVariants++; else allRet = false;
    }
    if(allRet) drillsDone++;
  }
  return {totalDrills: VARIATION_POOL.length, drillsDone, totalVariants, retiredVariants};
}

/* Match the user's loose input against ANY variant in the drill. Returns
   the matched variant index, or -1 if no match. */
function variationCheck(input, drill){
  if(!input) return -1;
  const norm = normJPLoose(input);
  for(let i = 0; i < drill.variants.length; i++){
    if(normJPLoose(drill.variants[i].jp) === norm) return i;
  }
  return -1;
}

function startVariationBlitz(){
  if(!state.variationStats) state.variationStats = {};
  const pool = buildVariationPool();
  if(!pool.length){
    showToast('No variations to drill.', 'success');
    return;
  }
  state.variationBlitz = {
    active:true, complete:false,
    pool, idx:0, submitted:false, input:'', matchedIdx:-1,
    tally:{correct:0, wrong:0, retired:0, total:pool.length}
  };
  nav('variationBlitz');
}
window.startVariationBlitz = startVariationBlitz;

function variationBlitzCurrent(){
  if(!state.variationBlitz || !state.variationBlitz.active) return null;
  return state.variationBlitz.pool[state.variationBlitz.idx] || null;
}

function variationBlitzSubmit(){
  if(!state.variationBlitz || state.variationBlitz.submitted) return;
  const drill = variationBlitzCurrent();
  if(!drill) return;
  const inp = $('#variationBlitzInput');
  state.variationBlitz.input = inp?.value || '';
  const matchedIdx = variationCheck(state.variationBlitz.input, drill);
  state.variationBlitz.matchedIdx = matchedIdx;
  state.variationBlitz.submitted = true;
  const correct = matchedIdx >= 0;
  updateStreak(correct);
  if(correct){
    const st = variationStatFor(drill.id, matchedIdx);
    st.lastSeen = now();
    st.streak++;
    st.correctCount++;
    if(st.streak >= VARIATION_RETIRE_STREAK && !st.retired){
      st.retired = true;
      st.retiredAt = now();
      state.variationBlitz.tally.retired++;
    }
    state.variationBlitz.tally.correct++;
  } else {
    /* Wrong — touch the drill's first variant stat so the introduce screen
       won't fire again, and bump wrongCount on variant 0 as a proxy. */
    const st = variationStatFor(drill.id, 0);
    st.lastSeen = now();
    st.wrongCount++;
    st.streak = 0;
    state.variationBlitz.tally.wrong++;
  }
  save();
  render();
  setTimeout(() => $('#variationBlitzContinue')?.focus(), 30);
}
window.variationBlitzSubmit = variationBlitzSubmit;

function variationBlitzReveal(){
  if(!state.variationBlitz || state.variationBlitz.submitted) return;
  const drill = variationBlitzCurrent();
  if(!drill) return;
  const inp = $('#variationBlitzInput');
  state.variationBlitz.input = inp?.value || '';
  state.variationBlitz.matchedIdx = -1;
  state.variationBlitz.submitted = true;
  const st = variationStatFor(drill.id, 0);
  st.lastSeen = now();
  st.wrongCount++;
  state.variationBlitz.tally.wrong++;
  save();
  render();
  setTimeout(() => $('#variationBlitzContinue')?.focus(), 30);
}
window.variationBlitzReveal = variationBlitzReveal;

function variationBlitzSkip(){
  if(!state.variationBlitz) return;
  state.variationBlitz.submitted = false;
  state.variationBlitz.input = '';
  state.variationBlitz.matchedIdx = -1;
  state.variationBlitz.idx++;
  if(state.variationBlitz.idx >= state.variationBlitz.pool.length){
    state.variationBlitz.active = false;
    state.variationBlitz.complete = true;
  }
  render();
  setTimeout(() => $('#variationBlitzInput')?.focus(), 30);
}
window.variationBlitzSkip = variationBlitzSkip;

function variationBlitzAdvance(){
  if(!state.variationBlitz) return;
  state.variationBlitz.idx++;
  state.variationBlitz.submitted = false;
  state.variationBlitz.input = '';
  state.variationBlitz.matchedIdx = -1;
  if(state.variationBlitz.idx >= state.variationBlitz.pool.length){
    state.variationBlitz.active = false;
    state.variationBlitz.complete = true;
  }
  save();
  render();
  setTimeout(() => $('#variationBlitzInput')?.focus(), 30);
}
window.variationBlitzAdvance = variationBlitzAdvance;

function variationBlitzEnd(){
  state.variationBlitz = null;
  nav('variations');
}
window.variationBlitzEnd = variationBlitzEnd;

function renderVariations(){
  const counts = variationCounts();
  const items = VARIATION_POOL.map(d => {
    const dr = state.variationStats?.[d.id];
    let retCount = 0;
    for(let i = 0; i < d.variants.length; i++){
      if(dr?.[i]?.retired) retCount++;
    }
    const fully = retCount === d.variants.length;
    const dot = fully ? '✓' : (retCount ? `${retCount}/${d.variants.length}` : '○');
    return `<div style="padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;gap:8px;align-items:baseline">
        <div style="font-size:14px;font-weight:600;color:var(--text)">${esc(d.en)}</div>
        <span class="muted" style="font-size:11px;white-space:nowrap">${dot}</span>
      </div>
      <div class="muted" style="font-size:12px;margin-top:2px">${d.variants.map(v => esc(v.jp)).join(' · ')}</div>
    </div>`;
  }).join('');

  return `
    <div class="card">
      <div class="muted" style="font-size:13px;line-height:1.5;margin-top:0">
        One thing in English, several ways in Japanese — casual, polite, softened, past, alternate phrasing. Type any one variant; the others reveal afterward so you absorb new ways naturally.
      </div>
      <div class="stats-row" style="margin-top:12px">
        <div class="stat-box"><div class="stat-num">${counts.drillsDone}</div><div class="stat-label">Mastered</div></div>
        <div class="stat-box"><div class="stat-num">${counts.retiredVariants}</div><div class="stat-label">Variants done</div></div>
        <div class="stat-box"><div class="stat-num">${counts.totalVariants}</div><div class="stat-label">Total variants</div></div>
        <div class="stat-box"><div class="stat-num">${counts.totalDrills}</div><div class="stat-label">Intents</div></div>
      </div>
      <div class="spacer"></div>
      <button class="btn btn-primary" style="width:100%" onclick="startVariationBlitz()">▶ Drill variations</button>
      <div style="height:6px"></div>
      <button class="btn btn-blue" style="width:100%" onclick="startBuildModeVariationSpam()">🎲 Spam in Build Mode (audio, out loud)</button>
    </div>
    <div class="card">
      <h3 style="margin-top:0">Browse all intents</h3>
      ${items}
    </div>
  `;
}

function renderVariationBlitz(){
  const vb = state.variationBlitz;
  if(!vb){
    return `<div class="card"><div class="muted">No active variation drill.</div>
      <button class="btn btn-primary" style="margin-top:12px" onclick="nav('variations')">Back to variations</button></div>`;
  }
  if(vb.complete){
    const t = vb.tally;
    const attempts = t.correct + t.wrong;
    const pct = attempts ? Math.round(100*t.correct/attempts) : 0;
    const counts = variationCounts();
    return `<div class="card">
      <h2 style="margin-top:0">Variation drill complete</h2>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num">${attempts}</div><div class="stat-label">Seen</div></div>
        <div class="stat-box"><div class="stat-num">${pct}%</div><div class="stat-label">Accuracy</div></div>
        <div class="stat-box"><div class="stat-num">${t.retired}</div><div class="stat-label">Retired</div></div>
        <div class="stat-box"><div class="stat-num">${t.wrong}</div><div class="stat-label">Wrong</div></div>
      </div>
      <div class="muted" style="text-align:center;margin-top:10px;font-size:13px">
        <b>${counts.drillsDone}</b> / ${counts.totalDrills} intents fully mastered · ${counts.retiredVariants} / ${counts.totalVariants} variants retired
      </div>
      <div class="spacer"></div>
      <button class="btn btn-primary" style="width:100%" onclick="startVariationBlitz()">Drill again</button>
      <div class="spacer"></div>
      <button class="btn btn-secondary" style="width:100%" onclick="variationBlitzEnd()">Back to variations</button>
    </div>`;
  }

  const drill = variationBlitzCurrent();
  if(!drill) return `<div class="card"><div class="muted">No drill.</div></div>`;
  const total = vb.pool.length;
  const pos = vb.idx + 1;

  /* Per-variant retired count for header context */
  let retCount = 0;
  for(let i = 0; i < drill.variants.length; i++){
    if(state.variationStats?.[drill.id]?.[i]?.retired) retCount++;
  }

  const head = `<div class="card" style="padding:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <span class="muted" style="font-size:13px">Intent ${pos} / ${total}</span>
      <span class="muted" style="font-size:12px">${retCount} / ${drill.variants.length} variants retired</span>
    </div>
  </div>`;

  /* Introduce phase: never-seen drill gets all variants exposed first. */
  if(!vb.submitted && !variationDrillIsIntroduced(drill.id)){
    if(vb._lastIntroAutoplay !== drill.id){
      vb._lastIntroAutoplay = drill.id;
      setTimeout(() => { try{ speakJP(drill.variants[0].jp); }catch(e){} }, 300);
    }
    return head + `<div class="card">
      <div class="muted" style="text-align:center;font-size:12px;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">New intent</div>
      <div style="font-size:20px;text-align:center;color:var(--text);margin-bottom:14px;line-height:1.4">${esc(drill.en)}</div>
      <div class="muted" style="font-size:12px;text-align:center;margin-bottom:8px">${drill.variants.length} ways to say this</div>
      ${drill.variants.map(v => `
        <div style="border-left:3px solid var(--accent);padding:8px 12px;margin:8px 0;background:rgba(255,255,255,0.02);border-radius:4px">
          <div class="jp" style="font-size:18px;font-weight:600">${esc(v.jp)}</div>
          <div class="muted" style="font-size:12px;font-style:italic">${esc(kanaToRomaji(v.jp))}</div>
          <div class="muted" style="font-size:12px;margin-top:4px"><b>${esc(v.register)}</b> — ${esc(v.note)}</div>
          <div style="margin-top:6px"><button class="audio-btn" style="font-size:11px;padding:3px 10px" onclick="speakJP('${jsEsc(v.jp)}')">🔊</button></div>
        </div>
      `).join('')}
      <div class="spacer"></div>
      <div class="muted" style="font-size:12px;text-align:center;margin-bottom:10px">Read each, hear each, then drill — type any one variant. The others surface as you go.</div>
      <button class="btn btn-primary" style="width:100%" onclick="variationMarkIntroduced('${jsEsc(drill.id)}')">Got it — drill me</button>
      <div class="spacer"></div>
      <button class="btn btn-secondary" style="width:100%;font-size:12px" onclick="variationBlitzSkip()">Skip this intent</button>
    </div>`;
  }

  if(!vb.submitted){
    return head + `<div class="card">
      <div style="font-size:22px;text-align:center;font-weight:600;line-height:1.4;padding:20px 8px;color:var(--text)">${esc(drill.en)}</div>
      <div class="muted" style="text-align:center;font-size:12px;margin-bottom:8px">type any one Japanese variant</div>
      <input id="variationBlitzInput" class="input" type="text" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="kana or romaji" onkeydown="if(event.key==='Enter'){event.preventDefault();variationBlitzSubmit();}">
      <div class="spacer"></div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="variationBlitzReveal()">Reveal</button>
        <button class="btn btn-primary" onclick="variationBlitzSubmit()">Submit</button>
      </div>
      <div class="spacer"></div>
      <button class="btn btn-secondary" style="width:100%;font-size:12px" onclick="variationBlitzSkip()">Skip this intent</button>
    </div>`;
  }

  /* Feedback: show user's input result + reveal all variants with notes. */
  const matched = vb.matchedIdx;
  const correct = matched >= 0;
  return head + `<div class="card" style="border:2px solid var(--${correct ? 'green' : 'red'})">
    <div style="font-size:18px;text-align:center;color:var(--text);margin-bottom:6px">${esc(drill.en)}</div>
    <div style="text-align:center;font-size:18px;color:var(--${correct?'green':'red'});font-weight:700;margin-bottom:8px">
      ${correct ? `✓ matched variant ${matched+1}` : '✗ no match'}
    </div>
    ${vb.input ? `<div class="feedback-smart" style="margin-top:6px">You wrote: <b>${esc(vb.input)}</b></div>` : ''}
    <div class="spacer"></div>
    <div class="muted" style="font-size:12px;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">All ways to say it</div>
    ${drill.variants.map((v, i) => {
      const st = variationStatPeek(drill.id, i);
      const isMatched = i === matched;
      const isRetired = st?.retired;
      const streak = st?.streak || 0;
      return `<div style="border-left:3px solid ${isMatched ? 'var(--green)' : (isRetired ? 'var(--accent)' : 'var(--border)')};padding:8px 12px;margin:6px 0;background:rgba(255,255,255,0.02);border-radius:4px">
        <div class="jp" style="font-size:17px;font-weight:600">${esc(v.jp)} ${isMatched ? '<span style="color:var(--green);font-size:12px">← you wrote this</span>' : ''}${isRetired ? '<span style="color:var(--accent);font-size:11px"> · retired</span>' : ''}</div>
        <div class="muted" style="font-size:12px;font-style:italic">${esc(kanaToRomaji(v.jp))}</div>
        <div class="muted" style="font-size:12px;margin-top:4px"><b>${esc(v.register)}</b> — ${esc(v.note)} <span style="opacity:0.7">· streak ${streak}/${VARIATION_RETIRE_STREAK}</span></div>
        <div style="margin-top:6px"><button class="audio-btn" style="font-size:11px;padding:3px 10px" onclick="speakJP('${jsEsc(v.jp)}')">🔊</button></div>
      </div>`;
    }).join('')}
    <div class="spacer"></div>
    <button id="variationBlitzContinue" class="btn btn-primary" style="width:100%" onclick="variationBlitzAdvance()">Continue</button>
  </div>`;
}

const SIMILAR_RETIRE_STREAK = 3;
const SIMILAR_SESSION_TARGET = 12;
const SIMILAR_MAINTENANCE_DAYS = 7;

function similarSetById(id){ return SIMILAR_SETS.find(s => s.id === id) || null; }

function similarStatFor(setId, itemIdx){
  if(!state.similarStats) state.similarStats = {};
  if(!state.similarStats[setId]) state.similarStats[setId] = {};
  if(!state.similarStats[setId][itemIdx]){
    state.similarStats[setId][itemIdx] = {streak:0, retired:false, retiredAt:null, lastSeen:null, correctCount:0, wrongCount:0};
  }
  return state.similarStats[setId][itemIdx];
}

function similarStatPeek(setId, itemIdx){
  return state.similarStats?.[setId]?.[itemIdx] || null;
}

function similarItemDueForMaintenance(setId, itemIdx){
  const st = similarStatPeek(setId, itemIdx);
  if(!st || !st.retired) return false;
  const days = (now() - (st.retiredAt || 0)) / (1000*60*60*24);
  return days >= SIMILAR_MAINTENANCE_DAYS;
}

function similarCounts(){
  let totalItems = 0, retired = 0, learning = 0, unseen = 0, setsDone = 0;
  for(const set of SIMILAR_SETS){
    let setRet = 0;
    for(let i = 0; i < set.items.length; i++){
      totalItems++;
      const st = similarStatPeek(set.id, i);
      if(!st){ unseen++; continue; }
      if(st.retired){ retired++; setRet++; }
      else learning++;
    }
    if(setRet === set.items.length) setsDone++;
  }
  return {totalSets: SIMILAR_SETS.length, setsDone, totalItems, retired, learning, unseen};
}

function buildSimilarPool(){
  /* Build a session pool of (setId, itemIdx) targets. Prioritise unseen +
     learning + maintenance-due. Within that, weight struggling items more
     heavily so wrong-answers resurface. */
  const candidates = [];
  for(const set of SIMILAR_SETS){
    for(let i = 0; i < set.items.length; i++){
      const st = similarStatPeek(set.id, i);
      if(!st){ candidates.push({setId:set.id, itemIdx:i, weight:2.0}); continue; }
      if(st.retired){
        if(similarItemDueForMaintenance(set.id, i)){
          candidates.push({setId:set.id, itemIdx:i, weight:1.0});
        }
        continue;
      }
      const w = 1 + (st.wrongCount || 0) * 0.5;
      candidates.push({setId:set.id, itemIdx:i, weight:w});
    }
  }
  if(!candidates.length){
    /* Everything retired and not yet due — let the user practise anyway. */
    for(const set of SIMILAR_SETS){
      for(let i = 0; i < set.items.length; i++){
        candidates.push({setId:set.id, itemIdx:i, weight:1.0});
      }
    }
  }
  /* Weighted shuffle: expand by weight, shuffle, dedup, take target.
     shuffleFY returns a new array (non-mutating), so capture the result. */
  const expanded = [];
  for(const c of candidates){
    const reps = Math.max(1, Math.round(c.weight * 2));
    for(let r = 0; r < reps; r++) expanded.push(c);
  }
  const shuffled = shuffleFY(expanded);
  const seen = new Set();
  const out = [];
  for(const c of shuffled){
    const key = c.setId + '|' + c.itemIdx;
    if(seen.has(key)) continue;
    seen.add(key);
    out.push(c);
    if(out.length >= SIMILAR_SESSION_TARGET) break;
  }
  return out;
}

function startSimilar(){
  if(!state.similarStats) state.similarStats = {};
  const pool = buildSimilarPool();
  if(!pool.length){
    showToast('Nothing to drill — no similar sets defined.', {tone:'warn'});
    return;
  }
  state.similar = {
    active:true, complete:false,
    pool,
    idx:0,
    submitted:false,
    chosenIdx:null,
    correct:null,
    tally:{correct:0, wrong:0, retired:0, total:pool.length}
  };
  clearNextTimer();
  nav('similar');
}
window.startSimilar = startSimilar;

function similarCurrent(){
  const s = state.similar;
  if(!s || !s.active) return null;
  return s.pool[s.idx] || null;
}

function similarSubmit(chosenIdx){
  const s = state.similar;
  if(!s || s.submitted) return;
  const cur = similarCurrent();
  if(!cur) return;
  const correct = chosenIdx === cur.itemIdx;
  s.chosenIdx = chosenIdx;
  s.correct = correct;
  s.submitted = true;
  const st = similarStatFor(cur.setId, cur.itemIdx);
  st.lastSeen = now();
  if(correct){
    st.correctCount = (st.correctCount || 0) + 1;
    st.streak = (st.streak || 0) + 1;
    s.tally.correct++;
    if(!st.retired && st.streak >= SIMILAR_RETIRE_STREAK){
      st.retired = true;
      st.retiredAt = now();
      s.tally.retired++;
    }
  } else {
    st.wrongCount = (st.wrongCount || 0) + 1;
    st.streak = 0;
    if(st.retired){ st.retired = false; st.retiredAt = null; }
    s.tally.wrong++;
  }
  updateStreak(correct);
  save();
  render();
  setTimeout(() => $('#similarContinue')?.focus(), 30);
}
window.similarSubmit = similarSubmit;

function similarAdvance(){
  const s = state.similar;
  if(!s) return;
  s.idx++;
  s.submitted = false;
  s.chosenIdx = null;
  s.correct = null;
  if(s.idx >= s.pool.length){
    s.active = false;
    s.complete = true;
  }
  render();
}
window.similarAdvance = similarAdvance;

function similarEnd(){
  state.similar = null;
  nav('home');
}
window.similarEnd = similarEnd;

function renderSimilar(){
  const s = state.similar;
  const counts = similarCounts();
  if(!s){
    /* Landing screen — overview + start */
    const browse = SIMILAR_SETS.map(set => {
      let ret = 0;
      for(let i = 0; i < set.items.length; i++){
        if(similarStatPeek(set.id, i)?.retired) ret++;
      }
      const fully = ret === set.items.length;
      const dot = fully ? '✓' : (ret ? `${ret}/${set.items.length}` : '○');
      return `<div style="padding:8px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;gap:8px;align-items:baseline">
          <div style="font-size:14px;font-weight:600">${esc(set.title)}</div>
          <span class="muted" style="font-size:11px;white-space:nowrap">${dot}</span>
        </div>
        <div class="muted" style="font-size:12px;margin-top:2px">${set.items.map(it => esc(it.jp)).join(' · ')}</div>
      </div>`;
    }).join('');
    return `
      <div class="card">
        <div class="muted" style="font-size:13px;line-height:1.5;margin-top:0">
          Confusable JP words paired with concise nuance notes. Each round shows one English gloss — pick the matching Japanese. Reveal shows the whole set so the contrast lands every round. 3-in-a-row retires an item; misses resurface it.
        </div>
        <div class="stats-row" style="margin-top:12px">
          <div class="stat-box"><div class="stat-num">${counts.setsDone}</div><div class="stat-label">Sets done</div></div>
          <div class="stat-box"><div class="stat-num">${counts.retired}</div><div class="stat-label">Items retired</div></div>
          <div class="stat-box"><div class="stat-num">${counts.totalItems}</div><div class="stat-label">Total items</div></div>
          <div class="stat-box"><div class="stat-num">${counts.totalSets}</div><div class="stat-label">Sets</div></div>
        </div>
        <div class="spacer"></div>
        <button class="btn btn-primary" style="width:100%" onclick="startSimilar()">▶ Start similar drill</button>
        <div style="height:6px"></div>
        <button class="btn btn-blue" style="width:100%" onclick="startBuildModeSimilarSpam()">🎲 Spam in Build Mode (audio, out loud)</button>
      </div>
      <div class="card">
        <h3 style="margin-top:0">Browse all sets</h3>
        ${browse}
      </div>
    `;
  }
  if(s.complete){
    const t = s.tally;
    const attempts = t.correct + t.wrong;
    const pct = attempts ? Math.round(100*t.correct/attempts) : 0;
    return `<div class="card">
      <h2 style="margin-top:0">Similar drill complete</h2>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num">${attempts}</div><div class="stat-label">Seen</div></div>
        <div class="stat-box"><div class="stat-num">${pct}%</div><div class="stat-label">Accuracy</div></div>
        <div class="stat-box"><div class="stat-num">${t.retired}</div><div class="stat-label">Retired</div></div>
        <div class="stat-box"><div class="stat-num">${t.wrong}</div><div class="stat-label">Wrong</div></div>
      </div>
      <div class="spacer"></div>
      <button class="btn btn-primary" style="width:100%" onclick="startSimilar()">Drill again</button>
      <div class="spacer"></div>
      <button class="btn btn-secondary" style="width:100%" onclick="similarEnd()">Back home</button>
    </div>`;
  }
  const cur = similarCurrent();
  if(!cur) return `<div class="card"><div class="muted">No item.</div></div>`;
  const set = similarSetById(cur.setId);
  if(!set) return `<div class="card"><div class="muted">Unknown set.</div></div>`;
  const target = set.items[cur.itemIdx];
  const total = s.pool.length;
  const pos = s.idx + 1;
  const head = `<div class="card" style="padding:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <span class="muted" style="font-size:13px">Item ${pos} / ${total} · ${esc(set.title)}</span>
    </div>
  </div>`;

  if(!s.submitted){
    /* Order options identically every round (set-defined order) so the user
       builds spatial memory of where each option sits — this aids the
       contrast learning. */
    const opts = set.items.map((it, i) => `
      <button class="btn btn-secondary" style="width:100%;text-align:left;padding:14px;font-size:18px;margin-bottom:8px" onclick="similarSubmit(${i})">
        <span class="jp" style="font-weight:600">${esc(it.jp)}</span>
      </button>
    `).join('');
    return head + `<div class="card">
      <div class="muted" style="text-align:center;font-size:12px;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Which Japanese means…</div>
      <div style="font-size:22px;text-align:center;font-weight:600;line-height:1.4;padding:16px 8px;color:var(--text)">${esc(target.en)}</div>
      <div class="spacer"></div>
      ${opts}
    </div>`;
  }
  /* Reveal — show all options with their notes; highlight correct + chosen */
  const reveal = set.items.map((it, i) => {
    const isCorrect = i === cur.itemIdx;
    const isChosen = i === s.chosenIdx;
    let border = 'var(--border)', bg = 'rgba(255,255,255,0.02)';
    if(isCorrect){ border = 'var(--green)'; bg = 'rgba(80,200,120,0.08)'; }
    if(isChosen && !isCorrect){ border = 'var(--red)'; bg = 'rgba(220,80,80,0.08)'; }
    const tag = isCorrect ? ' <span style="color:var(--green);font-size:12px">✓ correct</span>' : (isChosen ? ' <span style="color:var(--red);font-size:12px">✗ your pick</span>' : '');
    return `<div style="border-left:3px solid ${border};background:${bg};padding:10px 12px;margin:8px 0;border-radius:4px">
      <div class="jp" style="font-size:18px;font-weight:600">${esc(it.jp)}${tag}</div>
      <div class="muted" style="font-size:12px;margin-top:2px"><b>${esc(it.en)}</b></div>
      <div class="muted" style="font-size:12px;margin-top:4px">${esc(it.note)}</div>
      <div style="margin-top:6px"><button class="audio-btn" style="font-size:11px;padding:3px 10px" onclick="speakJP('${jsEsc(it.jp)}')">🔊</button></div>
    </div>`;
  }).join('');
  const verdict = s.correct
    ? `<div style="text-align:center;color:var(--green);font-weight:600;font-size:16px;margin:8px 0">Correct ✓</div>`
    : `<div style="text-align:center;color:var(--red);font-weight:600;font-size:16px;margin:8px 0">Not quite — see the contrast below</div>`;
  return head + `<div class="card">
    ${verdict}
    ${reveal}
    <div class="spacer"></div>
    <button id="similarContinue" class="btn btn-primary" style="width:100%" onclick="similarAdvance()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();similarAdvance();}">Continue ↵</button>
  </div>`;
}
window.renderSimilar = renderSimilar;

function buildFoodCat(en){
  if(['breakfast','lunch','dinner'].includes(en)) return 'meal';
  if(['water','tea','coffee','milk','juice','beer','wine','alcohol/sake','drink'].includes(en)) return 'drink';
  if(en === 'meat') return 'meat_parent';
  if(['beef','chicken (meat)','pork'].includes(en)) return 'meat_child';
  if(en === 'fruit') return 'fruit_parent';
  if(['apple','mandarin orange','banana'].includes(en)) return 'fruit_child';
  return 'other';
}
function buildFoodContrastOk(words){
  const a = words.N1.en, b = words.N2.en;
  const ca = buildFoodCat(a), cb = buildFoodCat(b);
  if(ca === 'meal' || cb === 'meal') return ca === cb;
  if(ca === 'drink' || cb === 'drink') return ca === cb;
  if(ca === 'meat_parent' && cb === 'meat_child') return false;
  if(cb === 'meat_parent' && ca === 'meat_child') return false;
  if(ca === 'fruit_parent' && cb === 'fruit_child') return false;
  if(cb === 'fruit_parent' && ca === 'fruit_child') return false;
  return true;
}

/* v6.22 — caps raised. Templates 10→30 because we have 169 templates across

   was excluding only ~5 prior lessons, letting the same template reappear
   too soon. Verb tracking added separately because many templates share
   the same verb (e.g. たべる appears in 8+ complex templates) — so dedup
   on template-id alone wasn't enough. */
const BUILD_RECENT_TEMPLATES_CAP = 30;
const BUILD_RECENT_WORDS_CAP = 60;

   so we bias selection toward templates with verbs we haven't said in a

   and the hand-authored Starter never auto-chain.

const BUILD_AUTO_CHAIN_CAP = 8;
function buildRecentGet(){
  /* v6.22 — added verbs[] alongside templates[]/words[] for verb-recency
     tracking. Old payloads without verbs degrade gracefully (treated as
     empty list). */
  try{ const r = JSON.parse(localStorage.getItem(BUILD_LS_RECENT) || '{}'); return {templates: r.templates || [], words: r.words || [], verbs: r.verbs || []}; }
  catch(e){ return {templates:[], words:[], verbs:[]}; }
}
function buildRecentPush(key, id, cap){
  if(!id) return;
  const r = buildRecentGet();
  r[key] = (r[key] || []).filter(x => x !== id);
  r[key].push(id);

  try{ localStorage.setItem(BUILD_LS_RECENT, JSON.stringify(r)); }catch(_){}

/* v6.22 — extract a template's "verb fingerprint" for variety dedup. Prefers
   the explicit `verb` field (set on v6.22 templates), falls back to the
   pattern's trailing token (e.g. 'たべた' from '{N}を たべた'). Used both
   within a lesson (avoid pairing primary+secondary that share a verb) and
   across lessons (recency tracking). Conjugations of the same verb get
   collapsed via the explicit tag where present; legacy templates fall back
   to per-conjugation distinctness, which is still better than nothing. */
function buildTemplateVerb(t){
  if(!t) return null;
  if(t.verb) return t.verb;
  if(!t.pattern) return null;
  const stripped = t.pattern.replace(/\{[A-Z0-9]+\}/g, '').trim();
  const tokens = stripped.split(/\s+/).filter(Boolean);
  if(!tokens.length) return null;
  const last = tokens[tokens.length - 1];
  /* Skip low-information predicates (copulas, existential あります/います,
     bare ですか) — these aren't the source of "same verb" feel and
     over-matching on them would suppress unrelated templates that share a
     trailing copula. The complaint is about content verbs (たべる, のむ,
     いく, etc.), which the leaf-token catches well. */
  const STOP = new Set(['です','ですか','あります','います','じゃない','でした','じゃなかった']);
  if(STOP.has(last)) return null;
  return last;
}

function buildFillTemplate(tmpl, word){
  const slotKey = tmpl.slotKey || 'N';
  const re = new RegExp('\\{' + slotKey + '\\}', 'g');
  return { jp: tmpl.pattern.replace(re, word.jp), en: tmpl.en.replace(re, word.en) };
}
function buildMultiSlotFill(tmpl, deck, excludeWordIds, preferredWordIds){
  /* v6.12.1 — only use words encountered in Vocab Blitz. Mirror Library exclusions.
     v6.12.7 — accept excludeWordIds Set so callers can dedup across slots/lessons.
     v6.13 — accept preferredWordIds Set so chain mode can favor chain words. */
  const masteredSet = new Set(state.settings.masteredWords || []);
  const suspendedSet = new Set(state.settings.suspendedWords || []);
  const moduleIds = activeModuleWordIdSet();
  const exclude = excludeWordIds || new Set();
  const preferred = preferredWordIds || null;
  const maxTries = tmpl.validate ? 30 : 1;
  for(let attempt = 0; attempt < maxTries; attempt++){
    const keys = Object.keys(tmpl.slots);
    const chosen = {};
    let failed = false;
    for(const key of keys){
      const cfg = tmpl.slots[key];
      const fullPool = deck.filter(w =>
        w.pos === 'n' &&
        (cfg.allowKatakana || !hasKatakana(w.jp)) &&
        w.jp && w.en && w.romaji &&
        !masteredSet.has(w.id) &&
        !suspendedSet.has(w.id) &&
        (!moduleIds || moduleIds.has(w.id)) &&
        vocabIsIntroduced(w) &&
        (!cfg.slotThemes || cfg.slotThemes.includes(w.theme)) &&
        (!cfg.slotWords || cfg.slotWords.includes(w.en)) &&
        (!cfg.slotExclude || !cfg.slotExclude.includes(w.en))
      );
      let pool = fullPool.filter(w => !exclude.has(w.id));
      if(pool.length === 0) pool = fullPool;
      /* v6.13 — chain bias. Promote preferred words to the top of the pool;
         only use them if they fit the slot constraints. */
      if(preferred && preferred.size > 0){
        const promoted = pool.filter(w => preferred.has(w.id));
        if(promoted.length > 0) pool = promoted;
      }
      if(cfg.distinctFrom && chosen[cfg.distinctFrom]){
        pool = pool.filter(w => w.jp !== chosen[cfg.distinctFrom].jp);
      }
      if(pool.length === 0){ failed = true; break; }
      chosen[key] = pool[Math.floor(Math.random() * pool.length)];
    }
    if(failed) return null;
    if(tmpl.validate && !tmpl.validate(chosen)) continue;
    let jp = tmpl.pattern, en = tmpl.en;
    for(const key of keys){
      const re = new RegExp('\\{' + key + '\\}', 'g');
      jp = jp.replace(re, chosen[key].jp);
      en = en.replace(re, chosen[key].en);
    }
    return { jp, en, words: chosen };
  }
  return null;
}
