/* =========================================================================
   FORM BLITZ (v4.25) — mixed-form, recall-direction.
   Pool = (verb, form) pairs drawn from Vocab-Blitz-graduated verbs × all forms.
   Card shows conjugated JP + form badge; user types English meaning.
   Graded lenient via form.accept() — base-verb recognition counts.
   Mirrors Vocab Blitz rhythm: streak=3, mature fast-path, continuous refill.
   ========================================================================= */

const FORM_BLITZ_STREAK_REQUIRED = 3;
const FORM_BLITZ_MATURE_MIN = SM_MASTERED_DAYS * 24 * 60; /* 7 d */
const FORM_BLITZ_POOL_LEARNING = 8;
const FORM_BLITZ_POOL_MATURE = 4;
const FORM_BLITZ_MIN_PAIRS = 1; /* v4.28: gate effectively removed — any deck with a verb unlocks Form Blitz */

function fbKey(verbId, formId){ return verbId + '|' + formId; }

function eligibleFormPairs(){
  const verbs = formEligibleVerbs();
  const out = [];
  for(const w of verbs){
    for(const f of FORMS) out.push({verbId:w.id, formId:f.id});
  }
  return out;
}

function buildFormBlitzPool(opts){
  opts = opts || {};
  const targetLearn = opts.targetLearn ?? FORM_BLITZ_POOL_LEARNING;
  const targetMature = opts.targetMature ?? FORM_BLITZ_POOL_MATURE;
  const exclude = opts.excludeKeys || new Set();
  const pairs = eligibleFormPairs().filter(p => !exclude.has(fbKey(p.verbId, p.formId)));
  const t = now();
  const unseen = [], youngDue = [], youngNotDue = [], matureDue = [];
  for(const p of pairs){
    const fst = state.formStats?.[p.verbId]?.[p.formId];
    if(!fst){ unseen.push(p); continue; }
    ensureSm(fst);
    if(fst.smInterval >= FORM_BLITZ_MATURE_MIN){
      if(fst.smNext <= t) matureDue.push({p, next: fst.smNext});
    } else {
      if(fst.smNext <= t) youngDue.push({p, next: fst.smNext});
      else youngNotDue.push({p, next: fst.smNext});
    }
  }
  matureDue.sort((a,b)=>a.next-b.next);
  youngDue.sort((a,b)=>a.next-b.next);
  youngNotDue.sort((a,b)=>a.next-b.next);
  const matureSel = matureDue.slice(0, targetMature).map(x => x.p);
  const learningSel = [
    ...youngDue.map(x => x.p),
    ...shuffleFY(unseen),
    ...youngNotDue.map(x => x.p),
  ].slice(0, targetLearn);
  return shuffleFY([
    ...matureSel.map(p => ({verbId:p.verbId, formId:p.formId, streak:0, required:1, answers:0, everWrong:false, mature:true})),
    ...learningSel.map(p => ({verbId:p.verbId, formId:p.formId, streak:0, required:FORM_BLITZ_STREAK_REQUIRED, answers:0, everWrong:false, mature:false})),
  ]);
}

function formBlitzRefillIfNeeded(){
  if(!state.formBlitz || !state.formBlitz.active) return;
  const target = state.formBlitz.poolTarget;
  if(!target) return;
  const halfway = Math.ceil(target / 2);
  if(state.formBlitz.pool.length > halfway) return;
  const deficit = target - state.formBlitz.pool.length;
  if(deficit <= 0) return;
  const exclude = new Set([
    ...state.formBlitz.pool.map(p => fbKey(p.verbId, p.formId)),
    ...state.formBlitz.graduated,
  ]);
  const defMature = Math.floor(deficit / 3);
  const defLearn = deficit - defMature;
  const fresh = buildFormBlitzPool({targetLearn:defLearn, targetMature:defMature, excludeKeys:exclude});
  if(!fresh.length) return;
  state.formBlitz.pool.push(...fresh);
  state.formBlitz.tally.total += fresh.length;
  state.formBlitz.tally.refills = (state.formBlitz.tally.refills || 0) + 1;
}

function startFormBlitz(){
  const pairs = eligibleFormPairs();
  if(!pairs.length){
    alert('Your deck has no verbs yet. Add a verb or enable the N5 pack in Settings.');
    return;
  }
  const poolTarget = FORM_BLITZ_POOL_LEARNING + FORM_BLITZ_POOL_MATURE;
  const pool = buildFormBlitzPool();
  if(!pool.length){
    alert('No form pairs available right now.');
    return;
  }
  const direction = state.settings.formBlitzDirection || 'jp-en';
  state.formBlitz = {
    active:true, complete:false,
    direction,
    currentDir: resolveBlitzDir(direction),
    pool, graduated:[], recent:[],
    currentKey: fbKey(pool[0].verbId, pool[0].formId),
    submitted:false, input:'', autoCorrect:null, justGraduated:null,
    totalAnswers:0, poolTarget,
    tally:{correct:0, wrong:0, graduated:0, total:pool.length, refills:0}
  };
  clearNextTimer();
  nav('formBlitz');
}
window.startFormBlitz = startFormBlitz;

function formBlitzCurrentPair(){
  if(!state.formBlitz || !state.formBlitz.active) return null;
  return state.formBlitz.pool.find(p => fbKey(p.verbId, p.formId) === state.formBlitz.currentKey) || null;
}
function formBlitzCurrentWord(){
  const p = formBlitzCurrentPair();
  if(!p) return null;
  return state.words.find(w => w.id === p.verbId) || null;
}
function formBlitzCurrentForm(){
  const p = formBlitzCurrentPair();
  if(!p) return null;
  return FORMS.find(f => f.id === p.formId) || null;
}

function formBlitzPickNext(){
  if(!state.formBlitz) return null;
  const pool = state.formBlitz.pool;
  if(!pool.length) return null;
  const gap = Math.min(3, pool.length - 1);
  const blocked = new Set((state.formBlitz.recent || []).slice(-gap));
  const eligible = pool.filter(p => !blocked.has(fbKey(p.verbId, p.formId)));
  const candidates = eligible.length ? eligible : pool;
  const pick = candidates[Math.floor(Math.random() * candidates.length)];
  return fbKey(pick.verbId, pick.formId);
}

let formBlitzAdvanceTimer = null;
function clearFormBlitzAdvanceTimer(){ if(formBlitzAdvanceTimer){ clearTimeout(formBlitzAdvanceTimer); formBlitzAdvanceTimer = null; } }

function formBlitzAcceptSet(w, f){
  const out = new Set();
  const fromForm = f.accept ? f.accept(w) : [f.en(w)];
  for(const s of fromForm){
    const n = normEN(s);
    if(n) out.add(n);
  }
  for(const alt of enAlternatives(w.en)){
    if(alt) out.add(alt);
  }
  return out;
}

function formBlitzCheck(input, w, f, dir){
  const d = dir || 'jp-en';
  if(d === 'en-jp'){
    /* Production: user types the conjugated form in hiragana. Single canonical target. */
    const target = normJP(f.conj(w.jp));
    const got = normJP(input);
    if(!got) return false;
    return got === target;
  }
  const n = normEN(input);
  if(!n) return false;
  return formBlitzAcceptSet(w, f).has(n);
}

function formBlitzToggleDir(){
  if(!state.formBlitz) return;
  const next = {'jp-en':'en-jp', 'en-jp':'mixed', 'mixed':'jp-en'};
  state.formBlitz.direction = next[state.formBlitz.direction] || 'jp-en';
  state.formBlitz.currentDir = resolveBlitzDir(state.formBlitz.direction);
  state.settings.formBlitzDirection = state.formBlitz.direction;
  save();
  render();
  setTimeout(() => $('#formBlitzInput')?.focus(), 30);
}
window.formBlitzToggleDir = formBlitzToggleDir;

function formBlitzRecord(pair, isCorrect){
  const fst = formStatFor(pair.verbId, pair.formId);
  ensureSm(fst);
  fst.reviewCount = (fst.reviewCount || 0) + 1;
  fst.lastReviewed = now();
  if(isCorrect){ fst.correctCount = (fst.correctCount || 0) + 1; }
  else { fst.wrongCount = (fst.wrongCount || 0) + 1; }
  pair.answers++;
  state.formBlitz.totalAnswers++;
  state.formBlitz.recent = [...(state.formBlitz.recent || []), fbKey(pair.verbId, pair.formId)].slice(-4);
  if(isCorrect){
    pair.streak++;
    state.formBlitz.tally.correct++;
    if(pair.streak >= pair.required){
      smGrade(fst, 'good');
      const k = fbKey(pair.verbId, pair.formId);
      state.formBlitz.pool = state.formBlitz.pool.filter(p => fbKey(p.verbId, p.formId) !== k);
      state.formBlitz.graduated.push(k);
      state.formBlitz.tally.graduated++;
      state.formBlitz.justGraduated = k;
    } else {
      state.formBlitz.justGraduated = null;
    }
  } else {
    pair.streak = 0;
    pair.everWrong = true;
    state.formBlitz.tally.wrong++;
    state.formBlitz.justGraduated = null;
  }
}

function formBlitzSubmit(){
  if(!state.formBlitz || state.formBlitz.submitted) return;
  const pair = formBlitzCurrentPair();
  const w = formBlitzCurrentWord();
  const f = formBlitzCurrentForm();
  if(!pair || !w || !f) return;
  const inp = $('#formBlitzInput');
  state.formBlitz.input = inp?.value || '';
  const correct = formBlitzCheck(state.formBlitz.input, w, f, state.formBlitz.currentDir || state.formBlitz.direction);
  state.formBlitz.autoCorrect = correct;
  state.formBlitz.submitted = true;
  formBlitzRecord(pair, correct);
  save();
  render();
  clearFormBlitzAdvanceTimer();
  setTimeout(() => $('#formBlitzContinue')?.focus(), 30);
  const ms = correct ? 900 : 2000;
  formBlitzAdvanceTimer = setTimeout(formBlitzAdvance, ms);
}
window.formBlitzSubmit = formBlitzSubmit;

function formBlitzReveal(){
  if(!state.formBlitz || state.formBlitz.submitted) return;
  const pair = formBlitzCurrentPair();
  if(!pair) return;
  const inp = $('#formBlitzInput');
  state.formBlitz.input = inp?.value || '';
  state.formBlitz.autoCorrect = false;
  state.formBlitz.submitted = true;
  formBlitzRecord(pair, false);
  save();
  render();
  clearFormBlitzAdvanceTimer();
  setTimeout(() => $('#formBlitzContinue')?.focus(), 30);
  formBlitzAdvanceTimer = setTimeout(formBlitzAdvance, 2000);
}
window.formBlitzReveal = formBlitzReveal;

function formBlitzAdvance(){
  clearFormBlitzAdvanceTimer();
  if(!state.formBlitz) return;
  state.formBlitz.submitted = false;
  state.formBlitz.input = '';
  state.formBlitz.autoCorrect = null;
  state.formBlitz.justGraduated = null;
  formBlitzRefillIfNeeded();
  if(!state.formBlitz.pool.length){
    state.formBlitz.active = false;
    state.formBlitz.complete = true;
    state.formBlitz.currentKey = null;
    save();
    render();
    return;
  }
  state.formBlitz.currentKey = formBlitzPickNext();
  state.formBlitz.currentDir = resolveBlitzDir(state.formBlitz.direction);
  save();
  render();
  setTimeout(() => $('#formBlitzInput')?.focus(), 30);
}
window.formBlitzAdvance = formBlitzAdvance;

function formBlitzSkip(){
  if(!state.formBlitz) return;
  if(!confirm('Skip this card without recording it?')) return;
  clearFormBlitzAdvanceTimer();
  const k = state.formBlitz.currentKey;
  state.formBlitz.pool = state.formBlitz.pool.filter(p => fbKey(p.verbId, p.formId) !== k);
  state.formBlitz.submitted = false;
  state.formBlitz.input = '';
  state.formBlitz.autoCorrect = null;
  state.formBlitz.justGraduated = null;
  if(!state.formBlitz.pool.length){
    state.formBlitz.active = false;
    state.formBlitz.complete = true;
    state.formBlitz.currentKey = null;
  } else {
    state.formBlitz.currentKey = formBlitzPickNext();
    state.formBlitz.currentDir = resolveBlitzDir(state.formBlitz.direction);
  }
  save();
  render();
  setTimeout(() => $('#formBlitzInput')?.focus(), 30);
}
window.formBlitzSkip = formBlitzSkip;

function formBlitzEnd(){
  clearFormBlitzAdvanceTimer();
  if(state.formBlitz && state.formBlitz.active){
    const struggled = state.formBlitz.pool.filter(p => p.everWrong);
    for(const p of struggled){
      const fst = formStatFor(p.verbId, p.formId);

/* =========================================================================
   KANA BLITZ — streak-based retention. Separate track from SM-2.
   Retire: 5 correct in a row. Maintenance: retired kana resurface weekly.
   Confusion-pair surfacing: on fail of a tagged char, partner is next.
   ========================================================================= */

const KANA_RETIRE_STREAK = 5;
const KANA_MAINTENANCE_DAYS = 7;
const KANA_SESSION_TARGET = 15;

function kanaStatFor(k){
  if(!state.kanaStats) state.kanaStats = {};
  if(!state.kanaStats[k]){
    state.kanaStats[k] = {streak:0, retired:false, retiredAt:null, lastSeen:null, correctCount:0, wrongCount:0};
  }
  return state.kanaStats[k];
}

function kanaDueForMaintenance(k){
  const st = state.kanaStats && state.kanaStats[k];
  if(!st || !st.retired) return false;
  const days = (now() - (st.retiredAt || 0)) / (1000*60*60*24);
  return days >= KANA_MAINTENANCE_DAYS;
}

function buildKanaPool(scope){
  const eligible = KANA_FULL.filter(item => {
    if(scope === 'hiragana' && item.script !== 'h') return false;
    if(scope === 'katakana' && item.script !== 'k') return false;
    const st = state.kanaStats[item.k];
    if(!st) return true;
    if(!st.retired) return true;
    return kanaDueForMaintenance(item.k);
  });
  const maintenance = [], unseen = [], learning = [];
  for(const item of eligible){
    const st = state.kanaStats[item.k];
    if(!st) unseen.push(item);
    else if(st.retired) maintenance.push(item);
    else learning.push(item);
  }
  return [
    ...shuffleFY(maintenance).slice(0, 4),
    ...shuffleFY(unseen).slice(0, 8),
    ...shuffleFY(learning),
  ].slice(0, KANA_SESSION_TARGET);
}

function startKanaBlitz(scope){
  scope = scope || 'all';
  if(!state.kanaStats) state.kanaStats = {};
  const pool = buildKanaPool(scope);
  if(!pool.length){
    alert('All kana retired! Great work. Check back in a week for maintenance.');
    return;
  }
  state.kanaBlitz = {
    active:true, complete:false,
    scope,
    pool,
    idx:0,
    submitted:false,
    input:'',
    autoCorrect:null,
    lastFailedK:null,
    tally:{correct:0, wrong:0, retired:0, total:pool.length},
  };
  nav('kanaBlitz');
}
window.startKanaBlitz = startKanaBlitz;

function kanaBlitzCurrent(){
  if(!state.kanaBlitz || !state.kanaBlitz.active) return null;
  return state.kanaBlitz.pool[state.kanaBlitz.idx] || null;
}

function kanaBlitzCheck(input, item){
  const i = (input||'').toLowerCase().trim().replace(/\s+/g,'');
  if(!i) return false;
  if(i === item.r) return true;
  if(item.alt && item.alt.includes(i)) return true;
  return false;
}

function kanaBlitzRecordAnswer(item, correct){
  const st = kanaStatFor(item.k);
  st.lastSeen = now();
  if(correct){
    st.streak++;
    st.correctCount++;
    state.kanaBlitz.tally.correct++;
    if(st.streak >= KANA_RETIRE_STREAK && !st.retired){
      st.retired = true;
      st.retiredAt = now();
      state.kanaBlitz.tally.retired++;
    } else if(st.retired){
      st.retiredAt = now();
    }
    state.kanaBlitz.lastFailedK = null;
  } else {
    st.streak = 0;
    st.wrongCount++;
    st.retired = false;
    st.retiredAt = null;
    state.kanaBlitz.tally.wrong++;
    state.kanaBlitz.lastFailedK = item.k;
  }
}

function kanaBlitzSubmit(){
  if(!state.kanaBlitz || state.kanaBlitz.submitted) return;
  const item = kanaBlitzCurrent();
  if(!item) return;
  const inp = $('#kanaInput');
  state.kanaBlitz.input = inp?.value || '';
  const correct = kanaBlitzCheck(state.kanaBlitz.input, item);
  state.kanaBlitz.autoCorrect = correct;
  state.kanaBlitz.submitted = true;
  kanaBlitzRecordAnswer(item, correct);
  save();
  render();
  setTimeout(() => $('#kanaContinue')?.focus(), 30);
}
window.kanaBlitzSubmit = kanaBlitzSubmit;

function kanaBlitzReveal(){
  if(!state.kanaBlitz || state.kanaBlitz.submitted) return;
  const item = kanaBlitzCurrent();
  if(!item) return;
  const inp = $('#kanaInput');
  state.kanaBlitz.input = inp?.value || '';
  state.kanaBlitz.autoCorrect = false;
  state.kanaBlitz.submitted = true;
  kanaBlitzRecordAnswer(item, false);
  save();
  render();
  setTimeout(() => $('#kanaContinue')?.focus(), 30);
}
window.kanaBlitzReveal = kanaBlitzReveal;

function kanaBlitzSkip(){
  if(!state.kanaBlitz) return;
  state.kanaBlitz.lastFailedK = null;
  state.kanaBlitz.submitted = false;
  state.kanaBlitz.input = '';
  state.kanaBlitz.autoCorrect = null;
  state.kanaBlitz.idx++;
  if(state.kanaBlitz.idx >= state.kanaBlitz.pool.length){
    state.kanaBlitz.active = false;
    state.kanaBlitz.complete = true;
  }
  render();
  setTimeout(() => $('#kanaInput')?.focus(), 30);
}
window.kanaBlitzSkip = kanaBlitzSkip;

function kanaBlitzAdvance(){
  if(!state.kanaBlitz) return;
  const failedK = state.kanaBlitz.lastFailedK;
  if(failedK){
    const group = Object.values(KANA_CONFUSION_GROUPS).find(g => g.includes(failedK));
    if(group){
      const partnerK = group.find(k => k !== failedK);
      const partnerItem = KANA_FULL.find(it => it.k === partnerK);
      if(partnerItem){
        const nextIdx = state.kanaBlitz.idx + 1;
        const currentNext = state.kanaBlitz.pool[nextIdx];
        if(!currentNext || currentNext.k !== partnerK){
          state.kanaBlitz.pool.splice(nextIdx, 0, partnerItem);
          state.kanaBlitz.tally.total++;
        }
      }
    }
  }
  state.kanaBlitz.idx++;
  state.kanaBlitz.submitted = false;
  state.kanaBlitz.input = '';
  state.kanaBlitz.autoCorrect = null;
  state.kanaBlitz.lastFailedK = null;
  if(state.kanaBlitz.idx >= state.kanaBlitz.pool.length){
    state.kanaBlitz.active = false;
    state.kanaBlitz.complete = true;
  }
  save();
  render();
  setTimeout(() => $('#kanaInput')?.focus(), 30);
}
window.kanaBlitzAdvance = kanaBlitzAdvance;

  if(!kb.submitted){
    return head + `<div class="card">
      <div style="font-size:120px;text-align:center;font-weight:900;line-height:1;padding:20px 0">${esc(item.k)}</div>

function buildFoodCat(en){
  if(['breakfast','lunch','dinner'].includes(en)) return 'meal';
  if(['water','tea','coffee','milk','juice','beer','wine','alcohol/sake','drink'].includes(en)) return 'drink';
  if(en === 'meat') return 'meat_parent';
  if(['beef','chicken (meat)','pork'].includes(en)) return 'meat_child';
  if(en === 'fruit') return 'fruit_parent';
  if(['apple','mandarin orange','banana'].includes(en)) return 'fruit_child';
  return 'other';
}
function buildFoodContrastOk(words){
  const a = words.N1.en, b = words.N2.en;
  const ca = buildFoodCat(a), cb = buildFoodCat(b);
  if(ca === 'meal' || cb === 'meal') return ca === cb;
  if(ca === 'drink' || cb === 'drink') return ca === cb;
  if(ca === 'meat_parent' && cb === 'meat_child') return false;
  if(cb === 'meat_parent' && ca === 'meat_child') return false;
  if(ca === 'fruit_parent' && cb === 'fruit_child') return false;
  if(cb === 'fruit_parent' && ca === 'fruit_child') return false;
  return true;
}

function buildFillTemplate(tmpl, word){
  const slotKey = tmpl.slotKey || 'N';
  const re = new RegExp('\\{' + slotKey + '\\}', 'g');
  return { jp: tmpl.pattern.replace(re, word.jp), en: tmpl.en.replace(re, word.en) };
}
function buildMultiSlotFill(tmpl, deck){
  const maxTries = tmpl.validate ? 30 : 1;
  for(let attempt = 0; attempt < maxTries; attempt++){
    const keys = Object.keys(tmpl.slots);
    const chosen = {};
    let failed = false;
    for(const key of keys){
      const cfg = tmpl.slots[key];
      let pool = deck.filter(w =>
        w.pos === 'n' &&
        (cfg.allowKatakana || !hasKatakana(w.jp)) &&
        w.jp && w.en && w.romaji &&
        (!cfg.slotThemes || cfg.slotThemes.includes(w.theme)) &&
        (!cfg.slotWords || cfg.slotWords.includes(w.en)) &&
        (!cfg.slotExclude || !cfg.slotExclude.includes(w.en))
      );
      if(cfg.distinctFrom && chosen[cfg.distinctFrom]){
        pool = pool.filter(w => w.jp !== chosen[cfg.distinctFrom].jp);
      }
      if(pool.length === 0){ failed = true; break; }
      chosen[key] = pool[Math.floor(Math.random() * pool.length)];
    }
    if(failed) return null;
    if(tmpl.validate && !tmpl.validate(chosen)) continue;
    let jp = tmpl.pattern, en = tmpl.en;
    for(const key of keys){
      const re = new RegExp('\\{' + key + '\\}', 'g');
      jp = jp.replace(re, chosen[key].jp);
      en = en.replace(re, chosen[key].en);
    }
    return { jp, en, words: chosen };
  }
  return null;
}
function buildGenWordId(w){ return 'w_' + (w.romaji || w.r || '').replace(/\s+/g, '_'); }
function buildGetSequence(){ try{ return JSON.parse(localStorage.getItem(BUILD_LS_SEQUENCE) || '[]'); }catch(e){ return []; } }
function buildPushSequence(e){ const s = buildGetSequence(); s.push(e); try{ localStorage.setItem(BUILD_LS_SEQUENCE, JSON.stringify(s)); }catch(_){} }
function buildClearSequence(){ try{ localStorage.removeItem(BUILD_LS_SEQUENCE); }catch(_){} }
window.buildClearSequence = buildClearSequence;
function buildPickRandom(arr, n){
  const pool = arr.slice(); const out = [];
  while(out.length < n && pool.length){
    const i = Math.floor(Math.random()*pool.length);
    out.push(pool.splice(i,1)[0]);
  }
  return out;
}

function buildGenerateLesson(mode){
  mode = mode || 'simple';
  const pool = mode === 'complex' ? BUILD_COMPLEX_TEMPLATES : BUILD_TEMPLATES;
  if(pool.length < 2) throw new Error('need at least 2 templates in pool');

  const primary = pool[Math.floor(Math.random() * pool.length)];
  const sequence = buildGetSequence();
  const introducedIds = new Set();
  sequence.forEach(e => (e.introduced || []).forEach(id => introducedIds.add(id)));
  const deck = state.words || [];

  const eligibleForPair = (p, s) => {
    const common = p.slotThemes.filter(t => s.slotThemes.includes(t));
    return deck.filter(w =>
      w.pos === 'n' &&
      common.includes(w.theme) &&
      !hasKatakana(w.jp) &&
      w.jp && w.en && w.romaji &&
      (!p.slotWords || p.slotWords.includes(w.en)) &&
      (!s.slotWords || s.slotWords.includes(w.en)) &&
      (!p.slotExclude || !p.slotExclude.includes(w.en)) &&
      (!s.slotExclude || !s.slotExclude.includes(w.en))
    );
  };

  const sCands = pool.filter(t =>
    t.id !== primary.id &&
    t.slotKey === primary.slotKey &&
    t.slotThemes.some(th => primary.slotThemes.includes(th)) &&
    eligibleForPair(primary, t).length >= 3
  );
  if(sCands.length === 0) throw new Error('no compatible secondary for ' + primary.id);
  const secondary = sCands[Math.floor(Math.random() * sCands.length)];
  const commonThemes = primary.slotThemes.filter(t => secondary.slotThemes.includes(t));
  const eligible = eligibleForPair(primary, secondary);
  if(eligible.length < 3) throw new Error('not enough deck nouns for ' + commonThemes.join(','));

  const unintroduced = eligible.filter(w => !introducedIds.has(buildGenWordId(w)));
  let newWords = buildPickRandom(unintroduced, 3);
  if(newWords.length < 3){
    const extra = buildPickRandom(eligible.filter(w => !newWords.includes(w)), 3 - newWords.length);
    newWords = newWords.concat(extra);
  }

  const newIdSet = new Set(newWords.map(buildGenWordId));
  const cbPool = [];
  for(const entry of sequence){
    for(const id of (entry.introduced || [])){
      if(newIdSet.has(id)) continue;
      const w = eligible.find(x => buildGenWordId(x) === id);
      if(w && !cbPool.some(p => buildGenWordId(p) === id)) cbPool.push(w);
    }
  }
  let callbacks = cbPool.slice(0, 2);
  if(callbacks.length < 2){
    const cbIds = new Set(callbacks.map(buildGenWordId));
    const extra = buildPickRandom(
      eligible.filter(w => !newIdSet.has(buildGenWordId(w)) && !cbIds.has(buildGenWordId(w))),
      2 - callbacks.length
    );
    callbacks = callbacks.concat(extra);
  }

  const [w1, w2, w3] = newWords;
  const [cb1, cb2] = callbacks;
  const lessonId = (mode === 'complex' ? 'Gc' : 'Gs') + (sequence.length + 1);
  const toRef = w => ({ id: buildGenWordId(w), jp: w.jp, en: w.en, r: w.romaji });

  const p1 = buildFillTemplate(primary, w1), p2 = buildFillTemplate(primary, w2), p3 = buildFillTemplate(primary, w3);
  const s2 = buildFillTemplate(secondary, w2), s3 = buildFillTemplate(secondary, w3);
  const sCb1 = buildFillTemplate(secondary, cb1);
  const pCb2 = buildFillTemplate(primary, cb2);

  const pEn = primary.en.replace(/\{N\}/g,'X');
  const sEn = secondary.en.replace(/\{N\}/g,'X');

  return {
    id: lessonId,
    title: `${mode === 'complex' ? 'Complex' : 'Simple'} ${lessonId} — ${pEn} / ${sEn}`,
    duration_mins: mode === 'complex' ? 10 : 8,
    new_words: newWords.map(toRef),
    carryover_words: callbacks.map(toRef),
    cycles: [
      { id:'cycle_1', name:`Introduce — ${w1.en}, ${w2.en}, ${w3.en}`,
        steps:[
          { type:'introduce', word_id: buildGenWordId(w1) },
          { type:'introduce', word_id: buildGenWordId(w2) },
          { type:'introduce', word_id: buildGenWordId(w3) },
          { type:'recall',    word_id: buildGenWordId(w1) }
        ]},
      { id:'cycle_2', name:`Mix frames — "${pEn}" ⇄ "${sEn}"`,
        steps:[
          { type:'build',      sentence_jp: p1.jp, sentence_en: p1.en },
          { type:'substitute', swap_word_id: buildGenWordId(w2), result_jp: p2.jp, result_en: p2.en },
          { type:'build',      sentence_jp: s2.jp, sentence_en: s2.en },
          { type:'substitute', swap_word_id: buildGenWordId(w3), result_jp: s3.jp, result_en: s3.en },
          { type:'build',      sentence_jp: p3.jp, sentence_en: p3.en }
        ]},
      { id:'cycle_3', name:`Callbacks — mix frames`,
        steps:[
          { type:'callback',   word_id: buildGenWordId(cb1), note:'cold — from earlier' },
          { type:'build',      sentence_jp: sCb1.jp, sentence_en: sCb1.en },
          { type:'callback',   word_id: buildGenWordId(cb2), note:'cold — from earlier' },
          { type:'build',      sentence_jp: pCb2.jp, sentence_en: pCb2.en }
        ]}
    ],
    _meta: {
      mode,
      introduced_ids: newWords.map(buildGenWordId),
      callback_ids: callbacks.map(buildGenWordId),
      primary_template: primary.pattern,
      secondary_template: secondary.pattern
    }
  };
}

function buildGenerateHardLesson(){
  const deck = state.words || [];
  const lessonId = 'Gh' + (buildGetSequence().length + 1);
  const steps = [];
  const usedRefs = new Map();
  let lastTmplId = null;
  let tries = 0;
  while(steps.length < 7 && tries < 60){
    tries++;
    const pool = BUILD_HARD_TEMPLATES.filter(t => t.id !== lastTmplId);
    const tmpl = pool[Math.floor(Math.random() * pool.length)];
    const filled = buildMultiSlotFill(tmpl, deck);
    if(!filled) continue;
    lastTmplId = tmpl.id;
    steps.push({ type:'build', sentence_jp: filled.jp, sentence_en: filled.en });
    for(const w of Object.values(filled.words)){
      const id = buildGenWordId(w);
      if(!usedRefs.has(id)) usedRefs.set(id, { id, jp: w.jp, en: w.en, r: w.romaji });
    }
  }
  if(steps.length === 0) throw new Error('no multi-slot templates could be filled — enable N5 pack in Settings');
  return {
    id: lessonId,
    title: `Hard ${lessonId} — multi-slot mix`,
    duration_mins: 8,
    new_words: [],
    carryover_words: Array.from(usedRefs.values()),
    cycles: [
      { id:'cycle_hard', name:'Multi-slot — cold production', steps }
    ],
    _meta: {
      mode: 'hard',
      introduced_ids: [],
      callback_ids: Array.from(usedRefs.keys())
    }
  };
}

function _buildSpeakEN(text){
  try{
    if(!('speechSynthesis' in window)) return;
    const ss = window.speechSynthesis;
    if(ss.speaking || ss.pending) ss.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    u.rate = 0.95;
    const v = (typeof _pickEnVoice === 'function') ? _pickEnVoice() : null;
    if(v) u.voice = v;
    ss.speak(u);
  }catch(e){}
}

function _buildSpeakJPThenEN(jp, en){
  try{
    if(!('speechSynthesis' in window)) return;
    const ss = window.speechSynthesis;
    if(ss.speaking || ss.pending) ss.cancel();
    const utter = () => {
      const u = new SpeechSynthesisUtterance(String(jp).replace(/\s+/g,''));
      u.lang = 'ja-JP';
      u.rate = state.settings.ttsRate || 0.9;
      const v = (typeof _pickJaVoice === 'function') ? _pickJaVoice() : null;
      if(v) u.voice = v;
      let finished = false;
      const chain = () => { if(finished) return; finished = true; setTimeout(() => _buildSpeakEN(en), 250); };
      u.onend = chain;
      u.onerror = chain;
      ss.speak(u);
    };
    if(typeof _ttsVoicesReady !== 'undefined' && _ttsVoicesReady) utter();
    else if(typeof _waitForVoices === 'function') _waitForVoices(utter);
    else utter();
  }catch(e){}
}

function buildAutoplayStep(step){
  if(step.type === 'introduce'){
    const w = buildWordById(step.word_id);
    if(w){ _buildSpeakJPThenEN(w.jp, w.en); }
  } else if(step.type === 'recall'){
    const w = buildWordById(step.word_id);
    if(w) _buildSpeakEN(w.en);
  } else if(step.type === 'callback'){
    if(step.word_id){
      const w = buildWordById(step.word_id);
      if(w) _buildSpeakEN(w.en);
    } else if(step.sentence_en){ _buildSpeakEN(step.sentence_en); }
  } else if(step.type === 'build'){
    _buildSpeakEN(step.sentence_en);
  } else if(step.type === 'substitute'){
    _buildSpeakEN(step.result_en);
  }
}

function buildReplayAudio(){
  const b = state.buildMode;
  if(!b?.steps) return;
  const step = b.steps[b.stepIdx];
  if(!step) return;
  if(b.revealed){
    if(step.type === 'introduce' || step.type === 'recall'){
      const w = buildWordById(step.word_id); if(w) _buildSpeakJPThenEN(w.jp, w.en);
    } else if(step.type === 'callback'){
      if(step.word_id){
        const w = buildWordById(step.word_id); if(w) _buildSpeakJPThenEN(w.jp, w.en);
      } else if(step.sentence_jp){ _buildSpeakJPThenEN(step.sentence_jp, step.sentence_en || ''); }
    } else if(step.type === 'build'){ _buildSpeakJPThenEN(step.sentence_jp, step.sentence_en); }
    else if(step.type === 'substitute'){ _buildSpeakJPThenEN(step.result_jp, step.result_en); }
  } else { buildAutoplayStep(step); }
}

function buildRevealStep(){
  const b = state.buildMode;

    const w = buildWordById(step.word_id); if(w) setTimeout(() => _buildSpeakJPThenEN(w.jp, w.en), 150);
  } else if(step.type === 'callback'){
    if(step.word_id){
      const w = buildWordById(step.word_id); if(w) setTimeout(() => _buildSpeakJPThenEN(w.jp, w.en), 150);
    } else if(step.sentence_jp){
      setTimeout(() => _buildSpeakJPThenEN(step.sentence_jp, step.sentence_en || ''), 150);
    }
  } else if(step.type === 'build'){
    setTimeout(() => _buildSpeakJPThenEN(step.sentence_jp, step.sentence_en), 150);
  } else if(step.type === 'substitute'){
    setTimeout(() => _buildSpeakJPThenEN(step.result_jp, step.result_en), 150);
  }
}

function buildAuditHard(samples){
  const n = samples || 5;
  const deck = state.words || [];
  const out = [];
  out.push('===== HARD (multi-slot, ' + n + ' samples per template) =====');
  for(const t of BUILD_HARD_TEMPLATES){
    const keys = Object.keys(t.slots);
    const slotSizes = keys.map(k => {
      const cfg = t.slots[k];
      const pool = deck.filter(w =>
        w.pos === 'n' && (cfg.allowKatakana || !hasKatakana(w.jp)) && w.jp && w.en && w.romaji &&
        (!cfg.slotThemes || cfg.slotThemes.includes(w.theme)) &&
        (!cfg.slotWords || cfg.slotWords.includes(w.en)) &&
        (!cfg.slotExclude || !cfg.slotExclude.includes(w.en))
      );
      return k + '=' + pool.length;
    }).join(', ');
    out.push('\n--- ' + t.id + '  [' + slotSizes + ']  ' + t.pattern + '  |  ' + t.en);
    const seen = new Set();
    let tries = 0;
    while(seen.size < n && tries < n * 10){
      tries++;
      const filled = buildMultiSlotFill(t, deck);
      if(!filled) break;
      const key = filled.jp;
      if(seen.has(key)) continue;
      seen.add(key);
      out.push('  ' + filled.jp.padEnd(40) + '  ' + filled.en);
    }
  }
  const text = out.join('\n');
  console.log(text);
  try{ navigator.clipboard.writeText(text); console.log('[buildAuditHard] copied to clipboard'); }catch(_){}
  return text;
}

/* ---------- BURST SESSIONS ----------
   A burst = 5 new words (+ 3 review on bursts > 0). Each word must be correct 2×
   (any direction, shuffled between attempts) to pass. Miss resets progress to 0.
   When all pass, burst completes → user can start next. */

const BURST_NEW = 5;
const BURST_REVIEW = 3;
const BURST_PASS_TARGET = 2;

function buildBurstWords(){
  const burst = state.burst || {bursts:0, passedIds:[]};
  const passedInSession = new Set(burst.passedIds || []);
  const recent = new Set(state._recentlyServed || []);
  const pool = getActiveWords();
  if(!pool.length) return {newWords:[], reviewWords:[]};

  const ord = {new:0, learning:1, apprentice:2, guru:3, master:4, burned:5};
  const scored = pool.map(w => ({
    w,
    mastery: getMasteryForWord(w.id),
    attempts: state.stats[w.id]?.attempts?.length || 0,
    lastSeen: state.stats[w.id]?.lastSeen || 0
  }));

  /* New: prefer unseen > learning > apprentice; exclude already-passed-this-session and recently-served */
  const newPool = scored
    .filter(x => !passedInSession.has(x.w.id) && !recent.has(x.w.id))
    .sort((a,b) => ord[a.mastery] - ord[b.mastery] || a.attempts - b.attempts);
  const newWords = shuffleFY(newPool.slice(0, BURST_NEW * 3)).slice(0, BURST_NEW).map(x => x.w);

  let reviewWords = [];
  if((burst.bursts || 0) > 0){
    const newIds = new Set(newWords.map(w => w.id));
    const reviewPool = scored
      .filter(x => !newIds.has(x.w.id))
      .filter(x => x.mastery === 'apprentice' || x.mastery === 'learning')
      .sort((a,b) => a.lastSeen - b.lastSeen); /* oldest unseen first */
    reviewWords = shuffleFY(reviewPool.slice(0, BURST_REVIEW * 3)).slice(0, BURST_REVIEW).map(x => x.w);
  }
  return {newWords, reviewWords};
}

function startBurst(){
  const {newWords, reviewWords} = buildBurstWords();
  const all = [...newWords, ...reviewWords];
  if(!all.length){
    alert('No words available. Add words or enable the N5 pack in Settings.');
    return;
  }
  state.burst = state.burst || {bursts:0, passedIds:[]};
  state.burst.words = all;
  state.burst.queue = shuffleFY(all.slice());
  state.burst.progress = Object.fromEntries(all.map(w => [w.id, 0]));
  state.burst.isReview = Object.fromEntries([
    ...newWords.map(w => [w.id, false]),
    ...reviewWords.map(w => [w.id, true])
  ]);
  state.burst.active = true;
  state.burst.complete = false;
  state.burst.isPattern = false;
  state.burst.patternId = null;
  state.sessionQueue = state.burst.queue;
  state.sessionIdx = 0;
  state.lastAnswer = null;
  clearNextTimer();
  nav('drill');
}

function requeueWord(word){
  /* Put the word back, spaced out so it doesn't appear next card */
  const q = state.burst.queue;
  if(q.length <= 1){ q.push(word); return; }
  const minPos = Math.min(2, q.length);
  const pos = minPos + Math.floor(Math.random() * (q.length - minPos + 1));
  q.splice(pos, 0, word);
}

function completeBurst(){
  state.burst.complete = true;
  state.burst.active = false;
  /* Pattern bursts don't count toward session burst counter or passedIds. */
  if(!state.burst.isPattern){
    state.burst.bursts = (state.burst.bursts || 0) + 1;
    const passed = state.burst.words.map(w => w.id);
    state.burst.passedIds = [...new Set([...(state.burst.passedIds || []), ...passed])];
  }
  log('burst_complete',{n: state.burst.words.length, bursts: state.burst.bursts, pattern: state.burst.patternId || null});
  save();
}

        <div style="font-size:48px;margin-bottom:8px">🧩</div>
        <h3>Pattern pack complete</h3>
        <div class="muted">${esc(b.patternName || pid)} — ${n} cards drilled.</div>
      </div>
      <button class="btn btn-primary" style="font-size:16px;padding:16px" onclick="startPatternBurst('${pid}')">▶ Run this pattern again</button>
      <button class="btn btn-secondary" onclick="nav('patterns')">Other patterns</button>
      <button class="btn btn-secondary" onclick="nav('home')">Home</button>
    `;
  }
  const reviewCount = b.words.filter(w => b.isReview[w.id]).length;
  const newCount = n - reviewCount;
  return `
    <div class="card" style="text-align:center">
      <div style="font-size:48px;margin-bottom:8px">🎉</div>
      <h3>Burst complete</h3>
      <div class="muted">You passed ${newCount} new word${newCount!==1?'s':''}${reviewCount ? ` and ${reviewCount} review` : ''}.</div>
      <div style="margin-top:6px;font-size:12px;color:var(--dim)">Bursts this session: ${b.bursts}</div>
    </div>
    <button class="btn btn-primary" style="font-size:16px;padding:16px" onclick="startBurst()">▶ Start next burst</button>
    <button class="btn btn-secondary" onclick="nav('home')">Home</button>
  `;
}

function renderDrill(){
  const b = state.burst;
  if(!b || !b.active){
    if(b && b.complete) return renderBurstComplete();
    return `<div class="card"><h3>No burst running</h3><div class="muted">Start a burst from the home screen.</div></div>
    <button class="btn btn-primary" onclick="nav('home')">Home</button>`;
  }
  if(!b.queue.length){
    /* defensive — shouldn't happen because submitAns calls completeBurst */
    completeBurst(); render(); return '';
  }

  const word = b.queue[0];
  const dir = state.settings.direction;
  const prompt = dir==='jp-en' ? word.jp : word.en;
  const promptClass = dir==='jp-en' ? 'jp' : '';
  const mastery = getMasteryForWord(word.id);
  const isReview = !!b.isReview[word.id];
  const wordsPassed = b.words.filter(w => (b.progress[w.id]||0) >= BURST_PASS_TARGET).length;
  const pct = Math.round(100 * wordsPassed / b.words.length);
  const wordProgress = b.progress[word.id] || 0;

  const siblings = dir==='jp-en' ? homographSiblings(word) : [];
  const disambig = siblings.length > 1 ? ` · ${esc((word.en||'').split('/')[0])}` : '';

  const selfGradeMode = (dir === 'jp-en');
  const feedbackShowing = !!state.lastAnswer;
  const revealShowing = !!state._reveal;

  return `
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="muted" style="text-align:center;font-size:12px;margin:4px 0">
      Burst · ${wordsPassed} / ${b.words.length} passed · ${isReview ? '🔁 review' : '✨ new'} · this word ${wordProgress}/${BURST_PASS_TARGET}
    </div>
    <div class="direction-toggle">
      <button class="direction-btn ${dir==='jp-en'?'active':''}" onclick="setDirection('jp-en')">JP → EN</button>
      <button class="direction-btn ${dir==='en-jp'?'active':''}" onclick="setDirection('en-jp')">EN → JP</button>
    </div>

    <div class="drill-stage" data-state="${feedbackShowing?'feedback':(revealShowing?'reveal':'prompt')}">
      <div class="drill-card fade-in">
        <div class="drill-cat">${word.theme || ''}${disambig} · <span class="pill pill-${mastery}">${mastery}</span>${word.source==='user' && !word.verified ? ' <span class="pill pill-unverified">unverified</span>':''}</div>
        <div class="drill-prompt ${promptClass}">${esc(prompt)}</div>
        ${dir==='jp-en' && word.romaji ? `<div class="drill-sub">${esc(word.romaji)}</div>` : ''}
        ${(revealShowing || feedbackShowing) && selfGradeMode ? `
          <div class="drill-divider"></div>
          <div class="drill-answer fade-in">${esc(word.en)}</div>
        ` : ''}
        ${feedbackShowing && !selfGradeMode ? `
          <div class="drill-divider"></div>
          <div class="drill-answer fade-in ${state.lastAnswer.correct?'ok':'bad'}">
            ${state.lastAnswer.correct ? '✓ ' : '✗ '}${esc(word.jp)}${word.romaji?` · <span class="drill-sub-inline">${esc(word.romaji)}</span>`:''}
          </div>
          <div class="drill-sub" style="margin-top:4px">${esc(word.en)}</div>
          ${state.lastAnswer.smart && state.lastAnswer.smart.type==='real-word' ? `<div class="feedback-smart" style="margin-top:6px">You wrote <b>${esc(state.lastAnswer.userJP||state.lastAnswer.userEN||'')}</b> — that means "${esc(state.lastAnswer.smart.match.en)}".</div>` : ''}
        ` : ''}
      </div>

      <div class="audio-row">
        <button class="audio-btn" id="ttsBtn" onclick="speakJP('${jsEsc(word.jp)}')">🔊 Listen</button>
        ${voiceSupported() && dir==='en-jp' ? `<button class="audio-btn" id="voiceBtn" onclick="drillVoice()">🎤 Speak</button>` : ''}
      </div>

      ${!selfGradeMode ? `
        <input class="input" id="ansInput" placeholder="にほんご で こたえて" autocomplete="off" autocapitalize="off" autocorrect="off" ${feedbackShowing?'disabled':''}>
      ` : ''}

      <div class="action-slot">
        ${selfGradeMode
          ? (revealShowing
              ? `<div class="btn-row">
                  <button class="btn btn-secondary" onclick="selfGrade(false)">✗ Missed it</button>
                  <button class="btn btn-primary" onclick="selfGrade(true)">✓ Got it</button>
                </div>`
              : `<button class="btn btn-primary" style="font-size:16px;padding:16px" onclick="revealForSelfGrade()">👀 Reveal</button>`)
          : (feedbackShowing
              ? `<button class="btn btn-primary" style="width:100%" onclick="nextCard()">Next card ›</button>`
              : `<div class="btn-row">
                  <button class="btn btn-secondary" onclick="revealAnswer()">👀 Reveal</button>
                  <button class="btn btn-primary" onclick="submitAns(false)">Submit</button>
                </div>`)
        }
        ${!feedbackShowing && !revealShowing ? `<button class="btn btn-ghost" style="width:100%;margin-top:6px;font-size:13px" onclick="skipCard()">Skip — no penalty</button>` : ''}
      </div>
    </div>

    <div class="collapsible" id="drillExtras">
      <div class="collapsible-head" onclick="document.getElementById('drillExtras').classList.toggle('open')">
        <h3>💡 Hint & example</h3>
        <span class="collapsible-arrow">›</span>
      </div>
      <div class="collapsible-body">
        ${state.settings.hintsEnabled ? `<div id="hintContainer"></div><button class="btn btn-ghost" style="width:100%" onclick="showNextHint('${jsEsc(word.id)}')">💡 Reveal a hint</button>` : ''}
        ${(() => {
          const ex = EXAMPLES.find(e => (e.uses||[]).some(u => normJP(u)===normJP(word.jp) || normEN(u)===normEN(word.en)));
          return ex ? `<div class="hint-card" style="margin-top:8px"><div class="hint-head">example sentence</div><div class="hint-body"><b>${esc(ex.jp)}</b><br><span style="color:var(--dim);font-size:12px">${esc(ex.en)}</span> <button class="wheels-btn" onclick="speakJP('${jsEsc(ex.jp)}')">🔊</button></div></div>` : '<div class="muted" style="font-size:12px;padding:4px 0">No example sentence for this word yet.</div>';
        })()}
      </div>
    </div>
  `;
}

function renderFeedback(fb){
  const cls = fb.correct ? 'correct' : 'wrong';
  const head = fb.correct ? '✓ Correct' : '✗ Incorrect';
  let smart = '';
  if(!fb.correct && fb.smart){
    if(fb.smart.type === 'real-word'){
      const h = fb.smart.match;
      smart = `<div class="feedback-smart">You wrote <span class="hit">${esc(fb.userJP || fb.userEN)}</span> — that's a real word meaning "<b>${esc(h.en)}</b>" (${h.pos||''}). But the answer was <b>${esc(fb.correctAnswer)}</b>.</div>`;
    } else if(fb.smart.type === 'near-real'){
      const h = fb.smart.match;
      smart = `<div class="feedback-smart">Almost — that's close to <b>${esc(h.jp)}</b> (${esc(h.en)}). But the answer was <b>${esc(fb.correctAnswer)}</b>.</div>`;
    } else {
      smart = `<div class="feedback-smart">Not a word I recognize. The answer was <b>${esc(fb.correctAnswer)}</b>.</div>`;
    }
  }
  return `<div class="feedback-card ${cls}">
    <div class="feedback-head">${head}${fb.viaVoice?' · voice':''}</div>
    <div class="feedback-body">${esc(fb.word.jp)} <span style="color:var(--dim);font-size:12px">${esc(fb.word.romaji||'')}</span> — <b>${esc(fb.word.en)}</b></div>
    ${smart}
  </div>`;
}

let _hintStage = 0;
function showNextHint(wordId){
  const word = state.words.find(w=>w.id===wordId);
  if(!word) return;
  const hints = getHintsFor(word);
  if(_hintStage >= hints.length) _hintStage = 0;
  const h = hints[_hintStage];
  _hintStage++;
  const c = $('#hintContainer');
  if(c) c.innerHTML += `<div class="hint-card"><div class="hint-head">Hint — ${esc(h.label)}</div><div class="hint-body">${esc(h.text)}</div></div>`;
  log('hint_used',{id:wordId, stage:_hintStage});
}

function setDirection(d){
  state.settings.direction = d;
  save();
  state.lastAnswer = null;
  state._reveal = false;
  clearNextTimer();
  render();
}

let _nextTimer = null;
function clearNextTimer(){ if(_nextTimer){ clearTimeout(_nextTimer); _nextTimer = null; } }
/* _nextTimer is still used by sentence mode (inline setTimeout). Burst drill
   mode is tap-to-advance only — no auto-advance timer. */

function applyBurstResult(word, correct, viaVoice){
  /* Update progress only. Queue mutation is deferred to nextCard so the
     feedback phase renders with b.queue[0] === the word just answered. */
  const b = state.burst;
  if(!b || !b.active) return;
  const cur = b.progress[word.id] || 0;
  b.progress[word.id] = correct ? cur + 1 : 0;
}

function submitAns(viaVoice, overrideInput){
  const b = state.burst;
  if(!b || !b.active) return;
  const word = b.queue[0];
  if(!word) return;
  const inp = overrideInput !== undefined ? overrideInput : ($('#ansInput')?.value || '');
  const dir = state.settings.direction;
  const res = checkAnswer(inp, word, dir);
  let smart = null;
  if(!res.correct && state.settings.smartWrongFeedback){
    smart = dir==='jp-en' ? analyzeWrongEN(inp, word) : analyzeWrongJP(inp, word);
  }
  recordAttempt(word.id, res.correct, viaVoice);
  updateStreak(res.correct);
  state.lastAnswer = {correct:res.correct, viaVoice, word, smart, userJP:dir==='en-jp'?inp:'', userEN:dir==='jp-en'?inp:'', correctAnswer:dir==='jp-en'?word.en:word.jp};
  applyBurstResult(word, res.correct, viaVoice);
  save();
  render();
}

function selfGrade(correct){
  const b = state.burst;
  if(!b || !b.active) return;
  const word = b.queue[0];
  if(!word) return;
  recordAttempt(word.id, correct, false);
  updateStreak(correct);
  applyBurstResult(word, correct, false);
  /* Self-grade: user already saw the answer via Reveal. Set lastAnswer so
     nextCard commits the queue shift+requeue, then advance. */
  state.lastAnswer = {correct, viaVoice:false, word, smart:null, correctAnswer:word.en};
  state._reveal = false;
  save();
  nextCard();
}

function revealForSelfGrade(){
  state._reveal = true;
  render();
}

function revealAnswer(){
  const b = state.burst;
  if(!b || !b.active) return;
  const word = b.queue[0];
  if(!word) return;
  state.lastAnswer = {correct:false, viaVoice:false, word, smart:{type:'revealed'}, correctAnswer:state.settings.direction==='jp-en'?word.en:word.jp};
  recordAttempt(word.id, false, false);
  applyBurstResult(word, false, false);
  save();
  render();
}

function nextCard(){
  clearNextTimer();
  _hintStage = 0;
  const b = state.burst;
  if(!b || !b.active){ render(); return; }
  const prev = state.lastAnswer && state.lastAnswer.word;
  if(prev){
    state._recentlyServed = state._recentlyServed || [];
    state._recentlyServed.push(prev.id);
    if(state._recentlyServed.length > 30) state._recentlyServed.shift();
    /* Commit deferred queue mutation now that feedback has been dismissed. */
    if(b.queue[0] && b.queue[0].id === prev.id){
      b.queue.shift();
      if((b.progress[prev.id] || 0) < BURST_PASS_TARGET){
        requeueWord(prev);
      }
      state.sessionQueue = b.queue;
      state.sessionIdx = 0;
    }
  }
  state.lastAnswer = null;
  state._reveal = false;
  if(!b.queue.length){
    completeBurst();
  }
  render();
}

function skipCard(){
  /* Non-penalty skip: requeue to back, don't touch progress or attempt log. */
  const b = state.burst;
  if(!b || !b.active || state.lastAnswer) return;
  const word = b.queue[0];
  if(!word) return;
  b.queue.shift();
  requeueWord(word);
  state.sessionQueue = b.queue;
  state.sessionIdx = 0;
  state._reveal = false;
  _hintStage = 0;
  log('skip',{id:word.id});
  render();
}
window.skipCard = skipCard;

function drillVoice(){
  const b = state.burst;
  const word = (b && b.active) ? b.queue[0] : null;
  if(!word) return;
  startVoice(
    (alts) => {
      /* Use the TOP hypothesis (alts[0]) — don't cherry-pick a lower-ranked one */
      const top = alts[0];
      state.voiceResult = top.transcript;
      const c = $('#ansInput'); if(c) c.value = top.transcript;
      submitAns(true, top.transcript);
    },
    (err)=>{ if(err) log('voice_end_err',{err:String(err)}); }
  );
}

/* ---------- SENTENCE MODE ---------- */
function generateSentence(){
  /* Only return sentences where every slot got filled (no ___ placeholders) */
  const active = getActiveWords();
  for(let tries = 0; tries < 40; tries++){
    const t = SENTENCE_TEMPLATES[Math.floor(Math.random()*SENTENCE_TEMPLATES.length)];
    let pattern = t.pattern;
    let en = t.en;
    let filled = true;
    for(const [slot, themes] of Object.entries(t.slots)){
      const candidates = active.filter(w => themes.includes(w.theme));
      const pick = candidates.length ? candidates[Math.floor(Math.random()*candidates.length)] : null;
      if(!pick){ filled = false; break; }
      pattern = pattern.replaceAll('{'+slot+'}', pick.jp);
      en = en.replaceAll('{'+slot+'}', pick.en.split('/')[0]);
    }
    if(filled) return {jp: pattern, en, register: t.register, level: t.level, template: t};
  }
  /* fallback — accept one with placeholder so screen still works */
  const t = SENTENCE_TEMPLATES[0];
  return {jp: t.pattern, en: t.en, register: t.register, level: t.level, template: t};
}

function renderSentence(){
  const s = state._sentence || generateSentence();
  state._sentence = s;
  const fb = state._sentenceAnswer;
  const feedbackShowing = !!fb;
  return `
    <div class="card">
      <h3>Sentence Drill</h3>
      <div class="muted">Read the English, type the Japanese (hiragana). Enter submits.</div>
    </div>
    <div class="drill-card">

      <div class="drill-prompt" style="font-size:22px">${esc(s.en)}</div>
    </div>
    <input class="input" id="ansInput" placeholder="にほんご で タイプ して" autocomplete="off" autocapitalize="off" autocorrect="off" ${feedbackShowing?'disabled':''}>
    ${feedbackShowing ? `
      <div class="feedback-card ${fb.correct?'correct':'wrong'}">
        <div class="feedback-head">${fb.correct?'✓ Correct':'✗ Incorrect'}</div>
        <div class="feedback-body jp" style="font-size:20px">${esc(s.jp)}</div>
        <div class="drill-sub">${esc(s.en)}</div>
        ${!fb.correct && fb.userInput ? `<div class="feedback-smart">You wrote: <b>${esc(fb.userInput)}</b></div>` : ''}
      </div>
    ` : ''}
    <div class="audio-row">
      <button class="audio-btn" onclick="speakJP('${jsEsc(s.jp)}')">🔊 Listen</button>
      ${voiceSupported() ? `<button class="audio-btn" id="voiceBtn" onclick="sentenceVoice()">🎤 Speak</button>` : ''}
    </div>
    ${feedbackShowing ? `
      <button class="btn btn-primary" style="font-size:16px;padding:16px" onclick="sentenceNext()">Next sentence →</button>
    ` : `
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="sentenceReveal()">👀 Reveal</button>
        <button class="btn btn-primary" onclick="sentenceSubmit()">Submit</button>
      </div>
      <button class="btn btn-ghost" onclick="sentenceSkip()">🎲 Skip to new sentence</button>
    `}
    <div class="card">
      <h3>Hand-curated examples</h3>
      ${EXAMPLES.slice(0,10).map(ex => `
        <div class="word-row">
          <div class="word-main">
            <div class="word-jp">${esc(ex.jp)}</div>
            <div class="word-en">${esc(ex.en)} <span class="pill pill-${ex.register==='casual'?'learning':'guru'}" style="font-size:9px">${ex.register}</span></div>
          </div>
          <button class="btn btn-ghost" style="padding:4px 8px;font-size:11px" onclick="speakJP('${jsEsc(ex.jp)}')">🔊</button>
        </div>
      `).join('')}

}

function sentenceSubmit(){
  const s = state._sentence;
  if(!s) return;
  const inp = ($('#ansInput')?.value || '').trim();
  if(!inp){ return; }
  const correct = normJP(inp) === normJP(s.jp);
  state._sentenceAnswer = {correct, userInput: inp};
  log('sentence_attempt',{correct, tpl: s.template?.pattern});
  render();
  clearNextTimer();
  _nextTimer = setTimeout(() => { _nextTimer = null; sentenceNext(); }, correct ? 1200 : 2200);
}

function sentenceReveal(){
  state._sentenceAnswer = {correct:false, userInput: '', revealed:true};
  render();
}

function sentenceNext(){
  clearNextTimer();
  state._sentence = null;
  state._sentenceAnswer = null;
  render();
}

function sentenceSkip(){ sentenceNext(); }

/* ---------- PARTICLES ---------- */
function renderParticles(){
  if(!state._particleIdx && state._particleIdx !== 0) state._particleIdx = 0;
  if(!state._particleQueue) state._particleQueue = shuffleFY(PARTICLE_DRILLS.map((_,i)=>i));
  const idx = state._particleQueue[state._particleIdx % state._particleQueue.length];
  const d = PARTICLE_DRILLS[idx];
  const ans = state._particleAnswer;
  const particles = ['は','が','を','に','で','へ','と','も','の','から','まで','や'];

  const accept = d.accept || [d.blank];
  const isCorrect = ans && accept.includes(ans);
  return `
    <div class="card">
      <h3>Particle drills · ${state._particleIdx+1} / ${state._particleQueue.length}</h3>
      <div class="muted">Pick the particle that belongs in the blank.${accept.length>1?' <i>(multiple acceptable)</i>':''}</div>
    </div>
    <div class="drill-card">
      <div class="drill-cat">fill in the blank</div>
      <div class="drill-prompt jp">${esc(d.jp)}</div>
      <div class="drill-sub">${esc(d.en)}</div>
    </div>
    <div class="audio-row">
      <button class="audio-btn" onclick="speakJP('${jsEsc(d.jp.replace('___',d.blank))}')">🔊 Listen (with answer)</button>
    </div>
    <div class="tags" style="justify-content:center">
      ${particles.map(p => `<button class="tag ${ans===p?(accept.includes(p)?'active':''):''}" style="${ans===p && !accept.includes(p)?'background:var(--red);color:#fff;border-color:var(--red)':''}" onclick="answerParticle('${jsEsc(p)}')">${p}</button>`).join('')}
    </div>
    ${ans ? `<div class="feedback-card ${isCorrect?'correct':'wrong'}">
      <div class="feedback-head">${isCorrect?'✓ Correct':'✗ Wrong — accepted: '+accept.map(esc).join(' / ')}</div>
      <div class="feedback-body">${esc(d.jp.replace('___','<b>'+d.blank+'</b>'))}</div>
      <div class="feedback-smart">${esc(d.explain)}</div>
    </div>
    <button class="btn btn-primary" onclick="nextParticle()">Next particle →</button>` : ''}
  `;
}
function answerParticle(p){
  state._particleAnswer = p;
  const idx = state._particleQueue[state._particleIdx % state._particleQueue.length];
  const d = PARTICLE_DRILLS[idx];
  const accept = d.accept || [d.blank];
  log('particle_attempt',{idx, correct:accept.includes(p), chose:p});
  render();
}
function nextParticle(){
  state._particleAnswer = null;
  state._particleIdx++;
  if(state._particleIdx >= state._particleQueue.length){
    state._particleQueue = shuffleFY(PARTICLE_DRILLS.map((_,i)=>i));
    state._particleIdx = 0;
  }
  render();
}
window.answerParticle = answerParticle;
window.nextParticle = nextParticle;

/* ---------- DASHBOARD ---------- */
function renderDashboard(){
  const logs = state.logs || [];
  const attempts = logs.filter(l=>l.evt==='attempt');
  const last7d = attempts.filter(l=>l.ts > now() - 7*86400000);
  const today0 = new Date(); today0.setHours(0,0,0,0);
  const todayAttempts = attempts.filter(l=>l.ts >= today0.getTime());
  const todayCorrect = todayAttempts.filter(l=>l.data?.correct).length;
  const accToday = todayAttempts.length ? Math.round(100*todayCorrect/todayAttempts.length) : 0;
  const voiceAttempts = attempts.filter(l=>l.data?.voice).length;
  const hintsUsed = logs.filter(l=>l.evt==='hint_used').length;
  const particlesTried = logs.filter(l=>l.evt==='particle_attempt').length;
  const particlesCorrect = logs.filter(l=>l.evt==='particle_attempt' && l.data?.correct).length;

  /* per-word accuracy, weakest N */
  const perWord = {};
  for(const l of attempts){
    const id = l.data?.id; if(!id) continue;
    perWord[id] = perWord[id] || {c:0,t:0};
    perWord[id].t++;
    if(l.data?.correct) perWord[id].c++;
  }
  const weakestAll = Object.entries(perWord)
    .map(([id,s])=>({id, acc:s.c/s.t, t:s.t, w: state.words.find(x=>x.id===id)}))
    .filter(x=>x.w)
    .sort((a,b)=>a.acc-b.acc);
  const weakestPrimary = weakestAll.filter(x=>x.t>=3);
  const weakest = weakestPrimary.length ? weakestPrimary.slice(0,10) : weakestAll.slice(0,10);
  const lowSample = !weakestPrimary.length && weakest.length > 0;

  /* daily activity last 14 days */
  const days = [];
  for(let i=13;i>=0;i--){
    const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-i);
    const d2 = new Date(d); d2.setDate(d2.getDate()+1);
    const cnt = attempts.filter(l=>l.ts>=d.getTime() && l.ts<d2.getTime()).length;
    days.push({d:d.toISOString().slice(5,10), cnt});
  }
  const maxCnt = Math.max(1, ...days.map(d=>d.cnt));

  return `
    <div class="card">
      <h3>Today</h3>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num">${todayAttempts.length}</div><div class="stat-label">Reps</div></div>
        <div class="stat-box"><div class="stat-num">${accToday}%</div><div class="stat-label">Accuracy</div></div>
        <div class="stat-box"><div class="stat-num">${state.streak.current||0}</div><div class="stat-label">Streak</div></div>
        <div class="stat-box"><div class="stat-num">${voiceAttempts}</div><div class="stat-label">Voice</div></div>
      </div>
    </div>
    <div class="card">
      <h3>Last 14 days</h3>
      <div style="display:flex;align-items:flex-end;gap:3px;height:60px;padding:4px 0">
        ${days.map(d => `<div title="${d.d}: ${d.cnt}" style="flex:1;background:var(--red);min-height:2px;height:${Math.round(100*d.cnt/maxCnt)}%;border-radius:2px 2px 0 0"></div>`).join('')}
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:9px;color:var(--faint)">
        <span>${days[0].d}</span><span>${days[days.length-1].d}</span>
      </div>
    </div>
    <div class="card">
      <h3>Weakest 10 words (by accuracy)${lowSample?' <span class="pill pill-unverified" style="font-size:9px">low sample</span>':''}</h3>
      ${weakest.length ? weakest.map(x => `
        <div class="word-row">
          <div class="word-main">
            <div class="word-jp">${esc(x.w.jp)} <span class="word-r">${esc(x.w.romaji||'')}</span></div>
            <div class="word-en">${esc(x.w.en)}</div>
          </div>
          <div class="word-meta">${Math.round(x.acc*100)}% · ${x.t} tries</div>
        </div>
      `).join('') : '<div class="muted">Not enough data yet. Do a few drills.</div>'}
    </div>
    <div class="card">
      <h3>Other</h3>
      <div class="muted">
        7-day reps: <b>${last7d.length}</b><br>
        Hints used: <b>${hintsUsed}</b><br>
        Particle drills: <b>${particlesCorrect}/${particlesTried}</b> correct<br>
        Events logged: <b>${logs.length}</b>
      </div>
    </div>
  `;
}

function sentenceVoice(){
  const s = state._sentence;
  if(!s) return;
  startVoice(
    (alts)=>{
      const target = normJP(s.jp);
      let best = alts[0]; let bestScore = levenshtein(normJP(alts[0].transcript), target);
      for(const a of alts){ const sc = levenshtein(normJP(a.transcript), target); if(sc < bestScore){ best=a; bestScore=sc; } }
      const dist = bestScore; const maxLen = target.length;
      const pct = Math.max(0, Math.round(100*(1 - dist/maxLen)));
      alert(`Heard: "${best.transcript}"\nMatch: ${pct}% (${dist} char diff)`);
      log('sentence_voice',{heard:best.transcript, pct});
    },
    ()=>{}
  );
}

function handleImport(ev){
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const d = JSON.parse(r.result);
      if(!confirm(`Import ${Object.keys(d.stats||{}).length} word stats + ${(d.notes||[]).length} notes? Existing data will be merged (existing keys kept).`)) return;
      if(d.words) for(const w of d.words) if(!state.words.find(x=>x.id===w.id)) state.words.push(w);
      if(d.stats) for(const k in d.stats) if(!state.stats[k]) state.stats[k] = d.stats[k];
      if(d.formStats){
        if(!state.formStats) state.formStats = {};
        for(const wid in d.formStats){
          if(!state.formStats[wid]) state.formStats[wid] = {};
          for(const fid in d.formStats[wid]){
            if(!state.formStats[wid][fid]) state.formStats[wid][fid] = d.formStats[wid][fid];
          }
        }
      }
      if(d.notes) for(const n of d.notes) if(!state.notes.find(x=>x.id===n.id)) state.notes.push(n);
      if(d.settings) state.settings = {...state.settings, ...d.settings};
      if(d.streak) state.streak = {...state.streak, ...d.streak};
      if(d.kanaStats){
        if(!state.kanaStats) state.kanaStats = {};
        for(const k in d.kanaStats) if(!state.kanaStats[k]) state.kanaStats[k] = d.kanaStats[k];
      }
      save(); load(); alert('Import complete.'); render();
    }catch(e){ alert('Import failed: '+e.message); }
  };
  r.readAsText(f);
}
function exportNotes(){

}

/* ---------- ASK CLAUDE ---------- */
const ASK_CLAUDE_SYSTEM = `You are Julius's Japanese sparring partner. He is a beginner/intermediate learner focused on conversational fluency — not JLPT. He attends a weekly JAPANEASY class and a language exchange.

Teach like a peer, not a teacher. Direct, casual, encouraging. No hedging. Don't lecture.

Hard rules:
- Write ALL Japanese in HIRAGANA ONLY. Never kanji. Never romaji unless Julius explicitly asks.
- Reply in concise English with short Japanese examples inline.
- Keep answers to 3–6 sentences by default. Expand only when asked.
- Prioritise conversational utility over grammar theory.
- Register-tag every Japanese example: [casual], [polite], or [formal].
- Flag anything uncertain so his JAPANEASY teacher can confirm.

When he asks about a word: give meaning, register, 1–2 short hiragana examples (register-tagged), and any close-but-wrong siblings he might confuse it with.

When he asks about a grammar pattern: show the pattern with 2–3 substitution examples using common N5-level words in hiragana, each register-tagged.

When he writes Japanese and asks to check it: correct gently, show the fix in hiragana, explain in one sentence.

Watch for these common beginner error patterns and proactively flag when his question touches one:
- い-adjective drop: dropping い before です (e.g. "たのし です" — wrong; should be "たのしい です")
- に vs で confusion: に for destinations, existence, and targets; で for locations of action and means/method
- は vs が: は for topic, が for subject/new information; が goes with すき, ある, いる, ほしい
- Transitive / intransitive pairs: はじまる vs はじめる, あく vs あける, きえる vs けす, でる vs だす, はいる vs いれる
- Stem vs dictionary form: ます-stem (たべ) vs dictionary (たべる) — ます-stem does not stand alone
- Particle drops in polite speech: don't drop を or が the way casual speech allows

Use examples from daily life — food, trains, weather, friends, work. Julius's ethos is "mayoeba yaburu" — hesitate and you lose. Match that energy: pick the most useful thing and say it plainly.`;

function currentClaudeContext(){

    const b = state.burst;
    const w = b && b.active ? b.queue[0] : null;
    if(w) return {hint:'this card', text:`I'm drilling this card: ${w.jp}${w.romaji?' ('+w.romaji+')':''} — ${w.en}${b.isPattern?` · pattern: ${b.patternName}`:''}.`};
  }
  if(s === 'sentence'){
    return {hint:'sentences', text:`I'm in Sentences mode.`};
  }
  if(s === 'convoDetail'){
    const id = state._navData;
    const sc = SCENARIOS.find(x=>x.id===id);
    if(sc) return {hint:'this scenario', text:`I'm reviewing the "${sc.title}" conversation scenario.`};

  return null;
}

async function sendAskClaude(){
  const inp = $('#askInput');
  const btn = $('#askSendBtn');
  const status = $('#chatStatus');
  const key = (state.settings.anthropicKey || '').trim();
  if(!key){ if(status) status.textContent = 'No API key set — open Settings first.'; return; }
  const text = (inp?.value || '').trim();
  if(!text) return;
  const ctx = currentClaudeContext();
  const fullText = ctx && (state.askClaude.messages.length === 0) ? `${ctx.text}\n\n${text}` : text;

  state.askClaude.messages.push({role:'user', content:fullText});
  save();
  if(inp) inp.value = '';
  if(btn) btn.disabled = true;
  if(status) status.textContent = 'thinking…';
  const logEl = $('#chatLog');
  if(logEl){
    logEl.insertAdjacentHTML('beforeend', renderChatMsg({role:'user', content:fullText}));
    scrollChatToBottom();
  }

  try{
    const model = state.settings.anthropicModel || 'claude-haiku-4-5-20251001';
    const history = state.askClaude.messages.slice(-20).map(m => ({role:m.role, content:m.content}));
    const body = {
      model,
      max_tokens: 1024,
      system: [{type:'text', text: ASK_CLAUDE_SYSTEM, cache_control:{type:'ephemeral'}}],
      messages: history
    };
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers: {
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
        'content-type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    if(!res.ok){
      const errTxt = await res.text().catch(()=>String(res.status));
      let friendly = `${res.status}`;
      if(res.status === 401) friendly += ' — API key rejected. Re-check the key in Settings (extra spaces? wrong account?).';
      else if(res.status === 400) friendly += ' — bad request. Try a shorter message or different model.';
      else if(res.status === 429) friendly += ' — rate limited or out of credits. Check console.anthropic.com billing.';
      else if(res.status === 529 || res.status === 503) friendly += ' — Anthropic overloaded. Try again in a moment.';
      throw new Error(`${friendly}\n\n${errTxt.slice(0,400)}`);
    }
    const data = await res.json();
    const reply = (data.content || []).map(c => c.text || '').join('').trim() || '(empty reply)';
    state.askClaude.messages.push({role:'assistant', content: reply});
    save();
    if(logEl){
      logEl.insertAdjacentHTML('beforeend', renderChatMsg({role:'assistant', content:reply}));
      scrollChatToBottom();
    }
    if(status){
      const usage = data.usage || {};
      const cache = usage.cache_read_input_tokens ? ` · ${usage.cache_read_input_tokens} cached` : '';
      status.textContent = `${usage.input_tokens||'?'} in · ${usage.output_tokens||'?'} out${cache}`;
    }
    log('ask_claude_ok',{model, in:(data.usage||{}).input_tokens, out:(data.usage||{}).output_tokens});
  } catch(e){
    if(logEl){
      logEl.insertAdjacentHTML('beforeend', `<div class="chat-msg err">Request failed: ${esc(String(e.message||e))}</div>`);
      scrollChatToBottom();
    }
    if(status) status.textContent = 'error';
    log('ask_claude_err',{err:String(e.message||e)});
  } finally {
    if(btn) btn.disabled = false;
    if(inp){ inp.focus(); }
  }
}

/* ---------- SCREEN BINDING ---------- */
function bindScreen(){
  const inp = $('#ansInput');
  const isSentence = state.screen === 'sentence';
  const isDrill = state.screen === 'drill';
  const sentenceFb = isSentence && !!state._sentenceAnswer;
  const drillFb = isDrill && !!state.lastAnswer;
  const feedbackShowing = sentenceFb || drillFb;

  if(inp){
    if(!inp.disabled) inp.focus();
    inp.onkeydown = (e) => {
      if(e.key !== 'Enter') return;
      e.preventDefault();
      if(feedbackShowing){
        if(isSentence) sentenceNext(); else nextCard();
      } else {
        if(isSentence) sentenceSubmit(); else submitAns(false);
      }
    };
  }
  /* Global Enter-to-advance when feedback showing but no active input (self-grade path) */
  if(feedbackShowing && (!inp || inp.disabled)){
    document.onkeydown = (e) => {
      if(e.key === 'Enter'){
        e.preventDefault();
        if(isSentence) sentenceNext(); else nextCard();
        document.onkeydown = null;
      }
    };
  } else {
    document.onkeydown = null;
  }
  if(isDrill && state.settings.swipeOn) bindSwipe();
}

/* Swipe gestures on drill card */
let _swipe = {x0:0, y0:0, t0:0};
function bindSwipe(){
  const card = $('.drill-card');
  if(!card) return;
  card.ontouchstart = (e)=>{ const t=e.touches[0]; _swipe={x0:t.clientX, y0:t.clientY, t0:Date.now()}; };
  card.ontouchend = (e)=>{
    const t = e.changedTouches[0];
    const dx = t.clientX - _swipe.x0;
    const dy = t.clientY - _swipe.y0;
    const dt = Date.now() - _swipe.t0;
    if(dt > 700) return;
    if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.5){
      if(dx < 0){
        /* swipe left → advance only if feedback is showing (no skip in burst mode) */
        if(state.lastAnswer) nextCard();
      } else {
        /* swipe right → submit or advance */
        if(state.lastAnswer) nextCard(); else submitAns(false);
      }
    } else if(Math.abs(dy) > 60 && Math.abs(dy) > Math.abs(dx)*1.5){
      /* swipe up → reveal. Guard: do nothing while feedback is showing so
         we don't call applyBurstResult twice on an already-committed word. */
      if(dy < 0){ if(!state.lastAnswer) revealAnswer(); }
      else if(voiceSupported() && !state.lastAnswer) drillVoice(); /* swipe down → voice */
    }
  };
}

/* ---------- INIT ---------- */
function init(){
  load();
  /* SW registration */
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
  /* Nav wiring */
  $$('.nav-btn').forEach(b => b.onclick = () => nav(b.dataset.screen));
  $('#notesFab').onclick = openNotes;
  const askFab = $('#askFab'); if(askFab) askFab.onclick = openAskClaude;
  $('#backFab').onclick = goBack;
  $('#modal').onclick = (e)=>{ if(e.target.id==='modal') closeModal(); };

  /* Browser history — native back button/gesture works */
  window.addEventListener('popstate', (e) => {
    const s = (e.state && e.state.screen) || 'home';
    const d = e.state && e.state.data;
    nav(s, d, true);
  });
  /* seed initial history */
  try{ history.replaceState({screen:'home'}, '', '#home'); }catch(e){}

  /* Prime voices list — some browsers populate async */
  try{
    if('speechSynthesis' in window){
      const v = window.speechSynthesis.getVoices();
      if(v && v.length) _ttsVoicesReady = true;
      else window.speechSynthesis.addEventListener('voiceschanged', () => { _ttsVoicesReady = true; }, {once:true});
    }
  }catch(e){}
  render();
  updateBackFab();
  log('init',{v:APP_VERSION, words:state.words.length});
}

function removeWord(id){
  if(!confirm('Remove this word from your active deck? You can restore it later in Settings.')) return;
  const r = state.settings.removedWords || [];
  if(!r.includes(id)) r.push(id);
  state.settings.removedWords = r;
  /* also drop from burst queue if present */
  if(state.burst && state.burst.active){
    state.burst.queue = state.burst.queue.filter(w=>w.id!==id);
    state.burst.words = state.burst.words.filter(w=>w.id!==id);
    if(!state.burst.queue.length){ completeBurst(); }
  }
  save(); render();
}
function restoreWord(id){
  state.settings.removedWords = (state.settings.removedWords||[]).filter(x=>x!==id);
  save(); render();
}
window.removeWord = removeWord;
window.restoreWord = restoreWord;
