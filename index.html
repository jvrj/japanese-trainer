/* =========================================================================
   FORM BLITZ (v4.25) — mixed-form, recall-direction.
   Pool = (verb, form) pairs drawn from Vocab-Blitz-graduated verbs × all forms.
   Card shows conjugated JP + form badge; user types English meaning.
   Graded lenient via form.accept() — base-verb recognition counts.
   Mirrors Vocab Blitz rhythm: streak=3, mature fast-path, continuous refill.
   ========================================================================= */

const FORM_BLITZ_STREAK_REQUIRED = 3;
const FORM_BLITZ_MATURE_MIN = SM_MASTERED_DAYS * 24 * 60; /* 7 d */
const FORM_BLITZ_POOL_LEARNING = 8;
const FORM_BLITZ_POOL_MATURE = 4;
const FORM_BLITZ_MIN_PAIRS = 1; /* v4.28: gate effectively removed — any deck with a verb unlocks Form Blitz */

function fbKey(verbId, formId){ return verbId + '|' + formId; }

function eligibleFormPairs(){
  const verbs = formEligibleVerbs();
  const out = [];
  for(const w of verbs){
    for(const f of FORMS) out.push({verbId:w.id, formId:f.id});
  }
  return out;
}

function buildFormBlitzPool(opts){
  opts = opts || {};
  const targetLearn = opts.targetLearn ?? FORM_BLITZ_POOL_LEARNING;
  const targetMature = opts.targetMature ?? FORM_BLITZ_POOL_MATURE;
  const exclude = opts.excludeKeys || new Set();
  const pairs = eligibleFormPairs().filter(p => !exclude.has(fbKey(p.verbId, p.formId)));
  const t = now();
  const unseen = [], youngDue = [], youngNotDue = [], matureDue = [];
  for(const p of pairs){
    const fst = state.formStats?.[p.verbId]?.[p.formId];
    if(!fst){ unseen.push(p); continue; }
    ensureSm(fst);
    if(fst.smInterval >= FORM_BLITZ_MATURE_MIN){
      if(fst.smNext <= t) matureDue.push({p, next: fst.smNext});
    } else {
      if(fst.smNext <= t) youngDue.push({p, next: fst.smNext});
      else youngNotDue.push({p, next: fst.smNext});
    }
  }
  matureDue.sort((a,b)=>a.next-b.next);
  youngDue.sort((a,b)=>a.next-b.next);
  youngNotDue.sort((a,b)=>a.next-b.next);
  const matureSel = matureDue.slice(0, targetMature).map(x => x.p);
  const learningSel = [
    ...youngDue.map(x => x.p),
    ...shuffleFY(unseen),
    ...youngNotDue.map(x => x.p),
  ].slice(0, targetLearn);
  return shuffleFY([
    ...matureSel.map(p => ({verbId:p.verbId, formId:p.formId, streak:0, required:1, answers:0, everWrong:false, mature:true})),
    ...learningSel.map(p => ({verbId:p.verbId, formId:p.formId, streak:0, required:FORM_BLITZ_STREAK_REQUIRED, answers:0, everWrong:false, mature:false})),
  ]);
}

function formBlitzRefillIfNeeded(){
  if(!state.formBlitz || !state.formBlitz.active) return;
  const target = state.formBlitz.poolTarget;
  if(!target) return;
  const halfway = Math.ceil(target / 2);
  if(state.formBlitz.pool.length > halfway) return;
  const deficit = target - state.formBlitz.pool.length;
  if(deficit <= 0) return;
  const exclude = new Set([
    ...state.formBlitz.pool.map(p => fbKey(p.verbId, p.formId)),
    ...state.formBlitz.graduated,
  ]);
  const defMature = Math.floor(deficit / 3);
  const defLearn = deficit - defMature;
  const fresh = buildFormBlitzPool({targetLearn:defLearn, targetMature:defMature, excludeKeys:exclude});
  if(!fresh.length) return;
  state.formBlitz.pool.push(...fresh);
  state.formBlitz.tally.total += fresh.length;
  state.formBlitz.tally.refills = (state.formBlitz.tally.refills || 0) + 1;
}

function startFormBlitz(){
  const pairs = eligibleFormPairs();
  if(!pairs.length){
    alert('Your deck has no verbs yet. Add a verb or enable the N5 pack in Settings.');
    return;
  }
  const poolTarget = FORM_BLITZ_POOL_LEARNING + FORM_BLITZ_POOL_MATURE;
  const pool = buildFormBlitzPool();
  if(!pool.length){
    alert('No form pairs available right now.');
    return;
  }
  const direction = state.settings.formBlitzDirection || 'jp-en';
  state.formBlitz = {
    active:true, complete:false,
    direction,
    currentDir: resolveBlitzDir(direction),
    pool, graduated:[], recent:[],
    currentKey: fbKey(pool[0].verbId, pool[0].formId),
    submitted:false, input:'', autoCorrect:null, justGraduated:null,
    totalAnswers:0, poolTarget,
    tally:{correct:0, wrong:0, graduated:0, total:pool.length, refills:0}
  };
  clearNextTimer();
  nav('formBlitz');
}
window.startFormBlitz = startFormBlitz;

function formBlitzCurrentPair(){
  if(!state.formBlitz || !state.formBlitz.active) return null;
  return state.formBlitz.pool.find(p => fbKey(p.verbId, p.formId) === state.formBlitz.currentKey) || null;
}
function formBlitzCurrentWord(){
  const p = formBlitzCurrentPair();
  if(!p) return null;
  return state.words.find(w => w.id === p.verbId) || null;
}
function formBlitzCurrentForm(){
  const p = formBlitzCurrentPair();
  if(!p) return null;
  return FORMS.find(f => f.id === p.formId) || null;
}

function formBlitzPickNext(){
  if(!state.formBlitz) return null;
  const pool = state.formBlitz.pool;
  if(!pool.length) return null;
  const gap = Math.min(3, pool.length - 1);
  const blocked = new Set((state.formBlitz.recent || []).slice(-gap));
  const eligible = pool.filter(p => !blocked.has(fbKey(p.verbId, p.formId)));
  const candidates = eligible.length ? eligible : pool;
  const pick = candidates[Math.floor(Math.random() * candidates.length)];
  return fbKey(pick.verbId, pick.formId);
}

let formBlitzAdvanceTimer = null;
function clearFormBlitzAdvanceTimer(){ if(formBlitzAdvanceTimer){ clearTimeout(formBlitzAdvanceTimer); formBlitzAdvanceTimer = null; } }

function formBlitzAcceptSet(w, f){
  const out = new Set();
  const fromForm = f.accept ? f.accept(w) : [f.en(w)];
  for(const s of fromForm){
    const n = normEN(s);
    if(n) out.add(n);
  }
  for(const alt of enAlternatives(w.en)){
    if(alt) out.add(alt);
  }
  return out;
}

function formBlitzCheck(input, w, f, dir){
  const d = dir || 'jp-en';
  if(d === 'en-jp'){
    /* Production: user types the conjugated form in hiragana. Single canonical target. */
    const target = normJP(f.conj(w.jp));
    const got = normJP(input);
    if(!got) return false;
    return got === target;
  }
  const n = normEN(input);
  if(!n) return false;
  return formBlitzAcceptSet(w, f).has(n);
}

function formBlitzToggleDir(){
  if(!state.formBlitz) return;
  const next = {'jp-en':'en-jp', 'en-jp':'mixed', 'mixed':'jp-en'};
  state.formBlitz.direction = next[state.formBlitz.direction] || 'jp-en';
  state.formBlitz.currentDir = resolveBlitzDir(state.formBlitz.direction);
  state.settings.formBlitzDirection = state.formBlitz.direction;
  save();
  render();
  setTimeout(() => $('#formBlitzInput')?.focus(), 30);
}
window.formBlitzToggleDir = formBlitzToggleDir;

function formBlitzRecord(pair, isCorrect){
  updateStreak(isCorrect);
  const fst = formStatFor(pair.verbId, pair.formId);
  ensureSm(fst);
  fst.reviewCount = (fst.reviewCount || 0) + 1;
  fst.lastReviewed = now();
  if(isCorrect){ fst.correctCount = (fst.correctCount || 0) + 1; }
  else { fst.wrongCount = (fst.wrongCount || 0) + 1; }
  pair.answers++;
  state.formBlitz.totalAnswers++;
  state.formBlitz.recent = [...(state.formBlitz.recent || []), fbKey(pair.verbId, pair.formId)].slice(-4);
  if(isCorrect){
    pair.streak++;
    state.formBlitz.tally.correct++;
    if(pair.streak >= pair.required){
      smGrade(fst, 'good');
      const k = fbKey(pair.verbId, pair.formId);
      state.formBlitz.pool = state.formBlitz.pool.filter(p => fbKey(p.verbId, p.formId) !== k);
      state.formBlitz.graduated.push(k);
      state.formBlitz.tally.graduated++;
      state.formBlitz.justGraduated = k;
    } else {
      state.formBlitz.justGraduated = null;
    }
  } else {
    pair.streak = 0;
    pair.everWrong = true;
    state.formBlitz.tally.wrong++;
    state.formBlitz.justGraduated = null;
  }
}

function formBlitzSubmit(){
  if(!state.formBlitz || state.formBlitz.submitted) return;
  const pair = formBlitzCurrentPair();
  const w = formBlitzCurrentWord();
  const f = formBlitzCurrentForm();
  if(!pair || !w || !f) return;
  const inp = $('#formBlitzInput');
  state.formBlitz.input = inp?.value || '';
  const correct = formBlitzCheck(state.formBlitz.input, w, f, state.formBlitz.currentDir || state.formBlitz.direction);
  state.formBlitz.autoCorrect = correct;
  state.formBlitz.submitted = true;
  formBlitzRecord(pair, correct);
  save();
  render();
  clearFormBlitzAdvanceTimer();
  setTimeout(() => $('#formBlitzContinue')?.focus(), 30);
  const ms = correct ? 900 : 2000;
  formBlitzAdvanceTimer = setTimeout(formBlitzAdvance, ms);
}
window.formBlitzSubmit = formBlitzSubmit;

function formBlitzReveal(){
  if(!state.formBlitz || state.formBlitz.submitted) return;
  const pair = formBlitzCurrentPair();
  if(!pair) return;
  const inp = $('#formBlitzInput');
  state.formBlitz.input = inp?.value || '';
  state.formBlitz.autoCorrect = false;
  state.formBlitz.submitted = true;
  formBlitzRecord(pair, false);
  save();
  render();
  clearFormBlitzAdvanceTimer();
  setTimeout(() => $('#formBlitzContinue')?.focus(), 30);
  formBlitzAdvanceTimer = setTimeout(formBlitzAdvance, 2000);
}
window.formBlitzReveal = formBlitzReveal;

function formBlitzAdvance(){
  clearFormBlitzAdvanceTimer();
  if(!state.formBlitz) return;
  state.formBlitz.submitted = false;
  state.formBlitz.input = '';
  state.formBlitz.autoCorrect = null;
  state.formBlitz.justGraduated = null;
  formBlitzRefillIfNeeded();
  if(!state.formBlitz.pool.length){
    state.formBlitz.active = false;
    state.formBlitz.complete = true;
    state.formBlitz.currentKey = null;
    save();
    render();
    return;
  }
  state.formBlitz.currentKey = formBlitzPickNext();
  state.formBlitz.currentDir = resolveBlitzDir(state.formBlitz.direction);
  save();
  render();
  setTimeout(() => $('#formBlitzInput')?.focus(), 30);
}
window.formBlitzAdvance = formBlitzAdvance;

function formBlitzSkip(){
  if(!state.formBlitz) return;
  if(!confirm('Skip this card without recording it?')) return;
  clearFormBlitzAdvanceTimer();
  const k = state.formBlitz.currentKey;
  state.formBlitz.pool = state.formBlitz.pool.filter(p => fbKey(p.verbId, p.formId) !== k);
  state.formBlitz.submitted = false;
  state.formBlitz.input = '';
  state.formBlitz.autoCorrect = null;
  state.formBlitz.justGraduated = null;
  if(!state.formBlitz.pool.length){
    state.formBlitz.active = false;
    state.formBlitz.complete = true;
    state.formBlitz.currentKey = null;
  } else {
    state.formBlitz.currentKey = formBlitzPickNext();
    state.formBlitz.currentDir = resolveBlitzDir(state.formBlitz.direction);
  }
  save();
  render();
  setTimeout(() => $('#formBlitzInput')?.focus(), 30);
}
window.formBlitzSkip = formBlitzSkip;

function formBlitzEnd(){
  clearFormBlitzAdvanceTimer();
  if(state.formBlitz && state.formBlitz.active){
    const struggled = state.formBlitz.pool.filter(p => p.everWrong);
    for(const p of struggled){
      const fst = formStatFor(p.verbId, p.formId);
      smGrade(fst, 'again');
    }
    save();
  }
  state.formBlitz = null;
  nav('forms');
}
window.formBlitzEnd = formBlitzEnd;

function renderFormBlitz(){
  const b = state.formBlitz;
  if(!b) return `<div class="card"><div class="muted">No active Form Blitz session.</div>
    <button class="btn btn-primary" style="margin-top:12px" onclick="startFormBlitz()">Start</button></div>`;

  if(b.complete){
    const t = b.tally;
    const attempts = t.correct + t.wrong;
    const accPct = attempts ? Math.round(100*t.correct/attempts) : 0;
    return `<div class="card">
      <h2 style="margin-top:0">Form deck clear</h2>
      <div class="muted" style="font-size:13px;margin-bottom:8px">Every pair graduated or the well ran dry. Come back later when reviews come due.</div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num">${t.graduated}</div><div class="stat-label">Graduated</div></div>
        <div class="stat-box"><div class="stat-num">${t.correct}</div><div class="stat-label">Correct</div></div>
        <div class="stat-box"><div class="stat-num">${t.wrong}</div><div class="stat-label">Wrong</div></div>
        <div class="stat-box"><div class="stat-num">${accPct}%</div><div class="stat-label">Accuracy</div></div>
      </div>
      <div class="spacer"></div>
      <button class="btn btn-primary" style="width:100%" onclick="startFormBlitz()">Start another session</button>
      <div class="spacer"></div>
      <button class="btn btn-secondary" style="width:100%" onclick="formBlitzEnd()">Done</button>
    </div>`;
  }

  const pair = formBlitzCurrentPair();
  const w = formBlitzCurrentWord();
  const f = formBlitzCurrentForm();
  if(!pair || !w || !f) return `<div class="card"><div class="muted">No cards.</div></div>`;

  const conj = f.conj(w.jp);
  const baseEn = stripTo(w.en);
  const cur = b.currentDir || b.direction || 'jp-en';
  const streakLabel = pair.mature ? 'Mature · confirm 1×' : `Streak ${pair.streak}/${pair.required}`;
  const progressLabel = `${b.tally.graduated}/${b.tally.total} graduated · pool ${b.pool.length}`;
  const curArrow = cur === 'jp-en' ? 'JP → EN' : 'EN → JP';
  const dirLabel = b.direction === 'mixed' ? `Mixed · ${curArrow}` : curArrow;

  const head = `<div class="card" style="padding:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <span class="muted" style="font-size:13px">${esc(progressLabel)}</span>
      <span class="muted" style="font-size:12px">${esc(streakLabel)}</span>
      <button class="btn btn-secondary" style="padding:6px 10px;font-size:12px" onclick="formBlitzToggleDir()">${esc(dirLabel)} ⇄</button>
    </div>
  </div>`;

  const promptBig = cur === 'jp-en' ? conj : baseEn;
  const promptSide = cur === 'jp-en' ? 'Japanese' : 'English';
  const inputPh = cur === 'jp-en' ? 'type English meaning' : 'type Japanese in hiragana';

  if(!b.submitted){
    return head + `<div class="card">
      <div class="muted" style="font-size:12px;margin-bottom:6px">${promptSide} · ${esc(f.name)} form</div>
      <div style="font-size:32px;text-align:center;padding:16px 0 6px">${esc(promptBig)}</div>
      <div class="muted" style="text-align:center;font-size:12px;margin-bottom:12px">[${esc(f.name)}] · ${esc(f.hint)}</div>
      <input id="formBlitzInput" class="input" type="text" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="${esc(inputPh)}" onkeydown="if(event.key==='Enter'){event.preventDefault();formBlitzSubmit();}">
      <div class="spacer"></div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="formBlitzReveal()">Reveal</button>
        <button class="btn btn-primary" onclick="formBlitzSubmit()">Submit</button>
      </div>
      <div class="spacer"></div>
      <button class="btn btn-secondary" style="width:100%;font-size:12px" onclick="formBlitzSkip()">Skip card</button>
    </div>`;
  }

  const correct = !!b.autoCorrect;
  const graduated = !!b.justGraduated;
  const accent = graduated ? 'var(--blue)' : (correct ? 'var(--green)' : 'var(--red)');
  const fst = state.formStats?.[pair.verbId]?.[pair.formId];
  const nextLbl = (graduated && fst) ? smIntervalLabel(fst.smInterval) : '';
  const verdict = graduated ? `Graduated ✓ · next in ${esc(nextLbl)}` : (correct ? 'Correct' : 'Wrong');
  const userShown = b.input ? esc(b.input) : '<span class="muted">(nothing typed)</span>';
  const idealEn = f.en(w);
  const streakAfter = graduated ? '' : (correct
    ? `<div class="muted" style="font-size:12px;text-align:center;margin-top:4px">Streak ${pair.streak}/${pair.required}</div>`
    : `<div class="muted" style="font-size:12px;text-align:center;margin-top:4px">Streak reset — keep drilling</div>`);

  const revealRows = cur === 'jp-en'

/* =========================================================================
   KANA BLITZ — streak-based retention. Separate track from SM-2.
   Retire: 5 correct in a row. Maintenance: retired kana resurface weekly.
   Confusion-pair surfacing: on fail of a tagged char, partner is next.
   ========================================================================= */

const KANA_RETIRE_STREAK = 5;
const KANA_MAINTENANCE_DAYS = 7;
const KANA_SESSION_TARGET = 15;

function kanaStatFor(k){
  if(!state.kanaStats) state.kanaStats = {};
  if(!state.kanaStats[k]){
    state.kanaStats[k] = {streak:0, retired:false, retiredAt:null, lastSeen:null, correctCount:0, wrongCount:0};
  }
  return state.kanaStats[k];
}

function kanaDueForMaintenance(k){
  const st = state.kanaStats && state.kanaStats[k];
  if(!st || !st.retired) return false;
  const days = (now() - (st.retiredAt || 0)) / (1000*60*60*24);
  return days >= KANA_MAINTENANCE_DAYS;
}

/* Weighted shuffle (Efraimidis–Spirakis): higher-weight items tend to land
   earlier in the result. Each item appears once. Used to front-load the
   worst-performing kana when the learning pool exceeds available slots. */
function weightedShuffle(items, weightFn){
  return items
    .map(item => {
      const w = Math.max(0.0001, weightFn(item));
      return { item, key: Math.random() ** (1 / w) };
    })
    .sort((a, b) => b.key - a.key)
    .map(x => x.item);
}

function kanaStruggleWeight(item){
  const st = state.kanaStats[item.k];
  if(!st) return 1;
  /* Wrongs hurt more when streak is cold; a hot streak dampens past sins. */
  const coolFactor = 1 - (st.streak || 0) / KANA_RETIRE_STREAK;
  return 1 + (st.wrongCount || 0) * coolFactor;
}

function buildKanaPool(scope){
  const inScope = item => {
    if(scope === 'hiragana' && item.script !== 'h') return false;
    if(scope === 'katakana' && item.script !== 'k') return false;
    return true;
  };
  const eligible = KANA_FULL.filter(item => {
    if(!inScope(item)) return false;
    const st = state.kanaStats[item.k];
    if(!st) return true;
    if(!st.retired) return true;
    return kanaDueForMaintenance(item.k);
  });
  /* v6.2 — Review fallback: if everything in scope is retired and nothing is
     yet due for maintenance, build a session from all in-scope kana so the
     user can always drill. Streak/wrong tracking still applies normally. */
  if(!eligible.length){
    const all = KANA_FULL.filter(inScope);
    return weightedShuffle(all, kanaStruggleWeight).slice(0, KANA_SESSION_TARGET);
  }
  const maintenance = [], unseen = [], learning = [];
  for(const item of eligible){
    const st = state.kanaStats[item.k];
    if(!st) unseen.push(item);
    else if(st.retired) maintenance.push(item);
    else learning.push(item);
  }
  /* v6.5 — interleave the three buckets via final shuffle so re-entry
     doesn't always open with the same maintenance → unseen → learning run. */
  const composed = [
    ...shuffleFY(maintenance).slice(0, 4),
    ...shuffleFY(unseen).slice(0, 8),
    ...weightedShuffle(learning, kanaStruggleWeight),
  ].slice(0, KANA_SESSION_TARGET);
  return shuffleFY(composed);
}

function startKanaBlitz(scope){
  scope = scope || 'all';
  if(!state.kanaStats) state.kanaStats = {};
  const pool = buildKanaPool(scope);
  if(!pool.length){
    alert('All kana retired! Great work. Check back in a week for maintenance.');
    return;
  }
  state.kanaBlitz = {
    active:true, complete:false,
    scope,
    pool,
    idx:0,
    submitted:false,
    input:'',
    autoCorrect:null,
    lastFailedK:null,
    tally:{correct:0, wrong:0, retired:0, total:pool.length},
  };
  nav('kanaBlitz');
}
window.startKanaBlitz = startKanaBlitz;

function kanaBlitzCurrent(){
  if(!state.kanaBlitz || !state.kanaBlitz.active) return null;
  return state.kanaBlitz.pool[state.kanaBlitz.idx] || null;
}

function kanaBlitzCheck(input, item){
  const i = (input||'').toLowerCase().trim().replace(/\s+/g,'');
  if(!i) return false;
  if(i === item.r) return true;
  if(item.alt && item.alt.includes(i)) return true;
  return false;
}

function kanaBlitzRecordAnswer(item, correct){
  updateStreak(correct);
  const st = kanaStatFor(item.k);
  st.lastSeen = now();
  if(correct){
    st.streak++;
    st.correctCount++;
    state.kanaBlitz.tally.correct++;
    if(st.streak >= KANA_RETIRE_STREAK && !st.retired){
      st.retired = true;
      st.retiredAt = now();
      state.kanaBlitz.tally.retired++;
    } else if(st.retired){
      st.retiredAt = now();
    }
    state.kanaBlitz.lastFailedK = null;
  } else {
    st.streak = 0;
    st.wrongCount++;
    st.retired = false;
    st.retiredAt = null;
    state.kanaBlitz.tally.wrong++;
    state.kanaBlitz.lastFailedK = item.k;
  }
}

function kanaBlitzSubmit(){
  if(!state.kanaBlitz || state.kanaBlitz.submitted) return;
  const item = kanaBlitzCurrent();
  if(!item) return;
  const inp = $('#kanaInput');
  state.kanaBlitz.input = inp?.value || '';
  const correct = kanaBlitzCheck(state.kanaBlitz.input, item);
  state.kanaBlitz.autoCorrect = correct;
  state.kanaBlitz.submitted = true;
  kanaBlitzRecordAnswer(item, correct);
  save();
  render();
  setTimeout(() => $('#kanaContinue')?.focus(), 30);
}
window.kanaBlitzSubmit = kanaBlitzSubmit;

function kanaBlitzReveal(){
  if(!state.kanaBlitz || state.kanaBlitz.submitted) return;
  const item = kanaBlitzCurrent();
  if(!item) return;
  const inp = $('#kanaInput');
  state.kanaBlitz.input = inp?.value || '';
  state.kanaBlitz.autoCorrect = false;
  state.kanaBlitz.submitted = true;
  kanaBlitzRecordAnswer(item, false);
  save();
  render();
  setTimeout(() => $('#kanaContinue')?.focus(), 30);
}
window.kanaBlitzReveal = kanaBlitzReveal;

function kanaBlitzSkip(){
  if(!state.kanaBlitz) return;
  state.kanaBlitz.lastFailedK = null;
  state.kanaBlitz.submitted = false;
  state.kanaBlitz.input = '';
  state.kanaBlitz.autoCorrect = null;
  state.kanaBlitz.idx++;
  if(state.kanaBlitz.idx >= state.kanaBlitz.pool.length){
    state.kanaBlitz.active = false;
    state.kanaBlitz.complete = true;
  }
  render();
  setTimeout(() => $('#kanaInput')?.focus(), 30);
}
window.kanaBlitzSkip = kanaBlitzSkip;

function kanaBlitzAdvance(){
  if(!state.kanaBlitz) return;
  const failedK = state.kanaBlitz.lastFailedK;
  if(failedK){
    const group = Object.values(KANA_CONFUSION_GROUPS).find(g => g.includes(failedK));
    if(group){
      const partnerK = group.find(k => k !== failedK);
      const partnerItem = KANA_FULL.find(it => it.k === partnerK);
      if(partnerItem){
        const nextIdx = state.kanaBlitz.idx + 1;
        const currentNext = state.kanaBlitz.pool[nextIdx];
        if(!currentNext || currentNext.k !== partnerK){
          state.kanaBlitz.pool.splice(nextIdx, 0, partnerItem);
          state.kanaBlitz.tally.total++;
        }
      }
    }
  }
  state.kanaBlitz.idx++;
  state.kanaBlitz.submitted = false;
  state.kanaBlitz.input = '';
  state.kanaBlitz.autoCorrect = null;
  state.kanaBlitz.lastFailedK = null;
  if(state.kanaBlitz.idx >= state.kanaBlitz.pool.length){
    state.kanaBlitz.active = false;
    state.kanaBlitz.complete = true;
  }
  save();
  render();
  setTimeout(() => $('#kanaInput')?.focus(), 30);
}
window.kanaBlitzAdvance = kanaBlitzAdvance;

function kanaBlitzEnd(){
  state.kanaBlitz = null;
  nav('home');
}
window.kanaBlitzEnd = kanaBlitzEnd;

function renderKanaBlitz(){
  const kb = state.kanaBlitz;
  if(!kb){
    return `<div class="card"><div class="muted">No active Kana Blitz.</div>
      <button class="btn btn-primary" style="margin-top:12px" onclick="nav('home')">Back home</button></div>`;
  }
  if(kb.complete){
    const t = kb.tally;
    const attempts = t.correct + t.wrong;
    const pct = attempts ? Math.round(100*t.correct/attempts) : 0;
    return `<div class="card">
      <h2 style="margin-top:0">Kana Blitz complete</h2>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num">${attempts}</div><div class="stat-label">Seen</div></div>
        <div class="stat-box"><div class="stat-num">${pct}%</div><div class="stat-label">Accuracy</div></div>
        <div class="stat-box"><div class="stat-num">${t.retired}</div><div class="stat-label">Retired</div></div>
        <div class="stat-box"><div class="stat-num">${t.wrong}</div><div class="stat-label">Wrong</div></div>
      </div>
      <div class="spacer"></div>
      <button class="btn btn-primary" style="width:100%" onclick="startKanaBlitz('${esc(kb.scope)}')">Drill again</button>
      <div class="spacer"></div>
      <button class="btn btn-secondary" style="width:100%" onclick="kanaBlitzEnd()">Back home</button>
    </div>`;
  }
  const item = kanaBlitzCurrent();
  if(!item) return `<div class="card"><div class="muted">No cards.</div></div>`;
  const st = state.kanaStats[item.k];
  const streak = st?.streak || 0;
  const retired = st?.retired || false;
  const total = kb.pool.length;
  const pos = kb.idx + 1;

  const scriptLabel = item.script === 'h' ? 'hiragana' : 'katakana';
  const modLabel = item.mod ? ' · ' + item.mod : (item.row === 'yoon' ? ' · yōon' : '');
  const head = `<div class="card" style="padding:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <span class="muted" style="font-size:13px">Card ${pos} / ${total}</span>
      <span class="muted" style="font-size:12px">${scriptLabel}${modLabel}${retired ? ' · maintenance' : ''}</span>
    </div>
  </div>`;

  if(!kb.submitted){
    return head + `<div class="card">
      <div style="font-size:120px;text-align:center;font-weight:900;line-height:1;padding:20px 0">${esc(item.k)}</div>
      <input id="kanaInput" class="input" type="text" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="type romaji (e.g. ka, shi, kyo)" onkeydown="if(event.key==='Enter'){event.preventDefault();kanaBlitzSubmit();}">
      <div class="spacer"></div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="kanaBlitzReveal()">Reveal</button>
        <button class="btn btn-primary" onclick="kanaBlitzSubmit()">Submit</button>
      </div>
      <div class="spacer"></div>
      <button class="btn btn-secondary" style="width:100%;font-size:12px" onclick="kanaBlitzSkip()">Skip card</button>
      <div class="muted" style="font-size:11px;text-align:center;margin-top:8px">Streak: ${streak} / ${KANA_RETIRE_STREAK}</div>
    </div>`;
  }

  const correct = kb.autoCorrect;
  const mnem = KANA_MNEMONICS[item.k];
  const confusionGroup = Object.entries(KANA_CONFUSION_GROUPS).find(([_, chars]) => chars.includes(item.k));
  const partner = confusionGroup ? confusionGroup[1].find(k => k !== item.k) : null;

  return head + `<div class="card" style="border:2px solid var(--${correct ? 'green' : 'red'})">
    <div style="font-size:80px;text-align:center;font-weight:900;line-height:1;padding:14px 0">${esc(item.k)}</div>
    <div style="text-align:center;font-size:18px;color:var(--${correct?'green':'red'});font-weight:700;margin-bottom:8px">
      ${correct ? '✓ correct' : '✗ wrong'}
    </div>
    <div style="text-align:center;font-size:14px;margin-bottom:6px">
      <span class="muted">Answer:</span> <b>${esc(item.r)}</b>
    </div>
    ${!correct && mnem ? `<div class="hint-card" style="margin-top:10px">
      <div class="hint-head">Remember</div>
      <div class="hint-body">${esc(mnem)}</div>
      ${partner ? `<div class="hint-body" style="margin-top:6px">Partner surfacing next: <b>${esc(partner)}</b></div>` : ''}
    </div>` : ''}
    <div class="spacer"></div>
    <button id="kanaContinue" class="btn btn-primary" style="width:100%" onclick="kanaBlitzAdvance()">Continue</button>
  </div>`;
}

const SENTENCE_RETIRE_STREAK = 5;
const SENTENCE_MAINTENANCE_DAYS = 7;
const SENTENCE_SESSION_TARGET = 12;

function sentenceStatFor(id){
  if(!state.sentenceStats) state.sentenceStats = {};
  if(!state.sentenceStats[id]){
    state.sentenceStats[id] = {streak:0, retired:false, retiredAt:null, lastSeen:null, correctCount:0, wrongCount:0};
  }
  return state.sentenceStats[id];
}

function sentenceDueForMaintenance(id){
  const st = state.sentenceStats && state.sentenceStats[id];
  if(!st || !st.retired) return false;
  const days = (now() - (st.retiredAt || 0)) / (1000*60*60*24);
  return days >= SENTENCE_MAINTENANCE_DAYS;
}

function sentenceStruggleWeight(item){
  const st = state.sentenceStats[item.id];
  if(!st) return 1;
  const coolFactor = 1 - (st.streak || 0) / SENTENCE_RETIRE_STREAK;
  return 1 + (st.wrongCount || 0) * coolFactor;
}

function buildSentenceBlitzPool(){
  const eligible = SENTENCE_BLITZ_POOL.filter(item => {
    const st = state.sentenceStats[item.id];
    if(!st) return true;
    if(!st.retired) return true;
    return sentenceDueForMaintenance(item.id);
  });
  /* Review fallback: if everything is retired and not yet due, build a pool
     from the full set so the user can always drill. */
  if(!eligible.length){
    return weightedShuffle(SENTENCE_BLITZ_POOL.slice(), sentenceStruggleWeight).slice(0, SENTENCE_SESSION_TARGET);
  }
  const maintenance = [], unseen = [], learning = [];
  for(const item of eligible){
    const st = state.sentenceStats[item.id];
    if(!st) unseen.push(item);
    else if(st.retired) maintenance.push(item);
    else learning.push(item);
  }
  const composed = [
    ...shuffleFY(maintenance).slice(0, 3),
    ...shuffleFY(unseen).slice(0, 6),
    ...weightedShuffle(learning, sentenceStruggleWeight),
  ].slice(0, SENTENCE_SESSION_TARGET);
  return shuffleFY(composed);
}

function sentenceBlitzCounts(){
  const total = SENTENCE_BLITZ_POOL.length;
  let retired = 0, learning = 0, unseen = 0;
  for(const item of SENTENCE_BLITZ_POOL){
    const st = state.sentenceStats[item.id];
    if(!st){ unseen++; continue; }
    if(st.retired) retired++;
    else learning++;
  }
  return {total, retired, learning, unseen};
}

function startSentenceBlitz(){
  if(!state.sentenceStats) state.sentenceStats = {};
  const pool = buildSentenceBlitzPool();
  if(!pool.length){
    showToast('All sentences retired! Check back in a week for maintenance.', 'success');
    return;

  state.sentenceBlitz = {
    active:true, complete:false,
    pool,
    idx:0,
    submitted:false,
    input:'',
    autoCorrect:null,
    tally:{correct:0, wrong:0, retired:0, total:pool.length},
  };
  nav('sentenceBlitz');
}

function sentenceBlitzCurrent(){
  if(!state.sentenceBlitz || !state.sentenceBlitz.active) return null;
  return state.sentenceBlitz.pool[state.sentenceBlitz.idx] || null;
}

function sentenceBlitzCheck(input, item){
  if(!input) return false;
  return normJPLoose(input) === normJPLoose(item.jp);
}

function sentenceBlitzRecordAnswer(item, correct){
  updateStreak(correct);
  const st = sentenceStatFor(item.id);
  st.lastSeen = now();
  if(correct){
    st.streak++;
    st.correctCount++;
    state.sentenceBlitz.tally.correct++;
    if(st.streak >= SENTENCE_RETIRE_STREAK && !st.retired){
      st.retired = true;
      st.retiredAt = now();
      state.sentenceBlitz.tally.retired++;
    } else if(st.retired){
      st.retiredAt = now();
    }
  } else {
    st.streak = 0;
    st.wrongCount++;
    st.retired = false;
    st.retiredAt = null;
    state.sentenceBlitz.tally.wrong++;
  }
}

const PHRASE_RETIRE_STREAK = 5;
const PHRASE_MAINTENANCE_DAYS = 7;
const PHRASE_SESSION_TARGET = 12;

const PHRASE_CATEGORIES = [
  {key:'timing',   label:'Timing & logistics'},
  {key:'social',   label:'Social rituals'},
  {key:'request',  label:'Requests'},
  {key:'eating',   label:'Eating & shopping'},
  {key:'reaction', label:'Reactions'},
  {key:'self',     label:'Self & status'},
  {key:'asking',   label:'Asking around'}
];

function phraseStatFor(id){
  if(!state.phraseStats) state.phraseStats = {};
  if(!state.phraseStats[id]){
    state.phraseStats[id] = {streak:0, retired:false, retiredAt:null, lastSeen:null, correctCount:0, wrongCount:0, introduced:false};
  }
  return state.phraseStats[id];
}

/* v6.6 — never-seen phrases get an introduce screen before they enter test
   rotation. Legacy stats (pre-v6.6) had no `introduced` field and are treated
   as already introduced so existing learners don't get re-prompted. */
function phraseIsIntroduced(item){
  const st = state.phraseStats && state.phraseStats[item.id];
  if(!st) return false;
  if(typeof st.introduced === 'undefined') return true;
  return !!st.introduced;
}
function phraseMarkIntroduced(id){
  const st = phraseStatFor(id);
  st.introduced = true;
  st.lastSeen = now();
  save();
  render();
}
window.phraseMarkIntroduced = phraseMarkIntroduced;

function phraseDueForMaintenance(id){
  const st = state.phraseStats && state.phraseStats[id];
  if(!st || !st.retired) return false;
  const days = (now() - (st.retiredAt || 0)) / (1000*60*60*24);
  return days >= PHRASE_MAINTENANCE_DAYS;
}

function phraseStruggleWeight(item){
  const st = state.phraseStats && state.phraseStats[item.id];
  if(!st) return 1;
  const cool = 1 - (st.streak || 0) / PHRASE_RETIRE_STREAK;
  return 1 + (st.wrongCount || 0) * cool;
}

function phraseFilteredPool(catFilter){
  if(!catFilter || catFilter === 'all') return PHRASE_POOL;
  return PHRASE_POOL.filter(p => p.cat === catFilter);
}

function buildPhraseBlitzPool(catFilter){
  const base = phraseFilteredPool(catFilter);
  const eligible = base.filter(item => {
    const st = state.phraseStats[item.id];
    if(!st) return true;
    if(!st.retired) return true;
    return phraseDueForMaintenance(item.id);
  });
  if(!eligible.length){
    return weightedShuffle(base.slice(), phraseStruggleWeight).slice(0, PHRASE_SESSION_TARGET);
  }
  const maintenance = [], unseen = [], learning = [];
  for(const item of eligible){
    const st = state.phraseStats[item.id];
    if(!st) unseen.push(item);
    else if(st.retired) maintenance.push(item);
    else learning.push(item);
  }
  const composed = [
    ...shuffleFY(maintenance).slice(0, 3),
    ...shuffleFY(unseen).slice(0, 6),
    ...weightedShuffle(learning, phraseStruggleWeight)
  ].slice(0, PHRASE_SESSION_TARGET);
  return shuffleFY(composed);
}

function phraseCounts(catFilter){
  const base = phraseFilteredPool(catFilter);
  let retired = 0, learning = 0, unseen = 0;
  for(const item of base){
    const st = state.phraseStats && state.phraseStats[item.id];
    if(!st){ unseen++; continue; }
    if(st.retired) retired++;
    else learning++;
  }
  return {total: base.length, retired, learning, unseen};
}

function startPhraseBlitz(catFilter){
  if(!state.phraseStats) state.phraseStats = {};
  const cat = catFilter || 'all';
  const pool = buildPhraseBlitzPool(cat);
  if(!pool.length){
    showToast('No phrases to drill in this category.', 'success');
    return;
  }
  state.phraseBlitz = {
    active:true, complete:false, cat,
    pool, idx:0, submitted:false, input:'', autoCorrect:null,
    tally:{correct:0, wrong:0, retired:0, total:pool.length}
  };
  nav('phraseBlitz');
}
window.startPhraseBlitz = startPhraseBlitz;

function phraseBlitzCurrent(){
  if(!state.phraseBlitz || !state.phraseBlitz.active) return null;
  return state.phraseBlitz.pool[state.phraseBlitz.idx] || null;
}

function phraseBlitzCheck(input, item){
  if(!input) return false;
  return normJPLoose(input) === normJPLoose(item.jp);
}

function phraseBlitzRecordAnswer(item, correct){
  updateStreak(correct);
  const st = phraseStatFor(item.id);
  st.lastSeen = now();
  if(correct){
    st.streak++;
    st.correctCount++;
    state.phraseBlitz.tally.correct++;
    if(st.streak >= PHRASE_RETIRE_STREAK && !st.retired){
      st.retired = true;
      st.retiredAt = now();
      state.phraseBlitz.tally.retired++;
    } else if(st.retired){
      st.retiredAt = now();
    }
  } else {
    st.streak = 0;
    st.wrongCount++;
    st.retired = false;
    st.retiredAt = null;
    state.phraseBlitz.tally.wrong++;
  }
}

function phraseBlitzSubmit(){
  if(!state.phraseBlitz || state.phraseBlitz.submitted) return;
  const item = phraseBlitzCurrent();
  if(!item) return;
  const inp = $('#phraseBlitzInput');
  state.phraseBlitz.input = inp?.value || '';
  const correct = phraseBlitzCheck(state.phraseBlitz.input, item);
  state.phraseBlitz.autoCorrect = correct;
  state.phraseBlitz.submitted = true;
  phraseBlitzRecordAnswer(item, correct);
  save();
  render();
  setTimeout(() => $('#phraseBlitzContinue')?.focus(), 30);
}
window.phraseBlitzSubmit = phraseBlitzSubmit;

function phraseBlitzReveal(){
  if(!state.phraseBlitz || state.phraseBlitz.submitted) return;

  state.phraseBlitz.input = inp?.value || '';
  state.phraseBlitz.autoCorrect = false;
  state.phraseBlitz.submitted = true;
  phraseBlitzRecordAnswer(item, false);
  save();
  render();
  setTimeout(() => $('#phraseBlitzContinue')?.focus(), 30);
}
window.phraseBlitzReveal = phraseBlitzReveal;

function phraseBlitzSkip(){
  if(!state.phraseBlitz) return;

    state.phraseBlitz.active = false;
    state.phraseBlitz.complete = true;
  }

window.phraseBlitzSkip = phraseBlitzSkip;

function renderPhraseBlitz(){

    return `<div class="card">

  const head = `<div class="card" style="padding:12px">

  if(!pb.submitted){
    return head + `<div class="card">
      <div style="font-size:22px;text-align:center;font-weight:600;line-height:1.4;padding:20px 8px;color:var(--text)">${esc(item.en)}</div>

    <div class="spacer"></div>
    <div class="audio-row">

    </div>
    <div class="spacer"></div>
    <button id="phraseBlitzContinue" class="btn btn-primary" style="width:100%" onclick="phraseBlitzAdvance()">Continue</button>
  </div>`;
}

function buildFoodCat(en){
  if(['breakfast','lunch','dinner'].includes(en)) return 'meal';
  if(['water','tea','coffee','milk','juice','beer','wine','alcohol/sake','drink'].includes(en)) return 'drink';
  if(en === 'meat') return 'meat_parent';
  if(['beef','chicken (meat)','pork'].includes(en)) return 'meat_child';
  if(en === 'fruit') return 'fruit_parent';
  if(['apple','mandarin orange','banana'].includes(en)) return 'fruit_child';
  return 'other';
}
function buildFoodContrastOk(words){
  const a = words.N1.en, b = words.N2.en;
  const ca = buildFoodCat(a), cb = buildFoodCat(b);
  if(ca === 'meal' || cb === 'meal') return ca === cb;
  if(ca === 'drink' || cb === 'drink') return ca === cb;
  if(ca === 'meat_parent' && cb === 'meat_child') return false;
  if(cb === 'meat_parent' && ca === 'meat_child') return false;
  if(ca === 'fruit_parent' && cb === 'fruit_child') return false;
  if(cb === 'fruit_parent' && ca === 'fruit_child') return false;
  return true;
}

const BUILD_LS_SEQUENCE = 'jp4_build_sequence';

function buildFillTemplate(tmpl, word){
  const slotKey = tmpl.slotKey || 'N';
  const re = new RegExp('\\{' + slotKey + '\\}', 'g');
  return { jp: tmpl.pattern.replace(re, word.jp), en: tmpl.en.replace(re, word.en) };
}
function buildMultiSlotFill(tmpl, deck){
  const maxTries = tmpl.validate ? 30 : 1;
  for(let attempt = 0; attempt < maxTries; attempt++){
    const keys = Object.keys(tmpl.slots);
    const chosen = {};
    let failed = false;
    for(const key of keys){
      const cfg = tmpl.slots[key];
      let pool = deck.filter(w =>
        w.pos === 'n' &&
        (cfg.allowKatakana || !hasKatakana(w.jp)) &&
        w.jp && w.en && w.romaji &&
        (!cfg.slotThemes || cfg.slotThemes.includes(w.theme)) &&
        (!cfg.slotWords || cfg.slotWords.includes(w.en)) &&
        (!cfg.slotExclude || !cfg.slotExclude.includes(w.en))
      );
      if(cfg.distinctFrom && chosen[cfg.distinctFrom]){
        pool = pool.filter(w => w.jp !== chosen[cfg.distinctFrom].jp);
      }
      if(pool.length === 0){ failed = true; break; }
      chosen[key] = pool[Math.floor(Math.random() * pool.length)];
    }
    if(failed) return null;
    if(tmpl.validate && !tmpl.validate(chosen)) continue;
    let jp = tmpl.pattern, en = tmpl.en;
    for(const key of keys){
      const re = new RegExp('\\{' + key + '\\}', 'g');
      jp = jp.replace(re, chosen[key].jp);
      en = en.replace(re, chosen[key].en);
    }
    return { jp, en, words: chosen };
  }
  return null;
}
function buildGenWordId(w){ return 'w_' + (w.romaji || w.r || '').replace(/\s+/g, '_'); }
function buildGetSequence(){ try{ return JSON.parse(localStorage.getItem(BUILD_LS_SEQUENCE) || '[]'); }catch(e){ return []; } }
function buildPushSequence(e){ const s = buildGetSequence(); s.push(e); try{ localStorage.setItem(BUILD_LS_SEQUENCE, JSON.stringify(s)); }catch(_){} }
function buildClearSequence(){ try{ localStorage.removeItem(BUILD_LS_SEQUENCE); }catch(_){} }
window.buildClearSequence = buildClearSequence;
function buildPickRandom(arr, n){
  const pool = arr.slice(); const out = [];
  while(out.length < n && pool.length){
    const i = Math.floor(Math.random()*pool.length);
    out.push(pool.splice(i,1)[0]);
  }
  return out;
}

function buildGenerateLesson(mode){
  mode = mode || 'simple';
  const pool = mode === 'complex' ? BUILD_COMPLEX_TEMPLATES : BUILD_TEMPLATES;
  if(pool.length < 2) throw new Error('need at least 2 templates in pool');

  const primary = pool[Math.floor(Math.random() * pool.length)];
  const sequence = buildGetSequence();
  const introducedIds = new Set();
  sequence.forEach(e => (e.introduced || []).forEach(id => introducedIds.add(id)));
  const deck = state.words || [];

  const eligibleForPair = (p, s) => {
    const common = p.slotThemes.filter(t => s.slotThemes.includes(t));
    return deck.filter(w =>
      w.pos === 'n' &&
      common.includes(w.theme) &&
      !hasKatakana(w.jp) &&
      w.jp && w.en && w.romaji &&
      (!p.slotWords || p.slotWords.includes(w.en)) &&
      (!s.slotWords || s.slotWords.includes(w.en)) &&
      (!p.slotExclude || !p.slotExclude.includes(w.en)) &&
      (!s.slotExclude || !s.slotExclude.includes(w.en))
    );
  };

  const sCands = pool.filter(t =>
    t.id !== primary.id &&
    t.slotKey === primary.slotKey &&
    t.slotThemes.some(th => primary.slotThemes.includes(th)) &&
    eligibleForPair(primary, t).length >= 3
  );
  if(sCands.length === 0) throw new Error('no compatible secondary for ' + primary.id);
  const secondary = sCands[Math.floor(Math.random() * sCands.length)];
  const commonThemes = primary.slotThemes.filter(t => secondary.slotThemes.includes(t));
  const eligible = eligibleForPair(primary, secondary);
  if(eligible.length < 3) throw new Error('not enough deck nouns for ' + commonThemes.join(','));

  const unintroduced = eligible.filter(w => !introducedIds.has(buildGenWordId(w)));
  let newWords = buildPickRandom(unintroduced, 3);
  if(newWords.length < 3){
    const extra = buildPickRandom(eligible.filter(w => !newWords.includes(w)), 3 - newWords.length);
    newWords = newWords.concat(extra);
  }

  const newIdSet = new Set(newWords.map(buildGenWordId));
  const cbPool = [];
  for(const entry of sequence){
    for(const id of (entry.introduced || [])){
      if(newIdSet.has(id)) continue;
      const w = eligible.find(x => buildGenWordId(x) === id);
      if(w && !cbPool.some(p => buildGenWordId(p) === id)) cbPool.push(w);
    }
  }
  let callbacks = cbPool.slice(0, 2);
  if(callbacks.length < 2){
    const cbIds = new Set(callbacks.map(buildGenWordId));
    const extra = buildPickRandom(
      eligible.filter(w => !newIdSet.has(buildGenWordId(w)) && !cbIds.has(buildGenWordId(w))),
      2 - callbacks.length
    );
    callbacks = callbacks.concat(extra);
  }

  const [w1, w2, w3] = newWords;
  const [cb1, cb2] = callbacks;
  const lessonId = (mode === 'complex' ? 'Gc' : 'Gs') + (sequence.length + 1);
  const toRef = w => ({ id: buildGenWordId(w), jp: w.jp, en: w.en, r: w.romaji });

  const p1 = buildFillTemplate(primary, w1), p2 = buildFillTemplate(primary, w2), p3 = buildFillTemplate(primary, w3);
  const s2 = buildFillTemplate(secondary, w2), s3 = buildFillTemplate(secondary, w3);
  const sCb1 = buildFillTemplate(secondary, cb1);
  const pCb2 = buildFillTemplate(primary, cb2);

  const pEn = primary.en.replace(/\{N\}/g,'X');
  const sEn = secondary.en.replace(/\{N\}/g,'X');

  return {
    id: lessonId,
    title: `${mode === 'complex' ? 'Complex' : 'Simple'} ${lessonId} — ${pEn} / ${sEn}`,
    duration_mins: mode === 'complex' ? 10 : 8,
    new_words: newWords.map(toRef),
    carryover_words: callbacks.map(toRef),
    cycles: [
      { id:'cycle_1', name:`Introduce — ${w1.en}, ${w2.en}, ${w3.en}`,
        steps:[
          { type:'introduce', word_id: buildGenWordId(w1) },
          { type:'introduce', word_id: buildGenWordId(w2) },
          { type:'introduce', word_id: buildGenWordId(w3) },
          { type:'recall',    word_id: buildGenWordId(w1) }
        ]},
      { id:'cycle_2', name:`Mix frames — "${pEn}" ⇄ "${sEn}"`,
        steps:[
          { type:'build',      sentence_jp: p1.jp, sentence_en: p1.en },
          { type:'substitute', swap_word_id: buildGenWordId(w2), result_jp: p2.jp, result_en: p2.en },
          { type:'build',      sentence_jp: s2.jp, sentence_en: s2.en },
          { type:'substitute', swap_word_id: buildGenWordId(w3), result_jp: s3.jp, result_en: s3.en },
          { type:'build',      sentence_jp: p3.jp, sentence_en: p3.en }
        ]},
      { id:'cycle_3', name:`Callbacks — mix frames`,
        steps:[
          { type:'callback',   word_id: buildGenWordId(cb1), note:'cold — from earlier' },
          { type:'build',      sentence_jp: sCb1.jp, sentence_en: sCb1.en },
          { type:'callback',   word_id: buildGenWordId(cb2), note:'cold — from earlier' },
          { type:'build',      sentence_jp: pCb2.jp, sentence_en: pCb2.en }
        ]}
    ],
    _meta: {
      mode,
      introduced_ids: newWords.map(buildGenWordId),
      callback_ids: callbacks.map(buildGenWordId),
      primary_template: primary.pattern,
      secondary_template: secondary.pattern
    }
  };
}

function buildGenerateHardLesson(){
  const deck = state.words || [];
  const lessonId = 'Gh' + (buildGetSequence().length + 1);
  const steps = [];
  const usedRefs = new Map();
  let lastTmplId = null;
  let tries = 0;
  while(steps.length < 7 && tries < 60){
    tries++;
    const pool = BUILD_HARD_TEMPLATES.filter(t => t.id !== lastTmplId);
    const tmpl = pool[Math.floor(Math.random() * pool.length)];
    const filled = buildMultiSlotFill(tmpl, deck);
    if(!filled) continue;
    lastTmplId = tmpl.id;
    steps.push({ type:'build', sentence_jp: filled.jp, sentence_en: filled.en });
    for(const w of Object.values(filled.words)){
      const id = buildGenWordId(w);
      if(!usedRefs.has(id)) usedRefs.set(id, { id, jp: w.jp, en: w.en, r: w.romaji });
    }
  }
  if(steps.length === 0) throw new Error('no multi-slot templates could be filled — enable N5 pack in Settings');
  return {
    id: lessonId,
    title: `Hard ${lessonId} — multi-slot mix`,
    duration_mins: 8,
    new_words: [],
    carryover_words: Array.from(usedRefs.values()),
    cycles: [
      { id:'cycle_hard', name:'Multi-slot — cold production', steps }
    ],
    _meta: {
      mode: 'hard',
      introduced_ids: [],
      callback_ids: Array.from(usedRefs.keys())
    }
  };
}

function buildMakeSession(lesson){
  const steps = [];
  for(const c of lesson.cycles){
    c.steps.forEach((s,i) => steps.push({...s, _cycleId: c.id, _cycleName: c.name, _cycleStepIdx: i}));
  }
  return { lesson, steps, stepIdx: 0, revealed: false, done: false };
}

function startBuildMode(){
  if(!state.buildMode || state.buildMode.done){
    state.buildMode = { lesson:null, steps:[], stepIdx:0, revealed:false, done:false };
  }
  nav('buildMode');
}
window.startBuildMode = startBuildMode;

function startBuildModeHand(){
  state.buildMode = buildMakeSession(BUILD_STARTER_LESSON);
  _buildWakeLockSync();
  render();
}

function startBuildModeGenerated(mode){

    state.buildMode = buildMakeSession(lesson);

function buildWordById(id){
  const b = state.buildMode;
  if(!b?.lesson) return null;
  return b.lesson.new_words.find(w => w.id === id)
      || (b.lesson.carryover_words || []).find(w => w.id === id);
}

function _buildSpeakEN(text, force, onDone){
  try{
    if(!('speechSynthesis' in window)){ if(onDone) setTimeout(onDone, 0); return; }
    if(!force && state.settings && state.settings.enTtsOn === false){ if(onDone) setTimeout(onDone, 0); return; }
    const ss = window.speechSynthesis;
    if(ss.speaking || ss.pending) ss.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.9;
    const v = (typeof _pickEnVoice === 'function') ? _pickEnVoice() : null;
    if(v){ u.voice = v; u.lang = v.lang || 'en-US'; } else { u.lang = 'en-US'; }
    if(onDone){
      let fired = false;
      const fire = () => { if(fired) return; fired = true; onDone(); };
      u.onend = fire; u.onerror = fire;
    }
    ss.speak(u);
  }catch(e){ if(onDone) setTimeout(onDone, 0); }
}

function _buildSpeakJP(text, onDone){
  try{
    if(!('speechSynthesis' in window)){ if(onDone) setTimeout(onDone, 0); return; }
    const ss = window.speechSynthesis;
    if(ss.speaking || ss.pending) ss.cancel();
    const utter = () => {
      const u = new SpeechSynthesisUtterance(String(text).replace(/\s+/g,''));
      u.rate = state.settings.buildTtsRate || state.settings.ttsRate || 0.9;
      const v = (typeof _pickJaVoice === 'function') ? _pickJaVoice() : null;
      if(v){ u.voice = v; u.lang = v.lang || 'ja-JP'; } else { u.lang = 'ja-JP'; }
      if(onDone){
        let fired = false;
        const fire = () => { if(fired) return; fired = true; onDone(); };
        u.onend = fire; u.onerror = fire;
      }
      ss.speak(u);
    };
    if(typeof _ttsVoicesReady !== 'undefined' && _ttsVoicesReady) utter();
    else if(typeof _waitForVoices === 'function') _waitForVoices(utter);
    else utter();
  }catch(e){ if(onDone) setTimeout(onDone, 0); }
}

function _buildSpeakJPThenEN(jp, en, onDone){
  try{
    if(!('speechSynthesis' in window)){ if(onDone) setTimeout(onDone, 0); return; }
    const ss = window.speechSynthesis;
    if(ss.speaking || ss.pending) ss.cancel();
    const utter = () => {
      const u = new SpeechSynthesisUtterance(String(jp).replace(/\s+/g,''));
      u.rate = state.settings.buildTtsRate || state.settings.ttsRate || 0.9;
      const v = (typeof _pickJaVoice === 'function') ? _pickJaVoice() : null;
      if(v){ u.voice = v; u.lang = v.lang || 'ja-JP'; } else { u.lang = 'ja-JP'; }
      let finished = false;
      const chain = () => { if(finished) return; finished = true; setTimeout(() => _buildSpeakEN(en, false, onDone), 250); };
      u.onend = chain;
      u.onerror = chain;
      ss.speak(u);
    };
    if(typeof _ttsVoicesReady !== 'undefined' && _ttsVoicesReady) utter();
    else if(typeof _waitForVoices === 'function') _waitForVoices(utter);
    else utter();
  }catch(e){ if(onDone) setTimeout(onDone, 0); }
}

// v6.0 — Screen Wake Lock so the phone doesn't sleep mid-session.
// Held only while a Build Mode lesson is active and auto-advance is on; released on pause/exit/done/hidden.
let _wakeLock = null;
async function _wakeLockAcquire(){
  try{
    if(!('wakeLock' in navigator)) return;
    if(_wakeLock) return;
    _wakeLock = await navigator.wakeLock.request('screen');
    _wakeLock.addEventListener('release', () => { _wakeLock = null; });
  }catch(e){ /* denied/unsupported — silent */ }
}
function _wakeLockRelease(){
  try{ if(_wakeLock){ _wakeLock.release(); _wakeLock = null; } }catch(e){}
}
function _buildWakeLockSync(){
  const b = state.buildMode;
  // Hold during any active Build Mode lesson — even manual mode, since the user is reading the screen.
  const shouldHold = !!b && !!b.lesson && !b.done && !b._paused;
  if(shouldHold) _wakeLockAcquire(); else _wakeLockRelease();
}

// v6.0 — Non-blocking toast. Replaces alert() for transient errors that shouldn't break flow.
function showToast(msg, opts){
  opts = opts || {};
  const tone = opts.tone || 'info';
  let host = document.getElementById('toast-host');
  if(!host){
    host = document.createElement('div');
    host.id = 'toast-host';
    document.body.appendChild(host);
  }
  const el = document.createElement('div');
  el.className = 'toast toast-' + tone;
  el.textContent = msg;
  host.appendChild(el);
  setTimeout(() => { el.classList.add('toast-out'); setTimeout(() => el.remove(), 300); }, opts.duration || 4000);
}

// v6.0 — Visibility handler: when the tab is hidden (user switches apps / locks phone),
// freeze the Build Mode session cleanly. Resume on return only if WE auto-paused, so manual pauses are respected.
function _buildOnVisibilityChange(){
  const b = state.buildMode;
  if(!b || !b.lesson || b.done) return;
  if(document.visibilityState === 'hidden'){
    if(!b._paused){
      b._paused = true;
      b._autoPaused = true;
      _buildClearTimer();
      try{ window.speechSynthesis?.cancel(); }catch(e){}
      _wakeLockRelease();
      render();
    } else {
      _wakeLockRelease();
    }
  } else {
    if(b._paused && b._autoPaused){
      b._paused = false;
      b._autoPaused = false;
      _wakeLockAcquire();
      const step = b.steps[b.stepIdx];
      if(step){
        if(b.revealed){
          setTimeout(() => {
            _buildPlayJPForStep(step, () => {
              if(state.buildMode === b && !b._paused && _buildAutoOn()) _buildScheduleLinger();
            });
          }, 100);
        } else {
          buildAutoplayStep(step);
        }
      }
      render();
    } else if(!b._paused){
      _wakeLockAcquire();
    }
  }
}

function _buildClearTimer(){
  const b = state.buildMode;
  if(b && b._autoTimer){ clearTimeout(b._autoTimer); b._autoTimer = null; }
  if(b){ b._phase = null; b._phaseDur = 0; }
}

function _buildSchedule(fn, ms){
  const b = state.buildMode;
  if(!b) return;
  if(b._autoTimer) clearTimeout(b._autoTimer);
  b._autoTimer = setTimeout(() => {
    if(state.buildMode === b){ b._autoTimer = null; b._phase = null; fn(); }
  }, ms);
}

function _buildSetPhase(phase, durMs){
  const b = state.buildMode;
  if(!b) return;
  b._phase = phase;
  b._phaseDur = durMs;
  // Drive the countdown bar via direct DOM (avoids a full re-render and lets CSS animate cleanly).
  const fill = document.querySelector('.build-countdown-fill');
  if(fill){
    fill.classList.remove('run','think','linger');
    void fill.offsetWidth; // restart animation
    if(phase === 'think' || phase === 'linger'){
      fill.style.animationDuration = (durMs/1000) + 's';
      fill.classList.add('run', phase);
    } else {
      fill.style.animationDuration = '';
    }
  }
  const label = document.querySelector('.build-phase-label');
  if(label){
    label.textContent = phase === 'prompt' ? '🔊 listen…'
                      : phase === 'answer' ? '🔊 answer…'
                      : phase === 'think' ? 'your turn — say it aloud'
                      : phase === 'linger' ? 'next step incoming…'
                      : '';
  }
}

function _buildAutoOn(){ return state.settings.buildAutoAdvance !== false; }

/* v6.5 — adaptive pacing. Known words shrink think+linger so easy reviews
   don't drag. Brand-new exposures (introduce steps, sentence-only steps)
   keep full pace. Mapping: Build Mode word_ids are 'w_'+romaji; resolve
   back to state.words via jp+en match to read the SRS mastery bucket. */
function _buildStateWordIdForStep(step){
  if(!step || !step.word_id) return null;
  const ref = buildWordById(step.word_id);
  if(!ref) return null;
  const m = (state.words || []).find(w => w.jp === ref.jp && w.en === ref.en);
  return m ? m.id : null;
}
function _buildPaceFactor(step){
  if(!step || step.type === 'introduce') return 1.0; /* never rush new exposures */
  const wid = _buildStateWordIdForStep(step);
  if(!wid) return 1.0; /* sentence-only step or unknown — full pace */
  const mastery = getMasteryForWord(wid);
  if(mastery === 'guru' || mastery === 'master' || mastery === 'burned') return 0.5;
  if(mastery === 'apprentice') return 0.7;
  return 1.0;
}

function buildAutoplayStep(step){
  const b = state.buildMode;
  if(!b) return;
  _buildClearTimer();
  const auto = _buildAutoOn() && !b._paused;

  const onEnDone = () => {
    if(!auto) return;
    const baseSec = Math.max(1, (state.settings.buildThinkSec || 4));
    const thinkMs = baseSec * _buildPaceFactor(step) * 1000;
    _buildSetPhase('think', thinkMs);
    _buildSchedule(() => buildAutoReveal(), thinkMs);
  };

  if(auto) _buildSetPhase('prompt', 0);

  if(step.type === 'introduce'){
    const w = buildWordById(step.word_id);
    if(w){
      _buildSpeakJPThenEN(w.jp, w.en, () => {
        if(!auto) return;
        _buildScheduleLinger();
      });
    }
  } else if(step.type === 'recall'){
    const w = buildWordById(step.word_id);
    if(w) _buildSpeakEN(w.en, false, onEnDone);
  } else if(step.type === 'callback'){
    if(step.word_id){
      const w = buildWordById(step.word_id);
      if(w) _buildSpeakEN(w.en, false, onEnDone);
    } else if(step.sentence_en){ _buildSpeakEN(step.sentence_en, false, onEnDone); }
  } else if(step.type === 'build'){
    _buildSpeakEN(step.sentence_en, false, onEnDone);
  } else if(step.type === 'substitute'){
    _buildSpeakEN(step.result_en, false, onEnDone);
  }
}

function buildAutoReveal(){
  const b = state.buildMode;
  if(!b || b._paused || !_buildAutoOn()) return;
  const step = b.steps[b.stepIdx];
  if(!step) return;
  b.revealed = true;
  render();
  setTimeout(() => {
    _buildSetPhase('answer', 0);
    _buildPlayJPForStep(step, () => {
      if(state.buildMode === b && !b._paused) _buildScheduleLinger();
    });
  }, 150);
}

function buildAutoNext(){
  const b = state.buildMode;
  if(!b || b._paused || !_buildAutoOn()) return;
  if(b.stepIdx >= b.steps.length - 1){
    if(!b.done) buildOnComplete();
    b.done = true;
  } else {
    b.revealed = false;
    b.stepIdx++;
  }
  render();
}

function buildTogglePause(){
  const b = state.buildMode;
  if(!b) return;
  b._paused = !b._paused;
  b._autoPaused = false; // user-driven pause/resume — not the visibility handler
  if(b._paused){
    _buildClearTimer();
    try{ window.speechSynthesis?.cancel(); }catch(e){}
  }
  _buildWakeLockSync();
  render();
  if(!b._paused){
    // Resume: replay the current step's audio and re-arm the timer chain.
    const step = b.steps[b.stepIdx];
    if(step){
      if(b.revealed){
        setTimeout(() => {
          _buildPlayJPForStep(step, () => {
            if(state.buildMode === b && !b._paused && _buildAutoOn()) _buildScheduleLinger();
          });
        }, 100);
      } else {
        buildAutoplayStep(step);
      }
    }
  }
}
window.buildTogglePause = buildTogglePause;

function buildReplayAudio(){
  const b = state.buildMode;
  if(!b?.steps) return;
  const step = b.steps[b.stepIdx];
  if(!step) return;
  if(b.revealed){
    if(step.type === 'introduce'){
      const w = buildWordById(step.word_id); if(w) _buildSpeakJPThenEN(w.jp, w.en);
    } else if(step.type === 'recall'){
      const w = buildWordById(step.word_id); if(w) speakJP(w.jp);
    } else if(step.type === 'callback'){
      if(step.word_id){ const w = buildWordById(step.word_id); if(w) speakJP(w.jp); }
      else if(step.sentence_jp){ speakJP(step.sentence_jp); }
    } else if(step.type === 'build'){ speakJP(step.sentence_jp); }
    else if(step.type === 'substitute'){ speakJP(step.result_jp); }
  } else { buildAutoplayStep(step); }
}
window.buildReplayAudio = buildReplayAudio;

function _buildPlayJPForStep(step, onDone){
  if(step.type === 'introduce'){
    const w = buildWordById(step.word_id); if(w) _buildSpeakJPThenEN(w.jp, w.en, onDone); else if(onDone) onDone();
  } else if(step.type === 'recall'){
    const w = buildWordById(step.word_id); if(w) _buildSpeakJP(w.jp, onDone); else if(onDone) onDone();
  } else if(step.type === 'callback'){
    if(step.word_id){ const w = buildWordById(step.word_id); if(w) _buildSpeakJP(w.jp, onDone); else if(onDone) onDone(); }
    else if(step.sentence_jp){ _buildSpeakJP(step.sentence_jp, onDone); }
    else if(onDone) onDone();
  } else if(step.type === 'build'){ _buildSpeakJP(step.sentence_jp, onDone); }
  else if(step.type === 'substitute'){ _buildSpeakJP(step.result_jp, onDone); }
  else if(onDone) onDone();
}

function _buildScheduleLinger(){
  const b = state.buildMode;
  if(!b || b._paused || !_buildAutoOn()) return;
  const step = b.steps[b.stepIdx];
  // New-word introduce steps get extra time — listening, no recall, more to absorb.
  const sec = (step && step.type === 'introduce')
    ? (state.settings.buildIntroduceLingerSec ?? 5)
    : (state.settings.buildLingerSec ?? 5);
  /* v6.5 — adaptive: known words shrink linger; introduce stays full. */
  const lingerMs = Math.max(0, sec) * _buildPaceFactor(step) * 1000;
  _buildSetPhase('linger', lingerMs);
  _buildSchedule(() => buildAutoNext(), lingerMs);
}

function buildRevealStep(){
  const b = state.buildMode;
  _buildClearTimer();
  b.revealed = true;
  render();
  const step = b.steps[b.stepIdx];
  setTimeout(() => {
    _buildPlayJPForStep(step, () => {
      if(state.buildMode === b && !b._paused && _buildAutoOn()) _buildScheduleLinger();
    });
  }, 150);
}
window.buildRevealStep = buildRevealStep;

function buildNextStep(){
  const b = state.buildMode;
  _buildClearTimer();
  b.revealed = false;
  try{ window.speechSynthesis?.cancel(); }catch(e){}
  if(b.stepIdx >= b.steps.length - 1){
    if(!b.done) buildOnComplete();
    b.done = true;
  } else { b.stepIdx++; }
  render();
}
window.buildNextStep = buildNextStep;

function buildPrevStep(){
  const b = state.buildMode;
  _buildClearTimer();
  b.revealed = false;
  try{ window.speechSynthesis?.cancel(); }catch(e){}
  if(b.stepIdx > 0) b.stepIdx--;
  render();
}
window.buildPrevStep = buildPrevStep;

function buildRestart(){
  const b = state.buildMode;
  _buildClearTimer();
  b._paused = false;
  b.stepIdx = 0; b.revealed = false; b.done = false;
  if(b.lesson) b.lesson._completed = false;
  render();
}
window.buildRestart = buildRestart;

function buildOnComplete(){
  const l = state.buildMode?.lesson;
  if(l?._meta && !l._completed){
    l._completed = true;
    buildPushSequence({
      id: l.id, mode: l._meta.mode,
      templates: [l._meta.primary_template, l._meta.secondary_template],
      introduced: l._meta.introduced_ids,
      callbacks: l._meta.callback_ids,
      date: new Date().toISOString()
    });
  }
  _wakeLockRelease();
}

function buildExit(){
  _buildClearTimer();
  try{ window.speechSynthesis?.cancel(); }catch(e){}
  state.buildMode = { lesson:null, steps:[], stepIdx:0, revealed:false, done:false };
  _wakeLockRelease();
  render();
}
window.buildExit = buildExit;

function buildAuditAll(){
  const deck = state.words || [];
  const out = [];
  const pools = [
    ['SIMPLE', BUILD_TEMPLATES],
    ['COMPLEX', BUILD_COMPLEX_TEMPLATES]
  ];
  for(const [label, pool] of pools){
    out.push('\n===== ' + label + ' =====');
    for(const t of pool){
      const eligible = deck.filter(w =>
        w.pos === 'n' &&
        t.slotThemes.includes(w.theme) &&
        !hasKatakana(w.jp) &&
        w.jp && w.en && w.romaji &&
        (!t.slotWords || t.slotWords.includes(w.en)) &&
        (!t.slotExclude || !t.slotExclude.includes(w.en))
      );
      out.push('\n--- ' + t.id + '  (' + eligible.length + ' words)  ' + t.pattern + '  |  ' + t.en);
      for(const w of eligible){
        const filled = buildFillTemplate(t, w);
        out.push('  ' + filled.jp.padEnd(36) + '  ' + filled.en);
      }
    }
  }
  const text = out.join('\n');
  console.log(text);
  try{ navigator.clipboard.writeText(text); console.log('[buildAuditAll] copied to clipboard'); }catch(_){}
  return text;
}
window.buildAuditAll = buildAuditAll;

function buildAuditHard(samples){
  const n = samples || 5;
  const deck = state.words || [];
  const out = [];
  out.push('===== HARD (multi-slot, ' + n + ' samples per template) =====');
  for(const t of BUILD_HARD_TEMPLATES){
    const keys = Object.keys(t.slots);
    const slotSizes = keys.map(k => {
      const cfg = t.slots[k];
      const pool = deck.filter(w =>
        w.pos === 'n' && (cfg.allowKatakana || !hasKatakana(w.jp)) && w.jp && w.en && w.romaji &&
        (!cfg.slotThemes || cfg.slotThemes.includes(w.theme)) &&
        (!cfg.slotWords || cfg.slotWords.includes(w.en)) &&
        (!cfg.slotExclude || !cfg.slotExclude.includes(w.en))
      );
      return k + '=' + pool.length;
    }).join(', ');
    out.push('\n--- ' + t.id + '  [' + slotSizes + ']  ' + t.pattern + '  |  ' + t.en);
    const seen = new Set();
    let tries = 0;
    while(seen.size < n && tries < n * 10){
      tries++;
      const filled = buildMultiSlotFill(t, deck);
      if(!filled) break;
      const key = filled.jp;
      if(seen.has(key)) continue;
      seen.add(key);
      out.push('  ' + filled.jp.padEnd(40) + '  ' + filled.en);
    }
  }
  const text = out.join('\n');
  console.log(text);
  try{ navigator.clipboard.writeText(text); console.log('[buildAuditHard] copied to clipboard'); }catch(_){}
  return text;
}
window.buildAuditHard = buildAuditHard;

function renderBuildModeStep(){
  const b = state.buildMode;
  const step = b.steps[b.stepIdx];
  const total = b.steps.length;
  const pct = Math.round(100 * b.stepIdx / total);
  const auto = _buildAutoOn();
  const paused = !!b._paused;

  let body = '';
  switch(step.type){
    case 'introduce':  body = _buildRenderIntroduce(step); break;
    case 'recall':     body = _buildRenderRecall(step); break;
    case 'build':      body = _buildRenderBuild(step); break;
    case 'substitute': body = _buildRenderSubstitute(step); break;
    case 'callback':   body = _buildRenderCallback(step); break;
    default: body = `<div class="muted">Unknown step: ${esc(step.type)}</div>`;
  }

  if(!b.revealed && !paused){ setTimeout(() => buildAutoplayStep(step), 100); }

  const countdown = (auto && !paused) ? `
    <div class="build-countdown"><div class="build-countdown-fill"></div></div>
    <div class="build-phase-label"></div>
  ` : '';

  return `
    <div class="build-progress"><div class="build-progress-fill" style="width:${pct}%"></div></div>
    <div class="muted" style="text-align:center;font-size:11px;margin:2px 0 6px">Step ${b.stepIdx+1} of ${total} · ${esc(step._cycleName)}</div>

    <div class="card">

/* ---------- PARTICLES ----------
   v6.7 — multi-blank rework. Each (drillIdx, blankIdx) pair is an independent
   pool item with its own retire streak, so the user can't pattern-match from
   "the answer to this sentence was X last time" — the next blank in the same
   sentence is a separate question. Retire after PARTICLE_RETIRE_STREAK
   consecutive correct on that exact pair. */
const PARTICLE_RETIRE_STREAK = 2;
const PARTICLE_SESSION_TARGET = 16;
const PARTICLE_OPTIONS = ['は','が','を','に','で','へ','と','も','の','から','まで','や'];

function particleBlanks(d){
  if(d.blanks) return d.blanks;
  /* Defensive fallback for any legacy single-blank shape that slips through. */
  return [{answer:d.blank, accept:d.accept, explain:d.explain}];
}
function particleAccept(blank){
  return blank.accept || [blank.answer];
}
function particleJP(d, activeIdx){
  /* Render JP with all blanks shown as ＿＿＿; the active blank gets a highlight. */
  const parts = d.jp.split('___');
  let out = esc(parts[0] || '');
  for(let i = 0; i < parts.length - 1; i++){
    if(i === activeIdx){
      out += '<span class="p-blank-active" style="background:var(--accent);color:#000;padding:2px 8px;border-radius:6px;font-weight:700">＿＿＿</span>';
    } else {
      out += '<span class="p-blank-other" style="opacity:0.5">＿＿＿</span>';
    }
    out += esc(parts[i+1] || '');
  }
  return out;
}
function particleJPRevealed(d, activeIdx, picked, isCorrect){
  /* JP with the active blank filled by user's pick (other blanks remain ＿＿＿). */
  const parts = d.jp.split('___');
  const colorVar = isCorrect ? '--green' : '--red';
  let out = esc(parts[0] || '');
  for(let i = 0; i < parts.length - 1; i++){
    if(i === activeIdx){
      out += `<b style="color:var(${colorVar})">${esc(picked)}</b>`;
    } else {
      out += '<span style="opacity:0.5">＿＿＿</span>';
    }
    out += esc(parts[i+1] || '');
  }
  return out;
}
function particleJPFilled(d){
  const blanks = particleBlanks(d);
  let i = 0;
  return d.jp.replace(/___/g, () => (blanks[i++] || {}).answer || '');
}

function particleStatFor(drillIdx, blankIdx){
  if(!state.particleStats) state.particleStats = {};
  if(!state.particleStats[drillIdx]) state.particleStats[drillIdx] = {};
  if(!state.particleStats[drillIdx][blankIdx]){
    state.particleStats[drillIdx][blankIdx] = {streak:0, retired:false, retiredAt:null, correctCount:0, wrongCount:0, lastSeen:null};
  }
  return state.particleStats[drillIdx][blankIdx];
}
function particleStatPeek(drillIdx, blankIdx){
  return state.particleStats?.[drillIdx]?.[blankIdx] || null;
}

function buildParticlePool(){
  const pairs = [];
  for(let di = 0; di < PARTICLE_DRILLS.length; di++){
    const blanks = particleBlanks(PARTICLE_DRILLS[di]);
    for(let bi = 0; bi < blanks.length; bi++){
      const st = particleStatPeek(di, bi);
      if(!st || !st.retired) pairs.push({drillIdx:di, blankIdx:bi});
    }
  }
  if(!pairs.length){
    /* All retired — sample everything for review. */
    for(let di = 0; di < PARTICLE_DRILLS.length; di++){
      const blanks = particleBlanks(PARTICLE_DRILLS[di]);
      for(let bi = 0; bi < blanks.length; bi++) pairs.push({drillIdx:di, blankIdx:bi});
    }
  }
  return shuffleFY(pairs).slice(0, PARTICLE_SESSION_TARGET);
}

function particleCounts(){
  let total = 0, retired = 0;
  for(let di = 0; di < PARTICLE_DRILLS.length; di++){
    const blanks = particleBlanks(PARTICLE_DRILLS[di]);
    for(let bi = 0; bi < blanks.length; bi++){
      total++;
      if(particleStatPeek(di, bi)?.retired) retired++;
    }
  }
  return {total, retired};
}

function ensureParticleSession(){
  if(!state.particleSession || !state.particleSession.pool?.length){
    state.particleSession = {pool: buildParticlePool(), idx: 0, answer: null};
  }
}

function renderParticles(){
  ensureParticleSession();
  const sess = state.particleSession;
  const cur = sess.pool[sess.idx];
  const d = PARTICLE_DRILLS[cur.drillIdx];
  const blanks = particleBlanks(d);
  const blank = blanks[cur.blankIdx];
  const accept = particleAccept(blank);
  const ans = sess.answer;
  const isCorrect = ans && accept.includes(ans);
  const counts = particleCounts();
  const stPeek = particleStatPeek(cur.drillIdx, cur.blankIdx);
  const streak = stPeek?.streak || 0;
  const blankLabel = blanks.length > 1 ? `Blank ${cur.blankIdx+1} of ${blanks.length}` : 'Fill in the blank';

  return `
    <div class="card">
      <h3>Particle drills · ${sess.idx+1} / ${sess.pool.length}</h3>
      <div class="muted" style="font-size:13px">${counts.retired} / ${counts.total} retired · streak ${streak} / ${PARTICLE_RETIRE_STREAK}</div>
    </div>
    <div class="drill-card">
      <div class="drill-cat">${esc(blankLabel)}${accept.length>1?' · multiple acceptable':''}</div>
      <div class="drill-prompt jp" style="line-height:1.7">${particleJP(d, cur.blankIdx)}</div>
      <div class="drill-sub">${esc(d.en)}</div>
    </div>
    ${ans ? '' : `<div class="tags" style="justify-content:center">
      ${PARTICLE_OPTIONS.map(p => `<button class="tag" onclick="answerParticle('${jsEsc(p)}')">${p}</button>`).join('')}
    </div>`}
    ${ans ? `<div class="feedback-card ${isCorrect?'correct':'wrong'}">
      <div class="feedback-head">${isCorrect?'✓ Correct':'✗ Wrong — accepted: '+accept.map(esc).join(' / ')}</div>
      <div class="feedback-body" style="line-height:1.7">${particleJPRevealed(d, cur.blankIdx, ans, isCorrect)}</div>
      <div class="feedback-smart">${esc(blank.explain)}</div>
    </div>
    <div class="audio-row">
      <button class="audio-btn" onclick="speakJP('${jsEsc(particleJPFilled(d))}')">🔊 Listen (full sentence)</button>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="nextParticle()">Next →</button>` : ''}
  `;
}

function answerParticle(p){
  ensureParticleSession();
  const sess = state.particleSession;
  if(sess.answer) return; /* already answered this blank */
  const cur = sess.pool[sess.idx];
  const d = PARTICLE_DRILLS[cur.drillIdx];
  const blank = particleBlanks(d)[cur.blankIdx];
  const accept = particleAccept(blank);
  const correct = accept.includes(p);
  sess.answer = p;
  const st = particleStatFor(cur.drillIdx, cur.blankIdx);
  st.lastSeen = now();
  if(correct){
    st.streak++;
    st.correctCount++;
    if(st.streak >= PARTICLE_RETIRE_STREAK && !st.retired){
      st.retired = true;
      st.retiredAt = now();
    }
  } else {
    st.streak = 0;
    st.wrongCount++;
    st.retired = false;
    st.retiredAt = null;
  }
  log('particle_attempt', {drillIdx:cur.drillIdx, blankIdx:cur.blankIdx, correct, chose:p});
  save();
  render();
}

function nextParticle(){
  ensureParticleSession();
  const sess = state.particleSession;
  sess.answer = null;
  sess.idx++;
  if(sess.idx >= sess.pool.length){
    /* Session done — reshuffle a fresh pool (skips retired pairs automatically). */
    state.particleSession = {pool: buildParticlePool(), idx: 0, answer: null};
  }
  render();
}
window.answerParticle = answerParticle;
window.nextParticle = nextParticle;

function exportJSON(){
  const data = {version:6, exportedAt:new Date().toISOString(), words:state.words.filter(w=>w.source==='user'), stats:state.stats, formStats:state.formStats||{}, kanaStats:state.kanaStats||{}, sentenceStats:state.sentenceStats||{}, phraseStats:state.phraseStats||{}, settings:state.settings, notes:state.notes, streak:state.streak, logs:state.logs.slice(-200)};
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`japanese-trainer-${today()}.json`; a.click();

function importJSON(){ $('#importFile').click(); }
function handleImport(ev){
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const d = JSON.parse(r.result);
      if(!confirm(`Import ${Object.keys(d.stats||{}).length} word stats + ${(d.notes||[]).length} notes? Existing data will be merged (existing keys kept).`)) return;
      if(d.words) for(const w of d.words) if(!state.words.find(x=>x.id===w.id)) state.words.push(w);
      if(d.stats) for(const k in d.stats) if(!state.stats[k]) state.stats[k] = d.stats[k];
      if(d.formStats){
        if(!state.formStats) state.formStats = {};
        for(const wid in d.formStats){
          if(!state.formStats[wid]) state.formStats[wid] = {};
          for(const fid in d.formStats[wid]){
            if(!state.formStats[wid][fid]) state.formStats[wid][fid] = d.formStats[wid][fid];
          }
        }
      }
      if(d.notes) for(const n of d.notes) if(!state.notes.find(x=>x.id===n.id)) state.notes.push(n);
      if(d.settings) state.settings = {...state.settings, ...d.settings};
      if(d.streak) state.streak = {...state.streak, ...d.streak};
      if(d.kanaStats){
        if(!state.kanaStats) state.kanaStats = {};
        for(const k in d.kanaStats) if(!state.kanaStats[k]) state.kanaStats[k] = d.kanaStats[k];
      }
      if(d.sentenceStats){
        if(!state.sentenceStats) state.sentenceStats = {};
        for(const k in d.sentenceStats) if(!state.sentenceStats[k]) state.sentenceStats[k] = d.sentenceStats[k];
      }
      save(); load(); alert('Import complete.'); render();
    }catch(e){ alert('Import failed: '+e.message); }
  };
  r.readAsText(f);
}
function exportNotes(){
  const txt = state.notes.map(n => `--- ${new Date(n.ts).toISOString()} ---\n${n.text}\n`).join('\n');
  const blob = new Blob([txt], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`notes-${today()}.txt`; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 500);
}
function resetAll(){
  if(!confirm('Reset ALL stats, notes, settings, custom words? (This cannot be undone.)')) return;

  const c = prompt('Type YES to confirm reset:'); if(c !== 'YES') return;

  localStorage.removeItem(LS.notes); localStorage.removeItem(LS.logs); localStorage.removeItem(LS.streak);
  localStorage.removeItem(LS.formStats);
  location.reload();
}

const ASK_CLAUDE_SYSTEM = `You are Julius's Japanese sparring partner. He is a beginner/intermediate learner focused on conversational fluency — not JLPT. He attends a weekly JAPANEASY class and a language exchange.

Teach like a peer, not a teacher. Direct, casual, encouraging. No hedging. Don't lecture.

Hard rules:
- Write ALL Japanese in HIRAGANA ONLY. Never kanji. Never romaji unless Julius explicitly asks.
- Reply in concise English with short Japanese examples inline.
- Keep answers to 3–6 sentences by default. Expand only when asked.
- Prioritise conversational utility over grammar theory.
- Register-tag every Japanese example: [casual], [polite], or [formal].
- Flag anything uncertain so his JAPANEASY teacher can confirm.

When he asks about a word: give meaning, register, 1–2 short hiragana examples (register-tagged), and any close-but-wrong siblings he might confuse it with.

When he asks about a grammar pattern: show the pattern with 2–3 substitution examples using common N5-level words in hiragana, each register-tagged.

When he writes Japanese and asks to check it: correct gently, show the fix in hiragana, explain in one sentence.

Watch for these common beginner error patterns and proactively flag when his question touches one:
- い-adjective drop: dropping い before です (e.g. "たのし です" — wrong; should be "たのしい です")
- に vs で confusion: に for destinations, existence, and targets; で for locations of action and means/method
- は vs が: は for topic, が for subject/new information; が goes with すき, ある, いる, ほしい
- Transitive / intransitive pairs: はじまる vs はじめる, あく vs あける, きえる vs けす, でる vs だす, はいる vs いれる
- Stem vs dictionary form: ます-stem (たべ) vs dictionary (たべる) — ます-stem does not stand alone
- Particle drops in polite speech: don't drop を or が the way casual speech allows

Use examples from daily life — food, trains, weather, friends, work. Julius's ethos is "mayoeba yaburu" — hesitate and you lose. Match that energy: pick the most useful thing and say it plainly.`;
