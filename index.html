<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>日本語 Trainer</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0a;--card:#161616;--border:#2a2a2a;--text:#e8e8e8;--dim:#888;--faint:#555;--red:#ef4444;--red-d:#7f1d1d;--green:#22c55e;--green-d:#14532d;--orange:#f97316;--orange-d:#7c2d12;--blue:#3b82f6;--purple:#a855f7;--teal:#14b8a6;--accent:#ef4444}
body{font-family:'Noto Sans JP',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.app{max-width:430px;margin:0 auto;padding:0 16px 80px;min-height:100dvh}
.header{text-align:center;padding:32px 0 20px}
.header h1{font-size:38px;font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,#fff,#888);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:11px;letter-spacing:3px;color:var(--faint);margin-top:4px;text-transform:uppercase}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:10px}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 8px;text-align:center}
.stat-num{font-size:26px;font-weight:900;line-height:1}
.stat-label{font-size:9px;letter-spacing:2px;color:var(--faint);margin-top:5px;text-transform:uppercase}
.btn{display:block;width:100%;border:none;border-radius:14px;padding:14px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;text-align:center;margin-bottom:7px}
.btn:active{transform:scale(.97);opacity:.9}
.btn-primary{background:var(--red);color:#fff}
.btn-orange{background:var(--orange);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-teal{background:var(--teal);color:#fff}
.btn-purple{background:var(--purple);color:#fff}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn-ghost{background:transparent;color:var(--dim);border:none;padding:10px;font-size:13px;font-family:inherit;cursor:pointer}
.btn-sm{padding:8px 14px;font-size:12px;width:auto;display:inline-block}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.tag{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);cursor:pointer;font-family:inherit;background:var(--card);color:var(--dim);transition:all .15s}
.tag.active{background:var(--red);color:#fff;border-color:var(--red)}
.input{width:100%;padding:14px;font-size:18px;border-radius:14px;border:2px solid var(--border);background:var(--card);color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:var(--faint)}
.progress-bar{width:100%;height:4px;background:var(--border);border-radius:2px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;background:var(--red);border-radius:2px;transition:width .3s}
.drill-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px 20px;text-align:center;margin-bottom:14px;min-height:120px;display:flex;flex-direction:column;justify-content:center}
.drill-cat{font-size:10px;letter-spacing:2px;color:var(--faint);text-transform:uppercase;margin-bottom:10px}
.drill-prompt{font-size:22px;font-weight:700;line-height:1.3}
.drill-prompt.jp{font-size:34px}
.feedback-card{border-radius:20px;padding:24px;text-align:center;margin-bottom:14px;border:2px solid}
.feedback-card.correct{background:var(--green-d);border-color:var(--green)}
.feedback-card.wrong{background:var(--red-d);border-color:var(--red)}
.word-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.word-jp{font-weight:700;font-size:15px}
.word-r{font-size:11px;color:var(--faint);margin-left:6px}
.word-en{font-size:12px;color:var(--dim)}
.word-acc{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px;white-space:nowrap}
.top-nav{display:flex;justify-content:space-between;align-items:center;padding:16px 0}
.top-nav-title{font-size:14px;font-weight:700}
.divider{height:1px;background:var(--border);margin:10px 0}
.drill-header{display:flex;justify-content:space-between;align-items:center;padding:14px 0}
.direction-toggle{display:flex;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.direction-btn{flex:1;padding:9px;border:none;background:transparent;color:var(--dim);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer}
.direction-btn.active{background:var(--red);color:#fff}
.verb-form{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.verb-label{color:var(--dim);font-size:11px;min-width:80px}
.verb-val{font-weight:600}
.particle-card{padding:14px 18px}
.particle-sym{font-size:28px;font-weight:900;color:var(--red);margin-bottom:4px}
.particle-meaning{font-size:14px;font-weight:600;margin-bottom:4px}
.particle-pattern{font-size:12px;color:var(--dim)}
.particle-ex{font-size:13px;margin-top:4px;color:var(--text)}
.counter-section{margin-bottom:16px}
.counter-title{font-size:12px;font-weight:700;letter-spacing:1px;color:var(--red);margin-bottom:8px;text-transform:uppercase}
.counter-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid var(--border)}
.hint-box{background:var(--border);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--dim);margin-bottom:12px;text-align:center}
.error-alert{background:var(--red-d);border:1px solid var(--red);border-radius:14px;padding:14px;margin-bottom:10px}
.error-alert-title{font-size:13px;font-weight:700;color:var(--red);margin-bottom:4px}
.error-alert-text{font-size:12px;color:var(--text)}
.section-title{font-size:11px;letter-spacing:2px;color:var(--faint);text-transform:uppercase;margin:16px 0 8px;font-weight:700}
.script-jp{font-size:18px;font-weight:700;margin-bottom:3px;line-height:1.4}
.script-en{font-size:13px;color:var(--dim)}
.chunk-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px}
.chunk-jp{font-size:16px;font-weight:700}
.chunk-en{font-size:12px;color:var(--dim)}
.chunk-p{background:var(--red);color:#fff;padding:3px 10px;border-radius:10px;font-size:13px;font-weight:800;flex-shrink:0}
.capture-item{padding:10px 0;border-bottom:1px solid var(--border)}
.syllable{display:inline-block;padding:2px 6px;margin:2px;background:var(--border);border-radius:6px;font-size:14px}
</style>
</head>

let S={mode:"menu",vocab:[],dq:[],ci:0,input:"",fb:null,sa:false,dir:"en2jp",ss:{c:0,w:0,t:0},caps:[],ci_inp:{h:"",g:"",m:""},cat:"All",sc:"Intro",cw:[],vsel:null,daily:null};

function load(){try{const s=localStorage.getItem("jp_v3");
if(s){const p=JSON.parse(s);S.vocab=V.map(v=>{const f=p.find(x=>x.jp===v.jp);return f?{...v,c:f.c||0,w:f.w||0}:{...v,c:0,w:0}});
const c=localStorage.getItem("jp_cw_v3");if(c){S.cw=JSON.parse(c);S.cw.forEach(w=>{if(!S.vocab.find(v=>v.jp===w.jp))S.vocab.push(w)})}
}else S.vocab=V.map(v=>({...v,c:0,w:0}));
const ca=localStorage.getItem("jp_ca_v3");if(ca)S.caps=JSON.parse(ca);
const d=localStorage.getItem("jp_daily_v3");if(d)S.daily=JSON.parse(d);
}catch(e){S.vocab=V.map(v=>({...v,c:0,w:0}))}}

function save(){try{localStorage.setItem("jp_v3",JSON.stringify(S.vocab.map(v=>({jp:v.jp,c:v.c,w:v.w}))));
localStorage.setItem("jp_cw_v3",JSON.stringify(S.cw));localStorage.setItem("jp_ca_v3",JSON.stringify(S.caps));
if(S.daily)localStorage.setItem("jp_daily_v3",JSON.stringify(S.daily))}catch(e){}}

const sh=a=>[...a].sort(()=>Math.random()-.5);
const nm=s=>s.toLowerCase().trim().replace(/[\s\u3000]+/g," ").replace(/[.,!?？。、！]/g,"");
const ac=v=>v.c+v.w===0?-1:Math.round((v.c/(v.c+v.w))*100);
const wk=()=>S.vocab.filter(v=>v.w>0||(v.c+v.w>0&&v.c/(v.c+v.w)<.8)).sort((a,b)=>(a.c/Math.max(1,a.c+a.w))-(b.c/Math.max(1,b.c+b.w)));
const cats=()=>["All",...new Set(S.vocab.map(v=>v.cat))];
const today=()=>new Date().toDateString();

function getErrors(){
const w=wk();const errs=[];
const adjW=w.filter(v=>v.cat==="Adj");if(adjW.length>=3)errs.push({type:"Adjectives",msg:`${adjW.length} weak adjectives — you may be dropping the final い`,drill:()=>startDrill("cat","Adj")});
const verbW=w.filter(v=>v.cat==="Verbs");if(verbW.length>=3)errs.push({type:"Verbs",msg:`${verbW.length} weak verbs — drill verb forms`,drill:()=>startDrill("cat","Verbs")});
const placeW=w.filter(v=>v.cat==="Places");if(placeW.length>=3)errs.push({type:"Places",msg:`${placeW.length} weak place words`,drill:()=>startDrill("cat","Places")});
if(w.length>=10)errs.push({type:"General",msg:`${w.length} total weak words — time for a focused session`,drill:()=>startDrill("weak")});
return errs}

function startDrill(type,forceCat){
let q=[];
if(type==="weak"){q=sh(wk()).slice(0,15);if(q.length<5)q=sh([...S.vocab]).slice(0,15)}
else if(type==="all")q=sh([...S.vocab]).slice(0,20);
else if(type==="recall")q=sh([...S.vocab]).slice(0,10);
else if(type==="cat"){const c=forceCat||S.cat;const f=c==="All"?S.vocab:S.vocab.filter(v=>v.cat===c);q=sh(f).slice(0,15)}
else if(type==="new"){q=sh(S.vocab.filter(v=>v.c+v.w===0)).slice(0,15);if(q.length<5)q=sh([...S.vocab]).slice(0,15)}
S.dq=q;S.ci=0;S.fb=null;S.sa=false;S.input="";S.ss={c:0,w:0,t:0};S.mode="drill";R();
setTimeout(()=>{const i=document.getElementById("di");if(i)i.focus()},50)}

function startDaily(){
const w=sh(wk()).slice(0,5);const n=sh(S.vocab.filter(v=>v.c+v.w===0)).slice(0,5);
if(n.length<5){const extra=sh(S.vocab.filter(v=>!w.includes(v)&&!n.includes(v))).slice(0,5-n.length);n.push(...extra)}
S.dq=[...w,...n];S.ci=0;S.fb=null;S.sa=false;S.input="";S.ss={c:0,w:0,t:0};
S.daily={date:today(),wordsCompleted:false,sentencesCompleted:false};save();S.mode="drill";R();
setTimeout(()=>{const i=document.getElementById("di");if(i)i.focus()},50)}

function startSentences(){S.dq=sh(SEN).slice(0,5);S.ci=0;S.fb=null;S.sa=false;S.input="";S.ss={c:0,w:0,t:0};S.mode="sentence";R();
setTimeout(()=>{const i=document.getElementById("di");if(i)i.focus()},50)}

function chk(){const card=S.dq[S.ci];if(!card)return;const ua=nm(S.input);let ok=false;
if(S.mode==="sentence"){ok=nm(card.jp)===ua||nm(card.jp).replace(/ /g,"")=== ua.replace(/ /g,"")}
else if(S.dir==="en2jp")ok=ua===nm(card.r)||ua===nm(card.jp);
else{const parts=card.en.split("/").map(s=>nm(s.trim()));ok=parts.some(a=>ua.includes(a)||a.includes(ua))}
if(S.mode!=="sentence"){const v=S.vocab.find(x=>x.jp===card.jp);if(v){if(ok)v.c++;else v.w++}}
S.ss[ok?"c":"w"]++;S.ss.t++;S.fb=ok?"correct":"wrong";S.sa=true;save();R()}

function skip(){const card=S.dq[S.ci];if(S.mode!=="sentence"){const v=S.vocab.find(x=>x.jp===card.jp);if(v)v.w++}
S.ss.w++;S.ss.t++;S.fb="wrong";S.sa=true;S.input="";save();R()}

function nxt(){if(S.ci<S.dq.length-1){S.ci++;S.fb=null;S.sa=false;S.input="";R();
setTimeout(()=>{const i=document.getElementById("di");if(i)i.focus()},50)}
else{if(S.daily&&S.mode==="sentence")S.daily.sentencesCompleted=true;
if(S.daily&&S.mode==="drill")S.daily.wordsCompleted=true;save();S.mode="results";R()}}

function addToDeck(cap){if(!cap.h.trim())return;const nw={jp:cap.h,r:cap.g||"?",en:cap.m||"?",cat:"Custom",c:0,w:0};
if(!S.vocab.find(v=>v.jp===nw.jp)){S.vocab.push(nw);S.cw.push(nw);save()}
S.caps=S.caps.filter(c=>c!==cap);save();R()}

function addCap(){const h=document.getElementById("ch")?.value||"";const g=document.getElementById("cg")?.value||"";const m=document.getElementById("cm")?.value||"";
if(!h.trim())return;S.caps.unshift({h,g,m,t:new Date().toLocaleString("en-AU",{hour:"2-digit",minute:"2-digit"})});save();R()}

function addWord(){const jp=document.getElementById("nj")?.value||"";const r=document.getElementById("nr")?.value||"";const en=document.getElementById("ne")?.value||"";
if(!jp.trim()||!en.trim())return;const nw={jp,r:r||"?",en,cat:"Custom",c:0,w:0};
if(!S.vocab.find(v=>v.jp===nw.jp)){S.vocab.push(nw);S.cw.push(nw);save()}R()}

function syllables(jp){return jp.split("").map(c=>`<span class="syllable">${c}</span>`).join("")}

function R(){const app=document.getElementById("app");const m=S.mode;

if(m==="menu"){
const w=wk();const tested=S.vocab.filter(v=>v.c+v.w>0);
const avg=tested.length>0?Math.round(tested.reduce((a,v)=>a+(v.c/(v.c+v.w)),0)/tested.length*100):0;
const unt=S.vocab.filter(v=>v.c+v.w===0).length;
const errs=getErrors();
const isDailyDone=S.daily&&S.daily.date===today()&&S.daily.wordsCompleted&&S.daily.sentencesCompleted;
let errHtml=errs.map((e,i)=>`<div class="error-alert"><div class="error-alert-title">⚠️ ${e.type}</div><div class="error-alert-text">${e.msg}</div><button class="btn btn-sm btn-primary" style="margin-top:8px;width:auto" onclick="getErrors()[${i}].drill()">Drill This</button></div>`).join("");
app.innerHTML=`
<div class="header"><h1>日本語</h1><div class="sub">Julius · ${S.vocab.length} words</div></div>
<div class="stats-row">
<div class="stat-box"><div class="stat-num">${S.vocab.length}</div><div class="stat-label">Total</div></div>
<div class="stat-box"><div class="stat-num" style="color:${w.length>0?'var(--red)':'var(--green)'}">${w.length}</div><div class="stat-label">Weak</div></div>
<div class="stat-box"><div class="stat-num">${avg}%</div><div class="stat-label">Accuracy</div></div>
</div>
${errHtml}
<button class="btn ${isDailyDone?'btn-secondary':'btn-teal'}" onclick="startDaily()">🎯 Daily Challenge${isDailyDone?' ✅':''}</button>
<button class="btn btn-purple" onclick="startSentences()">🔨 Sentence Builder</button>
<div class="direction-toggle">
<button class="direction-btn ${S.dir==='en2jp'?'active':''}" onclick="S.dir='en2jp';R()">EN → JP</button>
<button class="direction-btn ${S.dir==='jp2en'?'active':''}" onclick="S.dir='jp2en';R()">JP → EN</button>
</div>
<button class="btn btn-primary" onclick="startDrill('recall')">⚡ Recall Bomb</button>
${w.length>0?`<button class="btn btn-orange" onclick="startDrill('weak')">🔥 Weak Words (${w.length})</button>`:''}
${unt>0?`<button class="btn btn-secondary" style="border-color:var(--blue)" onclick="startDrill('new')">🆕 New Words (${unt})</button>`:''}
<button class="btn btn-secondary" onclick="startDrill('all')">📚 Full Drill</button>
<div class="tags">${cats().map(c=>`<button class="tag ${S.cat===c?'active':''}" onclick="S.cat='${c}';R()">${c}</button>`).join('')}</div>
<button class="btn btn-secondary" onclick="startDrill('cat')">Drill: ${S.cat}</button>
<div class="divider"></div>
<button class="btn btn-secondary" onclick="S.mode='japaneasy';R()">🇯🇵 JAPANEASY Mode</button>
<button class="btn btn-secondary" onclick="S.mode='verbs';R()">📖 Verb Forms</button>
<button class="btn btn-secondary" onclick="S.mode='particles';R()">🔗 Particles</button>
<button class="btn btn-secondary" onclick="S.mode='counters';R()">🔢 Counters</button>
<button class="btn btn-secondary" onclick="S.mode='chunks';R()">🧩 Chunks</button>
<button class="btn btn-secondary" onclick="S.mode='capture';R()">✏️ Quick Capture</button>
<button class="btn btn-secondary" onclick="S.mode='addword';R()">➕ Add Word</button>
<button class="btn btn-secondary" onclick="S.mode='stats';R()">📊 All Words</button>
<button class="btn btn-ghost" onclick="if(confirm('Reset all stats?')){S.vocab.forEach(v=>{v.c=0;v.w=0});save();R()}">Reset Stats</button>`;return}

if(m==="drill"||m==="sentence"){
const card=S.dq[S.ci];if(!card)return;
const isSen=m==="sentence";
const prompt=isSen?card.en:(S.dir==="en2jp"?card.en:card.jp);
const isJp=!isSen&&S.dir==="jp2en";
const prog=((S.ci+1)/S.dq.length)*100;
let body="";
if(!S.sa){
const ph=isSen?"Type the full Japanese sentence...":S.dir==='en2jp'?'Type romaji...':'Type English...';
body=`${isSen&&card.hint?`<div class="hint-box">💡 ${card.hint}</div>`:''}
<input class="input" id="di" value="${S.input}" placeholder="${ph}" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
<button class="btn btn-primary" style="margin-top:10px" onclick="chk()">Check</button>
<button class="btn btn-ghost" onclick="skip()">Don't know</button>`}
else{const ans=isSen?card.jp:(card.jp+' ('+card.r+')');
body=`<div class="feedback-card ${S.fb}">
<div style="font-size:28px;margin-bottom:6px">${S.fb==='correct'?'✅':'❌'}</div>
<div style="font-size:12px;color:var(--dim);margin-bottom:10px">${S.fb==='correct'?'Correct!':'Your answer: '+(S.input||'(skipped)')}</div>
<div style="font-size:${isSen?'18':'28'}px;font-weight:900">${isSen?card.jp:card.jp}</div>
${!isSen?`<div style="font-size:14px;color:var(--dim);margin-top:3px">${card.r}</div>`:''}
<div style="font-size:14px;margin-top:3px">${isSen?'':card.en}</div>
${isSen?`<div style="margin-top:8px;font-size:12px;color:var(--dim)">Syllables: ${syllables(card.jp.replace(/[。、！？ ]/g,''))}</div>`:''}
</div>
<button class="btn btn-primary" onclick="nxt()">${S.ci<S.dq.length-1?'Next →':'See Results'}</button>`}
app.innerHTML=`<div class="drill-header"><button class="btn btn-ghost" onclick="S.mode='menu';R()">✕</button>
<div style="font-size:12px;font-weight:600;color:var(--dim)">${S.ci+1}/${S.dq.length} ${isSen?'· Sentences':''}</div>
<div><span style="font-size:12px;font-weight:700;color:var(--green)">${S.ss.c}</span><span style="font-size:12px;color:var(--dim)"> / </span><span style="font-size:12px;font-weight:700;color:var(--red)">${S.ss.w}</span></div></div>
<div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
<div class="drill-card"><div class="drill-cat">${isSen?'Sentence Builder':card.cat}</div><div class="drill-prompt ${isJp?'jp':''}">${prompt}</div></div>${body}`;
const inp=document.getElementById("di");if(inp){inp.addEventListener("input",e=>{S.input=e.target.value});
inp.addEventListener("keydown",e=>{if(e.key==="Enter"){if(S.sa)nxt();else if(S.input.trim())chk()}})}return}

if(m==="results"){
const pct=S.ss.t>0?Math.round((S.ss.c/S.ss.t)*100):0;const w=wk();
const msg=pct>=90?"🔥 すごい！":pct>=70?"いいね！":"もっと！";
const dailyNext=S.daily&&!S.daily.sentencesCompleted&&S.daily.wordsCompleted;
app.innerHTML=`<div class="card" style="margin-top:32px;padding:28px"><div style="font-size:56px;font-weight:900;text-align:center">${pct}%</div>
<div style="text-align:center;font-size:13px;color:var(--dim);margin-top:6px">${S.ss.c} correct · ${S.ss.w} wrong</div>
<div style="text-align:center;font-size:18px;margin-top:12px">${msg}</div></div>
${dailyNext?`<button class="btn btn-purple" style="margin-top:10px" onclick="startSentences()">Continue → Sentences</button>`:''}
${w.length>0?`<button class="btn btn-orange" style="margin-top:10px" onclick="startDrill('weak')">Drill Weak (${w.length})</button>`:''}
<button class="btn btn-primary" style="margin-top:8px" onclick="startDrill('recall')">Another Round</button>
<button class="btn btn-secondary" onclick="S.mode='menu';R()">Menu</button>`;return}

if(m==="japaneasy"){
const sCs=[...new Set(SCRIPTS.map(s=>s.c))];const lb={Intro:"🤝",Ask:"❓",React:"⚡",Save:"🆘",Smooth:"💫"};
app.innerHTML=`<div class="top-nav"><button class="btn btn-ghost" onclick="S.mode='menu';R()">← Back</button><div class="top-nav-title">JAPANEASY Mode</div><div></div></div>
<div class="card" style="border-color:var(--teal)"><input class="input" style="margin-bottom:8px;font-size:14px" placeholder="Quick capture — what I heard..." id="jh" autocomplete="off">
<div style="display:flex;gap:6px"><input class="input" style="font-size:13px;flex:1" placeholder="Romaji guess..." id="jg" autocomplete="off">
<input class="input" style="font-size:13px;flex:1" placeholder="Meaning..." id="jm" autocomplete="off"></div>
<button class="btn btn-teal btn-sm" style="margin-top:8px;width:100%" onclick="const h=document.getElementById('jh').value,g=document.getElementById('jg').value,m=document.getElementById('jm').value;if(h.trim()){S.caps.unshift({h,g,m,t:''});save();R()}">+ Capture</button></div>
<div class="tags">${sCs.map(c=>`<button class="tag ${S.sc===c?'active':''}" onclick="S.sc='${c}';R()">${lb[c]||''} ${c}</button>`).join('')}</div>
${SCRIPTS.filter(s=>s.c===S.sc).map(s=>`<div class="card" style="padding:12px 16px"><div class="script-jp">${s.jp}</div><div class="script-en">${s.en}</div></div>`).join('')}
${S.caps.length>0?`<div class="section-title">Captured Tonight</div>${S.caps.slice(0,10).map((c,i)=>`<div class="card" style="padding:10px 14px"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:700">${c.h}</div><div style="font-size:12px;color:var(--dim)">${c.g} → ${c.m}</div></div>
<button class="btn btn-sm btn-primary" style="padding:5px 10px;font-size:10px;width:auto" onclick="addToDeck(S.caps[${i}])">+Deck</button></div></div>`).join('')}`:''}`;return}

if(m==="verbs"){
const sel=S.vsel!==null?VF[S.vsel]:null;
if(sel){app.innerHTML=`<div class="top-nav"><button class="btn btn-ghost" onclick="S.vsel=null;R()">← Verbs</button><div class="top-nav-title">${sel.base} (${sel.en})</div><div></div></div>
<div class="card" style="text-align:center;padding:24px"><div style="font-size:36px;font-weight:900">${sel.base}</div><div style="font-size:14px;color:var(--dim)">${sel.r} · ${sel.en} · Group ${sel.group}</div>
<div style="margin-top:12px">${syllables(sel.base)}</div></div>
<div class="card">
${[["Polite","masu"],["Past polite","mashita"],["Negative","masen"],["Let's","mashou"],["Won't you?","masenka"],["Want to","tai"],["て form","te"],["Casual past","ta"],["Ongoing","teiru"],["Negative casual","nai"]].map(([l,k])=>`<div class="verb-form"><span class="verb-label">${l}</span><span class="verb-val">${sel[k]}</span></div>`).join('')}
</div>`;return}
app.innerHTML=`<div class="top-nav"><button class="btn btn-ghost" onclick="S.mode='menu';R()">← Back</button><div class="top-nav-title">Verb Forms (${VF.length})</div><div></div></div>
${VF.map((v,i)=>`<div class="card" style="padding:12px 16px;cursor:pointer" onclick="S.vsel=${i};R()"><div style="display:flex;justify-content:space-between;align-items:center"><div><span style="font-size:18px;font-weight:700">${v.base}</span><span style="font-size:12px;color:var(--dim);margin-left:8px">${v.r}</span></div><span style="font-size:13px;color:var(--dim)">${v.en} →</span></div></div>`).join('')}`;return}

if(m==="particles"){
app.innerHTML=`<div class="top-nav"><button class="btn btn-ghost" onclick="S.mode='menu';R()">← Back</button><div class="top-nav-title">Particles</div><div></div></div>
${PARTICLES.map(p=>`<div class="card particle-card"><div class="particle-sym">${p.p}</div><div class="particle-meaning">${p.m}</div><div class="particle-pattern">${p.pat}</div><div class="particle-ex">${p.ex}</div>${p.note?`<div style="font-size:11px;color:var(--orange);margin-top:4px">⚠️ ${p.note}</div>`:''}</div>`).join('')}`;return}

if(m==="counters"){
app.innerHTML=`<div class="top-nav"><button class="btn btn-ghost" onclick="S.mode='menu';R()">← Back</button><div class="top-nav-title">Counters</div><div></div></div>
${[["Minutes (ぷん/ふん)","min"],["Hours (じかん)","hr"],["Months (かげつ)","mo"],["Years (ねん)","yr"]].map(([title,key])=>`<div class="card counter-section"><div class="counter-title">${title}</div>${COUNTERS[key].map(([jp,n])=>`<div class="counter-row"><span>${jp}</span><span style="color:var(--dim)">${n}</span></div>`).join('')}</div>`).join('')}`;return}

if(m==="chunks"){
app.innerHTML=`<div class="top-nav"><button class="btn btn-ghost" onclick="S.mode='menu';R()">← Back</button><div class="top-nav-title">Chunks</div><div></div></div>
${CHUNKS.map(c=>`<div class="card chunk-row"><div><div class="chunk-jp">${c.jp}</div><div class="chunk-en">${c.en}</div></div><div class="chunk-p">${c.p}</div></div>`).join('')}`;return}

if(m==="capture"){
app.innerHTML=`<div class="top-nav"><button class="btn btn-ghost" onclick="S.mode='menu';R()">← Back</button><div class="top-nav-title">Quick Capture</div><div></div></div>
<div class="card"><input class="input" style="margin-bottom:8px" placeholder="What I heard..." id="ch" autocomplete="off">
<input class="input" style="margin-bottom:8px" placeholder="My guess (romaji)..." id="cg" autocomplete="off">
<input class="input" style="margin-bottom:8px" placeholder="What it meant..." id="cm" autocomplete="off">
<button class="btn btn-primary" onclick="addCap()">+ Capture</button></div>
${S.caps.length>0?`<div class="card"><div style="font-size:12px;font-weight:700;margin-bottom:6px">CAPTURED (${S.caps.length})</div>
${S.caps.map((c,i)=>`<div class="capture-item"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:600">${c.h}</div><div style="font-size:12px;color:var(--dim)">${c.g} → ${c.m}</div></div>
<button class="btn btn-sm btn-primary" style="padding:5px 10px;font-size:10px;width:auto" onclick="addToDeck(S.caps[${i}])">+Deck</button></div></div>`).join('')}</div>`:''}`;return}

if(m==="addword"){
app.innerHTML=`<div class="top-nav"><button class="btn btn-ghost" onclick="S.mode='menu';R()">← Back</button><div class="top-nav-title">Add Word</div><div></div></div>
<div class="card"><input class="input" style="margin-bottom:8px" placeholder="Japanese (hiragana)..." id="nj" autocomplete="off">
<input class="input" style="margin-bottom:8px" placeholder="Romaji..." id="nr" autocomplete="off">
<input class="input" style="margin-bottom:8px" placeholder="English meaning..." id="ne" autocomplete="off">
<button class="btn btn-primary" onclick="addWord()">+ Add to Deck</button></div>
${S.cw.length>0?`<div class="card"><div style="font-size:12px;font-weight:700;margin-bottom:6px">YOUR WORDS (${S.cw.length})</div>
${S.cw.map(v=>`<div class="word-row"><div><span class="word-jp">${v.jp}</span><span class="word-r">${v.r}</span></div><span class="word-en">${v.en}</span></div>`).join('')}</div>`:''}`;return}

if(m==="stats"){
const sorted=[...S.vocab].sort((a,b)=>{const aa=ac(a),ab=ac(b);if(aa===-1&&ab===-1)return 0;if(aa===-1)return 1;if(ab===-1)return -1;return aa-ab});
const filtered=sorted.filter(v=>S.cat==="All"||v.cat===S.cat);
app.innerHTML=`<div class="top-nav"><button class="btn btn-ghost" onclick="S.mode='menu';R()">← Back</button><div class="top-nav-title">All Words (${S.vocab.length})</div><div></div></div>
<div class="tags">${cats().map(c=>`<button class="tag ${S.cat===c?'active':''}" onclick="S.cat='${c}';R()">${c}</button>`).join('')}</div>
<div class="card">${filtered.map(v=>{const a=ac(v);const bg=a===-1?'var(--border)':a>=80?'var(--green-d)':a>=50?'var(--orange-d)':'var(--red-d)';
const col=a===-1?'var(--faint)':a>=80?'var(--green)':a>=50?'var(--orange)':'var(--red)';
return `<div class="word-row"><div><span class="word-jp">${v.jp}</span><span class="word-r">${v.r}</span></div><div><span class="word-en">${v.en}</span><span class="word-acc" style="background:${bg};color:${col}">${a===-1?'—':a+'%'}</span></div></div>`}).join('')}</div>`;return}
}

load();R();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script></body></html>
