/* v6.13 — Daily Chain. Three-lesson sequence (simple → complex → hard) using
   the same 3 words across lessons, so the user encounters each word in many
   forms within a single session. State persists in localStorage so a chain
   survives a navigation away from Build Mode. */
const BUILD_LS_CHAIN = 'jp4_build_chain';
function buildChainGet(){ try{ return JSON.parse(localStorage.getItem(BUILD_LS_CHAIN) || 'null'); }catch(e){ return null; } }
function buildChainSet(c){ try{ localStorage.setItem(BUILD_LS_CHAIN, JSON.stringify(c)); }catch(_){} }
function buildChainClear(){ try{ localStorage.removeItem(BUILD_LS_CHAIN); }catch(_){} }
window.buildChainClear = buildChainClear;
function buildChainPickWords(){
  const deck = state.words || [];
  const masteredSet = new Set(state.settings.masteredWords || []);
  const suspendedSet = new Set(state.settings.suspendedWords || []);
  const moduleIds = activeModuleWordIdSet();
  const candidates = deck.filter(w =>
    w.pos === 'n' && !hasKatakana(w.jp) && w.jp && w.en && w.romaji &&
    !masteredSet.has(w.id) && !suspendedSet.has(w.id) &&
    (!moduleIds || moduleIds.has(w.id)) &&
    vocabIsIntroduced(w)
  );
  if(candidates.length < 3) return null;
  const dueScore = w => {
    const st = state.stats[w.id];
    if(!st || st.smNext == null) return Number.MAX_SAFE_INTEGER;
    return st.smNext;
  };
  /* Pick 3 SRS-due-soonest from a single theme so all 3 lessons can use them. */
  const themeBuckets = {};
  candidates.forEach(w => {
    if(!themeBuckets[w.theme]) themeBuckets[w.theme] = [];
    themeBuckets[w.theme].push(w);
  });
  /* Choose theme with ≥3 candidates, prefer themes with most due-soon. */
  const themesByDue = Object.entries(themeBuckets)
    .filter(([,arr]) => arr.length >= 3)
    .map(([t, arr]) => {
      arr.sort((a, b) => dueScore(a) - dueScore(b));
      return { theme: t, arr, dueTs: dueScore(arr[0]) };
    })
    .sort((a, b) => a.dueTs - b.dueTs);
  if(themesByDue.length === 0) return null;
  return themesByDue[0].arr.slice(0, 3);
}
function startBuildChain(){
  const words = buildChainPickWords();
  if(!words){
    showToast("Drill at least 3 nouns in the same theme via Vocab Blitz to start a chain.", {tone:'warn', duration:5500});
    return;
  }
  buildChainSet({ step: 1, wordIds: words.map(w => w.id), theme: words[0].theme, started: Date.now() });
  startBuildModeGenerated('simple');
}
window.startBuildChain = startBuildChain;
function buildPickRandom(arr, n){
  const pool = arr.slice(); const out = [];
  while(out.length < n && pool.length){
    const i = Math.floor(Math.random()*pool.length);
    out.push(pool.splice(i,1)[0]);
  }
  return out;
}

// v6.11 — slot-config eligibility for variation groups + qa templates.
// Same shape as BUILD_TEMPLATES (slotThemes/slotWords/slotExclude),
// shared so we can pick a random group + word together.
function buildPoolForCfg(deck, cfg){
  /* v6.12 — exclude mastered + suspended.
     v6.12.1 — also exclude words the user hasn't encountered in Vocab Blitz.
     v6.16 — also constrain to current/unlocked modules. */
  const masteredSet = new Set(state.settings.masteredWords || []);
  const suspendedSet = new Set(state.settings.suspendedWords || []);
  const moduleIds = activeModuleWordIdSet();
  return deck.filter(w =>
    w.pos === 'n' &&
    !hasKatakana(w.jp) &&
    w.jp && w.en && w.romaji &&
    !masteredSet.has(w.id) &&
    !suspendedSet.has(w.id) &&
    (!moduleIds || moduleIds.has(w.id)) &&
    vocabIsIntroduced(w) &&
    (!cfg.slotThemes || cfg.slotThemes.includes(w.theme)) &&
    (!cfg.slotWords || cfg.slotWords.includes(w.en)) &&
    (!cfg.slotExclude || !cfg.slotExclude.includes(w.en))
  );
}
function buildWordFitsCfg(word, cfg){
  if(!word) return false;
  if(cfg.slotThemes && !cfg.slotThemes.includes(word.theme)) return false;
  if(cfg.slotWords && !cfg.slotWords.includes(word.en)) return false;
  if(cfg.slotExclude && cfg.slotExclude.includes(word.en)) return false;
  return true;
}
function _buildMakeVariationStep(group, word){
  const ways = group.ways.map(w => ({
    jp: w.jp.replace(/\{N\}/g, word.jp),
    frame: w.jp
  }));
  return {
    type:'variation',
    english: group.en.replace(/\{N\}/g, word.en),
    ways,
    word_id: buildGenWordId(word),
    group_id: group.id
  };
}
function _buildMakeQaStep(tmpl, word){
  return {
    type:'qa',
    question_jp: tmpl.question_jp.replace(/\{N\}/g, word.jp),
    question_en: tmpl.question_en.replace(/\{N\}/g, word.en),
    answers: tmpl.answers.map(a => ({...a})),
    word_id: buildGenWordId(word),
    template_id: tmpl.id
  };
}
function buildGenerateVariationStep(deck, preferredWord){
  if(preferredWord && state.words){
    const real = state.words.find(w => w.jp === preferredWord.jp && w.en === preferredWord.en);
    if(real){
      const cands = BUILD_VARIATION_GROUPS.filter(g => buildWordFitsCfg(real, g));
      if(cands.length){
        const g = cands[Math.floor(Math.random() * cands.length)];
        return _buildMakeVariationStep(g, real);
      }
    }
  }
  for(let attempt = 0; attempt < 30; attempt++){
    const g = BUILD_VARIATION_GROUPS[Math.floor(Math.random() * BUILD_VARIATION_GROUPS.length)];
    const pool = buildPoolForCfg(deck, g);
    if(!pool.length) continue;
    const w = pool[Math.floor(Math.random() * pool.length)];
    return _buildMakeVariationStep(g, w);
  }
  return null;
}
function buildGenerateQaStep(deck, preferredWord){
  if(preferredWord && state.words){
    const real = state.words.find(w => w.jp === preferredWord.jp && w.en === preferredWord.en);
    if(real){
      const cands = BUILD_QA_TEMPLATES.filter(t => buildWordFitsCfg(real, t));
      if(cands.length){
        const t = cands[Math.floor(Math.random() * cands.length)];
        return _buildMakeQaStep(t, real);
      }
    }
  }
  for(let attempt = 0; attempt < 30; attempt++){
    const t = BUILD_QA_TEMPLATES[Math.floor(Math.random() * BUILD_QA_TEMPLATES.length)];
    const pool = buildPoolForCfg(deck, t);
    if(!pool.length) continue;
    const w = pool[Math.floor(Math.random() * pool.length)];
    return _buildMakeQaStep(t, w);
  }
  return null;
}

function buildGenerateLesson(mode){
  mode = mode || 'simple';
  let pool;
  if(mode === 'complex') pool = BUILD_COMPLEX_TEMPLATES;
  else if(mode === 'social') pool = BUILD_SOCIAL_TEMPLATES;
  else pool = BUILD_TEMPLATES;
  if(pool.length < 2) throw new Error('need at least 2 templates in pool');

  /* v6.13 — chain mode: restrict pool to templates whose slotThemes include
     the chain's anchor theme so the selected chain words actually fit. */
  const chain = buildChainGet();
  const chainActive = !!(chain && chain.theme && chain.wordIds && chain.wordIds.length === 3);
  if(chainActive){
    const themed = pool.filter(t => (t.slotThemes || []).includes(chain.theme));
    if(themed.length >= 2) pool = themed;
  }

  const recent = buildRecentGet();
  const recentTemplates = new Set(recent.templates || []);
  const sequence = buildGetSequence();
  const introducedIds = new Set();
  sequence.forEach(e => (e.introduced || []).forEach(id => introducedIds.add(id)));
  const deck = state.words || [];

  /* v6.12 — Build Mode honors Library status: skip mastered + suspended words.
     Focus is applied later as a preference, not a filter.
     v6.12.1 — also skip words the user has never encountered in Vocab Blitz.
     Build Mode is a reinforcement layer, not a place to learn cold vocab.
     v6.16 — also constrain to current/unlocked modules. */
  const masteredSet = new Set(state.settings.masteredWords || []);
  const suspendedSet = new Set(state.settings.suspendedWords || []);
  const moduleIds = activeModuleWordIdSet();
  const eligibleForPair = (p, s) => {
    const common = p.slotThemes.filter(t => s.slotThemes.includes(t));
    return deck.filter(w =>
      w.pos === 'n' &&
      common.includes(w.theme) &&
      !hasKatakana(w.jp) &&
      w.jp && w.en && w.romaji &&
      !masteredSet.has(w.id) &&
      !suspendedSet.has(w.id) &&
      (!moduleIds || moduleIds.has(w.id)) &&
      vocabIsIntroduced(w) &&
      (!p.slotWords || p.slotWords.includes(w.en)) &&
      (!s.slotWords || s.slotWords.includes(w.en)) &&
      (!p.slotExclude || !p.slotExclude.includes(w.en)) &&
      (!s.slotExclude || !s.slotExclude.includes(w.en))
    );
  };

  /* v6.12.4 — pre-filter primary templates to viable ones (those that have
     at least one valid secondary partner with ≥3 eligible introduced words).
     Stops the algorithm from picking a primary that dooms the pairing step
     and surfacing "no compatible secondary" toasts when the real fix is to
     just pick a different primary. */
  const viablePrimaries = pool.filter(p =>
    pool.some(s =>
      s.id !== p.id &&
      s.slotKey === p.slotKey &&
      s.slotThemes.some(th => p.slotThemes.includes(th)) &&
      eligibleForPair(p, s).length >= 3
    )
  );
  if(viablePrimaries.length === 0){
    const themeCounts = {};
    deck.filter(w =>
      w.pos === 'n' && !hasKatakana(w.jp) &&
      !masteredSet.has(w.id) && !suspendedSet.has(w.id) &&
      (!moduleIds || moduleIds.has(w.id)) && vocabIsIntroduced(w)
    ).forEach(w => { themeCounts[w.theme] = (themeCounts[w.theme] || 0) + 1; });
    const have = Object.entries(themeCounts)
      .sort((a,b) => b[1]-a[1])
      .map(([t,n]) => `${t}:${n}`).join(', ') || 'none';
    throw new Error(`no template pair has 3+ introduced words (you have ${have || 'none'}) — drill more in the same theme via Vocab Blitz`);
  }

  /* v6.12.2 — recency-aware template selection. Skip recently-used templates
     unless the filtered pool would shrink below 4 (keep generation robust).
     v6.22 — also bias against recently-used verbs (track the last
     BUILD_RECENT_VERBS_CAP verb fingerprints across lessons). The user
     complaint was "same verbs over and over"; template-id recency alone
     doesn't catch this because many templates share the same verb. */
  const recentVerbs = new Set((recent.verbs || []).slice(-BUILD_RECENT_VERBS_CAP));
  const verbFresh = (t) => {
    const v = buildTemplateVerb(t);
    return !v || !recentVerbs.has(v);
  };
  let primaryPool = viablePrimaries.filter(t => !recentTemplates.has(t.id));
  if(primaryPool.length < 4) primaryPool = viablePrimaries;
  /* Tighten further: prefer fresh-verb templates if enough remain. */
  const primaryFreshVerb = primaryPool.filter(verbFresh);
  if(primaryFreshVerb.length >= 3) primaryPool = primaryFreshVerb;
  const primary = primaryPool[Math.floor(Math.random() * primaryPool.length)];

  const sCands = pool.filter(t =>
    t.id !== primary.id &&
    t.slotKey === primary.slotKey &&
    t.slotThemes.some(th => primary.slotThemes.includes(th)) &&
    eligibleForPair(primary, t).length >= 3
  );
  if(sCands.length === 0) throw new Error('no compatible secondary for ' + primary.id);
  /* v6.12.2 — bias secondary away from recently-used templates too.
     v6.22 — within a single lesson, also prefer a secondary whose verb
     differs from primary's. Falls back gracefully if no different-verb
     candidate exists for the chosen theme/slotKey pair. */
  const primaryVerb = buildTemplateVerb(primary);
  const sFiltered = sCands.filter(t => !recentTemplates.has(t.id));
  const sBase = sFiltered.length > 0 ? sFiltered : sCands;
  const sDifferentVerb = sBase.filter(t => {
    const v = buildTemplateVerb(t);
    return !primaryVerb || !v || v !== primaryVerb;
  });
  const sPool = sDifferentVerb.length > 0 ? sDifferentVerb : sBase;
  const secondary = sPool[Math.floor(Math.random() * sPool.length)];
  const commonThemes = primary.slotThemes.filter(t => secondary.slotThemes.includes(t));
  const eligible = eligibleForPair(primary, secondary);
  if(eligible.length < 3) throw new Error('not enough deck nouns for ' + commonThemes.join(','));

  /* v6.12 — prefer focused words (★) for new-word slots when possible.
     v6.12.2 — prefer most-recently-learned vocab; de-prefer words used in
     the last few Build Mode lessons.
     v6.12.13 — primary signal is now SM-2 due-soonest. The user wants
     Build Mode to surface "what I need to master" — by definition that's
     words coming due (or overdue) in Vocab Blitz. Recently-learned tends
     to be due soon anyway, so this preserves that bias while explicitly
     prioritizing reinforcement targets. */
  const focusSet = new Set(state.settings.focusWords || []);
  const recentWords = new Set(recent.words || []);
  const wordDueTs = w => {
    const st = state.stats[w.id];
    if(!st) return Number.MAX_SAFE_INTEGER;
    if(st.smNext != null) return st.smNext;
    return Number.MAX_SAFE_INTEGER;
  };
  const sortByPriority = (a, b) => {
    /* Recently-used in Build Mode goes LAST (avoid same-word repetition). */
    const ar = recentWords.has(a.id) ? 1 : 0;
    const br = recentWords.has(b.id) ? 1 : 0;
    if(ar !== br) return ar - br;
    /* Then due-soonest in SM-2 goes FIRST — these are the words the user
       actively needs to master. */
    return wordDueTs(a) - wordDueTs(b);
  };
  /* v6.13 — chain mode: hardwire newWords to the chain's 3 words when they
     fit eligible. The whole point of the chain is "same words across modes". */
  let newWords;
  if(chainActive){
    const chainWords = chain.wordIds.map(id => eligible.find(w => w.id === id)).filter(Boolean);
    if(chainWords.length === 3){
      newWords = chainWords;
    } else {
      /* Some chain words don't fit current pair (rare, but possible). Fill from
         eligible by priority. The user still gets the chain feel because at
         least some chain words are present. */
      const have = new Set(chainWords.map(w => w.id));
      const extra = eligible.filter(w => !have.has(w.id)).sort(sortByPriority);
      newWords = chainWords.concat(extra.slice(0, 3 - chainWords.length));
    }
  } else {
    const unintroduced = eligible.filter(w => !introducedIds.has(buildGenWordId(w))).sort(sortByPriority);
    const focusedUnintro = unintroduced.filter(w => focusSet.has(w.id));
    newWords = focusedUnintro.slice(0, 3);  /* take top focused, in priority order */
    if(newWords.length < 3){
      const rest = unintroduced.filter(w => !newWords.includes(w));
      newWords = newWords.concat(rest.slice(0, 3 - newWords.length));
    }
    if(newWords.length < 3){
      const extra = eligible.filter(w => !newWords.includes(w)).sort(sortByPriority);
      newWords = newWords.concat(extra.slice(0, 3 - newWords.length));
    }
  }

  const newIdSet = new Set(newWords.map(buildGenWordId));
  const cbPool = [];
  for(const entry of sequence){
    for(const id of (entry.introduced || [])){
      if(newIdSet.has(id)) continue;
      const w = eligible.find(x => buildGenWordId(x) === id);
      if(w && !cbPool.some(p => buildGenWordId(p) === id)) cbPool.push(w);
    }
  }
  /* v6.12 — sort callback pool by SRS due-soonest first. Words about to come
     due (or already overdue) in Vocab Blitz get pulled into Build Mode as
     callbacks today, instead of waiting for the user to start a Blitz session.
     This is the cross-mode revisit Julius asked for, riding on existing SM-2. */
  cbPool.sort((a, b) => {
    const sa = state.stats[a.id], sb = state.stats[b.id];
    const na = (sa && sa.smNext != null) ? sa.smNext : Number.MAX_SAFE_INTEGER;
    const nb = (sb && sb.smNext != null) ? sb.smNext : Number.MAX_SAFE_INTEGER;
    return na - nb;
  });
  let callbacks = cbPool.slice(0, 2);
  if(callbacks.length < 2){
    const cbIds = new Set(callbacks.map(buildGenWordId));
    const extra = buildPickRandom(
      eligible.filter(w => !newIdSet.has(buildGenWordId(w)) && !cbIds.has(buildGenWordId(w))),
      2 - callbacks.length
    );
    callbacks = callbacks.concat(extra);
  }
  /* v6.12.12 — fallback chain so cb1/cb2 are never undefined. Prior code
     crashed with "Cannot read properties of undefined (reading 'jp')" when
     eligible was small enough that all viable words went to newWords and
     none were left for callbacks.
     v6.14 — Tier 2 must respect slot constraints. Earlier version pulled
     any introduced noun, which let words like 'michi' (places) get slotted
     into 'たべる' templates → "I eat the road". Now requires the word to
     fit BOTH primary and secondary slot constraints (themes/slotWords/
     slotExclude) so cb1↔cb2 assignment can never produce silly sentences. */
  if(callbacks.length < 2){
    const cbIds = new Set(callbacks.map(buildGenWordId));
    const fitsTmpl = (w, t) =>
      (!t.slotThemes || t.slotThemes.includes(w.theme)) &&
      (!t.slotWords || t.slotWords.includes(w.en)) &&
      (!t.slotExclude || !t.slotExclude.includes(w.en));
    const wider = deck.filter(w =>
      w.pos === 'n' && !hasKatakana(w.jp) && w.jp && w.en && w.romaji &&
      !masteredSet.has(w.id) && !suspendedSet.has(w.id) &&
      (!moduleIds || moduleIds.has(w.id)) &&
      vocabIsIntroduced(w) &&
      !newIdSet.has(buildGenWordId(w)) && !cbIds.has(buildGenWordId(w)) &&
      fitsTmpl(w, primary) && fitsTmpl(w, secondary)
    );
    callbacks = callbacks.concat(buildPickRandom(wider, 2 - callbacks.length));
  }
  if(callbacks.length < 2){
    /* Tier 3: reuse newWords (with cycle-3 callback framing). At least the
       lesson generates instead of crashing; in tiny-deck scenarios this is
       still pedagogically sound — it's another pass over the same words. */
    const cbIds = new Set(callbacks.map(buildGenWordId));
    for(const nw of newWords){
      if(callbacks.length >= 2) break;
      const id = buildGenWordId(nw);
      if(!cbIds.has(id)){ callbacks.push(nw); cbIds.add(id); }
    }
  }

  const [w1, w2, w3] = newWords;
  const [cb1, cb2] = callbacks;
  const lessonId = (mode === 'complex' ? 'Gc' : mode === 'social' ? 'Gx' : 'Gs') + (sequence.length + 1);
  const toRef = w => ({ id: buildGenWordId(w), jp: w.jp, en: w.en, r: w.romaji });

  const p1 = buildFillTemplate(primary, w1), p2 = buildFillTemplate(primary, w2), p3 = buildFillTemplate(primary, w3);
  const s1 = buildFillTemplate(secondary, w1), s2 = buildFillTemplate(secondary, w2), s3 = buildFillTemplate(secondary, w3);
  const sCb1 = buildFillTemplate(secondary, cb1);
  const pCb2 = buildFillTemplate(primary, cb2);
  const sCb2 = buildFillTemplate(secondary, cb2);

  const pEn = primary.en.replace(/\{N\}/g,'X');
  const sEn = secondary.en.replace(/\{N\}/g,'X');

  /* v6.23 — cycle 2 extended from 5 → 8 step beats. Users reported lessons
     ending too quickly; extra rotation reinforces the same 3 words across
     both frames a 2nd time before the variation step. Ordering keeps
     P/S/P/S/P alternation so the user keeps hearing the contrast. */
  const cycle2Steps = [
    { type:'build',      sentence_jp: p1.jp, sentence_en: p1.en },
    { type:'substitute', swap_word_id: buildGenWordId(w2), result_jp: p2.jp, result_en: p2.en },
    { type:'build',      sentence_jp: s2.jp, sentence_en: s2.en },
    { type:'substitute', swap_word_id: buildGenWordId(w3), result_jp: s3.jp, result_en: s3.en },
    { type:'build',      sentence_jp: p3.jp, sentence_en: p3.en },
    { type:'substitute', swap_word_id: buildGenWordId(w1), result_jp: p1.jp, result_en: p1.en },
    { type:'build',      sentence_jp: s1.jp, sentence_en: s1.en },
    { type:'substitute', swap_word_id: buildGenWordId(w3), result_jp: s3.jp, result_en: s3.en }
  ];
  // v6.11 — append a variation step using one of the new words. Same English intent,
  // multiple Japanese framings. Falls back to a deck pick if no new word fits.
  const varStep = buildGenerateVariationStep(state.words || [], w3) ||
                  buildGenerateVariationStep(state.words || [], w2) ||
                  buildGenerateVariationStep(state.words || [], w1);
  if(varStep) cycle2Steps.push(varStep);

  const pCb1 = buildFillTemplate(primary, cb1);
  /* v6.23 — cycle 3 extended from 4 → 6 step beats. Each callback word now
     gets BOTH frames so cold review still feels like a contrast drill, not
     a one-shot quiz. */
  const cycle3Steps = [
    { type:'callback',   word_id: buildGenWordId(cb1), note:'cold — from earlier' },
    { type:'build',      sentence_jp: sCb1.jp, sentence_en: sCb1.en },
    { type:'substitute', swap_word_id: buildGenWordId(cb1), result_jp: pCb1.jp, result_en: pCb1.en },
    { type:'callback',   word_id: buildGenWordId(cb2), note:'cold — from earlier' },
    { type:'build',      sentence_jp: pCb2.jp, sentence_en: pCb2.en },
    { type:'substitute', swap_word_id: buildGenWordId(cb2), result_jp: sCb2.jp, result_en: sCb2.en }
  ];
  // v6.11 — append a QA step. Uses a callback word so it doubles as a 3rd cold review.
  const qaStep = buildGenerateQaStep(state.words || [], cb1) ||
                 buildGenerateQaStep(state.words || [], cb2) ||
                 buildGenerateQaStep(state.words || [], w1);
  if(qaStep) cycle3Steps.push(qaStep);

  /* v6.12.2 — record what we just used so the next lesson avoids it.
     v6.22 — also record verb fingerprints so the next lesson's selector
     can avoid re-using the same verbs. */
  buildRecentPush('templates', primary.id, BUILD_RECENT_TEMPLATES_CAP);
  buildRecentPush('templates', secondary.id, BUILD_RECENT_TEMPLATES_CAP);
  for(const w of newWords) buildRecentPush('words', w.id, BUILD_RECENT_WORDS_CAP);
  const pVerb = buildTemplateVerb(primary);
  const sVerb = buildTemplateVerb(secondary);
  if(pVerb) buildRecentPush('verbs', pVerb, BUILD_RECENT_VERBS_CAP);
  if(sVerb && sVerb !== pVerb) buildRecentPush('verbs', sVerb, BUILD_RECENT_VERBS_CAP);

  /* v6.12.6 — cycle 1 honors lifetime Vocab Blitz history. If the user has
     correctly answered a word ≥1 times in Vocab Blitz (or any other mode that
     pushes to state.stats), it's NOT a new word — skip the passive introduce
     step and go straight to active recall. Eliminates the "introducing me to
     ringo when I just graduated it yesterday" problem. */
  const knownInApp = (w) => {
    const st = state.stats[w.id];
    if(!st) return false;
    if(st.correctCount && st.correctCount >= 1) return true;
    if(st.attempts && st.attempts.some(a => a.correct)) return true;
    return false;
  };
  const cycle1Steps = newWords.map(w => ({
    type: knownInApp(w) ? 'recall' : 'introduce',
    word_id: buildGenWordId(w)
  }));
  cycle1Steps.push({ type:'recall', word_id: buildGenWordId(w1) });
  const allKnown = newWords.every(knownInApp);
  const cycle1Name = allKnown
    ? `Warm-up — ${w1.en}, ${w2.en}, ${w3.en}`
    : `Introduce — ${w1.en}, ${w2.en}, ${w3.en}`;

  /* v6.24 — cycle 4: cold final pass over all 5 lesson words (3 new + 2 cb).
     Each word gets one cold-recall step in whichever frame the user has
     seen it LEAST in cycle 2/3. Adds ~5 steps per lesson; doubles down on
     the user's "I need more time per lesson" ask without restructuring
     the cycle1-3 contract. */
  const cycle4Steps = [
    { type:'callback', word_id: buildGenWordId(w1), note:'final pass' },
    { type:'build',    sentence_jp: s1.jp, sentence_en: s1.en },
    { type:'callback', word_id: buildGenWordId(w2), note:'final pass' },
    { type:'build',    sentence_jp: s2.jp, sentence_en: s2.en },
    { type:'callback', word_id: buildGenWordId(w3), note:'final pass' },
    { type:'build',    sentence_jp: p3.jp, sentence_en: p3.en },
    { type:'callback', word_id: buildGenWordId(cb1), note:'final pass — earlier word' },
    { type:'build',    sentence_jp: pCb1.jp, sentence_en: pCb1.en },
    { type:'callback', word_id: buildGenWordId(cb2), note:'final pass — earlier word' },
    { type:'build',    sentence_jp: sCb2.jp, sentence_en: sCb2.en }
  ];

  /* v6.26 — Similar-words discrimination cycle, inserted between callbacks
     (cycle 3) and the final cold pass (cycle 4). Picks a SIMILAR_SET that
     overlaps with the lesson's verbs/words when possible. Skipped silently
     if no SIMILAR_SETS or set has too few items. Folds the standalone
     Similar Words mode into Build Mode lessons so the user doesn't have
     to leave Build Mode to drill near-synonym discrimination. */
  const simSet = _buildPickSimilarSetForLesson(pVerb, sVerb, [...newWords, ...callbacks]);
  const cycleSimSteps = _buildGenerateSimilarSteps(simSet, 2);

  /* v6.27 — form_drill cycle: 2 conjugation steps using introduced deck verbs.
     Skipped silently when no eligible verbs exist (early users, small decks). */
  const formVerbs = _buildPickFormDrillVerbs(deck, 2);
  const cycleFormSteps = _buildGenerateFormDrillSteps(formVerbs, 2);

  const cycles = [
    { id:'cycle_1', name: cycle1Name, steps: cycle1Steps },
    { id:'cycle_2', name:`Mix frames — "${pEn}" ⇄ "${sEn}"`, steps: cycle2Steps },
    { id:'cycle_3', name:`Callbacks — mix frames`, steps: cycle3Steps }
  ];
  if(cycleSimSteps.length){
    cycles.push({ id:'cycle_sim', name:`Discriminate — ${simSet.title}`, steps: cycleSimSteps });
  }
  if(cycleFormSteps.length){
    cycles.push({ id:'cycle_form', name:`Conjugate — verb forms`, steps: cycleFormSteps });
  }
  /* v6.28 — phrase cycle: 2 real-life phrases from PHRASE_POOL. */
  const cyclePhraseSteps = _buildGeneratePhraseSteps(2);
  if(cyclePhraseSteps.length){
    cycles.push({ id:'cycle_phrase', name:`Real-life phrases`, steps: cyclePhraseSteps });
  }
  cycles.push({ id:'cycle_4', name:`Final pass — all 5 words cold`, steps: cycle4Steps });

  return {
    id: lessonId,
    title: `${mode === 'complex' ? 'Complex' : mode === 'social' ? 'Social' : 'Simple'} ${lessonId} — ${pEn} / ${sEn}`,
    duration_mins: mode === 'complex' ? 13 : mode === 'social' ? 12 : 11,
    new_words: newWords.map(toRef),
    carryover_words: callbacks.map(toRef),
    cycles,
    _meta: {
      mode,
      introduced_ids: newWords.map(buildGenWordId),
      callback_ids: callbacks.map(buildGenWordId),
      /* v6.14 — real deck IDs for SM-2 credit on completion. */
      real_word_ids: [...newWords, ...callbacks].map(w => w.id).filter(Boolean),
      primary_template: primary.pattern,
      secondary_template: secondary.pattern
    }
  };
}

function buildGenerateHardLesson(){
  const deck = state.words || [];
  /* v6.12.4 — only consider templates whose every slot has ≥1 introduced word
     in the user's Vocab Blitz history. Keeps Hard mode from rolling templates
     that have no chance of filling (e.g., time/family/places combos when the
     user has only drilled food). */
  const masteredSet = new Set(state.settings.masteredWords || []);
  const suspendedSet = new Set(state.settings.suspendedWords || []);
  const moduleIds = activeModuleWordIdSet();
  const slotPool = (cfg) => deck.filter(w =>
    w.pos === 'n' &&
    (cfg.allowKatakana || !hasKatakana(w.jp)) &&
    w.jp && w.en && w.romaji &&
    !masteredSet.has(w.id) && !suspendedSet.has(w.id) &&
    (!moduleIds || moduleIds.has(w.id)) &&
    vocabIsIntroduced(w) &&
    (!cfg.slotThemes || cfg.slotThemes.includes(w.theme)) &&
    (!cfg.slotWords || cfg.slotWords.includes(w.en)) &&
    (!cfg.slotExclude || !cfg.slotExclude.includes(w.en))
  );
  const viable = BUILD_HARD_TEMPLATES.filter(t => {
    const keys = Object.keys(t.slots);
    if(!keys.every(k => slotPool(t.slots[k]).length >= 1)) return false;
    /* distinctFrom requires the source slot to have ≥2 distinct words. */
    return keys.every(k => {
      const cfg = t.slots[k];
      if(!cfg.distinctFrom) return true;
      return slotPool(t.slots[cfg.distinctFrom]).length >= 2;
    });
  });
  if(viable.length === 0){
    throw new Error("no hard templates fit your introduced vocab — drill 'yesterday'/'today' (time), a family member, or a place via Vocab Blitz, or try simple/complex mode");
  }

  /* v6.12.7 — round-robin viable templates with cross-session recency dedup.
     v6.13 — chain mode: prefer templates whose slots can host the chain words. */
  const recent = buildRecentGet();
  const recentTemplatesSet = new Set(recent.templates || []);
  const recentWordsSet = new Set(recent.words || []);
  const chain = buildChainGet();
  const chainActive = !!(chain && chain.wordIds && chain.wordIds.length === 3);
  const chainSet = chainActive ? new Set(chain.wordIds) : null;
  let chainViable = viable;
  if(chainActive){
    chainViable = viable.filter(t =>
      Object.values(t.slots).some(cfg => slotPool(cfg).some(w => chainSet.has(w.id)))
    );
    if(chainViable.length === 0) chainViable = viable;
  }
  let preferredTmpls = chainViable.filter(t => !recentTemplatesSet.has(t.id));
  if(preferredTmpls.length < 2) preferredTmpls = chainViable;
  const shuffledTmpls = shuffleFY(preferredTmpls.slice());

  const lessonId = 'Gh' + (buildGetSequence().length + 1);
  const steps = [];
  const usedRefs = new Map();
  /* Lesson-scoped word set — passed to buildMultiSlotFill so the same noun
     doesn't appear twice in the same lesson (e.g., "park" in two builds). */
  const lessonWords = new Set();
  let fallbackPicks = 0, totalPicks = 0;
  let tries = 0;
  while(steps.length < 7 && tries < 80){
    tries++;
    /* Round-robin through shuffled templates by step index. */
    const tmpl = shuffledTmpls[steps.length % shuffledTmpls.length];
    const exclude = new Set([...recentWordsSet, ...lessonWords]);
    const filled = buildMultiSlotFill(tmpl, deck, exclude, chainSet);
    if(!filled) continue;
    /* Diagnostic: a slot pick fell back if its chosen word was in the exclude set. */
    for(const k of Object.keys(tmpl.slots)){
      totalPicks++;
      if(exclude.has(filled.words[k].id)) fallbackPicks++;
    }
    steps.push({ type:'build', sentence_jp: filled.jp, sentence_en: filled.en });
    for(const w of Object.values(filled.words)){
      lessonWords.add(w.id);
      const id = buildGenWordId(w);
      if(!usedRefs.has(id)) usedRefs.set(id, { id, jp: w.jp, en: w.en, r: w.romaji });
    }
  }
  /* v6.12.7 — record what we used so the next lesson avoids it. */
  const usedTmplIds = new Set();
  for(let i = 0; i < Math.min(steps.length, shuffledTmpls.length); i++){
    usedTmplIds.add(shuffledTmpls[i].id);
  }
  for(const tid of usedTmplIds) buildRecentPush('templates', tid, BUILD_RECENT_TEMPLATES_CAP);
  for(const wid of lessonWords) buildRecentPush('words', wid, BUILD_RECENT_WORDS_CAP);
  if(totalPicks > 0 && fallbackPicks / totalPicks >= 0.3){
    log('build_hard_low_variety', {fallbackPicks, totalPicks, lessonId});
    /* v6.12.8 — surface this to the user too. They were yelling "build mode
       is the same shit" — when the algorithm has had to relax dedup, tell
       them why so they can drill more vocab to unlock variety. */
    setTimeout(() => {
      showToast(
        `${fallbackPicks}/${totalPicks} slot picks repeated — your introduced pool is thin in some themes. Drill more in Vocab Blitz.`,
        {tone:'warn', duration:5000}
      );
    }, 1200);
  }
  if(steps.length === 0) throw new Error('no multi-slot templates could be filled — drill more nouns across food/places/family in Vocab Blitz');
  // v6.11 — append a QA capstone using one of the words used in the lesson.
  const usedList = Array.from(usedRefs.values());
  let qaStep = null;
  for(const ref of usedList){
    qaStep = buildGenerateQaStep(deck, ref);
    if(qaStep) break;
  }
  if(!qaStep) qaStep = buildGenerateQaStep(deck);
  if(qaStep) steps.push(qaStep);
  return {
    id: lessonId,
    title: `Hard ${lessonId} — multi-slot mix`,
    duration_mins: 8,
    new_words: [],
    carryover_words: usedList,
    cycles: [
      { id:'cycle_hard', name:'Multi-slot — cold production', steps }
    ],
    _meta: {
      mode: 'hard',
      introduced_ids: [],
      callback_ids: Array.from(usedRefs.keys()),
      /* v6.14 — real deck IDs for SM-2 credit on completion. */
      real_word_ids: Array.from(lessonWords)
    }
  };
}

  /* v6.14 — _missed: Set of real deck word IDs the user tapped 'missed' on
     during the lesson. On completion these get smGrade('again') instead of
     'good', honoring autopilot default while letting the user mark misses
     when they have a free hand.
     v6.22 — _chainIdx: which lesson in an autopilot chain this is (1-based).
     Initial sessions start at 1; auto-chained sessions increment from there
     up to BUILD_AUTO_CHAIN_CAP. Lets the header show "Lesson 2 of 4 ⛓"
     and the complete screen know whether we're at the chain end. */
  return { lesson, steps, stepIdx: 0, revealed: false, done: false, _missed: new Set(), _chainIdx: chainIdx || 1 };

/* v6.15 — Form Spam: a Build-Mode-shaped lesson dedicated to a single
   FORMS pattern (e.g. ても いい). Picks ~8 verbs from the deck, prioritising
   per-(verb×form) SM-2 due-soonest, and emits one `build` step per verb so
   the user gets audio-led EN→JP production reps across that pattern only.
   Pure exposure/practice — Form Drill remains the typing+SM-2 graded path. */
function buildGenerateFormSpamLesson(formId, opts){
  const f = FORMS.find(x => x.id === formId);
  if(!f) throw new Error('Unknown grammar pattern: ' + formId);
  const verbs = formEligibleVerbs();
  if(verbs.length < 1) throw new Error('No verbs in your deck — enable the N5 pack in Settings.');
  /* v6.30 — bumped default 8 → 25. v6.31 — 25 → 50. Form Spam doesn't
     auto-chain like Simple/Complex/Hard lessons (it's a single-shot per
     tap), so the per-session count IS the total. With 140 eligible verbs
     a 50-verb session covers ~36% of the pool, leaving real headroom for
     a second session that doesn't repeat. */
  const want = (opts && opts.count) || 50;
  const n = Math.min(want, verbs.length);

  /* v6.30 — Form Spam verb selection. Prior code sorted verbs by smNext
     ascending and took the top n*2, biasing to the SAME most-due verbs
     every session. Now we split by formRecentSet (verb-form pairs drilled
     in the last ~80 events across Form Drill + Build Mode + Form Spam):
       freshUnseen = no formStats entry AND not in recent log
       freshSeen   = has formStats AND not in recent log
       stale       = in recent log
     Pool fills from fresh wells first; stale only backfills if needed. */
  const recent = formRecentSet(formId);
  const freshUnseen = [], freshSeen = [], stale = [];
  for(const w of verbs){
    const isRecent = recent.has(w.id);
    if(isRecent){ stale.push(w); continue; }
    if(!state.formStats?.[w.id]?.[formId]) freshUnseen.push(w);
    else freshSeen.push(w);
  }
  const ordered = [...shuffleFY(freshUnseen), ...shuffleFY(freshSeen), ...shuffleFY(stale)];
  const pool = ordered.slice(0, n);

  const safeConj = jp => { try { return f.conj(jp); } catch(e){ return jp; } };
  const safeEn = w => {
    try {
      if(typeof f.en === 'function'){
        const v = f.en(w);
        if(v && typeof v === 'string') return v;
      }
    } catch(e){}
    return stripTo(w.en);
  };

  const steps = pool.map(w => ({
    type: 'build',
    sentence_jp: safeConj(w.jp),
    sentence_en: safeEn(w)
  }));

  return {
    id: 'Gf_' + formId + '_' + Date.now().toString(36),
    title: `Form Spam — ${f.name} (${f.hint})`,
    duration_mins: Math.max(3, Math.round(n * 0.6)),
    new_words: pool.map(w => ({ id: w.id, jp: w.jp, en: w.en, r: w.romaji })),
    carryover_words: [],
    cycles: [
      { id: 'spam', name: `${f.name} · ${f.hint}`, steps }
    ],
    _meta: {
      mode: 'formSpam',
      formId,
      formName: f.name,
      formRule: f.rule,
      real_word_ids: pool.map(w => w.id)
    }
  };
}

/* Vocab Spam — pull ~30 words from the active section's full topical pool
   and emit recall steps. v6.33.1 — relaxed: skips the module-unlock filter
   so "Food & drink" yields the whole theme even on early modules. Still
   honors mastered + suspended (don't re-drill what the user has retired).
   If the section is smaller than 30, the session length matches the pool. */
function buildGenerateVocabSpamLesson(opts){
  const want = (opts && opts.count) || 30;
  const masteredSet = new Set(state.settings.masteredWords || []);
  const suspendedSet = new Set(state.settings.suspendedWords || []);
  /* v6.37 — Mastered review: include ★mastered words in the spam pool. */
  const isMasteredMode = activeVocabSection().mode === 'mastered';
  /* Progressive widening — when the strict section pool is thin (e.g. user
     ★-mastered most of a small section), keep relaxing filters until we have
     enough words for a real spam session. Never strand the user with 1 word. */
  const minViable = Math.min(want, 10);
  const tries = [
    () => vocabSectionFilter(getActiveWords()).filter(w =>
      (isMasteredMode || !masteredSet.has(w.id)) && !suspendedSet.has(w.id)),
    () => vocabSectionFilter(getActiveWords()).filter(w => !suspendedSet.has(w.id)),
    () => getActiveWords().filter(w => !masteredSet.has(w.id) && !suspendedSet.has(w.id)),
    () => getActiveWords().filter(w => !suspendedSet.has(w.id))
  ];
  let sectionPool = [];
  let widenedAt = 0;
  for(let i = 0; i < tries.length; i++){
    sectionPool = tries[i]();
    widenedAt = i;
    if(sectionPool.length >= minViable) break;
  }
  if(sectionPool.length < 1) throw new Error('No words available — enable the N5 pack in Settings.');
  if(widenedAt > 0){
    const why = ['', 'including ★mastered', 'ignoring section filter', 'using whole deck'][widenedAt];
    log('vocab_spam_widen', {widenedAt, poolSize: sectionPool.length, why});
    showToast(`Section was thin — widened pool ${why} so you get a full session.`, {tone:'info', duration:3500});
  }
  const pool = shuffleFY(sectionPool.slice()).slice(0, Math.min(want, sectionPool.length));
  const sec = activeVocabSection();
  const steps = pool.map(w => ({ type:'recall', word_id: w.id }));
  return {
    id: 'Gv_' + Date.now().toString(36),
    title: `Vocab Spam — ${sec.name}`,
    duration_mins: Math.max(3, Math.round(pool.length * 0.4)),
    new_words: pool.map(w => ({ id:w.id, jp:w.jp, en:w.en, r:w.romaji })),
    carryover_words: [],
    cycles: [{ id:'spam', name:`Vocab · ${sec.name}`, steps }],
    _meta: { mode:'vocabSpam', sectionId: sec.id, real_word_ids: pool.map(w => w.id) }
  };
}

/* Similar Spam — sample SIMILAR_SETS and emit similar-discrimination steps
   across multiple sets. v6.33.1 — bumped to 30 steps; loops over sets in
   shuffled order, taking every item per set, then re-shuffles and loops
   again if needed so a small set count still fills a long session. */
function buildGenerateSimilarSpamLesson(opts){
  const want = (opts && opts.count) || 30;
  if(!Array.isArray(SIMILAR_SETS) || SIMILAR_SETS.length === 0) throw new Error('No similar sets defined.');
  const steps = [];
  let safety = 0;
  while(steps.length < want && safety < 8){
    safety++;
    const sets = shuffleFY(SIMILAR_SETS.slice());
    for(const set of sets){
      if(steps.length >= want) break;
      const perSet = set.items?.length || 0;
      const itemSteps = _buildGenerateSimilarSteps(set, perSet);
      for(const s of itemSteps){
        if(steps.length >= want) break;
        steps.push(s);
      }
    }
  }
  if(steps.length < 1) throw new Error('Similar sets are empty — none could be drilled.');
  return {
    id: 'Gm_' + Date.now().toString(36),
    title: 'Similar Spam',
    duration_mins: Math.max(3, Math.round(steps.length * 0.4)),
    new_words: [],
    carryover_words: [],
    cycles: [{ id:'spam', name:'Similar', steps }],
    _meta: { mode:'similarSpam' }
  };
}

function _buildSpeakEN(text, force, onDone){
  try{
    if(!('speechSynthesis' in window)){ if(onDone) setTimeout(onDone, 0); return; }
    if(!force && state.settings && state.settings.enTtsOn === false){ if(onDone) setTimeout(onDone, 0); return; }
    const ss = window.speechSynthesis;
    if(ss.speaking || ss.pending) ss.cancel();
    const u = new SpeechSynthesisUtterance(text);
    // Faster default — the previous 0.9 felt sluggish in spam-mode loops where
    // every step plays an EN gloss. User-tunable via buildEnTtsRate.
    u.rate = (state.settings && state.settings.buildEnTtsRate) || 1.15;
    const v = (typeof _pickEnVoice === 'function') ? _pickEnVoice() : null;
    if(v){ u.voice = v; u.lang = v.lang || 'en-US'; } else { u.lang = 'en-US'; }
    if(onDone){
      let fired = false;
      const fire = () => { if(fired) return; fired = true; onDone(); };
      u.onend = fire; u.onerror = fire;
    }
    ss.speak(u);
  }catch(e){ if(onDone) setTimeout(onDone, 0); }
}

function _buildSpeakJP(text, onDone){
  try{
    if(!('speechSynthesis' in window)){ if(onDone) setTimeout(onDone, 0); return; }
    const ss = window.speechSynthesis;
    if(ss.speaking || ss.pending) ss.cancel();
    const utter = () => {
      const u = new SpeechSynthesisUtterance(String(text).replace(/\s+/g,''));
      u.rate = state.settings.buildTtsRate || state.settings.ttsRate || 0.9;
      const v = (typeof _pickJaVoice === 'function') ? _pickJaVoice() : null;
      if(v){ u.voice = v; u.lang = v.lang || 'ja-JP'; } else { u.lang = 'ja-JP'; }
      if(onDone){
        let fired = false;
        const fire = () => { if(fired) return; fired = true; onDone(); };
        u.onend = fire; u.onerror = fire;
      }
      ss.speak(u);
    };
    if(typeof _ttsVoicesReady !== 'undefined' && _ttsVoicesReady) utter();
    else if(typeof _waitForVoices === 'function') _waitForVoices(utter);
    else utter();
  }catch(e){ if(onDone) setTimeout(onDone, 0); }
}

// v6.11 — chain multiple JP utterances with a small linger between each.
// Each item is { jp, en?, _delay? } — if en is set, plays JP then EN. Final onDone after last.
function _buildSpeakJPSequence(items, onDone){
  if(!items || !items.length){ if(onDone) setTimeout(onDone, 0); return; }
  const list = items.slice();
  const playOne = (idx) => {
    if(idx >= list.length){ if(onDone) onDone(); return; }
    const it = list[idx];
    const after = () => {
      const gap = (list[idx+1] && list[idx+1]._delay) || 1000;
      setTimeout(() => playOne(idx+1), gap);
    };
    if(it.en){
      _buildSpeakJPThenEN(it.jp, it.en, after);
    } else {
      _buildSpeakJP(it.jp, after);
    }
  };
  const startDelay = list[0]._delay || 0;
  setTimeout(() => playOne(0), startDelay);
}

function _buildSpeakJPThenEN(jp, en, onDone){
  try{
    if(!('speechSynthesis' in window)){ if(onDone) setTimeout(onDone, 0); return; }
    const ss = window.speechSynthesis;
    if(ss.speaking || ss.pending) ss.cancel();
    const utter = () => {
      const u = new SpeechSynthesisUtterance(String(jp).replace(/\s+/g,''));
      u.rate = state.settings.buildTtsRate || state.settings.ttsRate || 0.9;
      const v = (typeof _pickJaVoice === 'function') ? _pickJaVoice() : null;
      if(v){ u.voice = v; u.lang = v.lang || 'ja-JP'; } else { u.lang = 'ja-JP'; }
      let finished = false;
      const chain = () => { if(finished) return; finished = true; setTimeout(() => _buildSpeakEN(en, false, onDone), 250); };
      u.onend = chain;
      u.onerror = chain;
      ss.speak(u);
    };
    if(typeof _ttsVoicesReady !== 'undefined' && _ttsVoicesReady) utter();
    else if(typeof _waitForVoices === 'function') _waitForVoices(utter);
    else utter();
  }catch(e){ if(onDone) setTimeout(onDone, 0); }
}

// v6.12 — AI conversation mode for QA steps.
// When Settings → "🤖 AI conversation" is on AND an Anthropic key exists AND SpeechRecognition is supported,
// QA steps swap their scripted answer for a real Claude reply based on what the user said.

Hard rules — never break:

- Your reply must be 5–14 Japanese words, A1 vocab level only.

- ALWAYS end with a short follow-up question or a one-word reaction so they have something to say next.

Output format — EXACTLY two lines, no other text, no labels, no quotes:
LINE 1: your Japanese reply, hiragana, with normal spaces between words
LINE 2: short English gloss of the reply, under 14 words

If their answer made grammatical sense, react warmly and ask a follow-up.
If their answer was garbled (the speech-to-text may have misheard them), make a best guess at meaning and reply naturally — do not say "I didn't understand."
If they accidentally answered in English, gently model the JP version in your reply.
If they used the wrong particle or form, model the correct version naturally — do not lecture or correct explicitly.`;

function _buildAiMode(){
  const s = state.settings || {};
  if(!s.buildAiQa) return false;
  if(!(s.anthropicKey || '').trim()) return false;
  if(!voiceSupported()) return false;
  if(typeof window.fetch !== 'function') return false;
  return true;
}

/* =========================================================================
   BUILD MODE — VOICE MODE (hands-free, on-device scoring)
   When on, recall/build/callback/substitute/phrase/variation/form_drill steps
   run as: speak EN prompt → listen ja-JP → score → spoken verdict → reveal.
   Forgiving: "close" counts as correct. Two STT misses on a single step fall
   back to typed Write Mode for that step only, so road noise can't strand
   you mid-session. AI Q&A keeps its own dedicated path.
   ========================================================================= */
function _buildVoiceModeActive(){
  return state.settings && state.settings.buildVoiceMode === true && voiceSupported();
}
function _buildVoiceTargetForStep(step){
  if(!step) return null;
  if(step.type === 'recall'){
    const w = buildWordById(step.word_id); return w ? w.jp : null;
  }
  if(step.type === 'callback'){
    if(step.word_id){ const w = buildWordById(step.word_id); return w ? w.jp : null; }
    if(step.sentence_jp) return step.sentence_jp;
    return null;
  }
  if(step.type === 'build') return step.sentence_jp || null;
  if(step.type === 'substitute') return step.result_jp || null;
  if(step.type === 'phrase') return step.jp || null;
  if(step.type === 'form_drill') return step.target_jp || step.word_jp || null;
  if(step.type === 'variation'){
    const ways = (step.ways || []).map(v => v && v.jp).filter(Boolean);
    return ways.length ? ways : null;
  }
  return null;
}
function _buildVoiceShouldListen(step){
  if(!_buildVoiceModeActive()) return false;
  if(!step) return false;
  if(step.type === 'introduce' || step.type === 'similar') return false;
  if(step.type === 'qa') return false; // AI path or scripted reveal owns qa
  return _buildVoiceTargetForStep(step) != null;
}
function _buildVoiceListen(target, onVerdict){
  const b = state.buildMode;
  if(!b){ onVerdict && onVerdict({verdict:'nostt'}); return; }
  const listenSec = Math.max(3, Math.min(15, state.settings.voiceListenSec || 7));
  const listenMs = listenSec * 1000;
  _buildSetPhase('listen', listenMs);
  let alts = [];
  b._sttActive = true;
  startVoice(
    (results) => { alts = results || []; },
    (err) => {
      b._sttActive = false;
      if(state.buildMode !== b || b._paused) return;
      if(err || !alts.length){
        log('voice_step_nostt', {type: target ? 'has_target' : 'no_target', err: err && err.error});
        onVerdict({verdict:'nostt'});
        return;
      }
      const targets = Array.isArray(target) ? target : [target];
      let best = {verdict:'wrong', heard:'', dist:Infinity};
      for(const t of targets){
        const r = _voiceScoreJa(t, alts);
        if(r.verdict === 'correct'){ best = r; break; }
        if(r.dist < best.dist) best = r;
      }
      log('voice_step_score', {verdict:best.verdict, dist:best.dist, heard:best.heard});
      onVerdict(best);
    }
  );
  // Hard timeout — onend usually fires, but belt-and-braces in case it doesn't.
  if(b._autoTimer) clearTimeout(b._autoTimer);
  b._autoTimer = setTimeout(() => {
    if(state.buildMode !== b) return;
    if(b._sttActive){ try{ stopVoice(); }catch(e){} }
  }, listenMs + 2500);
}
/* Speaks a short EN verdict, then calls cb so the caller can reveal (which
   itself plays the canonical JP). Keeps audio chain short — every extra
   second of speech delays the next step. */
function _buildSayVerdict(verdict, cb){
  const phrase = verdict === 'correct' ? 'correct'
              : verdict === 'close'   ? 'close — listen'
              : 'not quite — listen';
  _buildSpeakEN(phrase, false, cb);
}
function _buildVoiceListenStep(step){
  const b = state.buildMode;
  if(!b) return;
  const target = _buildVoiceTargetForStep(step);
  const fallToThink = () => {
    const baseSec = Math.max(1, (state.settings.buildThinkSec || 4));
    const thinkMs = baseSec * _buildPaceFactor(step) * 1000;
    _buildSetPhase('think', thinkMs);
    _buildSchedule(() => buildAutoReveal(), thinkMs);
  };
  if(!target){ fallToThink(); return; }
  _buildVoiceListen(target, (res) => {
    if(state.buildMode !== b || b._paused) return;
    if(res.verdict === 'nostt'){
      // Voice mode = no typing ever. STT silence just falls through to the
      // normal think→reveal flow — the canonical JP plays, lesson moves on.
      log('voice_step_nostt', {type: step.type});
      fallToThink();
      return;
    }
    // Record voice attempt against the SRS stats slot. "close" counts as
    // correct (per user's spec) so it credits firstCorrect / lastSeen too.
    const wid = _buildStateWordIdForStep(step);
    if(wid){
      const isCorrect = (res.verdict !== 'wrong');
      const st = smStatFor(wid);
      st.attempts = st.attempts || [];
      st.attempts.push({ts: now(), correct: isCorrect, voice: true});
      if(isCorrect && !st.firstCorrect) st.firstCorrect = now();
      st.lastSeen = now();
    }
    _buildSayVerdict(res.verdict, () => {
      if(state.buildMode === b && !b._paused) buildAutoReveal();
    });
  });
}
function _buildAiQaActive(step){
  if(!step || step.type !== 'qa') return false;
  /* v6.12 — _aiAttempted now means "we got a complete Claude response", not
     "we started the flow." Transient failures (network, STT, mic) leave the
     flag false so the next visit can retry. _aiFailCount caps retries per
     step at 3 to prevent infinite loops. */
  if(step._aiAttempted) return false;
  if((step._aiFailCount || 0) >= 3) return false;
  return _buildAiMode();
}
function _buildQaAiFlow(step){
  const b = state.buildMode;
  if(!b) return;
  step._aiMode = true;
  _buildSpeakJP(step.question_jp, () => {
    if(state.buildMode !== b || b._paused) return;
    setTimeout(() => {
      if(state.buildMode !== b || b._paused) return;
      _buildSpeakEN(step.question_en, false, () => {
        if(state.buildMode !== b || b._paused) return;
        _buildAiQaListen(step);
      });
    }, 350);
  });
}
function _buildAiQaListen(step){
  const b = state.buildMode;
  if(!b) return;
  const listenMs = 10000;
  _buildSetPhase('listen', listenMs);
  const labelEl = document.querySelector('.build-phase-label');
  if(labelEl) labelEl.textContent = '🎤 listening — speak Japanese';
  let captured = null;
  b._sttActive = true;
  startVoice(
    (alts) => {
      if(alts && alts.length){
        const best = alts.slice().sort((a,c)=>(c.conf||0)-(a.conf||0))[0];
        captured = best.transcript;
      }
    },
    (err) => {
      b._sttActive = false;
      if(state.buildMode !== b) return;
      if(b._paused) return;
      if(captured && captured.trim()){
        step._userTranscript = captured.trim();
        _buildAiQaSendToClaude(step, captured.trim());
      } else {
        // No speech captured — silent fallback to scripted reveal.
        // v6.12 — bump fail count but DON'T set _aiAttempted, so next visit can retry.
        log('build_ai_qa_no_speech',{});
        step._aiFailCount = (step._aiFailCount || 0) + 1;
        step._aiMode = false;
        if(state.buildMode === b && !b._paused) buildAutoReveal();
      }
    }
  );
  // Hard timeout in case onend never fires.
  if(b._autoTimer) clearTimeout(b._autoTimer);
  b._autoTimer = setTimeout(() => {
    if(state.buildMode !== b) return;
    if(b._sttActive){ try{ stopVoice(); }catch(e){} }
  }, listenMs + 2500);
}
async function _buildAiQaSendToClaude(step, transcript){
  const b = state.buildMode;
  if(!b) return;
  _buildSetPhase('aithink', 6000);
  const labelEl = document.querySelector('.build-phase-label');
  if(labelEl) labelEl.textContent = '🤖 Claude is replying…';
  const key = (state.settings.anthropicKey || '').trim();
  if(!key){
    step._aiMode = false;
    if(state.buildMode === b && !b._paused) buildAutoReveal();
    return;
  }
  const model = state.settings.anthropicModel || 'claude-haiku-4-5-20251001';
  const userMsg = `I asked them this question: "${step.question_jp}" (English: ${step.question_en}).\n\nThey replied (captured via speech-to-text, may be slightly garbled): "${transcript}"\n\nNow reply in exactly two lines: hiragana Japanese on line 1, short English gloss on line 2.`;
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
        'content-type': 'application/json'
      },
      body: JSON.stringify({
        model,
        max_tokens: 200,
        system: [{type:'text', text: BUILD_AI_QA_SYSTEM, cache_control:{type:'ephemeral'}}],
        messages: [{role:'user', content: userMsg}]
      })
    });
    if(!res.ok){ throw new Error('http ' + res.status); }
    const data = await res.json();
    const text = (data.content || []).map(c => c.text || '').join('').trim();
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    if(!lines.length) throw new Error('empty reply');
    const jp = lines[0].replace(/^[A-Z_]+:\s*/i,'').replace(/^["「]|["」]$/g,'');
    const en = lines[1] ? lines[1].replace(/^[A-Z_]+:\s*/i,'').replace(/^["「]|["」]$/g,'') : '';
    if(!jp) throw new Error('no jp');
    step._aiReplyJp = jp;
    step._aiReplyEn = en;
    /* v6.12 — only NOW mark as attempted. A successful response is the only
       outcome that should permanently downgrade the step on revisit. */
    step._aiAttempted = true;
    log('build_ai_qa_ok', {model, in:(data.usage||{}).input_tokens, out:(data.usage||{}).output_tokens});
    if(state.buildMode === b && !b._paused) buildAutoReveal();
  } catch(e){
    log('build_ai_qa_err', {err: String(e.message || e)});
    showToast('AI reply failed — using scripted answer.', {tone:'warn'});
    step._aiFailCount = (step._aiFailCount || 0) + 1;
    step._aiMode = false;
    step._aiReplyJp = null;
    step._aiReplyEn = null;
    if(state.buildMode === b && !b._paused) buildAutoReveal();
  }
}

// v6.0 — Screen Wake Lock so the phone doesn't sleep mid-session.
// Held only while a Build Mode lesson is active and auto-advance is on; released on pause/exit/done/hidden.
let _wakeLock = null;
async function _wakeLockAcquire(){
  try{
    if(!('wakeLock' in navigator)) return;
    if(_wakeLock) return;
    _wakeLock = await navigator.wakeLock.request('screen');
    _wakeLock.addEventListener('release', () => { _wakeLock = null; });
  }catch(e){ /* denied/unsupported — silent */ }
}
function _wakeLockRelease(){
  try{ if(_wakeLock){ _wakeLock.release(); _wakeLock = null; } }catch(e){}
}
function _buildWakeLockSync(){
  const b = state.buildMode;
  // Hold during any active Build Mode lesson — even manual mode, since the user is reading the screen.
  const shouldHold = !!b && !!b.lesson && !b.done && !b._paused;
  if(shouldHold) _wakeLockAcquire(); else _wakeLockRelease();
}

// v6.0 — Non-blocking toast. Replaces alert() for transient errors that shouldn't break flow.
function showToast(msg, opts){
  opts = opts || {};
  const tone = opts.tone || 'info';
  let host = document.getElementById('toast-host');
  if(!host){
    host = document.createElement('div');
    host.id = 'toast-host';
    document.body.appendChild(host);
  }
  const el = document.createElement('div');
  el.className = 'toast toast-' + tone;
  el.textContent = msg;
  host.appendChild(el);
  setTimeout(() => { el.classList.add('toast-out'); setTimeout(() => el.remove(), 300); }, opts.duration || 4000);
}

// v6.0 — Visibility handler: when the tab is hidden (user switches apps / locks phone),
// freeze the Build Mode session cleanly. Resume on return only if WE auto-paused, so manual pauses are respected.
function _buildOnVisibilityChange(){
  const b = state.buildMode;
  if(!b || !b.lesson || b.done) return;
  if(document.visibilityState === 'hidden'){
    if(!b._paused){
      b._paused = true;
      b._autoPaused = true;
      _buildClearTimer();
      try{ window.speechSynthesis?.cancel(); }catch(e){}
      _wakeLockRelease();
      render();
    } else {
      _wakeLockRelease();
    }
  } else {
    if(b._paused && b._autoPaused){
      b._paused = false;
      b._autoPaused = false;
      _wakeLockAcquire();
      const step = b.steps[b.stepIdx];
      if(step){
        if(b.revealed){
          setTimeout(() => {
            _buildPlayJPForStep(step, () => {
              if(state.buildMode === b && !b._paused && _buildAutoOn()) _buildScheduleLinger();
            });
          }, 100);
        } else {
          buildAutoplayStep(step);
        }
      }
      render();
    } else if(!b._paused){
      _wakeLockAcquire();
    }
  }
}

function _buildClearTimer(){
  const b = state.buildMode;
  if(b && b._autoTimer){ clearTimeout(b._autoTimer); b._autoTimer = null; }
  if(b && b._sttActive){ try{ stopVoice(); }catch(e){} b._sttActive = false; }
  if(b){ b._phase = null; b._phaseDur = 0; }
}

function _buildSchedule(fn, ms){
  const b = state.buildMode;
  if(!b) return;
  if(b._autoTimer) clearTimeout(b._autoTimer);
  b._autoTimer = setTimeout(() => {
    if(state.buildMode === b){ b._autoTimer = null; b._phase = null; fn(); }
  }, ms);
}

function _buildSetPhase(phase, durMs){
  const b = state.buildMode;
  if(!b) return;
  b._phase = phase;
  b._phaseDur = durMs;
  // Drive the countdown bar via direct DOM (avoids a full re-render and lets CSS animate cleanly).
  const fill = document.querySelector('.build-countdown-fill');
  if(fill){
    fill.classList.remove('run','think','linger');
    void fill.offsetWidth; // restart animation
    if(phase === 'think' || phase === 'linger'){
      fill.style.animationDuration = (durMs/1000) + 's';
      fill.classList.add('run', phase);
    } else {
      fill.style.animationDuration = '';
    }
  }
  const label = document.querySelector('.build-phase-label');
  if(label){
    label.textContent = phase === 'prompt' ? '🔊 listen…'
                      : phase === 'answer' ? '🔊 answer…'
                      : phase === 'think' ? 'your turn — say it aloud'
                      : phase === 'linger' ? 'next step incoming…'
                      : phase === 'listen' ? '🎤 listening — speak Japanese'
                      : phase === 'aithink' ? '🤖 Claude is replying…'
                      : '';
  }
}

function _buildAutoOn(){ return state.settings.buildAutoAdvance !== false; }
/* v6.25 — Write Mode. When on AND the current step type is build/substitute
   or sentence-flavored callback, suppress EN TTS + don't auto-reveal —
   instead the renderer shows an input box and we wait for buildWriteSubmit().
   Word-flavored callbacks (single-word recall) and introduce/recall steps
   stay audio-led even in write mode because they're vocabulary cards, not
   sentences worth typing. */
function _buildWriteOn(){ return !!state.settings.buildWriteMode; }
function _buildWriteApplies(step){
  if(!step) return false;
  /* Voice Mode = no typing ever. While voice mode is on, every step is
     audio-led — we never force a typed input, even after STT silence. */
  if(_buildVoiceModeActive()) return false;
  if(!_buildWriteOn()) return false;
  if(step.type === 'build' || step.type === 'substitute') return true;
  if(step.type === 'callback' && step.sentence_jp) return true;
  if(step.type === 'form_drill') return true;  /* v6.27 — typing fits conjugation drills naturally */
  if(step.type === 'phrase') return true;       /* v6.28 — phrase step is sentence-shaped, fits write mode */
  return false;
}

/* v6.5 — adaptive pacing. Known words shrink think+linger so easy reviews
   don't drag. Brand-new exposures (introduce steps, sentence-only steps)
   keep full pace. Mapping: Build Mode word_ids are 'w_'+romaji; resolve
   back to state.words via jp+en match to read the SRS mastery bucket. */
function _buildStateWordIdForStep(step){
  if(!step || !step.word_id) return null;
  const ref = buildWordById(step.word_id);
  if(!ref) return null;
  const m = (state.words || []).find(w => w.jp === ref.jp && w.en === ref.en);
  return m ? m.id : null;
}
function _buildPaceFactor(step){
  if(!step || step.type === 'introduce') return 1.0; /* never rush new exposures */
  /* v6.36 — split into length factor + mastery factor.
     Single-word recall/callback is "instant or unknown", so half-speed.
     Sentence steps (build/qa, sentence-only callback) keep full length so the
     user has time to parse. */
  const lengthFactor = _buildStepIsSingleWord(step) ? 0.55 : 1.0;
  const wid = _buildStateWordIdForStep(step);
  let masteryFactor = 1.0;
  if(wid){
    const mastery = getMasteryForWord(wid);
    if(mastery === 'guru' || mastery === 'master' || mastery === 'burned') masteryFactor = 0.5;
    else if(mastery === 'apprentice') masteryFactor = 0.7;
  }
  return Math.max(0.3, lengthFactor * masteryFactor); /* floor so it's never absurdly fast */
}
function _buildStepIsSingleWord(step){
  if(!step) return false;
  /* recall/callback with word_id is by definition a single-word answer */
  if((step.type === 'recall' || step.type === 'callback') && step.word_id) return true;
  /* short phrase steps count as single-word for pacing */
  if(step.type === 'phrase' && step.jp && step.jp.length <= 6) return true;
  return false;
}

function buildAutoplayStep(step){
  const b = state.buildMode;
  if(!b) return;
  _buildClearTimer();
  const auto = _buildAutoOn() && !b._paused;

  /* v6.25 — Write Mode short-circuits autoplay for sentence-typing steps:
     no EN TTS (silent prompt), no auto-reveal timer. The renderer shows an
     input box; buildWriteSubmit() drives the reveal + advance. Focus the
     input shortly after render so the user can start typing immediately. */
  if(_buildWriteApplies(step)){
    _buildSetPhase('prompt', 0);
    setTimeout(() => { try{ document.getElementById('buildWriteInput')?.focus(); }catch(e){} }, 80);
    return;
  }

  const onEnDone = () => {
    if(!auto) return;
    if(_buildVoiceShouldListen(step)){
      _buildVoiceListenStep(step);
      return;
    }
    const baseSec = Math.max(1, (state.settings.buildThinkSec || 4));
    const thinkMs = baseSec * _buildPaceFactor(step) * 1000;
    _buildSetPhase('think', thinkMs);
    _buildSchedule(() => buildAutoReveal(), thinkMs);
  };

  if(auto) _buildSetPhase('prompt', 0);

  if(step.type === 'introduce'){
    const w = buildWordById(step.word_id);
    if(w){
      _buildSpeakJPThenEN(w.jp, w.en, () => {
        if(!auto) return;
        _buildScheduleLinger();
      });
    }
  } else if(step.type === 'recall'){
    const w = buildWordById(step.word_id);
    if(w) _buildSpeakEN(w.en, false, onEnDone);
  } else if(step.type === 'callback'){
    if(step.word_id){
      const w = buildWordById(step.word_id);
      if(w) _buildSpeakEN(w.en, false, onEnDone);
    } else if(step.sentence_en){ _buildSpeakEN(step.sentence_en, false, onEnDone); }
  } else if(step.type === 'build'){
    _buildSpeakEN(step.sentence_en, false, onEnDone);
  } else if(step.type === 'substitute'){
    _buildSpeakEN(step.result_en, false, onEnDone);
  } else if(step.type === 'variation'){
    _buildSpeakEN(step.english, false, onEnDone);
  } else if(step.type === 'qa'){
    // v6.11 — speak JP question, then EN gloss, then enter think phase.
    // v6.12 — if AI conversation mode is on and STT is supported, branch to AI flow instead.
    if(_buildAiQaActive(step)){
      _buildQaAiFlow(step);
    } else {
      _buildSpeakJP(step.question_jp, () => {
        if(state.buildMode !== b || b._paused) return;
        setTimeout(() => _buildSpeakEN(step.question_en, false, onEnDone), 350);
      });
    }
  } else if(step.type === 'similar'){
    /* v6.26 — speak the EN gloss as a hint, then idle. Auto-reveal does NOT
       fire — the step waits for buildSimilarPick(). After pick, the linger
       timer carries the user to the next step. */
    const set = similarSetById(step.set_id);
    const target = set?.items?.[step.item_idx];
    if(target?.en) _buildSpeakEN(target.en, false);
  } else if(step.type === 'form_drill'){
    /* v6.27 — speak the dictionary form + form name as the prompt. Then,
       in normal mode, fall through to the auto-reveal timer; in write
       mode the input wait already short-circuited above. */
    _buildSpeakJP(step.word_jp, () => {
      if(state.buildMode !== b || b._paused) return;
      _buildSpeakEN(`${step.word_en} — ${step.form_hint || step.form_name}`, false, onEnDone);
    });
  } else if(step.type === 'phrase'){
    /* v6.28 — speak the EN gloss as the prompt. Auto-reveal timer carries
       the user to JP reveal in normal mode. */
    _buildSpeakEN(step.en, false, onEnDone);
  }
}

function buildAutoReveal(){
  const b = state.buildMode;
  if(!b || b._paused || !_buildAutoOn()) return;
  const step = b.steps[b.stepIdx];
  if(!step) return;
  b.revealed = true;
  render();
  setTimeout(() => {
    _buildSetPhase('answer', 0);
    _buildPlayJPForStep(step, () => {
      if(state.buildMode === b && !b._paused) _buildScheduleLinger();
    });
  }, 150);
}

function buildAutoNext(){
  const b = state.buildMode;
  if(!b || b._paused || !_buildAutoOn()) return;
  if(b.stepIdx >= b.steps.length - 1){
    if(!b.done) buildOnComplete();
    b.done = true;
  } else {
    b.revealed = false;
    b._writeAttempt = null;  /* v6.25 */
    b._similarPick = null;   /* v6.26 */
    b.stepIdx++;
  }
  render();
}

function buildTogglePause(){
  const b = state.buildMode;
  if(!b) return;
  b._paused = !b._paused;
  b._autoPaused = false; // user-driven pause/resume — not the visibility handler
  if(b._paused){
    _buildClearTimer();
    try{ window.speechSynthesis?.cancel(); }catch(e){}
  }
  _buildWakeLockSync();
  render();
  if(!b._paused){
    // Resume: replay the current step's audio and re-arm the timer chain.
    const step = b.steps[b.stepIdx];
    if(step){
      if(b.revealed){
        setTimeout(() => {
          _buildPlayJPForStep(step, () => {
            if(state.buildMode === b && !b._paused && _buildAutoOn()) _buildScheduleLinger();
          });
        }, 100);
      } else {
        buildAutoplayStep(step);
      }
    }
  }
}
window.buildTogglePause = buildTogglePause;

async function buildToggleVoiceMode(){
  if(!voiceSupported()){
    showToast('Speech recognition not supported in this browser.', {tone:'warn'});
    return;
  }
  const turningOn = !state.settings.buildVoiceMode;
  if(turningOn){
    const ok = await _voicePreflightMic();
    if(!ok){
      showToast('Microphone permission was blocked. Allow it in your browser settings, then try again.', {tone:'warn', duration:6000});
      return;
    }
  }
  state.settings.buildVoiceMode = turningOn;
  save();
  log('voice_mode_toggle', {on: state.settings.buildVoiceMode});
  // If we were mid-listen and the user flipped it off, stop STT cleanly.
  const b = state.buildMode;
  if(b){
    _buildClearTimer();
    try{ window.speechSynthesis?.cancel(); }catch(e){}
  }
  render();
  // Re-arm autoplay on the current step so the new mode takes effect immediately
  // — without this, you'd need to advance a step before voice mode kicks in.
  if(b && !b._paused){
    const step = b.steps[b.stepIdx];
    if(step && !b.revealed) setTimeout(() => buildAutoplayStep(step), 80);
  }
  showToast(state.settings.buildVoiceMode ? '🎙️ Voice mode ON — speak the answer' : 'Voice mode off', {tone:'info', duration:2500});
}
window.buildToggleVoiceMode = buildToggleVoiceMode;

/* Ask the browser for mic permission upfront. If we don't pre-flight, the
   first listen attempt inside a drill triggers the permission prompt mid-card
   and the user (driving) can't see/tap "Allow" in time. Calling getUserMedia
   here surfaces the prompt immediately on toggle-on. */
async function _voicePreflightMic(){
  try{
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return true;
    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
    // We only needed the permission grant — release the stream right away.
    try{ stream.getTracks().forEach(t => t.stop()); }catch(e){}
    return true;
  } catch(e){
    log('voice_preflight_err', {err: String(e && e.name || e)});
    return false;
  }
}

function buildReplayAudio(){
  const b = state.buildMode;
  if(!b?.steps) return;
  const step = b.steps[b.stepIdx];
  if(!step) return;
  if(b.revealed){
    if(step.type === 'introduce'){
      const w = buildWordById(step.word_id); if(w) _buildSpeakJPThenEN(w.jp, w.en);
    } else if(step.type === 'recall'){
      const w = buildWordById(step.word_id); if(w) speakJP(w.jp);
    } else if(step.type === 'callback'){
      if(step.word_id){ const w = buildWordById(step.word_id); if(w) speakJP(w.jp); }
      else if(step.sentence_jp){ speakJP(step.sentence_jp); }
    } else if(step.type === 'build'){ speakJP(step.sentence_jp); }
    else if(step.type === 'substitute'){ speakJP(step.result_jp); }
    else if(step.type === 'variation'){
      const items = (step.ways || []).map((w, idx) => ({ jp: w.jp, _delay: idx === 0 ? 0 : 1100 }));
      _buildSpeakJPSequence(items);
    }
    else if(step.type === 'qa'){
      if(step._aiReplyJp){
        _buildSpeakJPSequence([{ jp: step._aiReplyJp, en: step._aiReplyEn || '' }]);
      } else {
        const items = (step.answers || []).map((a, idx) => ({ jp: a.jp, en: a.en, _delay: idx === 0 ? 0 : 1300 }));
        _buildSpeakJPSequence(items);
      }
    }
  } else { buildAutoplayStep(step); }
}
window.buildReplayAudio = buildReplayAudio;

function _buildPlayJPForStep(step, onDone){
  if(step.type === 'introduce'){
    const w = buildWordById(step.word_id); if(w) _buildSpeakJPThenEN(w.jp, w.en, onDone); else if(onDone) onDone();
  } else if(step.type === 'recall'){
    const w = buildWordById(step.word_id); if(w) _buildSpeakJP(w.jp, onDone); else if(onDone) onDone();
  } else if(step.type === 'callback'){
    if(step.word_id){ const w = buildWordById(step.word_id); if(w) _buildSpeakJP(w.jp, onDone); else if(onDone) onDone(); }
    else if(step.sentence_jp){ _buildSpeakJP(step.sentence_jp, onDone); }
    else if(onDone) onDone();
  } else if(step.type === 'build'){ _buildSpeakJP(step.sentence_jp, onDone); }
  else if(step.type === 'substitute'){ _buildSpeakJP(step.result_jp, onDone); }
  else if(step.type === 'variation'){
    const items = (step.ways || []).map((w, idx) => ({ jp: w.jp, _delay: idx === 0 ? 0 : 1100 }));
    _buildSpeakJPSequence(items, onDone);
  }
  else if(step.type === 'qa'){
    // v6.12 — if AI mode produced a real reply, play it instead of canonical answers.
    if(step._aiReplyJp){
      const items = [{ jp: step._aiReplyJp, en: step._aiReplyEn || '', _delay: 0 }];
      _buildSpeakJPSequence(items, onDone);
    } else {
      const items = (step.answers || []).map((a, idx) => ({ jp: a.jp, en: a.en, _delay: idx === 0 ? 0 : 1300 }));
      _buildSpeakJPSequence(items, onDone);
    }
  }
  else if(step.type === 'similar'){
    /* v6.26 — speak the correct JP after reveal so the right answer lands
       in the user's ear, not just on the screen. */
    const set = similarSetById(step.set_id);
    const target = set?.items?.[step.item_idx];
    if(target?.jp) _buildSpeakJP(target.jp, onDone);
    else if(onDone) onDone();
  }
  else if(step.type === 'form_drill'){
    /* v6.27 — speak the conjugated answer on reveal. */
    if(step.expected_jp) _buildSpeakJP(step.expected_jp, onDone);
    else if(onDone) onDone();
  }
  else if(step.type === 'phrase'){
    /* v6.28 — speak the JP phrase on reveal. */
    if(step.jp) _buildSpeakJP(step.jp, onDone);
    else if(onDone) onDone();
  }
  else if(onDone) onDone();
}

function _buildScheduleLinger(){
  const b = state.buildMode;
  if(!b || b._paused || !_buildAutoOn()) return;
  const step = b.steps[b.stepIdx];
  // New-word introduce steps get extra time — listening, no recall, more to absorb.
  const sec = (step && step.type === 'introduce')
    ? (state.settings.buildIntroduceLingerSec ?? 10)
    : (state.settings.buildLingerSec ?? 8);
  /* v6.5 — adaptive: known words shrink linger; introduce stays full. */
  const lingerMs = Math.max(0, sec) * _buildPaceFactor(step) * 1000;
  _buildSetPhase('linger', lingerMs);
  _buildSchedule(() => buildAutoNext(), lingerMs);
}

function buildRevealStep(){
  const b = state.buildMode;
  _buildClearTimer();
  b.revealed = true;
  render();
  const step = b.steps[b.stepIdx];
  setTimeout(() => {
    _buildPlayJPForStep(step, () => {
      if(state.buildMode === b && !b._paused && _buildAutoOn()) _buildScheduleLinger();
    });
  }, 150);
}
window.buildRevealStep = buildRevealStep;

/* v6.25 — Write Mode submit. Compares the typed input to the step's expected
   JP using normJPLoose (forgiving to は/わ, を/お, へ/え particle traps and
   long-vowel ambiguity, also auto-converts romaji → kana). On correct: mark
   ✓, reveal the JP, speak it, and let auto-advance carry the user forward.
   On wrong: mark ✗, reveal anyway so they see the right answer — no
   "try again" loop because Build Mode is meant to flow forward. */
function buildWriteSubmit(){
  const b = state.buildMode;
  if(!b) return;
  const step = b.steps[b.stepIdx];
  if(!step || !_buildWriteApplies(step)) return;
  const inp = document.getElementById('buildWriteInput');
  if(!inp) return;
  const typed = inp.value || '';
  if(!typed.trim()) return;
  const expected = step.sentence_jp || step.result_jp || step.expected_jp || step.jp || '';  /* v6.28 — phrase uses .jp */
  const correct = normJPLoose(typed) === normJPLoose(expected);
  b._writeAttempt = { input: typed.trim(), correct };
  /* Reveal regardless of correctness so the user sees the right answer. */
  _buildClearTimer();
  b.revealed = true;
  render();
  setTimeout(() => {
    _buildPlayJPForStep(step, () => {
      if(state.buildMode === b && !b._paused && _buildAutoOn()) _buildScheduleLinger();
    });
  }, 150);
}
window.buildWriteSubmit = buildWriteSubmit;

/* v6.26 — Similar-step tap handler. Records pick, marks correct/wrong on the
   step's per-item streak (same SIMILAR_RETIRE_STREAK contract Similar mode
   uses), reveals, then auto-advances on the linger timer like a normal step. */
function buildSimilarPick(idx){
  const b = state.buildMode;
  if(!b) return;
  const step = b.steps[b.stepIdx];
  if(!step || step.type !== 'similar') return;
  if(b._similarPick != null) return;  /* already picked */
  b._similarPick = idx;
  b.revealed = true;
  const correct = (idx === step.item_idx);
  /* Update SIMILAR streak/retire bookkeeping so progress here counts toward
     standalone Similar mode too. */
  try{
    const stat = similarStatFor(step.set_id, step.item_idx);
    stat.lastSeen = now();
    if(correct){
      stat.streak = (stat.streak || 0) + 1;
      stat.correctCount = (stat.correctCount || 0) + 1;
      if(stat.streak >= SIMILAR_RETIRE_STREAK){ stat.retired = true; stat.retiredAt = now(); }
    } else {
      stat.streak = 0;
      stat.wrongCount = (stat.wrongCount || 0) + 1;
    }
    save();
  }catch(e){}
  render();
  if(_buildAutoOn() && !b._paused){
    setTimeout(() => { if(state.buildMode === b) _buildScheduleLinger(); }, 200);
  }
}
window.buildSimilarPick = buildSimilarPick;

function buildNextStep(){
  const b = state.buildMode;
  _buildClearTimer();
  b.revealed = false;
  b._writeAttempt = null;  /* v6.25 — clear write-mode feedback between steps */
  b._similarPick = null;   /* v6.26 — clear similar-step pick between steps */
  try{ window.speechSynthesis?.cancel(); }catch(e){}
  if(b.stepIdx >= b.steps.length - 1){
    if(!b.done) buildOnComplete();
    b.done = true;
  } else { b.stepIdx++; }
  render();
}
window.buildNextStep = buildNextStep;

function buildPrevStep(){
  const b = state.buildMode;
  _buildClearTimer();
  b.revealed = false;
  b._writeAttempt = null;  /* v6.25 — clear write-mode feedback between steps */
  b._similarPick = null;   /* v6.26 — clear similar-step pick between steps */
  try{ window.speechSynthesis?.cancel(); }catch(e){}
  if(b.stepIdx > 0) b.stepIdx--;
  render();
}
window.buildPrevStep = buildPrevStep;

function buildRestart(){
  const b = state.buildMode;
  _buildClearTimer();
  b._paused = false;
  b.stepIdx = 0; b.revealed = false; b.done = false;
  b._writeAttempt = null;  /* v6.25 */

}
